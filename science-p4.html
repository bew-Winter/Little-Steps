tbody><tr><td>1</td><td>สัตว์มีกระดูกสันหลัง</td></tr><tr><td>2</td><td>สัตว์ไม่มีกระดูกสันหลัง</td></tr><tr><td>3</td><td>มีแนวกระดูกสันหลังภายในแม้ไม่มีขา</td></tr><tr><td>4</td><td>ไม่ เป็นเปลือก/โครงสร้างภายนอก</td></tr><tr><td>5</td><td>จัดถูกตามโครงร่าง</td></tr><tr><td>6</td><td>สัตว์นี้มีกระดูกสันหลังภายในหรือไม่</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนใช้เกณฑ์กระดูกสันหลังได้ดีและไม่หลงกับเปลือกแข็งภายนอก ควรฝึกอธิบาย “เกณฑ์” ก่อนยกตัวอย่างสัตว์</p></div>","lessonNo":5,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l6-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 6: สัตว์มีกระดูกสันหลัง 5 กลุ่ม","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">จำแนกปลา สัตว์สะเทินน้ำสะเทินบก สัตว์เลื้อยคลาน นก และสัตว์เลี้ยงลูกด้วยนมจากผิวหนัง การหายใจ การสืบพันธุ์ และถิ่นอาศัย</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 1.3 ป.4/4</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ใช้ลักษณะหลายข้อ ไม่ใช้ “บินได้” เพราะค้างคาวไม่ใช่นก</li><li>วาฬเป็นสัตว์เลี้ยงลูกด้วยนมแม้อยู่ในน้ำ</li><li>เพนกวินเป็นนกแม้บินไม่ได้</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"◎","search":"ปลา สัตว์สะเทินน้ำสะเทินบก สัตว์เลื้อยคลาน นก สัตว์เลี้ยงลูกด้วยนม เหงือก ปอด ขน"},{"id":"l6-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"สัตว์มีกระดูกสันหลัง 5 กลุ่ม","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ค้างคาวเป็นนกหรือไม่</li><li>ปลาใช้สิ่งใดหายใจ</li><li>กลุ่มใดผิวชื้น</li><li>เพนกวินเป็นนกเพราะอะไร</li><li>วาฬอยู่กลุ่มใด</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “สวนสัตว์ใหม่ต้องทำป้าย 5 โซน เด็กต้องจัดสัตว์และเขียนลักษณะเด่นที่แยกแต่ละโซน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ปลา: ครีบ เหงือก อยู่ในน้ำ</li><li>สะเทินน้ำสะเทินบก: ชีวิตเกี่ยวข้องทั้งน้ำและบก ผิวชื้น</li><li>เลื้อยคลาน: ผิวแห้งมีเกล็ด หายใจด้วยปอด</li><li>นก: มีขนปกคลุม วางไข่</li><li>สัตว์เลี้ยงลูกด้วยนม: มีขน/เส้นขน เลี้ยงลูกด้วยน้ำนม</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ค้างคาว</td><td>สัตว์เลี้ยงลูกด้วยนม: มีขนและเลี้ยงลูกด้วยน้ำนม</td></tr><tr><td>เพนกวิน</td><td>นก: มีขนและวางไข่</td></tr><tr><td>วาฬ</td><td>สัตว์เลี้ยงลูกด้วยนม: หายใจด้วยปอดและเลี้ยงลูกด้วยน้ำนม</td></tr></tbody></table></div>","lessonNo":6,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l6-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"สัตว์มีกระดูกสันหลัง 5 กลุ่ม","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>สร้างตาราง 5 กลุ่ม</li><li>จับคู่สัตว์กรณีพิเศษ</li><li>สร้างกุญแจจำแนกอย่างง่าย</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Five Animal Houses</div><p class=\"content-p \">อุปกรณ์: บ้านกลุ่มสัตว์ 5 หลัง บัตรสัตว์ และบัตรลักษณะ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>วางบัตรลักษณะใต้บ้านแต่ละหลัง</li><li>เด็กผลัดหยิบบัตรสัตว์และเลือกบ้าน</li><li>ต้องอ่านลักษณะที่ใช้ตัดสิน 2 ข้อ</li><li>รอบท้าทายใช้ค้างคาว วาฬ เพนกวิน ตุ่นปากเป็ด</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">ปลาทอง</span><span class=\"chip\">กบ</span><span class=\"chip\">จิ้งจก</span><span class=\"chip\">ไก่</span><span class=\"chip\">แมว</span><span class=\"chip\">ค้างคาว</span><span class=\"chip\">วาฬ</span><span class=\"chip\">เพนกวิน</span><span class=\"chip\">เต่า</span><span class=\"chip\">ซาลาแมนเดอร์</span></div><p class=\"content-p question\">เกณฑ์คะแนน: บ้านถูก 1 + ลักษณะ 2 ข้อ 2 + กรณีพิเศษ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l6-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: สัตว์มีกระดูกสันหลัง 5 กลุ่ม","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">จำแนกปลา สัตว์สะเทินน้ำสะเทินบก สัตว์เลื้อยคลาน นก และสัตว์เลี้ยงลูกด้วยนมจากผิวหนัง การหายใจ การสืบพันธุ์ และถิ่นอาศัย</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">ปลา</span><span class=\"chip\">สัตว์สะเทินน้ำสะเทินบก</span><span class=\"chip\">สัตว์เลื้อยคลาน</span><span class=\"chip\">นก</span><span class=\"chip\">สัตว์เลี้ยงลูกด้วยนม</span><span class=\"chip\">เหงือก</span><span class=\"chip\">ปอด</span><span class=\"chip\">ขน</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ใช้ลักษณะหลายข้อ ไม่ใช้ “บินได้” เพราะค้างคาวไม่ใช่นก</li><li>วาฬเป็นสัตว์เลี้ยงลูกด้วยนมแม้อยู่ในน้ำ</li><li>เพนกวินเป็นนกแม้บินไม่ได้</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ค้างคาว</td><td>สัตว์เลี้ยงลูกด้วยนม: มีขนและเลี้ยงลูกด้วยน้ำนม</td></tr><tr><td>เพนกวิน</td><td>นก: มีขนและวางไข่</td></tr><tr><td>วาฬ</td><td>สัตว์เลี้ยงลูกด้วยนม: หายใจด้วยปอดและเลี้ยงลูกด้วยน้ำนม</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ใช้ลักษณะหลายข้อ ไม่ใช้ “บินได้” เพราะค้างคาวไม่ใช่นก</li><li>วาฬเป็นสัตว์เลี้ยงลูกด้วยนมแม้อยู่ในน้ำ</li><li>เพนกวินเป็นนกแม้บินไม่ได้</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ ปลา สัตว์สะเทินน้ำสะเทินบก สัตว์เลื้อยคลาน นก สัตว์เลี้ยงลูกด้วยนม เหงือก ปอด ขน"},{"id":"l6-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"สัตว์มีกระดูกสันหลัง 5 กลุ่ม","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ปลาใช้สิ่งใดหายใจ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. กลุ่มใดมีขนปกคลุมลำตัว</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. วาฬอยู่กลุ่มใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เพนกวินเป็นนกเพราะเหตุใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เติมตาราง 5 กลุ่ม: ผิวหนัง/หายใจ/สืบพันธุ์</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. สร้างกุญแจจำแนกสัตว์ 5 ชนิดแบบคำถาม yes/no</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":6,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l6-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"สัตว์มีกระดูกสันหลัง 5 กลุ่ม","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>เหงือก</td></tr><tr><td>2</td><td>นก</td></tr><tr><td>3</td><td>สัตว์เลี้ยงลูกด้วยนม</td></tr><tr><td>4</td><td>มีขนและวางไข่ แม้บินไม่ได้</td></tr><tr><td>5</td><td>ข้อมูลถูกตามลักษณะกลุ่ม</td></tr><tr><td>6</td><td>คำถามนำไปสู่กลุ่มได้ เช่น มีขนปกคลุมหรือไม่</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนจำแนกสัตว์ 5 กลุ่มได้จากลักษณะ ไม่ใช้เพียงถิ่นอาศัย จุดที่ควรทบทวนคือกรณีพิเศษ เช่น วาฬ ค้างคาว และเพนกวิน</p></div>","lessonNo":6,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l7-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 7: สมบัติของวัสดุ: ความแข็งและสภาพยืดหยุ่น","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">ทดสอบและเปรียบเทียบความแข็งกับสภาพยืดหยุ่นด้วยวิธีที่ยุติธรรม แล้วเลือกวัสดุให้เหมาะกับงาน</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 2.1 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>แข็งไม่เท่ากับแข็งแรงทุกกรณี</li><li>ยืดได้มากไม่แปลว่าคืนรูปดี</li><li>ต้องควบคุมขนาดชิ้นงานและแรง</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"◎","search":"วัสดุ ความแข็ง รอยขีด สภาพยืดหยุ่น คืนรูป แรง การทดสอบอย่างยุติธรรม"},{"id":"l7-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"สมบัติของวัสดุ: ความแข็งและสภาพยืดหยุ่น","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ความแข็งดูจากอะไร</li><li>ยางยืดมีสมบัติใด</li><li>ทำไมต้องใช้แรงใกล้กัน</li><li>ดินน้ำมันคืนรูปไหม</li><li>วัสดุทำพื้นรองเท้าควรมีสมบัติใด</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “บริษัทออกแบบของเล่นต้องเลือกวัสดุทำล้อ สปริง และตัวรถ เด็กต้องทดสอบแล้วเสนอวัสดุพร้อมหลักฐาน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ความแข็ง = ต้านทานการขีดข่วน/กดเป็นรอย</li><li>สภาพยืดหยุ่น = เปลี่ยนรูปแล้วกลับสู่รูปเดิมเมื่อหยุดแรง</li><li>ทดสอบต้องใช้แรงและวิธีใกล้เคียงกัน</li><li>วัสดุหนึ่งชนิดอาจแข็งแต่ไม่ยืดหยุ่น</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ไม้บรรทัดเหล็กขีดพลาสติกเป็นรอย</td><td>เหล็กแข็งกว่าพลาสติกในการทดสอบนี้</td></tr><tr><td>ยางยืดกลับรูป</td><td>มีสภาพยืดหยุ่น</td></tr><tr><td>ดินน้ำมันยุบแล้วไม่คืนรูป</td><td>ยืด/เปลี่ยนรูปได้แต่สภาพยืดหยุ่นต่ำ</td></tr></tbody></table></div>","lessonNo":7,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l7-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"สมบัติของวัสดุ: ความแข็งและสภาพยืดหยุ่น","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>คาดการณ์ก่อนทดสอบ</li><li>ทดสอบรอยขีดแบบปลอดภัยด้วยวัสดุที่ครูเตรียม</li><li>ยืด/กดแล้วสังเกตการคืนรูป</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Material Testing Stations</div><p class=\"content-p \">อุปกรณ์: ฟองน้ำ ยางรัด พลาสติก ผ้า ไม้ ดินน้ำมัน คลิป และตารางผล</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>สถานี 1 กด/ขีดด้วยแรงใกล้กันเพื่อดูรอย</li><li>สถานี 2 ยืดหรือกดแล้วปล่อยเพื่อดูคืนรูป</li><li>บันทึกผล ไม่ใช้คำว่า “ดี” โดยไม่มีข้อมูล</li><li>เลือกวัสดุทำผลิตภัณฑ์และนำเสนอเหตุผล</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">ล้อของเล่น</span><span class=\"chip\">หนังยาง</span><span class=\"chip\">หมอน</span><span class=\"chip\">โต๊ะ</span><span class=\"chip\">กล่องกันกระแทก</span><span class=\"chip\">สปริง</span></div><p class=\"content-p question\">เกณฑ์คะแนน: วิธีทดสอบยุติธรรม 1 + บันทึกตรงจริง 1 + เลือกวัสดุมีเหตุผล 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l7-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: สมบัติของวัสดุ: ความแข็งและสภาพยืดหยุ่น","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ทดสอบและเปรียบเทียบความแข็งกับสภาพยืดหยุ่นด้วยวิธีที่ยุติธรรม แล้วเลือกวัสดุให้เหมาะกับงาน</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">วัสดุ</span><span class=\"chip\">ความแข็ง</span><span class=\"chip\">รอยขีด</span><span class=\"chip\">สภาพยืดหยุ่น</span><span class=\"chip\">คืนรูป</span><span class=\"chip\">แรง</span><span class=\"chip\">การทดสอบอย่างยุติธรรม</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>แข็งไม่เท่ากับแข็งแรงทุกกรณี</li><li>ยืดได้มากไม่แปลว่าคืนรูปดี</li><li>ต้องควบคุมขนาดชิ้นงานและแรง</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ไม้บรรทัดเหล็กขีดพลาสติกเป็นรอย</td><td>เหล็กแข็งกว่าพลาสติกในการทดสอบนี้</td></tr><tr><td>ยางยืดกลับรูป</td><td>มีสภาพยืดหยุ่น</td></tr><tr><td>ดินน้ำมันยุบแล้วไม่คืนรูป</td><td>ยืด/เปลี่ยนรูปได้แต่สภาพยืดหยุ่นต่ำ</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>แข็งไม่เท่ากับแข็งแรงทุกกรณี</li><li>ยืดได้มากไม่แปลว่าคืนรูปดี</li><li>ต้องควบคุมขนาดชิ้นงานและแรง</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ วัสดุ ความแข็ง รอยขีด สภาพยืดหยุ่น คืนรูป แรง การทดสอบอย่างยุติธรรม"},{"id":"l7-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"สมบัติของวัสดุ: ความแข็งและสภาพยืดหยุ่น","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ความแข็งหมายถึงอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. สภาพยืดหยุ่นหมายถึงอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ยางกับดินน้ำมันต่างกันอย่างไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ตัวแปรใดควรควบคุมในการกดทดสอบ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ออกแบบตารางทดสอบวัสดุ 4 ชนิด</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เลือกวัสดุทำกล่องกันกระแทกพร้อมเหตุผล</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":7,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l7-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"สมบัติของวัสดุ: ความแข็งและสภาพยืดหยุ่น","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ความสามารถต้านทานการขีดข่วนหรือกดเป็นรอย</td></tr><tr><td>2</td><td>เปลี่ยนรูปเมื่อมีแรงและกลับรูปเมื่อหยุดแรง</td></tr><tr><td>3</td><td>ยางคืนรูปได้ดีกว่า ดินน้ำมันคงรูปใหม่</td></tr><tr><td>4</td><td>แรง ขนาดชิ้นงาน เวลา/วิธี</td></tr><tr><td>5</td><td>มีวัสดุ วิธี รอย/การคืนรูป และสรุป</td></tr><tr><td>6</td><td>เช่น ฟองน้ำ เพราะยุบตัวรับแรงและคืนรูปได้</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนทดสอบวัสดุอย่างมีระบบและใช้ข้อมูลเลือกวัสดุได้ ควรฝึกแยกคำว่า “แข็ง” “ยืดหยุ่น” และ “แข็งแรง” ให้ชัดจากของใช้จริง</p></div>","lessonNo":7,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l8-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 8: การนำความร้อนของวัสดุ","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">เปรียบเทียบการนำความร้อนของวัสดุและอธิบายเหตุผลในการเลือกใช้ตัวนำหรือฉนวนอย่างปลอดภัย</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 2.1 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ไม่ใช้มือสัมผัสของร้อนโดยตรง</li><li>เปรียบเทียบภายใต้เวลาและอุณหภูมิเริ่มต้นใกล้กัน</li><li>ผลขึ้นกับชนิดและความหนาวัสดุด้วย</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":8,"teacherOnly":false,"icon":"◎","search":"ความร้อน การนำความร้อน ตัวนำความร้อน ฉนวนความร้อน โลหะ ไม้ พลาสติก ความปลอดภัย"},{"id":"l8-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การนำความร้อนของวัสดุ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ช้อนชนิดใดอุ่นเร็วกว่า</li><li>ด้ามหม้อควรทำจากอะไร</li><li>ตัวนำความร้อนคืออะไร</li><li>ทำไมต้องจับเวลาเท่ากัน</li><li>บอกกฎความปลอดภัย 1 ข้อ</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ทีมครัวปลอดภัยต้องออกแบบช้อนและที่จับภาชนะ โดยมีวัสดุหลายชนิดแต่ต้องพิสูจน์ก่อนเลือก” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>วัสดุนำความร้อนได้ต่างกัน</li><li>โลหะมักนำความร้อนได้ดี</li><li>ไม้ พลาสติก และผ้าหลายชนิดนำความร้อนช้ากว่า จึงใช้เป็นฉนวน</li><li>การทดลองความร้อนต้องอยู่ภายใต้การดูแลของครู</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ช้อนโลหะในน้ำอุ่น ด้ามอุ่นเร็ว</td><td>โลหะนำความร้อนได้ดี</td></tr><tr><td>ด้ามหม้อพลาสติก/ไม้</td><td>ลดการถ่ายโอนความร้อนสู่มือ</td></tr><tr><td>ผ้าห่อแก้ว</td><td>ช่วยชะลอการสูญเสีย/รับความร้อน</td></tr></tbody></table></div>","lessonNo":8,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l8-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การนำความร้อนของวัสดุ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>อ่านภาพการทดลองช้อนหลายวัสดุ</li><li>เรียงผลการนำความร้อน</li><li>เลือกวัสดุสำหรับส่วนต่าง ๆ ของเครื่องครัว</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Safe Kitchen Designer</div><p class=\"content-p \">อุปกรณ์: บัตรวัสดุ บัตรเครื่องครัว ภาพผลทดลอง และสติกเกอร์ความร้อนจำลอง</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กลุ่มอ่านผลทดลองของโลหะ ไม้ พลาสติก</li><li>จัดอันดับนำความร้อนเร็ว→ช้า</li><li>ประกอบบัตรกระทะ: ตัวกระทะ/ด้ามจับ</li><li>อธิบายว่าจุดใดต้องนำและจุดใดต้องเป็นฉนวน</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">aluminium</span><span class=\"chip\">steel</span><span class=\"chip\">wood</span><span class=\"chip\">plastic</span><span class=\"chip\">cloth</span><span class=\"chip\">กระทะ</span><span class=\"chip\">ด้ามจับ</span><span class=\"chip\">ถุงมือกันร้อน</span></div><p class=\"content-p question\">เกณฑ์คะแนน: อ่านข้อมูลถูก 1 + เลือกวัสดุถูกหน้าที่ 1 + ความปลอดภัย 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":8,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l8-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การนำความร้อนของวัสดุ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เปรียบเทียบการนำความร้อนของวัสดุและอธิบายเหตุผลในการเลือกใช้ตัวนำหรือฉนวนอย่างปลอดภัย</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">ความร้อน</span><span class=\"chip\">การนำความร้อน</span><span class=\"chip\">ตัวนำความร้อน</span><span class=\"chip\">ฉนวนความร้อน</span><span class=\"chip\">โลหะ</span><span class=\"chip\">ไม้</span><span class=\"chip\">พลาสติก</span><span class=\"chip\">ความปลอดภัย</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ไม่ใช้มือสัมผัสของร้อนโดยตรง</li><li>เปรียบเทียบภายใต้เวลาและอุณหภูมิเริ่มต้นใกล้กัน</li><li>ผลขึ้นกับชนิดและความหนาวัสดุด้วย</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ช้อนโลหะในน้ำอุ่น ด้ามอุ่นเร็ว</td><td>โลหะนำความร้อนได้ดี</td></tr><tr><td>ด้ามหม้อพลาสติก/ไม้</td><td>ลดการถ่ายโอนความร้อนสู่มือ</td></tr><tr><td>ผ้าห่อแก้ว</td><td>ช่วยชะลอการสูญเสีย/รับความร้อน</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ไม่ใช้มือสัมผัสของร้อนโดยตรง</li><li>เปรียบเทียบภายใต้เวลาและอุณหภูมิเริ่มต้นใกล้กัน</li><li>ผลขึ้นกับชนิดและความหนาวัสดุด้วย</li></ul></div>","lessonNo":8,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ ความร้อน การนำความร้อน ตัวนำความร้อน ฉนวนความร้อน โลหะ ไม้ พลาสติก ความปลอดภัย"},{"id":"l8-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การนำความร้อนของวัสดุ","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ตัวนำความร้อนคืออะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เหตุใดหม้อใช้โลหะ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เหตุใดด้ามหม้อไม่ควรเป็นโลหะเปลือย</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. บอกตัวอย่างฉนวน 2 ชนิด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. วิเคราะห์ตารางอุณหภูมิแล้วจัดอันดับวัสดุ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l8-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. ออกแบบแก้วเก็บอุณหภูมิและระบุชั้นวัสดุ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l8-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l8-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":8,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l8-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การนำความร้อนของวัสดุ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>วัสดุที่ถ่ายโอนความร้อนได้ดี/เร็ว</td></tr><tr><td>2</td><td>โลหะนำความร้อนไปสู่อาหารได้ดี</td></tr><tr><td>3</td><td>จะนำความร้อนถึงมือและเสี่ยงลวก</td></tr><tr><td>4</td><td>ไม้ พลาสติก ผ้า ฯลฯ</td></tr><tr><td>5</td><td>วัสดุที่ปลายร้อนเร็วกว่า นำความร้อนได้ดีกว่า</td></tr><tr><td>6</td><td>เลือกฉนวนและอธิบายการชะลอความร้อน</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเข้าใจตัวนำและฉนวนความร้อนจากการใช้งานจริง ควรย้ำความปลอดภัย ไม่ทดลองกับน้ำเดือดหรือของร้อนโดยไม่มีผู้ใหญ่</p></div>","lessonNo":8,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l9-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 9: การนำไฟฟ้าของวัสดุ","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">จำแนกตัวนำไฟฟ้าและฉนวนไฟฟ้าจากผลวงจรทดสอบแรงดันต่ำ พร้อมใช้ความรู้เพื่อความปลอดภัย</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 2.1 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>หลอดไม่ติดอาจเกิดจากวงจรต่อไม่ครบ ไม่ใช่วัสดุอย่างเดียว</li><li>ตรวจอุปกรณ์ด้วยตัวนำที่รู้ผลก่อน</li><li>ความเปียกชื้นเปลี่ยนความปลอดภัยของวัสดุได้</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":9,"teacherOnly":false,"icon":"◎","search":"วงจรไฟฟ้า ตัวนำไฟฟ้า ฉนวนไฟฟ้า โลหะ วงจรปิด วงจรเปิด ความปลอดภัย"},{"id":"l9-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การนำไฟฟ้าของวัสดุ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>วงจรต้องเป็นแบบใดหลอดจึงติด</li><li>โลหะส่วนมากเป็นอะไร</li><li>เปลือกสายไฟทำจากอะไร</li><li>ทำไมต้องใช้ถ่านไม่ใช้ปลั๊กบ้าน</li><li>ถ้าหลอดไม่ติดควรตรวจอะไรบ้าง</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ช่างออกแบบสายไฟต้องเลือกวัสดุแกนและเปลือกให้ไฟผ่านได้แต่ผู้ใช้ปลอดภัย” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>หลอดไฟติดเมื่อวงจรปิดและวัสดุยอมให้กระแสผ่าน</li><li>โลหะส่วนมากเป็นตัวนำไฟฟ้า</li><li>พลาสติก ยาง ไม้แห้งมักเป็นฉนวน</li><li>ห้ามทดลองกับปลั๊กไฟบ้าน ใช้เฉพาะถ่านไฟฉายแรงดันต่ำภายใต้ครู</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>คลิปโลหะต่อวงจร หลอดติด</td><td>คลิปเป็นตัวนำ</td></tr><tr><td>ยางลบต่อวงจร หลอดไม่ติด</td><td>ยางเป็นฉนวนในการทดลอง</td></tr><tr><td>สายไฟมีแกนโลหะ–เปลือกพลาสติก</td><td>แกนนำไฟฟ้า เปลือกช่วยป้องกันสัมผัส</td></tr></tbody></table></div>","lessonNo":9,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l9-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การนำไฟฟ้าของวัสดุ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ประกอบวงจรกระดาษจำลอง</li><li>อ่านผลตารางวัสดุ</li><li>ตรวจปัจจัยอื่นเมื่อหลอดไม่ติด</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Circuit Detective (Low-Voltage Simulation)</div><p class=\"content-p \">อุปกรณ์: บัตรวงจร ถ่าน/หลอดแรงดันต่ำสำหรับครู หรือแถบกระดาษจำลอง บัตรวัสดุ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูสาธิตวงจรปิดอย่างปลอดภัย หรือใช้ภาพผลทดลอง</li><li>เด็กทำนายวัสดุก่อนดูผล</li><li>จัดบัตรตัวนำ/ฉนวนจากหลักฐานหลอดติด–ไม่ติด</li><li>ออกแบบสายไฟโดยเลือกแกนและเปลือก</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">coin</span><span class=\"chip\">paper clip</span><span class=\"chip\">foil</span><span class=\"chip\">rubber</span><span class=\"chip\">plastic</span><span class=\"chip\">dry wood</span><span class=\"chip\">metal core</span><span class=\"chip\">plastic cover</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ทำนายมีเหตุผล 1 + จำแนกจากผล 1 + ออกแบบปลอดภัย 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":9,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l9-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การนำไฟฟ้าของวัสดุ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">จำแนกตัวนำไฟฟ้าและฉนวนไฟฟ้าจากผลวงจรทดสอบแรงดันต่ำ พร้อมใช้ความรู้เพื่อความปลอดภัย</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">วงจรไฟฟ้า</span><span class=\"chip\">ตัวนำไฟฟ้า</span><span class=\"chip\">ฉนวนไฟฟ้า</span><span class=\"chip\">โลหะ</span><span class=\"chip\">วงจรปิด</span><span class=\"chip\">วงจรเปิด</span><span class=\"chip\">ความปลอดภัย</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>หลอดไม่ติดอาจเกิดจากวงจรต่อไม่ครบ ไม่ใช่วัสดุอย่างเดียว</li><li>ตรวจอุปกรณ์ด้วยตัวนำที่รู้ผลก่อน</li><li>ความเปียกชื้นเปลี่ยนความปลอดภัยของวัสดุได้</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>คลิปโลหะต่อวงจร หลอดติด</td><td>คลิปเป็นตัวนำ</td></tr><tr><td>ยางลบต่อวงจร หลอดไม่ติด</td><td>ยางเป็นฉนวนในการทดลอง</td></tr><tr><td>สายไฟมีแกนโลหะ–เปลือกพลาสติก</td><td>แกนนำไฟฟ้า เปลือกช่วยป้องกันสัมผัส</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>หลอดไม่ติดอาจเกิดจากวงจรต่อไม่ครบ ไม่ใช่วัสดุอย่างเดียว</li><li>ตรวจอุปกรณ์ด้วยตัวนำที่รู้ผลก่อน</li><li>ความเปียกชื้นเปลี่ยนความปลอดภัยของวัสดุได้</li></ul></div>","lessonNo":9,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ วงจรไฟฟ้า ตัวนำไฟฟ้า ฉนวนไฟฟ้า โลหะ วงจรปิด วงจรเปิด ความปลอดภัย"},{"id":"l9-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การนำไฟฟ้าของวัสดุ","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ตัวนำไฟฟ้าคืออะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. บอกตัวนำ 2 ชนิด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. บอกฉนวน 2 ชนิด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. สายไฟมีเปลือกพลาสติกเพราะอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ถ้าหลอดไม่ติด มีสาเหตุใดนอกจากวัสดุเป็นฉนวน</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l9-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนกฎความปลอดภัยไฟฟ้า 4 ข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l9-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l9-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":9,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l9-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การนำไฟฟ้าของวัสดุ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>วัสดุที่ยอมให้กระแสไฟฟ้าผ่านได้ดี</td></tr><tr><td>2</td><td>โลหะ เช่น ทองแดง อะลูมิเนียม คลิป</td></tr><tr><td>3</td><td>พลาสติก ยาง ไม้แห้ง</td></tr><tr><td>4</td><td>เป็นฉนวนลดการสัมผัสแกนตัวนำ</td></tr><tr><td>5</td><td>วงจรเปิด ถ่านหมด จุดต่อหลวม หลอดเสีย</td></tr><tr><td>6</td><td>ไม่แตะปลั๊ก/สายชำรุด มือเปียกไม่จับอุปกรณ์ แจ้งผู้ใหญ่ ฯลฯ</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนจำแนกตัวนำ–ฉนวนและเชื่อมกับโครงสร้างสายไฟได้ดี ขอให้ย้ำว่ากิจกรรมไฟฟ้าต้องใช้แรงดันต่ำและอยู่กับผู้ใหญ่ ห้ามทดลองกับปลั๊กบ้าน</p></div>","lessonNo":9,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l10-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 10: สถานะของสสาร","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">เปรียบเทียบของแข็ง ของเหลว และแก๊สจากรูปร่าง ปริมาตร การไหล และการจัดเรียงอนุภาคแบบจำลอง</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 2.1 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>น้ำหนึ่งแก้วย้ายภาชนะ ปริมาตรเดิมแต่รูปร่างเปลี่ยน</li><li>อากาศมองไม่เห็นแต่กินที่และมีมวล</li><li>เม็ดทรายแต่ละเม็ดเป็นของแข็ง แม้กองทรายไหลได้</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":10,"teacherOnly":false,"icon":"◎","search":"สสาร ของแข็ง ของเหลว แก๊ส รูปร่าง ปริมาตร อนุภาค ภาชนะ"},{"id":"l10-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"สถานะของสสาร","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ของเหลวมีรูปร่างคงที่ไหม</li><li>แก๊สอยู่เฉพาะก้นภาชนะหรือไม่</li><li>เม็ดทรายเป็นสถานะใด</li><li>บอกสมบัติของของแข็ง 2 ข้อ</li><li>อากาศเป็นสสารเพราะอะไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักสำรวจสถานีอวกาศต้องบรรจุสสารสามสถานะลงภาชนะให้เหมาะและทำนายว่าเมื่อย้ายภาชนะจะเกิดอะไร” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ของแข็งมีรูปร่างและปริมาตรคงที่</li><li>ของเหลวปริมาตรคงที่แต่รูปร่างตามภาชนะ</li><li>แก๊สไม่มีรูปร่างและปริมาตรคงที่ เติมเต็มภาชนะ</li><li>สสารมีมวลและต้องการที่อยู่</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>น้ำแข็ง</td><td>ของแข็ง</td></tr><tr><td>น้ำในขวด/ชาม</td><td>ของเหลว รูปร่างตามภาชนะ</td></tr><tr><td>อากาศในลูกโป่ง</td><td>แก๊ส เติมพื้นที่ภายใน</td></tr></tbody></table></div>","lessonNo":10,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l10-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"สถานะของสสาร","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จำลองอนุภาคด้วยเด็กยืนชิด/เคลื่อนที่</li><li>เทน้ำจำลองระหว่างภาพภาชนะ</li><li>บีบถุงอากาศเพื่อรับรู้การกินที่</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Particle Freeze–Flow–Fly</div><p class=\"content-p \">อุปกรณ์: พื้นที่เคลื่อนไหว ป้าย solid/liquid/gas และวงเชือกแทนภาชนะ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูชูป้ายของแข็ง เด็กยืนชิดและสั่นอยู่กับที่</li><li>ของเหลว เด็กอยู่ใกล้แต่เลื่อนไหลเปลี่ยนรูปวง</li><li>แก๊ส เด็กกระจายเต็มวงและเคลื่อนอิสระ</li><li>แต่ละรอบเด็กอธิบายรูปร่างและปริมาตร</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">ice</span><span class=\"chip\">water</span><span class=\"chip\">steam/air</span><span class=\"chip\">stone</span><span class=\"chip\">milk</span><span class=\"chip\">oxygen</span><span class=\"chip\">sand grain</span></div><p class=\"content-p question\">เกณฑ์คะแนน: แบบจำลองถูก 1 + สมบัติถูก 2 + ตัวอย่างถูก 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":10,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l10-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: สถานะของสสาร","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เปรียบเทียบของแข็ง ของเหลว และแก๊สจากรูปร่าง ปริมาตร การไหล และการจัดเรียงอนุภาคแบบจำลอง</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">สสาร</span><span class=\"chip\">ของแข็ง</span><span class=\"chip\">ของเหลว</span><span class=\"chip\">แก๊ส</spa
