” ออกจาก “สิ่งที่คิด”</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.1 ป.4/1 (บูรณาการ)</span><span class=\"chip\">ทักษะกระบวนการทางวิทยาศาสตร์</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>แยกข้อสังเกตจากการอนุมานได้</li><li>เลือกเครื่องมือและหน่วยเหมาะสม</li><li>บันทึกข้อมูลเป็นตารางเพื่อใช้เป็นหลักฐาน</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"◎","search":"การสังเกต การวัด การจำแนก การพยากรณ์ ข้อมูล หลักฐาน ตัวแปร"},{"id":"l1-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ทักษะกระบวนการทางวิทยาศาสตร์","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>“ดอกไม้นี้สวย” เป็นข้อสังเกตหรือความคิดเห็น</li><li>เครื่องมือวัดความยาวคืออะไร</li><li>ทำไมต้องใส่หน่วย</li><li>การคาดจากรูปแบบเรียกว่าอะไร</li><li>ยกตัวอย่างข้อมูลเชิงจำนวน 1 อย่าง</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “กล่องปริศนามีวัตถุซ่อนอยู่ เด็กห้ามเปิด แต่ต้องใช้การเขย่า ฟัง ชั่ง และตั้งคำถามเพื่ออธิบายว่าวัตถุอาจเป็นอะไร” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>สังเกต = ใช้ประสาทสัมผัส/เครื่องมือเก็บข้อมูล</li><li>ข้อสังเกตต้องบอกสิ่งที่ตรวจได้ เช่น สี ขนาด จำนวน</li><li>การอนุมาน = คำอธิบายจากข้อมูล ต้องใช้คำว่า “อาจ”</li><li>ตารางข้อมูลต้องมีหัวข้อ หน่วย และค่าที่ชัดเจน</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ใบไม้ยาว 8 ซม. สีเขียว</td><td>เป็นข้อสังเกต</td></tr><tr><td>ใบไม้อาจได้รับแสงไม่พอ</td><td>เป็นการอนุมาน</td></tr><tr><td>วัด 3 ครั้ง: 8.0, 8.1, 8.0 ซม.</td><td>ข้อมูลมีความน่าเชื่อถือขึ้น</td></tr></tbody></table></div>","lessonNo":1,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l1-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ทักษะกระบวนการทางวิทยาศาสตร์","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จำแนกประโยค observation/inference</li><li>วัดวัตถุ 3 ชิ้นและบันทึกหน่วย</li><li>สร้างตารางเปรียบเทียบ</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Mystery Object Lab</div><p class=\"content-p \">อุปกรณ์: ถุงทึบ วัตถุปลอดภัย ไม้บรรทัด ตาชั่งอย่างง่าย และตารางบันทึก</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูใส่วัตถุในถุงโดยไม่ให้เห็น</li><li>เด็กเก็บข้อมูลจากการสัมผัสภายนอก เสียง และมวล</li><li>เขียนข้อสังเกตอย่างน้อย 4 ข้อก่อนอนุมาน</li><li>เปิดถุง ตรวจคำอธิบาย และบอกข้อมูลใดช่วยมากที่สุด</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">สี/รูปร่าง (เมื่อเปิด)</span><span class=\"chip\">เสียง</span><span class=\"chip\">ความแข็ง</span><span class=\"chip\">มวล</span><span class=\"chip\">ขนาด</span><span class=\"chip\">พื้นผิว</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ข้อสังเกตตรวจสอบได้ 1 ต่อข้อ + ใช้หน่วย 1 + อนุมานมีหลักฐาน 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l1-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ทักษะกระบวนการทางวิทยาศาสตร์","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ฝึกสังเกต วัด จำแนก พยากรณ์ ตั้งคำถาม และบันทึกข้อมูล โดยแยก “สิ่งที่เห็นจริง” ออกจาก “สิ่งที่คิด”</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">การสังเกต</span><span class=\"chip\">การวัด</span><span class=\"chip\">การจำแนก</span><span class=\"chip\">การพยากรณ์</span><span class=\"chip\">ข้อมูล</span><span class=\"chip\">หลักฐาน</span><span class=\"chip\">ตัวแปร</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>อย่าผสมความคิดเห็นกับข้อสังเกต</li><li>วัดซ้ำช่วยลดความคลาดเคลื่อน</li><li>พยากรณ์ต้องอิงรูปแบบของข้อมูล ไม่ใช่เดา</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ใบไม้ยาว 8 ซม. สีเขียว</td><td>เป็นข้อสังเกต</td></tr><tr><td>ใบไม้อาจได้รับแสงไม่พอ</td><td>เป็นการอนุมาน</td></tr><tr><td>วัด 3 ครั้ง: 8.0, 8.1, 8.0 ซม.</td><td>ข้อมูลมีความน่าเชื่อถือขึ้น</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>อย่าผสมความคิดเห็นกับข้อสังเกต</li><li>วัดซ้ำช่วยลดความคลาดเคลื่อน</li><li>พยากรณ์ต้องอิงรูปแบบของข้อมูล ไม่ใช่เดา</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ การสังเกต การวัด การจำแนก การพยากรณ์ ข้อมูล หลักฐาน ตัวแปร"},{"id":"l1-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ทักษะกระบวนการทางวิทยาศาสตร์","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ประโยค “ก้อนหินหนัก 120 กรัม” เป็นอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ประโยค “ก้อนหินน่าจะมาจากแม่น้ำ” เป็นอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. บอกเครื่องมือและหน่วยสำหรับวัดความยาวดินสอ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ทำไมควรวัดมากกว่า 1 ครั้ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. สร้างตารางสังเกตวัตถุ 3 ชิ้น มีอย่างน้อย 4 หัวข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนคำถามวิทยาศาสตร์ 1 ข้อที่ทดลองได้</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":1,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l1-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ทักษะกระบวนการทางวิทยาศาสตร์","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ข้อสังเกตเชิงปริมาณ</td></tr><tr><td>2</td><td>การอนุมาน</td></tr><tr><td>3</td><td>ไม้บรรทัด หน่วยเซนติเมตร</td></tr><tr><td>4</td><td>เพื่อตรวจสอบและลดความคลาดเคลื่อน</td></tr><tr><td>5</td><td>ตารางมีชื่อวัตถุ สี ขนาด มวล/พื้นผิว พร้อมหน่วย</td></tr><tr><td>6</td><td>ตัวอย่าง: ปริมาณแสงมีผลต่อการเจริญของต้นถั่วหรือไม่</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเก็บข้อมูลได้ละเอียดและเริ่มแยกสิ่งที่เห็นออกจากสิ่งที่คิด ควรฝึกใช้ตัวเลขและหน่วยให้ครบ ผู้ปกครองชวนสังเกตของใช้หนึ่งชิ้นโดยห้ามใช้คำว่า “สวย/ดี/น่าจะ” ได้</p></div>","lessonNo":1,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l2-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 2: การจำแนกสิ่งมีชีวิตและสิ่งไม่มีชีวิต","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">ใช้ลักษณะการดำรงชีวิตเป็นเกณฑ์จำแนกสิ่งมีชีวิต ไม่ตัดสินจากการเคลื่อนที่เพียงอย่างเดียว</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 1.3 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ใช้หลายลักษณะร่วมกัน</li><li>เมล็ดที่พักตัวเป็นสิ่งมีชีวิต แม้ยังไม่เห็นการเติบโต</li><li>ไฟลุกและขยายได้แต่ไม่ครบลักษณะสิ่งมีชีวิต</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"◎","search":"สิ่งมีชีวิต สิ่งไม่มีชีวิต เจริญเติบโต สืบพันธุ์ ตอบสนอง ต้องการอาหาร ขับถ่าย"},{"id":"l2-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การจำแนกสิ่งมีชีวิตและสิ่งไม่มีชีวิต","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>รถเคลื่อนที่ได้ จึงเป็นสิ่งมีชีวิตหรือไม่</li><li>พืชตอบสนองต่ออะไรได้บ้าง</li><li>บอกลักษณะสิ่งมีชีวิต 3 ข้อ</li><li>เมล็ดแห้งมีชีวิตไหม</li><li>ไฟเป็นสิ่งมีชีวิตหรือไม่ เพราะอะไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “พิพิธภัณฑ์ส่งภาพวัตถุปริศนามาให้เด็กจัดนิทรรศการ “มีชีวิต–ไม่มีชีวิต” โดยทุกชิ้นต้องมีเหตุผลอย่างน้อยสองข้อ” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>สิ่งมีชีวิตต้องการอาหาร/พลังงาน</li><li>เจริญเติบโตและเปลี่ยนแปลงตามวัย</li><li>ตอบสนองต่อสิ่งเร้า</li><li>สืบพันธุ์ได้ตามชนิด</li><li>สิ่งไม่มีชีวิตบางอย่างเคลื่อนที่ได้เมื่อมีแรง เช่น รถ</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ต้นถั่ว</td><td>มีชีวิต: โต ตอบสนอง และสืบพันธุ์</td></tr><tr><td>รถของเล่น</td><td>ไม่มีชีวิต: เคลื่อนที่เพราะพลังงาน/แรงภายนอก</td></tr><tr><td>เมล็ดถั่วแห้ง</td><td>มีชีวิตในภาวะพักตัว</td></tr></tbody></table></div>","lessonNo":2,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l2-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การจำแนกสิ่งมีชีวิตและสิ่งไม่มีชีวิต","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จัดบัตรภาพเป็นสองกลุ่ม</li><li>อภิปรายกรณีก้ำกึ่ง เช่น เมล็ด ไฟ หุ่นยนต์</li><li>สร้างแผนผังเกณฑ์ yes/no</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Alive or Not? Evidence Court</div><p class=\"content-p \">อุปกรณ์: บัตรภาพ 20 ใบ ป้ายสองฝั่ง และบัตรหลักฐาน</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กสุ่มบัตรภาพและเลือกฝั่งมีชีวิต/ไม่มีชีวิต</li><li>ต้องวางบัตรหลักฐาน 2 ใบเพื่อสนับสนุน</li><li>ฝ่ายตรงข้ามถามได้ 1 คำถาม</li><li>หากหลักฐานไม่พอให้ย้ายบัตรหลังอภิปราย</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">ต้นไม้</span><span class=\"chip\">แมว</span><span class=\"chip\">เห็ด</span><span class=\"chip\">เมล็ดถั่ว</span><span class=\"chip\">หุ่นยนต์</span><span class=\"chip\">รถ</span><span class=\"chip\">ไฟ</span><span class=\"chip\">เมฆ</span><span class=\"chip\">แบคทีเรีย</span><span class=\"chip\">ตุ๊กตา</span></div><p class=\"content-p question\">เกณฑ์คะแนน: จำแนกถูก 1 + หลักฐานถูก 2 + ตอบคำถามได้ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l2-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การจำแนกสิ่งมีชีวิตและสิ่งไม่มีชีวิต","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ใช้ลักษณะการดำรงชีวิตเป็นเกณฑ์จำแนกสิ่งมีชีวิต ไม่ตัดสินจากการเคลื่อนที่เพียงอย่างเดียว</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">สิ่งมีชีวิต</span><span class=\"chip\">สิ่งไม่มีชีวิต</span><span class=\"chip\">เจริญเติบโต</span><span class=\"chip\">สืบพันธุ์</span><span class=\"chip\">ตอบสนอง</span><span class=\"chip\">ต้องการอาหาร</span><span class=\"chip\">ขับถ่าย</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ใช้หลายลักษณะร่วมกัน</li><li>เมล็ดที่พักตัวเป็นสิ่งมีชีวิต แม้ยังไม่เห็นการเติบโต</li><li>ไฟลุกและขยายได้แต่ไม่ครบลักษณะสิ่งมีชีวิต</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ต้นถั่ว</td><td>มีชีวิต: โต ตอบสนอง และสืบพันธุ์</td></tr><tr><td>รถของเล่น</td><td>ไม่มีชีวิต: เคลื่อนที่เพราะพลังงาน/แรงภายนอก</td></tr><tr><td>เมล็ดถั่วแห้ง</td><td>มีชีวิตในภาวะพักตัว</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ใช้หลายลักษณะร่วมกัน</li><li>เมล็ดที่พักตัวเป็นสิ่งมีชีวิต แม้ยังไม่เห็นการเติบโต</li><li>ไฟลุกและขยายได้แต่ไม่ครบลักษณะสิ่งมีชีวิต</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ สิ่งมีชีวิต สิ่งไม่มีชีวิต เจริญเติบโต สืบพันธุ์ ตอบสนอง ต้องการอาหาร ขับถ่าย"},{"id":"l2-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การจำแนกสิ่งมีชีวิตและสิ่งไม่มีชีวิต","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. บอกลักษณะสิ่งมีชีวิต 4 ข้อ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เหตุใดรถจึงไม่ใช่สิ่งมีชีวิต</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เมล็ดถั่วแห้งจัดเป็นอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เขียนหลักฐานว่าพืชเป็นสิ่งมีชีวิต 2 ข้อ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. สร้างตารางจำแนก 6 สิ่งพร้อมเหตุผล</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบายว่าทำไมการเคลื่อนที่อย่างเดียวใช้ตัดสินไม่ได้</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":2,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l2-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การจำแนกสิ่งมีชีวิตและสิ่งไม่มีชีวิต","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ต้องการพลังงาน เจริญเติบโต ตอบสนอง สืบพันธุ์/ขับถ่าย</td></tr><tr><td>2</td><td>เคลื่อนที่เพราะแรง/พลังงานภายนอกและไม่มีลักษณะชีวิตครบ</td></tr><tr><td>3</td><td>สิ่งมีชีวิตในภาวะพักตัว</td></tr><tr><td>4</td><td>เช่น โตได้ ตอบสนองต่อแสง สืบพันธุ์</td></tr><tr><td>5</td><td>คำตอบต้องใช้เกณฑ์หลายลักษณะ</td></tr><tr><td>6</td><td>สิ่งไม่มีชีวิตบางอย่างเคลื่อนที่ได้จากแรงภายนอก</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนจำแนกได้ดีเมื่อใช้หลักฐานหลายข้อ จุดที่ควรย้ำคือ “เคลื่อนที่ได้” ไม่เพียงพอต่อการเป็นสิ่งมีชีวิต ชวนสำรวจของรอบบ้าน 5 ชิ้นและอธิบายด้วยเกณฑ์ชีวิต</p></div>","lessonNo":2,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l3-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 3: ส่วนประกอบของพืชดอก","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">ระบุราก ลำต้น ใบ ดอก ผล และเมล็ด พร้อมเชื่อมโครงสร้างแต่ละส่วนกับหน้าที่</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 1.2 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>โครงสร้างเหมาะกับหน้าที่</li><li>ส่วนต่าง ๆ ทำงานเป็นระบบ ไม่แยกขาดกัน</li><li>พืชบางชนิดมีส่วนดัดแปลง เช่น รากสะสมอาหาร</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"◎","search":"ราก ลำต้น ใบ ดอก ผล เมล็ด ดูดน้ำ ลำเลียง สร้างอาหาร"},{"id":"l3-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ส่วนประกอบของพืชดอก","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ส่วนใดดูดน้ำ</li><li>ส่วนใดรับแสงมากที่สุด</li><li>ผลมีหน้าที่อะไร</li><li>เมล็ดทำอะไรได้</li><li>ถ้ารากเสียหาย พืชจะได้รับผลอย่างไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักออกแบบพืชต้องประกอบ “โรงงานพืช” จากชิ้นส่วนให้ครบ และอธิบายเส้นทางน้ำจากดินไปถึงใบ” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>รากยึดพืชและดูดน้ำ/แร่ธาตุ</li><li>ลำต้นพยุงและลำเลียงน้ำ/อาหาร</li><li>ใบรับแสงและสร้างอาหาร</li><li>ดอกเกี่ยวข้องกับการสืบพันธุ์</li><li>ผลห่อหุ้มเมล็ด เมล็ดงอกเป็นต้นใหม่</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>รากขนอ่อนจำนวนมาก</td><td>เพิ่มพื้นที่ดูดน้ำ</td></tr><tr><td>เส้นใบเชื่อมลำต้น</td><td>ช่วยลำเลียง</td></tr><tr><td>กลีบดอกสีเด่น</td><td>ช่วยดึงดูดสัตว์ผสมเกสร</td></tr></tbody></table></div>","lessonNo":3,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l3-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ส่วนประกอบของพืชดอก","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ติดป้ายส่วนพืชจริง/ภาพ</li><li>เรียงเส้นทาง ดิน→ราก→ลำต้น→ใบ</li><li>จับคู่โครงสร้างกับหน้าที่</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Build a Plant Factory</div><p class=\"content-p \">อุปกรณ์: ชิ้นส่วนพืชกระดาษ ลูกศรสีน้ำเงิน/เขียว และบัตรหน้าที่</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กลุ่มประกอบราก ลำต้น ใบ ดอก ผล เมล็ด</li><li>วางลูกศรสีน้ำเงินแทนเส้นทางน้ำ</li><li>วางบัตรหน้าที่ใต้ส่วนที่ถูกต้อง</li><li>ครูหยิบบัตร “ส่วนนี้เสีย” ให้กลุ่มทำนายผล</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">ดูดน้ำ</span><span class=\"chip\">พยุงต้น</span><span class=\"chip\">สร้างอาหาร</span><span class=\"chip\">สืบพันธุ์</span><span class=\"chip\">ห่อหุ้มเมล็ด</span><span class=\"chip\">งอกเป็นต้นใหม่</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ตำแหน่งถูก 1 ต่อส่วน + หน้าที่ถูก 1 + ทำนายมีเหตุผล 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l3-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ส่วนประกอบของพืชดอก","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ระบุราก ลำต้น ใบ ดอก ผล และเมล็ด พร้อมเชื่อมโครงสร้างแต่ละส่วนกับหน้าที่</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">ราก</span><span class=\"chip\">ลำต้น</span><span class=\"chip\">ใบ</span><span class=\"chip\">ดอก</span><span class=\"chip\">ผล</span><span class=\"chip\">เมล็ด</span><span class=\"chip\">ดูดน้ำ</span><span class=\"chip\">ลำเลียง</span><span class=\"chip\">สร้างอาหาร</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>โครงสร้างเหมาะกับหน้าที่</li><li>ส่วนต่าง ๆ ทำงานเป็นระบบ ไม่แยกขาดกัน</li><li>พืชบางชนิดมีส่วนดัดแปลง เช่น รากสะสมอาหาร</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>รากขนอ่อนจำนวนมาก</td><td>เพิ่มพื้นที่ดูดน้ำ</td></tr><tr><td>เส้นใบเชื่อมลำต้น</td><td>ช่วยลำเลียง</td></tr><tr><td>กลีบดอกสีเด่น</td><td>ช่วยดึงดูดสัตว์ผสมเกสร</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>โครงสร้างเหมาะกับหน้าที่</li><li>ส่วนต่าง ๆ ทำงานเป็นระบบ ไม่แยกขาดกัน</li><li>พืชบางชนิดมีส่วนดัดแปลง เช่น รากสะสมอาหาร</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ ราก ลำต้น ใบ ดอก ผล เมล็ด ดูดน้ำ ลำเลียง สร้างอาหาร"},{"id":"l3-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ส่วนประกอบของพืชดอก","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ส่วนใดดูดน้ำและแร่ธาตุ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ส่วนใดลำเลียงและพยุง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ใบมีหน้าที่สำคัญอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ดอกเกี่ยวข้องกับกระบวนการใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. วาดพืชและใส่ป้าย 6 ส่วน</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบายเส้นทางน้ำจากดินถึงใบ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":3,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l3-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ส่วนประกอบของพืชดอก","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ราก</td></tr><tr><td>2</td><td>ลำต้น</td></tr><tr><td>3</td><td>รับแสงและสร้างอาหาร</td></tr><tr><td>4</td><td>การสืบพันธุ์</td></tr><tr><td>5</td><td>ราก ลำต้น ใบ ดอก ผล เมล็ดครบ</td></tr><tr><td>6</td><td>ดิน→ราก→ลำต้น→ใบ ผ่านท่อลำเลียง</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเชื่อมส่วนของพืชกับหน้าที่ได้ดี ควรทบทวนเส้นทางน้ำและความสัมพันธ์ของทุกส่วน ลองให้ผู้เรียนชี้ส่วนของผัก/ผลไม้จริงและบอกหน้าที่</p></div>","lessonNo":3,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l4-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 4: หน้าที่ของราก ลำต้น และใบ: การทดลองง่าย ๆ","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">อธิบายหน้าที่ของราก ลำต้น และใบจากหลักฐานการทดลอง ไม่เพียงท่องจำข้อความ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 1.2 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ผลทดลองต้องเทียบก่อน–หลัง</li><li>ควรมีชุดเปรียบเทียบ</li><li>ห้ามสรุปเกินหลักฐานที่เห็น</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":4,"teacherOnly":false,"icon":"◎","search":"ท่อลำเลียง การคายน้ำ ปากใบ คลอโรฟิลล์ แสง น้ำสี หลักฐาน"},{"id":"l4-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"หน้าที่ของราก ลำต้น และใบ: การทดลองง่าย ๆ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>น้ำเดินทางจากรากไปส่วนใด</li><li>หยดน้ำในถุงคลุมใบมาจากไหน</li><li>เหตุใดต้องมีชุดไม่ใส่สี</li><li>ใบต้องการอะไรสร้างอาหาร</li><li>หลักฐานต่างจากข้อสรุปอย่างไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ห้องทดลองได้รับคำถามว่า “ลำต้นเป็นเพียงแท่งพยุงหรือมีหน้าที่ลำเลียงด้วย” เด็กต้องออกแบบการสังเกตเพื่อหาหลักฐาน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ลำต้นลำเลียงน้ำขึ้นสู่ใบ</li><li>ใบใช้แสง น้ำ และคาร์บอนไดออกไซด์สร้างอาหาร</li><li>ใบคายน้ำบางส่วนผ่านปากใบ</li><li>การเปลี่ยนสีของก้าน/เส้นใบเป็นหลักฐานการลำเลียง</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>คื่นฉ่ายแช่น้ำสี เส้นใบเปลี่ยนสี</td><td>น้ำเคลื่อนผ่านลำต้นไปใบ</td></tr><tr><td>ถุงใสคลุมใบเกิดหยดน้ำ</td><td>ใบคายน้ำ</td></tr><tr><td>ใบในที่มืดนาน</td><td>สร้างอาหารได้น้อยลงเพราะขาดแสง</td></tr></tbody></table></div>","lessonNo":4,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l4-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"หน้าที่ของราก ลำต้น และใบ: การทดลองง่าย ๆ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>คาดการณ์ผลคื่นฉ่ายในน้ำสี</li><li>วาดก่อน–หลังและระบุส่วนเปลี่ยนสี</li><li>สร้างตารางเวลา/การเปลี่ยนแปลง</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Water Journey Simulation</div><p class=\"content-p \">อุปกรณ์: เชือกสีน้ำเงิน บัตรราก–ลำต้น–ใบ ลูกปัดแทนน้ำ และภาพการทดลอง</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กยืนเป็นส่วนพืชต่อกัน</li><li>ส่งลูกปัดน้ำจากรากผ่านลำต้นไปใบ</li><li>ครูวางอุปสรรค “ลำต้นหัก” ให้ทำนาย</li><li>อ่านภาพทดลองน้ำสีและเขียนหลักฐาน</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">รากดูดน้ำ</span><span class=\"chip\">ลำต้นลำเลียง</span><span class=\"chip\">ใบใช้บางส่วน</span><span class=\"chip\">ใบคายน้ำ</span><span class=\"chip\">ลำต้นหัก</span><span class=\"chip\">ขาดแสง</span></div><p class=\"content-p question\">เกณฑ์คะแนน: เส้นทางถูก 1 + ทำนายผล 1 + อ้างหลักฐาน 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":4,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l4-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: หน้าที่ของราก ลำต้น และใบ: การทดลองง่าย ๆ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อธิบายหน้าที่ของราก ลำต้น และใบจากหลักฐานการทดลอง ไม่เพียงท่องจำข้อความ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">ท่อลำเลียง</span><span class=\"chip\">การคายน้ำ</span><span class=\"chip\">ปากใบ</span><span class=\"chip\">คลอโรฟิลล์</span><span class=\"chip\">แสง</span><span class=\"chip\">น้ำสี</span><span class=\"chip\">หลักฐาน</span></div><p class=\"content-p subhead\">กฎห "form-field\"><label>5. เขียนผลคาดการณ์คื่นฉ่ายในน้ำสี 3 ชั่วโมง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l4-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียน CER สั้น ๆ: Claim–Evidence–Reasoning ว่าลำต้นลำเลียงน้ำ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l4-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l4-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":4,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l4-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"หน้าที่ของราก ลำต้น และใบ: การทดลองง่าย ๆ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>มีการลำเลียงน้ำผ่านลำต้นไปใบ</td></tr><tr><td>2</td><td>การคายน้ำ</td></tr><tr><td>3</td><td>แสง</td></tr><tr><td>4</td><td>เพื่อเห็นการเปลี่ยนแปลงและแนวโน้ม</td></tr><tr><td>5</td><td>ก้าน/เส้นใบจะมีสีตามน้ำมากขึ้น</td></tr><tr><td>6</td><td>ข้อกล่าวอ้าง + หลักฐานสี + เหตุผลเชื่อมโยง</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเริ่มอธิบายหน้าที่พืชจากหลักฐานได้ ไม่ใช่เพียงจำคำตอบ ควรฝึกพูดรูปแบบ “ฉันสรุปว่า… เพราะสังเกตเห็น…” จากเหตุการณ์รอบตัว</p></div>","lessonNo":4,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l5-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 5: การจำแนกสัตว์มีกระดูกสันหลังและไม่มีกระดูกสันหลัง","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">จำแนกสัตว์โดยใช้การมีกระดูกสันหลังเป็นเกณฑ์หลัก แล้วสังเกตลักษณะอื่นประกอบ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 1.3 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ใช้โครงสร้างภายในเป็นเกณฑ์</li><li>สัตว์ตัวนิ่มอาจมีกระดูกสันหลัง เช่น ปลา</li><li>สัตว์มีเปลือกอาจไม่มีกระดูกสันหลัง เช่น ปู หอย</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":5,"teacherOnly":false,"icon":"◎","search":"สัตว์มีกระดูกสันหลัง สัตว์ไม่มีกระดูกสันหลัง โครงร่าง ลำตัว เกณฑ์จำแนก หลักฐาน"},{"id":"l5-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การจำแนกสัตว์มีกระดูกสันหลังและไม่มีกระดูกสันหลัง","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ปูมีกระดูกสันหลังไหม</li><li>งูอยู่กลุ่มใด</li><li>แมลงมีโครงร่างแบบใด</li><li>เกณฑ์หลักวันนี้คืออะไร</li><li>ยกสัตว์ไม่มีกระดูกสันหลัง 2 ชนิด</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ศูนย์ช่วยเหลือสัตว์ต้องจัดห้องตรวจสองห้องตามชนิดโครงร่าง เด็กต้องส่งสัตว์เข้าห้องถูกและเขียนหลักฐาน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>มีกระดูกสันหลัง: ปลา สัตว์สะเทินน้ำสะเทินบก สัตว์เลื้อยคลาน นก สัตว์เลี้ยงลูกด้วยนม</li><li>ไม่มีกระดูกสันหลัง: แมลง หนอน หอย แมงมุม ปะการัง ฯลฯ</li><li>เปลือกแข็งภายนอกไม่เท่ากับกระดูกสันหลัง</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ปลา</td><td>มีกระดูกสันหลัง</td></tr><tr><td>ปู</td><td>ไม่มีกระดูกสันหลัง แม้มีเปลือกแข็ง</td></tr><tr><td>งู</td><td>มีกระดูกสันหลัง แม้ไม่มีขา</td></tr></tbody></table></div>","lessonNo":5,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l5-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การจำแนกสัตว์มีกระดูกสันหลังและไม่มีกระดูกสันหลัง","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>คลำแนวกระดูกสันหลังของตน/แบบจำลอง</li><li>จัดบัตรภาพ 2 กลุ่ม</li><li>อภิปรายสัตว์หลอกตา เช่น ปู งู หมึก</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Animal Sorting Clinic</div><p class=\"content-p \">อุปกรณ์: บัตรสัตว์ 24 ใบ ป้ายสองกลุ่ม และบัตรเหตุผล</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กหยิบบัตรสัตว์หนึ่งใบ</li><li>วางในกลุ่มมีกระดูก/ไม่มีกระดูกสันหลัง</li><li>พูดหลักฐานโดยห้ามใช้เพียง “หน้าตาเหมือน”</li><li>เพื่อนมีสิทธิ์ท้าทายและเสนอหลักฐานใหม่</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">ปลา</span><span class=\"chip\">กบ</span><span class=\"chip\">งู</span><span class=\"chip\">นก</span><span class=\"chip\">แมว</span><span class=\"chip\">ผีเสื้อ</span><span class=\"chip\">ปู</span><span class=\"chip\">ไส้เดือน</span><span class=\"chip\">หอย</span><span class=\"chip\">หมึก</span><span class=\"chip\">แมงมุม</span><span class=\"chip\">แมงกะพรุน</span></div><p class=\"content-p question\">เกณฑ์คะแนน: กลุ่มถูก 1 + หลักฐานถูก 1 + แก้คำตอบจากหลักฐานได้ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอ
