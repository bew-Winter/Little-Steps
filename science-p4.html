-field\"><label>4. อากาศเป็นสสารหรือไม่</label><input type=\"text\" class=\"response-input \" data-save-key=\"l10-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ทำตารางเปรียบเทียบ 3 สถานะ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l10-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบายเม็ดทรายกับกองทราย</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l10-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l10-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":10,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l10-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"สถานะของสสาร","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>คงที่</td></tr><tr><td>2</td><td>ค่อนข้างคงที่ แต่รูปร่างตามภาชนะ</td></tr><tr><td>3</td><td>เติมเต็มพื้นที่ภาชนะ</td></tr><tr><td>4</td><td>เป็น เพราะมีมวลและกินที่</td></tr><tr><td>5</td><td>ระบุรูปร่าง ปริมาตร การไหล และตัวอย่าง</td></tr><tr><td>6</td><td>แต่ละเม็ดเป็นของแข็ง แต่เม็ดจำนวนมากเลื่อนไหลกันได้</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเปรียบเทียบสถานะสสารได้ดี จุดที่ควรย้ำคือกองเม็ดเล็กไหลได้ไม่ทำให้แต่ละเม็ดกลายเป็นของเหลว ลองจำแนกวัสดุในครัว 10 ชนิด</p></div>","lessonNo":10,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l11-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 11: การเปลี่ยนสถานะของสสาร","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">อธิบายการหลอมเหลว แข็งตัว ระเหย ควบแน่น และระเหิดด้วยการรับ–สูญเสียความร้อน พร้อมแยกการเปลี่ยนทางกายภาพ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 2.1 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>น้ำยังเป็นสารเดิมแม้เปลี่ยนสถานะ</li><li>อัตราการเปลี่ยนขึ้นกับอุณหภูมิ พื้นที่ผิว ลม ฯลฯ</li><li>หยดน้ำนอกแก้วเย็นมาจากไอน้ำในอากาศควบแน่น ไม่ได้ซึมจากในแก้ว</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":11,"teacherOnly":false,"icon":"◎","search":"หลอมเหลว แข็งตัว ระเหย ควบแน่น ระเหิด ความร้อน ย้อนกลับได้"},{"id":"l11-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การเปลี่ยนสถานะของสสาร","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>น้ำแข็งรับหรือเสียความร้อนเมื่อหลอม</li><li>หยดน้ำบนแก้วเย็นมาจากไหน</li><li>ของเหลวเป็นแก๊สเรียกว่าอะไร</li><li>น้ำในช่องแช่แข็งเกิดอะไร</li><li>การเปลี่ยนสถานะเป็นสารใหม่หรือไม่</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักสืบครัวพบเหตุการณ์น้ำแข็งหาย หยดน้ำบนฝา และผ้าแห้ง ต้องติดป้ายชื่อกระบวนการพร้อมลูกศรความร้อน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ของแข็ง→ของเหลว = หลอมเหลว (รับความร้อน)</li><li>ของเหลว→ของแข็ง = แข็งตัว (สูญเสียความร้อน)</li><li>ของเหลว→แก๊ส = ระเหย</li><li>แก๊ส→ของเหลว = ควบแน่น</li><li>บางสาร ของแข็ง→แก๊ส = ระเหิด</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>น้ำแข็งละลาย</td><td>หลอมเหลว</td></tr><tr><td>หยดน้ำบนฝาหม้อ</td><td>ควบแน่น</td></tr><tr><td>ผ้าแห้ง</td><td>น้ำระเหยสู่อากาศ</td></tr></tbody></table></div>","lessonNo":11,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l11-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การเปลี่ยนสถานะของสสาร","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เรียงแผนภาพสถานะ</li><li>ติดลูกศรรับ/สูญเสียความร้อน</li><li>วิเคราะห์เหตุการณ์ในชีวิตจริง</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: State Change Domino</div><p class=\"content-p \">อุปกรณ์: การ์ดสถานะ การ์ดกระบวนการ ลูกศรแดงรับร้อน/น้ำเงินเสียร้อน</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กต่อโดมิโน solid→melting→liquid เป็นต้น</li><li>วางลูกศรความร้อนให้ถูกทิศ</li><li>จับคู่เหตุการณ์จริงกับกระบวนการ</li><li>อธิบายหนึ่งเหตุการณ์โดยใช้คำว่าอนุภาค/พลังงานแบบง่าย</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">ice melts</span><span class=\"chip\">water freezes</span><span class=\"chip\">wet clothes dry</span><span class=\"chip\">dew forms</span><span class=\"chip\">mothball shrinks</span><span class=\"chip\">steam becomes drops</span></div><p class=\"content-p question\">เกณฑ์คะแนน: กระบวนการถูก 1 + ทิศความร้อนถูก 1 + อธิบายเหตุการณ์ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":11,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l11-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การเปลี่ยนสถานะของสสาร","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อธิบายการหลอมเหลว แข็งตัว ระเหย ควบแน่น และระเหิดด้วยการรับ–สูญเสียความร้อน พร้อมแยกการเปลี่ยนทางกายภาพ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">หลอมเหลว</span><span class=\"chip\">แข็งตัว</span><span class=\"chip\">ระเหย</span><span class=\"chip\">ควบแน่น</span><span class=\"chip\">ระเหิด</span><span class=\"chip\">ความร้อน</span><span class=\"chip\">ย้อนกลับได้</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>น้ำยังเป็นสารเดิมแม้เปลี่ยนสถานะ</li><li>อัตราการเปลี่ยนขึ้นกับอุณหภูมิ พื้นที่ผิว ลม ฯลฯ</li><li>หยดน้ำนอกแก้วเย็นมาจากไอน้ำในอากาศควบแน่น ไม่ได้ซึมจากในแก้ว</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>น้ำแข็งละลาย</td><td>หลอมเหลว</td></tr><tr><td>หยดน้ำบนฝาหม้อ</td><td>ควบแน่น</td></tr><tr><td>ผ้าแห้ง</td><td>น้ำระเหยสู่อากาศ</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>น้ำยังเป็นสารเดิมแม้เปลี่ยนสถานะ</li><li>อัตราการเปลี่ยนขึ้นกับอุณหภูมิ พื้นที่ผิว ลม ฯลฯ</li><li>หยดน้ำนอกแก้วเย็นมาจากไอน้ำในอากาศควบแน่น ไม่ได้ซึมจากในแก้ว</li></ul></div>","lessonNo":11,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ หลอมเหลว แข็งตัว ระเหย ควบแน่น ระเหิด ความร้อน ย้อนกลับได้"},{"id":"l11-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การเปลี่ยนสถานะของสสาร","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ของแข็งเป็นของเหลวเรียกว่า</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. แก๊สเป็นของเหลวเรียกว่า</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ผ้าแห้งเพราะกระบวนการใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. หยดน้ำนอกแก้วเย็นมาจากไหน</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. วาดแผนภาพ 3 สถานะพร้อมลูกศร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l11-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. ยกตัวอย่างการเปลี่ยนที่ย้อนกลับได้ 2 อย่าง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l11-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l11-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":11,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l11-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การเปลี่ยนสถานะของสสาร","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>หลอมเหลว</td></tr><tr><td>2</td><td>ควบแน่น</td></tr><tr><td>3</td><td>การระเหย</td></tr><tr><td>4</td><td>ไอน้ำในอากาศควบแน่น</td></tr><tr><td>5</td><td>solid-liquid-gas พร้อม melting/freezing/evaporation/condensation</td></tr><tr><td>6</td><td>น้ำแข็งละลายแล้วแข็งตัว; น้ำระเหยแล้วควบแน่น</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเรียกชื่อการเปลี่ยนสถานะได้ดี ควรทบทวนความเข้าใจเรื่องหยดน้ำนอกแก้วว่าเกิดจากไอน้ำในอากาศ ไม่ใช่น้ำซึมผ่านแก้ว</p></div>","lessonNo":11,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l12-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 12: แรงโน้มถ่วง มวล และน้ำหนัก","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">อธิบายแรงโน้มถ่วงที่ดึงวัตถุสู่โลก และแยกมวล (ปริมาณเนื้อสาร) จากน้ำหนัก (แรงโน้มถ่วงกระทำต่อวัตถุ)</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 2.2 ป.4/1</span><span class=\"chip\">ว 2.2 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>คำว่า “หนัก 2 กิโลกรัม” ในชีวิตประจำวันมักหมายถึงมวล</li><li>วัตถุทุกชิ้นตกด้วยแรงโน้มถ่วง แม้อากาศมีผลต่อความเร็ว</li><li>แรงมีทั้งขนาดและทิศทาง</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":12,"teacherOnly":false,"icon":"◎","search":"แรง แรงโน้มถ่วง มวล น้ำหนัก ทิศทาง โลก นิวตัน กรัม/กิโลกรัม"},{"id":"l12-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"แรงโน้มถ่วง มวล และน้ำหนัก","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>แรงโน้มถ่วงชี้ทิศใด</li><li>มวลใช้หน่วยอะไร</li><li>น้ำหนักใช้หน่วยอะไร</li><li>ไปดวงจันทร์มวลเปลี่ยนไหม</li><li>วัตถุลอยมีแรงโน้มถ่วงไหม</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักบินอวกาศต้องจัดกระเป๋าโดยเข้าใจว่ามวลของของยังเท่าเดิม แต่น้ำหนักบนดวงจันทร์ลดลง” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>แรงโน้มถ่วงมีทิศเข้าสู่ศูนย์กลางโลก</li><li>มวลบอกปริมาณเนื้อสาร ใช้หน่วย g/kg</li><li>น้ำหนักเป็นแรง ใช้หน่วยนิวตัน (N)</li><li>บนสถานที่แรงโน้มถ่วงต่างกัน มวลเท่าเดิมแต่น้ำหนักอาจเปลี่ยน</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ปล่อยลูกบอล</td><td>เคลื่อนลงเพราะแรงโน้มถ่วง</td></tr><tr><td>ก้อนหินมวล 1 kg บนโลก/ดวงจันทร์</td><td>มวลเท่าเดิม แต่น้ำหนักต่าง</td></tr><tr><td>ลูกโป่งลอย</td><td>ยังมีแรงโน้มถ่วง แต่มีแรงอื่นช่วยพยุง</td></tr></tbody></table></div>","lessonNo":12,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l12-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"แรงโน้มถ่วง มวล และน้ำหนัก","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>วาดลูกศรแรงโน้มถ่วงรอบโลก</li><li>จำแนกข้อความมวล/น้ำหนัก</li><li>เปรียบเทียบโลก–ดวงจันทร์</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Gravity Arrow Challenge</div><p class=\"content-p \">อุปกรณ์: ภาพโลก ลูกศรแม่เหล็ก/กระดาษ บัตรวัตถุ และบัตรมวล–น้ำหนัก</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>วางวัตถุรอบภาพโลกหลายตำแหน่ง</li><li>เด็กวางลูกศรชี้เข้าสู่ศูนย์กลางโลก</li><li>จับบัตรข้อความลงคอลัมน์มวล/น้ำหนัก</li><li>ตอบสถานการณ์อวกาศโดยอธิบายสิ่งที่เปลี่ยน/ไม่เปลี่ยน</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">2 kg</span><span class=\"chip\">20 N</span><span class=\"chip\">amount of matter</span><span class=\"chip\">force due to gravity</span><span class=\"chip\">same on Moon</span><span class=\"chip\">smaller on Moon</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ทิศลูกศรถูก 1 + จำแนกหน่วยถูก 1 + อธิบายโลก/ดวงจันทร์ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":12,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l12-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: แรงโน้มถ่วง มวล และน้ำหนัก","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อธิบายแรงโน้มถ่วงที่ดึงวัตถุสู่โลก และแยกมวล (ปริมาณเนื้อสาร) จากน้ำหนัก (แรงโน้มถ่วงกระทำต่อวัตถุ)</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">แรง</span><span class=\"chip\">แรงโน้มถ่วง</span><span class=\"chip\">มวล</span><span class=\"chip\">น้ำหนัก</span><span class=\"chip\">ทิศทาง</span><span class=\"chip\">โลก</span><span class=\"chip\">นิวตัน</span><span class=\"chip\">กรัม/กิโลกรัม</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>คำว่า “หนัก 2 กิโลกรัม” ในชีวิตประจำวันมักหมายถึงมวล</li><li>วัตถุทุกชิ้นตกด้วยแรงโน้มถ่วง แม้อากาศมีผลต่อความเร็ว</li><li>แรงมีทั้งขนาดและทิศทาง</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ปล่อยลูกบอล</td><td>เคลื่อนลงเพราะแรงโน้มถ่วง</td></tr><tr><td>ก้อนหินมวล 1 kg บนโลก/ดวงจันทร์</td><td>มวลเท่าเดิม แต่น้ำหนักต่าง</td></tr><tr><td>ลูกโป่งลอย</td><td>ยังมีแรงโน้มถ่วง แต่มีแรงอื่นช่วยพยุง</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>คำว่า “หนัก 2 กิโลกรัม” ในชีวิตประจำวันมักหมายถึงมวล</li><li>วัตถุทุกชิ้นตกด้วยแรงโน้มถ่วง แม้อากาศมีผลต่อความเร็ว</li><li>แรงมีทั้งขนาดและทิศทาง</li></ul></div>","lessonNo":12,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ แรง แรงโน้มถ่วง มวล น้ำหนัก ทิศทาง โลก นิวตัน กรัม/กิโลกรัม"},{"id":"l12-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"แรงโน้มถ่วง มวล และน้ำหนัก","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. แรงโน้มถ่วงมีทิศทางใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. มวลคืออะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. น้ำหนักคืออะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. หน่วยของมวลและน้ำหนัก</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ถ้าไปดวงจันทร์ สิ่งใดคงเดิม</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l12-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. วาดแรงที่กระทำต่อลูกบอลวางนิ่งแบบง่าย</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l12-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l12-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":12,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l12-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"แรงโน้มถ่วง มวล และน้ำหนัก","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>เข้าสู่ศูนย์กลางโลก</td></tr><tr><td>2</td><td>ปริมาณเนื้อสารในวัตถุ</td></tr><tr><td>3</td><td>แรงโน้มถ่วงที่กระทำต่อวัตถุ</td></tr><tr><td>4</td><td>มวล g/kg; น้ำหนัก N</td></tr><tr><td>5</td><td>มวลคงเดิม น้ำหนักลดลง</td></tr><tr><td>6</td><td>ลูกศรแรงโน้มถ่วงลง และแรงพยุงจากพื้นขึ้น</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเข้าใจทิศของแรงโน้มถ่วงและเริ่มแยกมวลกับน้ำหนักได้ จุดที่ควรฝึกคือหน่วย: kg เป็นมวล ส่วน N เป็นน้ำหนัก/แรง</p></div>","lessonNo":12,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l13-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 13: การวัดน้ำหนักด้วยเครื่องชั่งสปริง","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">อ่านค่าเครื่องชั่งสปริงอย่างถูกต้อง ตั้งศูนย์ เลือกช่วงวัด และบันทึกหน่วยนิวตันจากแบบจำลองหรืออุปกรณ์จริง</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 2.2 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>การอ่านเฉียงทำให้เกิด parallax</li><li>ค่าต่อขีด = ช่วงตัวเลขระหว่างป้าย ÷ จำนวนช่อง</li><li>วัดซ้ำและตรวจความสม่ำเสมอ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":13,"teacherOnly":false,"icon":"◎","search":"เครื่องชั่งสปริง สเกล ค่าต่ำสุด ตั้งศูนย์ นิวตัน ช่วงวัด ความคลาดเคลื่อน"},{"id":"l13-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การวัดน้ำหนักด้วยเครื่องชั่งสปริง","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ก่อนวัดตรวจอะไร</li><li>หน่วยเครื่องชั่งสปริงคืออะไร</li><li>0–2 มี 4 ช่อง ค่าต่อขีดเท่าไร</li><li>ทำไมตาต้องระดับเดียวกับเข็ม</li><li>แขวนเกินช่วงวัดได้ไหม</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “สถานีชั่งพัสดุพบป้ายสเกลหลายแบบ เด็กต้องคำนวณค่าต่อขีดและอ่านน้ำหนักก่อนส่งของ” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ตรวจเข็ม/ขีดเริ่มที่ศูนย์ก่อนใช้</li><li>อ่านระดับสายตาตรงกับสเกล</li><li>หาค่าต่อขีดก่อนอ่าน</li><li>ไม่แขวนเกินช่วงวัด</li><li>บันทึกตัวเลขพร้อมหน่วย N</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ระหว่าง 0–1 N มี 5 ช่อง</td><td>ค่าต่อขีด 0.2 N</td></tr><tr><td>เข็มอยู่ขีดที่ 7 จากศูนย์ ค่าต่อขีด 0.5 N</td><td>อ่านได้ 3.5 N</td></tr><tr><td>เข็มไม่อยู่ศูนย์ก่อนแขวน</td><td>ต้องปรับ/บันทึกข้อผิดพลาดก่อน</td></tr></tbody></table></div>","lessonNo":13,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l13-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การวัดน้ำหนักด้วยเครื่องชั่งสปริง","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ฝึกหาค่าต่อขีดจากภาพ</li><li>อ่านค่าเข็มหลายตำแหน่ง</li><li>เรียงขั้นตอนใช้เครื่องชั่ง</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Spring Scale Stations</div><p class=\"content-p \">อุปกรณ์: ภาพเครื่องชั่งสปริงหลายสเกล คลิปหนีบวัตถุ หรือเครื่องชั่งจริงภายใต้ครู</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>สถานี A หาค่าต่อขีด</li><li>สถานี B อ่านเข็มโดยวางสายตาตรง</li><li>สถานี C ตรวจข้อผิดพลาด เช่น ไม่ตั้งศูนย์/เกินช่วง</li><li>บันทึกค่าและหน่วยในใบภารกิจ</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">0–5 N / 10 ช่อง</span><span class=\"chip\">0–2 N / 4 ช่อง</span><span class=\"chip\">เข็ม 1.5 N</span><span class=\"chip\">ไม่ตั้งศูนย์</span><span class=\"chip\">อ่านเฉียง</span><span class=\"chip\">เกินช่วง 5 N</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ค่าต่อขีดถูก 1 + อ่านค่าถูก 1 + ระบุข้อผิดพลาด 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":13,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l13-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การวัดน้ำหนักด้วยเครื่องชั่งสปริง","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อ่านค่าเครื่องชั่งสปริงอย่างถูกต้อง ตั้งศูนย์ เลือกช่วงวัด และบันทึกหน่วยนิวตันจากแบบจำลองหรืออุปกรณ์จริง</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">เครื่องชั่งสปริง</span><span class=\"chip\">สเกล</span><span class=\"chip\">ค่าต่ำสุด</span><span class=\"chip\">ตั้งศูนย์</span><span class=\"chip\">นิวตัน</span><span class=\"chip\">ช่วงวัด</span><span class=\"chip\">ความคลาดเคลื่อน</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>การอ่านเฉียงทำให้เกิด parallax</li><li>ค่าต่อขีด = ช่วงตัวเลขระหว่างป้าย ÷ จำนวนช่อง</li><li>วัดซ้ำและตรวจความสม่ำเสมอ</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ระหว่าง 0–1 N มี 5 ช่อง</td><td>ค่าต่อขีด 0.2 N</td></tr><tr><td>เข็มอยู่ขีดที่ 7 จากศูนย์ ค่าต่อขีด 0.5 N</td><td>อ่านได้ 3.5 N</td></tr><tr><td>เข็มไม่อยู่ศูนย์ก่อนแขวน</td><td>ต้องปรับ/บันทึกข้อผิดพลาดก่อน</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>การอ่านเฉียงทำให้เกิด parallax</li><li>ค่าต่อขีด = ช่วงตัวเลขระหว่างป้าย ÷ จำนวนช่อง</li><li>วัดซ้ำและตรวจความสม่ำเสมอ</li></ul></div>","lessonNo":13,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ เครื่องชั่งสปริง สเกล ค่าต่ำสุด ตั้งศูนย์ นิวตัน ช่วงวัด ความคลาดเคลื่อน"},{"id":"l13-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การวัดน้ำหนักด้วยเครื่องชั่งสปริง","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ขั้นแรกก่อนใช้เครื่องชั่งสปริง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l13-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. หน่วยที่อ่านคือ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l13-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. 0–4 N มี 8 ช่อง ค่าต่อขีด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l13-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เข็มอยู่ขีดที่ 6 ค่าต่อขีด 0.5 N</label><input type=\"text\" class=\"response-input \" data-save-key=\"l13-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เรียงขั้นตอนใช้เครื่องชั่ง 5 ขั้น</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l13-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. บอกข้อควรระวัง 3 ข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l13-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l13-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":13,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l13-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การวัดน้ำหนักด้วยเครื่องชั่งสปริง","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ตรวจและตั้งศูนย์</td></tr><tr><td>2</td><td>นิวตัน (N)</td></tr><tr><td>3</td><td>0.5 N</td></tr><tr><td>4</td><td>3.0 N</td></tr><tr><td>5</td><td>ตั้งศูนย์–เลือกช่วง–แขวน–อ่านระดับตา–บันทึกหน่วย</td></tr><tr><td>6</td><td>ไม่เกินช่วง ไม่แกว่ง อ่านตรงระดับตา/ไม่เล่นอุปกรณ์</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนอ่านสเกลและใส่หน่วยได้ดีขึ้น ควรฝึกหาค่าต่อขีดก่อนทุกครั้ง เพราะสเกลแต่ละเครื่องไม่เท่ากัน</p></div>","lessonNo":13,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l14-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 14: ดวงจันทร์และการเปลี่ยนแปลงรูปร่างปรากฏ","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">อธิบายว่าดวงจันทร์ไม่ได้เปลี่ยนรูปร่างจริง แต่ส่วนสว่างที่มองเห็นจากโลกเปลี่ยนตามตำแหน่งดวงอาทิตย์–โลก–ดวงจันทร์</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 3.1 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>เงาของโลกไม่ใช่สาเหตุของข้างขึ้นข้างแรม (เงาโลกเกี่ยวกับจันทรุปราคา)</li><li>ดวงจันทร์ยังเป็นทรงกลม</li><li>ตำแหน่งและมุมมองสำคัญ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"◎","search":"ดวงจันทร์ ข้างขึ้น ข้างแรม ดวงจันทร์เต็มดวง จันทร์ดับ แสงอาทิตย์ โคจร รูปร่างปรากฏ"},{"id":"l14-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ดวงจันทร์และการเปลี่ยนแปลงรูปร่างปรากฏ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ดวงจันทร์มีแสงเองไหม</li><li>ครึ่งหนึ่งได้รับแสงหรือไม่</li><li>ข้างขึ้นข้างแรมเกิดจากเงาโลกไหม</li><li>ดวงจันทร์เปลี่ยนรูปร่างจริงหรือไม่</li><li>ใช้เวลาประมาณเท่าไรครบวงรอบ</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักข่าวท้องฟ้าต้องตอบข่าวลือว่า “ดวงจันทร์ถูกกินทีละส่วน” ด้วยแบบจำลองลูกบอลและไฟฉาย” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ดวงจันทร์ไม่มีแสงในตัวเอง สะท้อนแสงอาทิตย์</li><li>ครึ่งหนึ่งของดวงจันทร์ได้รับแสงเสมอ</li><li>จากโลกเราเห็นส่วนสว่างต่างกันเมื่อดวงจันทร์โคจร</li><li>รอบรูปร่างปรากฏประมาณหนึ่งเดือน</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ดวงจันทร์อยู่ด้านตรงข้ามดวงอาทิตย์เมื่อมองจากโลก</td><td>มักเห็นเต็มดวง</td></tr><tr><td>ดวงจันทร์ใกล้ทิศเดียวกับดวงอาทิตย์</td><td>มักเห็นมืด/จันทร์ดับ</td></tr><tr><td>เห็นครึ่งดวง</td><td>มุมโลก–ดวงจันทร์–ดวงอาทิตย์ประมาณฉาก</td></tr></tbody></table></div>","lessonNo":14,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l14-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ดวงจันทร์และการเปลี่ยนแปลงรูปร่างปรากฏ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ใช้ลูกบอลเป็นดวงจันทร์และโคมไฟเป็นดวงอาทิตย์</li><li>สังเกตส่วนสว่างจากตำแหน่งโลก</li><li>เรียงภาพเฟสตามลำดับ</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Moon Phase Human Model</div><p class=\"content-p \">อุปกรณ์: โคมไฟคงที่ ลูกบอลโฟม หรือวงกลมครึ่งดำ–ขาว และการ์ดเฟส</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>โคมไฟแทนดวงอาทิตย์ เด็กยืนเป็นโลกถือบอลดวงจันทร์</li><li>หมุนบอลรอบตัวโดยห้ามหมุนโคมไฟ</li><li>หยุด 8 ตำแหน่งและวาดส่วนสว่างที่เห็น</li><li>เรียงการ์ดจากจันทร์ดับ→เต็มดวง→จันทร์ดับ</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">new moon</span><span class=\"chip\">waxing crescent</span><span class=\"chip\">first quarter</span><span class=\"chip\">waxing gibbous</span><span class=\"chip\">full moon</span><span class=\"chip\">waning gibbous</span><span class=\"chip\">last quarter</span><span class=\"chip\">waning crescent</span></div><p class=\"content-p question\">เกณฑ์คะแนน: แบบจำลองตำแหน่งถูก 1 + ภาพส่วนสว่างถูก 1 + อธิบายไม่ใช้เงาโลก 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l14-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ดวงจันทร์และการเปลี่ยนแปลงรูปร่างปรากฏ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อธิบายว่าดวงจันทร์ไม่ได้เปลี่ยนรูปร่างจริง แต่ส่วนสว่างที่มองเห็นจากโลกเปลี่ยนตามตำแหน่งดวงอาทิตย์–โลก–ดวงจันทร์</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">ดวงจันทร์</span><span class=\"chip\">ข้างขึ้น</span><span class=\"chip\">ข้างแรม</span><span class=\"chip\">ดวงจันทร์เต็มดวง</span><span class=\"chip\">จันทร์ดับ</span><span class=\"chip\">แสงอาทิตย์</span><span class=\"chip\">โคจร</span><span class=\"chip\">รูปร่างปรากฏ</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>เงาของโลกไม่ใช่สาเหตุของข้างขึ้นข้างแรม (เงาโลกเกี่ยวกับจันทรุปราคา)</li><li>ดวงจันทร์ยังเป็นทรงกลม</li><li>ตำแหน่งและมุมมองสำคัญ</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ดวงจันทร์อยู่ด้านตรงข้ามดวงอาทิตย์เมื่อมองจากโลก</td><td>มักเห็นเต็มดวง</td></tr><tr><td>ดวงจันทร์ใกล้ทิศเดียวกับดวงอาทิตย์</td><td>มักเห็นมืด/จันทร์ดับ</td></tr><tr><td>เห็นครึ่งดวง</td><td>มุมโลก–ดวงจันทร์–ดวงอาทิตย์ประมาณฉาก</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>เงาของโลกไม่ใช่สาเหตุของข้างขึ้นข้างแรม (เงาโลกเกี่ยวกับจันทรุปราคา)</li><li>ดวงจันทร์ยังเป็นทรงกลม</li><li>ตำแหน่งและมุมมองสำคัญ</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ ดวงจันทร์ ข้างขึ้น ข้างแรม ดวงจันทร์เต็มดวง จันทร์ดับ แสงอาทิตย์ โคจร รูปร่างปรากฏ"},{"id":"l14-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ดวงจันทร์และการเปลี่ยนแปลงรูปร่างปรากฏ","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ดวงจันทร์สว่างเพราะอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ดวงจันทร์เปลี่ยนรูปร่างจริงหรือไม่</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ข้างขึ้นข้างแรมเกิดจากอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เงาโลกทำให้เกิดข้างขึ้นข้างแรมหรือไม่</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เรียง 4 เฟสหลัก</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนคำอธิบายข่าวลือ “ดวงจันทร์ถูกกิน” 3 ประโยค</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":14,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l14-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ดวงจันทร์และการเปลี่ยนแปลงรูปร่างปรากฏ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>สะท้อนแสงจากดวงอาทิตย์</td></tr><tr><td>2</td><td>ไม่ เป็นรูปร่างปรากฏจากส่วนสว่างที่เห็น</td></tr><tr><td>3</td><td>ตำแหน่งสัมพัทธ์ของดวงอาทิตย์ โลก และดวงจันทร์</td></tr><tr><td>4</td><td>ไม่ เงาโลกเกี่ยวกับจันทรุปราคา</td></tr><tr><td>5</td><td>จันทร์ดับ–ครึ่งดวงข้างขึ้น–เต็มดวง–ครึ่งดวงข้างแรม</td></tr><tr><td>6</td><td>อธิบายการสะท้อนแสงและมุมมอง</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนใช้แบบจำลองอธิบายเฟสดวงจันทร์ได้ จุดสำคัญคือไม่ใช้ “เงาโลก” อธิบายข้างขึ้นข้างแรม ชวนสังเกตดวงจันทร์หลายคืนและวาดรูปพร้อมวันที่</p></div>","lessonNo":14,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l15-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 15: ระบบสุริยะและแบบจำลอง","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">อธิบายองค์ประกอบพื้นฐานของระบบสุริยะและใช้แบบจำลองอย่างรู้ข้อจำกัด ไม่สับสนขนาดกับระยะทางจริง</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 3.1 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ลำดับจากดวงอาทิตย์: พุธ ศุกร์ โลก อังคาร พฤหัสบดี เสาร์ ยูเรนัส เนปจูน</li><li>โลกหมุนรอบตัวเองและโคจรรอบดวงอาทิตย์</li><li>ดวงจันทร์โคจรรอบโลก</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"◎","search":"ดวงอาทิตย์ ดาวเคราะห์ วงโคจร ดาวบริวาร ดาวเคราะห์น้อย ดาวหาง ระบบสุริยะ แบบจำลอง"},{"id":"l15-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ระบบสุริยะและแบบจำลอง","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ดวงอาทิตย์เป็นดาวอะไร</li><li>มีดาวเคราะห์กี่ดวง</li><li>โลกอยู่ลำดับที่เท่าไร</li><li>ดวงจันทร์โคจรรอบอะไร</li><li>แบบจำลองมีข้อจำกัดอะไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ศูนย์วิทยาศาสตร์ต้องสร้างนิทรรศการระบบสุริยะในห้องเล็ก เด็กต้องเลือกว่าจะเน้นลำดับ ขนาด หรือระยะ และติดป้ายข้อจำกัด” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ดวงอาทิตย์เป็นดาวฤกษ์และศูนย์กลางระบบสุริยะ</li><li>ดาวเคราะห์ 8 ดวงโคจรรอบดวงอาทิตย์</li><li>ดาวเคราะห์บางดวงมีดวงจันทร์บริวาร</li><li>แบบจำลองช่วยอธิบายแต่ไม่สามารถทำขนาดและระยะจริงพร้อมกันได้ง่าย</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ลูกบอลขนาดต่างกันเรียงบนโต๊ะ</td><td>เป็นแบบจำลองขนาดโดยประมาณ ไม่ใช่ระยะจริง</td></tr><tr><td>โลกโคจรรอบดวงอาทิตย์</td><td>ใช้เวลาประมาณ 1 ปี</td></tr><tr><td>โลกหมุนรอบตัวเอง</td><td>เกี่ยวข้องกับกลางวัน–กลางคืน</td></tr></tbody></table></div>","lessonNo":15,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l15-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ระบบสุริยะและแบบจำลอง","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เรียงบัตรดาวเคราะห์</li><li>เปรียบเทียบดาวเคราะห์หิน/แก๊สอย่างง่าย</li><li>วิจารณ์แบบจำลองที่ดาวทุกดวงห่างเท่ากัน</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Solar System Walk</div><p class=\"content-p \">อุปกรณ์: บัตรดาวเคราะห์ เชือกวงโคจร และป้ายข้อจำกัด</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กเรียงบัตร 8 ดวงจากดวงอาทิตย์</li><li>วางวงโคจรโดยเน้นลำดับ ไม่อ้างว่าเป็นระยะจริง</li><li>แต่ละคนถือดาวและเดินโคจรช้า ๆ</li><li>กลุ่มติดป้าย “แบบจำลองนี้แสดง… แต่ไม่แสดง…”</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Mercury/พุธ</span><span class=\"chip\">Venus/ศุกร์</span><span class=\"chip\">Earth/โลก</span><span class=\"chip\">Mars/อังคาร</span><span class=\"chip\">Jupiter/พฤหัสบดี</span><span class=\"chip\">Saturn/เสาร์</span><span class=\"chip\">Uranus/ยูเรนัส</span><span class=\"chip\">Neptune/เนปจูน</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ลำดับถูก 2 + บทบาทการโคจรถูก 1 + บอกข้อจำกัด 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l15-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ระบบสุริยะและแบบจำลอง","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อธิบายองค์ประกอบพื้นฐานของระบบสุริยะและใช้แบบจำลองอย่างรู้ข้อจำกัด ไม่สับสนขนาดกับระยะทางจริง</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">ดวงอาทิตย์</span><span class=\"chip\">ดาวเคราะห์</span><span class=\"chip\">วงโคจร</span><span class=\"chip\">ดาวบริวาร</span><span class=\"chip\">ดาวเคราะห์น้อย</span><span class=\"chip\">ดาวหาง</span><span class=\"chip\">ระบบสุริยะ</span><span class=\"chip\">แบบจำลอง</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ลำดับจากดวงอาทิตย์: พุธ ศุกร์ โลก อังคาร พฤหัสบดี เสาร์ ยูเรนัส เนปจูน</li><li>โลกหมุนรอบตัวเองและโคจรรอบดวงอาทิตย์</li><li>ดวงจันทร์โคจรรอบโลก</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ลูกบอลขนาดต่างกันเรียงบนโต๊ะ</td><td>เป็นแบบจำลองขนาดโดยประมาณ ไม่ใช่ระยะจริง</td></tr><tr><td>โลกโคจรรอบดวงอาทิตย์</td><td>ใช้เวลาประมาณ 1 ปี</td></tr><tr><td>โลกหมุนรอบตัวเอง</td><td>เกี่ยวข้องกับกลางวัน–กลางคืน</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ลำดับจากดวงอาทิตย์: พุธ ศุกร์ โลก อังคาร พฤหัสบดี เสาร์ ยูเรนัส เนปจูน</li><li>โลกหมุนรอบตัวเองและโคจรรอบดวงอาทิตย์</li><li>ดวงจันทร์โคจรรอบโลก</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ ดวงอาทิตย์ ดาวเคราะห์ วงโคจร ดาวบริวาร ดาวเคราะห์น้อย ดาวหาง ระบบสุริยะ แบบจำลอง"},{"id":"l15-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ระบบสุริยะและแบบจำลอง","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ดวงอาทิตย์เป็นดาวชนิดใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ดาวเคราะห์มีกี่ดวง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. โลกเป็นลำดับที่เท่าไรจากดวงอาทิตย์</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เรียงดาว 4 ดวงแรก</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนสิ่งที่แบบจำลองลูกบอลแสดงได้ 2 อย่าง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนข้อจำกัดแบบจำลอง 2 อย่าง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":15,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l15-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ระบบสุริยะและแบบจำลอง","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ดาวฤกษ์</td></tr><tr><td>2</td><td>8 ดวง</td></tr><tr><td>3</td><td>ลำดับที่ 3</td></tr><tr><td>4</td><td>พุธ ศุกร์ โลก อังคาร</td></tr><tr><td>5</td><td>ลำดับ/ขนาดเปรียบเทียบ/การโคจรโดยประมาณ</td></tr><tr><td>6</td><td>ขนาด ระยะ ความเร็ว และวงโคจรไม่เป็นสัดส่วนจริงทั้งหมด</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนจำลำดับดาวเคราะห์และเข้าใจบทบาทแบบจำลองได้ดี ควรย้ำว่าแบบจำลองห้องเรียนไม่ใช่ขนาดและระยะจริงทุกอย่างพร้อมกัน</p></div>","lessonNo":15,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l16-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 16: ภารกิจทบทวนวิทยาศาสตร์แบบบูรณาการ","parent":"วิทยาศาสตร์ ป.4","html":"<p class=\"content-p lead\">บูรณาการสิ่งมีชีวิต วัสดุ สสาร แรง และอวกาศ ผ่านสถานีปัญหา พร้อมอธิบายคำตอบแบบ Claim–Evidence–Reasoning</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 1.2–3.1 ป.4 (ทบทวน)</span><span class=\"chip\">สมรรถนะการสืบเสาะและสื่อสาร</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ตอบคำถามด้วย Claim–Evidence–Reasoning</li><li>เชื่อมแนวคิดหลายบทกับสถานการณ์จริง</li><li>ประเมินจุดแข็งและหัวข้อที่ต้องเสริมของตน</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":16,"teacherOnly":false,"icon":"◎","search":"Claim Evidence Reasoning ข้อมูล แบบจำลอง ทบทวน สื่อสาร ตรวจสอบ"},{"id":"l16-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ภารกิจทบทวนวิทยาศาสตร์แบบบูรณาการ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>CER ย่อจากอะไร</li><li>หลักฐานต่างจากเหตุผลอย่างไร</li><li>ยก claim เรื่องพืช 1 ข้อ</li><li>ข้อสรุปเปลี่ยนได้ไหมเมื่อมีข้อมูลใหม่</li><li>บอกหัวข้อที่อยากทบทวนที่สุด</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ทีม Little Scientists ต้องผ่าน 5 สถานีเพื่อรับตรานักวิทยาศาสตร์ โดยทุกสถานีต้องตอบพร้อมหลักฐาน ไม่รับคำตอบเดา” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>Claim = ข้อสรุปที่ตอบคำถาม</li><li>Evidence = ข้อมูล/สิ่งสังเกตที่สนับสนุน</li><li>Reasoning = หลักวิทยาศาสตร์ที่เชื่อมข้อมูลกับข้อสรุป</li><li>คำตอบที่ดีต้องตรวจได้และยอมแก้เมื่อมีหลักฐานใหม่</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>Claim: โลหะเหมาะทำก้นหม้อ</td><td>Evidence: ปลายช้อนโลหะอุ่นเร็วที่สุด</td><td>Reasoning: โลหะนำความร้อนได้ดี</td></tr><tr><td>Claim: วาฬเป็นสัตว์เลี้ยงลูกด้วยนม</td><td>Evidence: หายใจด้วยปอดและเลี้ยงลูกด้วยน้ำนม</td><td>Reasoning: ลักษณะตรงเกณฑ์กลุ่ม</td></tr></tbody></table></div>","lessonNo":16,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l16-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ภารกิจทบทวนวิทยาศาสตร์แบบบูรณาการ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ทบทวนแผนผังแนวคิดทั้งคอร์ส</li><li>ทำสถานีแบบจับเวลา</li><li>เลือกหนึ่งสถานีเขียน CER เต็ม</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Science Mission Stations</div><p class=\"content-p \">อุปกรณ์: ซองภารกิจ 5 ซอง บัตรคำ ตารางคะแนน และวัสดุจำลอง</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>สถานี 1 พืช/สัตว์: จำแนกพร้อมหลักฐาน</li><li>สถานี 2 วัสดุ: เลือกใช้ตามสมบัติ</li><li>สถานี 3 สสาร: เรียงการเปลี่ยนสถานะ</li><li>สถานี 4 แรง: แยกมวล–น้ำหนัก/อ่านสเกล</li><li>สถานี 5 อวกาศ: เรียงเฟสดวงจันทร์/ดาวเคราะห์</li><li>กลุ่มเลือกคำตอบหนึ่งข้อทำโปสเตอร์ CER</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Plant function</span><span class=\"chip\">Animal group</span><span class=\"chip\">Material choice</span><span class=\"chip\">State change</span><span class=\"chip\">Gravity</span><span class=\"chip\">Moon phase</span><span class=\"chip\">Solar system model</span></div><p class=\"content-p question\">เกณฑ์คะแนน: แต่ละสถานี 3 คะแนน: คำตอบ 1 หลักฐาน 1 คำศัพท์/เหตุผล 1</p></div><div class=\"note\"><div function coverHTML(){return `<div class="cover"><div class="cover-copy"><div class="eyebrow">✦ ${COURSE.englishName}</div><h1 class="cover-title">${COURSE.title}<span>ป.4 · 16 ชั่วโมง</span></h1><p class="cover-subtitle">${COURSE.subtitle}</p><div class="cover-pills">${COURSE.pills.map(x=>`<span class="cover-pill">${x}</span>`).join('')}</div><div class="cta-row"><button type="button" class="cta primary" onclick="go('course-map')">ดูแผนทั้งคอร์ส →</button><button type="button" class="cta secondary" onclick="go('${COURSE.firstLesson}')">เริ่มชั่วโมงที่ 1</button></div></div><div class="cover-logo"><img src="assets/logo.png" alt="Little Steps"></div></div>`}
function mapHTML(){return `<div class="map"><div class="map-head"><div><div class="eyebrow">แผนที่คอร์ส</div><h2>16 ก้าวการเรียนรู้</h2><p>แตะบทเรียนเพื่อเปิดภาพรวม ขั้นสอน ใบความรู้ เกม และใบงาน</p></div><button type="button" class="icon-btn" onclick="printAll()">🖨️ พิมพ์ทั้งชุด</button></div><div class="lesson-grid">${COURSE.lessons.map(l=>`<button type="button" class="lesson-card" onclick="go('${l.first}')"><span class="n">${l.no}</span><h3>${l.title}</h3><small>เปิดบทเรียน →</small></button>`).join('')}</div></div>`}
function render(dir=0){let s=cur();if(mode==='student'&&s.teacherOnly){current=visible()[0].id;s=cur()};const el=$('.slide');if(s.kind==='cover')el.innerHTML=coverHTML();else if(s.kind==='map')el.innerHTML=mapHTML();else el.innerHTML=`<header class="banner"><div class="kicker"><span class="dots"></span>${s.label}${s.lessonNo?` · ชั่วโมงที่ ${s.lessonNo}`:''}</div><h1 class="slide-title">${s.title}</h1>${s.parent?`<div class="slide-parent">${s.parent}</div>`:''}</header><main class="body">${s.html}</main><footer class="footer"><div class="footer-note">Little Steps · เพราะทุกก้าวเล็ก ๆ สร้างพัฒนาการที่ยิ่งใหญ่</div><div class="footer-actions"><button type="button" class="arrow" onclick="prev()">← ก่อนหน้า</button><button type="button" class="arrow primary" onclick="next()">ถัดไป →</button></div></footer>`;bindInputs();update();document.title=`${s.title} | ${COURSE.title} ป.4`;window.scrollTo({top:0,left:0,behavior:'auto'});$('.body')?.scrollTo(0,0)}
function go(id,historyMode='push'){const s=SLIDES.find(x=>x.id===id);if(!s)return;if(mode==='student'&&s.teacherOnly){toast('หน้านี้แสดงในโหมดครู');return}const v=visible(),old=v.findIndex(x=>x.id===current),neu=v.findIndex(x=>x.id===id);current=id;history[historyMode+'State']({id},'',`#${id}`);render(neu>old?1:-1);closeMenu()}
function next(){const v=visible(),i=v.findIndex(x=>x.id===current);if(i<v.length-1)go(v[i+1].id)}function prev(){const v=visible(),i=v.findIndex(x=>x.id===current);if(i>0)go(v[i-1].id)}
function update(){const v=visible(),i=Math.max(0,v.findIndex(x=>x.id===current));$('.progress-bar').style.width=`${(i+1)*100/v.length}%`;$('.progress-label').textContent=`${i+1} / ${v.length}`;$('.dock-page').textContent=`หน้า ${i+1} จาก ${v.length}`;$('.dock-title').textContent=cur().title;$$('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===current));const d=$(`details[data-lesson="${cur().lessonNo}"]`);if(d)d.open=true;$$('.arrow').forEach((b,n)=>b.disabled=n===0?i===0:i===v.length-1)}
function setMode(m){mode=m;Store.set(COURSE.storage+'-mode',m);document.body.dataset.mode=m;$('.mode-btn').dataset.active=String(m==='teacher');$('.mode-text').textContent=m==='teacher'?'ครู':'ผู้เรียน';if(m==='student'&&cur().teacherOnly)current=visible()[0].id;buildNav();render();toast(m==='teacher'?'เปิดโหมดครูแล้ว':'เปิดโหมดผู้เรียนแล้ว')}

function buildNav(){let h='<div class="nav-title">เริ่มต้น</div>';for(const s of SLIDES.filter(x=>!x.lessonNo&&(mode==='teacher'||!x.teacherOnly)))h+=navBtn(s);for(const l of COURSE.lessons){const ss=SLIDES.filter(x=>x.lessonNo===l.no&&(mode==='teacher'||!x.teacherOnly));h+=`<details class="lesson-group" data-lesson="${l.no}"><summary><span class="nav-num">${l.no}</span><span>ชั่วโมงที่ ${l.no}<br><small>${l.title}</small></span></summary><div class="group-body">${ss.map(navBtn).join('')}</div></details>`}$('.nav-content').innerHTML=h;bindSearch();update()}

window.addEventListener('popstate',()=>{const id=(location.hash||'#home').slice(1);if(SLIDES.some(s=>s.id===id)){current=id;render()}});window.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')closeMenu()});
let touch=null;$('.stage').addEventListener('touchstart',e=>{if(e.target.closest('input,textarea,button,a,.table-wrap,summary'))return;const t=e.touches[0];touch={x:t.clientX,y:t.clientY,time:Date.now()}},{passive:true});$('.stage').addEventListener('touchend',e=>{if(!touch)return;const t=e.changedTouches[0],dx=t.clientX-touch.x,dy=t.clientY-touch.y,dt=Date.now()-touch.time;touch=null;if(dt<650&&Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.3)(dx<0?next:prev)()},{passive:true});
$('.mode-btn').dataset.active=String(mode==='teacher');$('.mode-text').textContent=mode==='teacher'?'ครู':'ผู้เรียน';buildNav();history.replaceState({id:current},'',`#${current}`);render();
</script></body></html>
