ท 4.1 ป.4/1"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"จำแนกอักษรกลาง สูง และต่ำจากคำตัวอย่างได้"},{"type":"p","style":"List Bullet","text":"บอกคำเป็นและคำตายจากเสียงท้ายและความยาวของสระ"},{"type":"p","style":"List Bullet","text":"ใช้ความรู้พื้นฐานช่วยอ่านและเขียนคำที่มีวรรณยุกต์ได้"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"อักษรกลาง 9 ตัว: ก จ ฎ ฏ ด ต บ ป อ"},{"type":"p","style":"List Bullet","text":"อักษรสูง 11 ตัว: ข ฃ ฉ ฐ ถ ผ ฝ ศ ษ ส ห ส่วนที่เหลือเป็นอักษรต่ำ"},{"type":"p","style":"List Bullet","text":"คำเป็น: สระยาวไม่มีตัวสะกด หรือสะกดแม่ กน กม เกย เกอว; คำตาย: สระสั้นไม่มีตัวสะกด หรือสะกดแม่ กก กด กบ"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","บันไดเสียงภาษาไทย"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 6: อักษรสามหมู่ คำเป็น–คำตาย และเสียงวรรณยุกต์ ตัวชี้วัดที่เน้น ท 4.1 ป.4/1 จุดประสงค์การเรียนรู้ จำแนกอักษรกลาง สูง และต่ำจากคำตัวอย่างได้ บอกคำเป็นและคำตายจากเสียงท้ายและความยาวของสระ ใช้ความรู้พื้นฐานช่วยอ่านและเขียนคำที่มีวรรณยุกต์ได้ แนวคิดสำคัญ อักษรกลาง 9 ตัว: ก จ ฎ ฏ ด ต บ ป อ อักษรสูง 11 ตัว: ข ฃ ฉ ฐ ถ ผ ฝ ศ ษ ส ห ส่วนที่เหลือเป็นอักษรต่ำ คำเป็น: สระยาวไม่มีตัวสะกด หรือสะกดแม่ กน กม เกย เกอว; คำตาย: สระสั้นไม่มีตัวสะกด หรือสะกดแม่ กก กด กบ หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท บันไดเสียงภาษาไทย สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l6-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 6: อักษรสามหมู่ คำเป็น–คำตาย และเสียงวรรณยุกต์","lessonNo":6,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: กา, ขา, นา, ปิด\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูอ่าน “กา–ก่า–ก้า–ก๊า–ก๋า” ให้เด็กใช้มือวาดระดับเสียงขึ้นลง\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• อักษรกลาง 9 ตัว: ก จ ฎ ฏ ด ต บ ป อ\n• อักษรสูง 11 ตัว: ข ฃ ฉ ฐ ถ ผ ฝ ศ ษ ส ห ส่วนที่เหลือเป็นอักษรต่ำ\n• คำเป็น: สระยาวไม่มีตัวสะกด หรือสะกดแม่ กน กม เกย เกอว; คำตาย: สระสั้นไม่มีตัวสะกด หรือสะกดแม่ กก กด กบ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nคำ “บ้าน” บ เป็นอักษรกลาง สระยาว และสะกดแม่กน จึงเป็นคำเป็น\nคำ “รัก” ร เป็นอักษรต่ำ สระสั้น/สะกดแม่กก จึงเป็นคำตาย\nครูเน้นว่าชั่วโมงนี้ฝึกจำแนกพื้นฐานก่อน ไม่ท่องตารางผันวรรณยุกต์ทั้งหมดในครั้งเดียว\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ขา” พยัญชนะต้นอยู่หมู่ใด และเป็นคำเป็นหรือคำตาย\n• คำว่า “ปิด” เป็นคำตายเพราะเหตุใด\n• คำว่า “ลม” เป็นคำเป็นหรือคำตาย\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: บันไดเสียงภาษาไทย","ครูอธิบายกติกา:\n• ครูแสดงบัตรคำ เด็กยืนบนช่อง กลาง–สูง–ต่ำ ตามพยัญชนะต้น\n• จากนั้นชูป้าย “เป็น” หรือ “ตาย”\n• ทีมได้คะแนนเมื่ออธิบายกฎได้ ไม่ใช่ตอบถูกอย่างเดียว\nบัตรพร้อมใช้: กา, ขา, นา, ปิด, รัก, ลม, ดาว, โต๊ะ\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• อธิบายคำเป็นด้วยภาษาของตนเอง\n• จำแนก “เด็ก” และ “เรียน” เป็นคำเป็นหรือคำตาย\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"อักษรกลาง 9 ตัว: ก จ ฎ ฏ ด ต บ ป อ"},{"type":"p","style":"List Bullet","text":"อักษรสูง 11 ตัว: ข ฃ ฉ ฐ ถ ผ ฝ ศ ษ ส ห ส่วนที่เหลือเป็นอักษรต่ำ"},{"type":"p","style":"List Bullet","text":"คำเป็น: สระยาวไม่มีตัวสะกด หรือสะกดแม่ กน กม เกย เกอว; คำตาย: สระสั้นไม่มีตัวสะกด หรือสะกดแม่ กก กด กบ"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"คำ “บ้าน” บ เป็นอักษรกลาง สระยาว และสะกดแม่กน จึงเป็นคำเป็น\nคำ “รัก” ร เป็นอักษรต่ำ สระสั้น/สะกดแม่กก จึงเป็นคำตาย\nครูเน้นว่าชั่วโมงนี้ฝึกจำแนกพื้นฐานก่อน ไม่ท่องตารางผันวรรณยุกต์ทั้งหมดในครั้งเดียว"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"กา | ขา | นา | ปิด | รัก | ลม | ดาว | โต๊ะ"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: กา, ขา, นา, ปิด\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูอ่าน “กา–ก่า–ก้า–ก๊า–ก๋า” ให้เด็กใช้มือวาดระดับเสียงขึ้นลง\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• อักษรกลาง 9 ตัว: ก จ ฎ ฏ ด ต บ ป อ\n• อักษรสูง 11 ตัว: ข ฃ ฉ ฐ ถ ผ ฝ ศ ษ ส ห ส่วนที่เหลือเป็นอักษรต่ำ\n• คำเป็น: สระยาวไม่มีตัวสะกด หรือสะกดแม่ กน กม เกย เกอว; คำตาย: สระสั้นไม่มีตัวสะกด หรือสะกดแม่ กก กด กบ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nคำ “บ้าน” บ เป็นอักษรกลาง สระยาว และสะกดแม่กน จึงเป็นคำเป็น\nคำ “รัก” ร เป็นอักษรต่ำ สระสั้น/สะกดแม่กก จึงเป็นคำตาย\nครูเน้นว่าชั่วโมงนี้ฝึกจำแนกพื้นฐานก่อน ไม่ท่องตารางผันวรรณยุกต์ทั้งหมดในครั้งเดียว\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ขา” พยัญชนะต้นอยู่หมู่ใด และเป็นคำเป็นหรือคำตาย\n• คำว่า “ปิด” เป็นคำตายเพราะเหตุใด\n• คำว่า “ลม” เป็นคำเป็นหรือคำตาย\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: บันไดเสียงภาษาไทย ครูอธิบายกติกา:\n• ครูแสดงบัตรคำ เด็กยืนบนช่อง กลาง–สูง–ต่ำ ตามพยัญชนะต้น\n• จากนั้นชูป้าย “เป็น” หรือ “ตาย”\n• ทีมได้คะแนนเมื่ออธิบายกฎได้ ไม่ใช่ตอบถูกอย่างเดียว\nบัตรพร้อมใช้: กา, ขา, นา, ปิด, รัก, ลม, ดาว, โต๊ะ\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• อธิบายคำเป็นด้วยภาษาของตนเอง\n• จำแนก “เด็ก” และ “เรียน” เป็นคำเป็นหรือคำตาย\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน อักษรกลาง 9 ตัว: ก rmal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 4.1 ป.4/2"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"ระบุคำนาม สรรพนาม และคำกริยาในประโยคได้"},{"type":"p","style":"List Bullet","text":"อธิบายหน้าที่ของคำแต่ละชนิดในประโยค"},{"type":"p","style":"List Bullet","text":"เลือกใช้สรรพนามเหมาะกับบุคคลและสถานการณ์"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"คำนามใช้เรียกคน สัตว์ สิ่งของ สถานที่ และความคิด เช่น นักเรียน แมว โต๊ะ โรงเรียน ความดี"},{"type":"p","style":"List Bullet","text":"สรรพนามใช้แทนคำนามเพื่อลดการกล่าวซ้ำ เช่น ฉัน เธอ เขา พวกเรา"},{"type":"p","style":"List Bullet","text":"คำกริยาบอกการกระทำหรือสภาพ เช่น วิ่ง อ่าน เป็น อยู่ คือ"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","จับทีมคำ"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 7: ชนิดและหน้าที่ของคำ: คำนาม สรรพนาม และคำกริยา ตัวชี้วัดที่เน้น ท 4.1 ป.4/2 จุดประสงค์การเรียนรู้ ระบุคำนาม สรรพนาม และคำกริยาในประโยคได้ อธิบายหน้าที่ของคำแต่ละชนิดในประโยค เลือกใช้สรรพนามเหมาะกับบุคคลและสถานการณ์ แนวคิดสำคัญ คำนามใช้เรียกคน สัตว์ สิ่งของ สถานที่ และความคิด เช่น นักเรียน แมว โต๊ะ โรงเรียน ความดี สรรพนามใช้แทนคำนามเพื่อลดการกล่าวซ้ำ เช่น ฉัน เธอ เขา พวกเรา คำกริยาบอกการกระทำหรือสภาพ เช่น วิ่ง อ่าน เป็น อยู่ คือ หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท จับทีมคำ สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l7-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 7: ชนิดและหน้าที่ของคำ: คำนาม สรรพนาม และคำกริยา","lessonNo":7,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: ครู, สนาม, ฉัน, พวกเขา\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูเล่า “มะลิถือหนังสือ มะลิเปิดหนังสือ มะลิอ่านหนังสือ” แล้วถามว่าจะลดคำซ้ำอย่างไร\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำนามใช้เรียกคน สัตว์ สิ่งของ สถานที่ และความคิด เช่น นักเรียน แมว โต๊ะ โรงเรียน ความดี\n• สรรพนามใช้แทนคำนามเพื่อลดการกล่าวซ้ำ เช่น ฉัน เธอ เขา พวกเรา\n• คำกริยาบอกการกระทำหรือสภาพ เช่น วิ่ง อ่าน เป็น อยู่ คือ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nประโยค “พิมพ์อ่านหนังสือ เธอจดคำสำคัญ”\nพิมพ์/หนังสือ/คำ = คำนาม\nเธอ = สรรพนามแทนพิมพ์\nอ่าน/จด = คำกริยา\nทดลองตัดคำกริยาออก จะพบว่าประโยคไม่บอกว่าเกิดอะไรขึ้น\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ความสุข” เป็นคำนามหรือไม่ เพราะเหตุใด\n• แทนคำว่า “นักเรียนทั้งห้อง” ด้วยสรรพนามใด\n• ในประโยค “ดอกไม้สวย” คำใดบอกสภาพ\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: จับทีมคำ","ครูอธิบายกติกา:\n• แจกบัตรคำคนละใบ เด็กเดินหากลุ่ม นาม–สรรพนาม–กริยา\n• แต่ละกลุ่มนำคำ 3 ใบมาแต่งประโยค\n• ทีมอื่นตรวจว่าคำทำหน้าที่ตรงชนิดหรือไม่\nบัตรพร้อมใช้: ครู, สนาม, ฉัน, พวกเขา, วิ่ง, คิด, ความหวัง, เป็น\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกความต่างระหว่างคำนามกับสรรพนาม\n• แต่งประโยค 5 คำแล้วชี้คำกริยา\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"คำนามใช้เรียกคน สัตว์ สิ่งของ สถานที่ และความคิด เช่น นักเรียน แมว โต๊ะ โรงเรียน ความดี"},{"type":"p","style":"List Bullet","text":"สรรพนามใช้แทนคำนามเพื่อลดการกล่าวซ้ำ เช่น ฉัน เธอ เขา พวกเรา"},{"type":"p","style":"List Bullet","text":"คำกริยาบอกการกระทำหรือสภาพ เช่น วิ่ง อ่าน เป็น อยู่ คือ"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"ประโยค “พิมพ์อ่านหนังสือ เธอจดคำสำคัญ”\nพิมพ์/หนังสือ/คำ = คำนาม\nเธอ = สรรพนามแทนพิมพ์\nอ่าน/จด = คำกริยา\nทดลองตัดคำกริยาออก จะพบว่าประโยคไม่บอกว่าเกิดอะไรขึ้น"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"ครู | สนาม | ฉัน | พวกเขา | วิ่ง | คิด | ความหวัง | เป็น"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: ครู, สนาม, ฉัน, พวกเขา\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูเล่า “มะลิถือหนังสือ มะลิเปิดหนังสือ มะลิอ่านหนังสือ” แล้วถามว่าจะลดคำซ้ำอย่างไร\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำนามใช้เรียกคน สัตว์ สิ่งของ สถานที่ และความคิด เช่น นักเรียน แมว โต๊ะ โรงเรียน ความดี\n• สรรพนามใช้แทนคำนามเพื่อลดการกล่าวซ้ำ เช่น ฉัน เธอ เขา พวกเรา\n• คำกริยาบอกการกระทำหรือสภาพ เช่น วิ่ง อ่าน เป็น อยู่ คือ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nประโยค “พิมพ์อ่านหนังสือ เธอจดคำสำคัญ”\nพิมพ์/หนังสือ/คำ = คำนาม\nเธอ = สรรพนามแทนพิมพ์\nอ่าน/จด = คำกริยา\nทดลองตัดคำกริยาออก จะพบว่าประโยคไม่บอกว่าเกิดอะไรขึ้น\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ความสุข” เป็นคำนามหรือไม่ เพราะเหตุใด\n• แทนคำว่า “นักเรียนทั้งห้อง” ด้วยสรรพนามใด\n• ในประโยค “ดอกไม้สวย” คำใดบอกสภาพ\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: จับทีมคำ ครูอธิบายกติกา:\n• แจกบัตรคำคนละใบ เด็กเดินหากลุ่ม นาม–สรรพนาม–กริยา\n• แต่ละกลุ่มนำคำ 3 ใบมาแต่งประโยค\n• ทีมอื่นตรวจว่าคำทำหน้าที่ตรงชนิดหรือไม่\nบัตรพร้อมใช้: ครู, สนาม, ฉัน, พวกเขา, วิ่ง, คิด, ความหวัง, เป็น\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกความต่างระหว่างคำนามกับสรรพนาม\n• แต่งประโยค 5 คำแล้วชี้คำกริยา\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน คำนามใช้เรียกคน สัตว์ สิ่งของ สถานที่ และความคิด เช่น นักเรียน แมว โต๊ะ โรงเรียน ความดี สรรพนามใช้แทนคำนามเพื่อลดการกล่าวซ้ำ เช่น ฉัน เธอ เขา พวกเรา คำกริยาบอกการกระทำหรือสภาพ เช่น วิ่ง อ่าน เป็น อยู่ คือ ตัวอย่างสอนบนกระดาน ประโยค “พิมพ์อ่านหนังสือ เธอจดคำสำคัญ”\nพิมพ์/หนังสือ/คำ = คำนาม\nเธอ = สรรพนามแทนพิมพ์\nอ่าน/จด = คำกริยา\nทดลองตัดคำกริยาออก จะพบว่าประโยคไม่บอกว่าเกิดอะไรขึ้น ชุดบัตรเกมพร้อมใช้ ครู | สนาม | ฉัน | พวกเขา | วิ่ง | คิด | ความหวัง | เป็น"},{"id":"thai-l7-knowledge","title":"ใบความรู้: ชนิดและหน้าที่ของคำ: คำนาม สรรพนาม และคำกริยา","level":0,"parent":"ชั่วโมงที่ 7: ชนิดและหน้าที่ของคำ: คำนาม สรรพนาม และคำกริยา","lessonNo":7,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ให้ดูหน้าที่ในประโยค ไม่ดูคำโดด ๆ อย่างเดียว เพราะบางคำใช้ได้ต่างหน้าที่ตามบริบท"},{"type":"p","style":"List Bullet","text":"สรรพนามต้องสุภาพและเหมาะกับผู้ฟัง เช่น หนู/ผม/ดิฉัน เมื่อตอบครู"},{"type":"p","style":"List Bullet","text":"โครงประโยคพื้นฐาน: ผู้ทำ (นาม/สรรพนาม) + การกระทำ (กริยา) + ผู้รับหรือรายละเอียด"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"ประโยค “พิมพ์อ่านหนังสือ เธอจดคำสำคัญ”\nพิมพ์/หนังสือ/คำ = คำนาม\nเธอ = สรรพนามแทนพิมพ์\nอ่าน/จด = คำกริยา\nทดลองตัดคำกริยาออก จะพบว่าประโยคไม่บอกว่าเกิดอะไรขึ้น"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"คำนามใช้เรียกคน สัตว์ สิ่งของ สถานที่ และความคิด เช่น นักเรียน แมว โต๊ะ โรงเรียน ความดี"}],"searchText":"ใบความรู้: ชนิดและหน้าที่ของคำ: คำนาม สรรพนาม และคำกริยา ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ ให้ดูหน้าที่ในประโยค ไม่ดูคำโดด ๆ อย่างเดียว เพราะบางคำใช้ได้ต่างหน้าที่ตามบริบท สรรพนามต้องสุภาพและเหมาะกับผู้ฟัง เช่น หนู/ผม/ดิฉัน เมื่อตอบครู โครงประโยคพื้นฐาน: ผู้ทำ (นาม/สรรพนาม) + การกระทำ (กริยา) + ผู้รับหรือรายละเอียด ตัวอย่างที่ครูใช้สอน ประโยค “พิมพ์อ่านหนังสือ เธอจดคำสำคัญ”\nพิมพ์/หนังสือ/คำ = คำนาม\nเธอ = สรรพนามแทนพิมพ์\nอ่าน/จด = คำกริยา :"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 4.1 ป.4/2 และ ท 4.1 ป.4/4"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"ระบุคำวิเศษณ์ที่ขยายคำนามหรือคำกริยาได้"},{"type":"p","style":"List Bullet","text":"แยกภาคประธานและภาคแสดงของประโยคพื้นฐาน"},{"type":"p","style":"List Bullet","text":"ขยายประโยคให้ชัดเจนโดยไม่ฟุ่มเฟือย"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"คำวิเศษณ์ช่วยบอกลักษณะ จำนวน เวลา สถานที่ หรือระดับ เช่น สวย มาก เร็ว สาม วันนี้"},{"type":"p","style":"List Bullet","text":"ประโยคสมบูรณ์มีผู้กระทำหรือสิ่งที่กล่าวถึง และมีข้อความบอกสิ่งที่เกิดขึ้น"},{"type":"p","style":"List Bullet","text":"การขยายประโยคควรเพิ่มข้อมูลที่จำเป็น เช่น ใคร ทำอะไร ที่ไหน เมื่อไร อย่างไร"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ต่อประโยคให้โต"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 8: คำวิเศษณ์และการสร้างประโยคสมบูรณ์ ตัวชี้วัดที่เน้น ท 4.1 ป.4/2 และ ท 4.1 ป.4/4 จุดประสงค์การเรียนรู้ ระบุคำวิเศษณ์ที่ขยายคำนามหรือคำกริยาได้ แยกภาคประธานและภาคแสดงของประโยคพื้นฐาน ขยายประโยคให้ชัดเจนโดยไม่ฟุ่มเฟือย แนวคิดสำคัญ คำวิเศษณ์ช่วยบอกลักษณะ จำนวน เวลา สถานที่ หรือระดับ เช่น สวย มาก เร็ว สาม วันนี้ ประโยคสมบูรณ์มีผู้กระทำหรือสิ่งที่กล่าวถึง และมีข้อความบอกสิ่งที่เกิดขึ้น การขยายประโยคควรเพิ่มข้อมูลที่จำเป็น เช่น ใคร ทำอะไร ที่ไหน เมื่อไร อย่างไร หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ต่อประโยคให้โต สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l8-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 8: คำวิเศษณ์และการสร้างประโยคสมบูรณ์","lessonNo":8,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: เด็กอ่าน, ฝนตก, รถแล่น, ดอกไม้บาน\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูเขียน “นกบิน” แล้วค่อยเติม “นกตัวเล็กบินเร็วเหนือสนามตอนเช้า” ให้เด็กบอกว่าคำใดเพิ่มรายละเอียด\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำวิเศษณ์ช่วยบอกลักษณะ จำนวน เวลา สถานที่ หรือระดับ เช่น สวย มาก เร็ว สาม วันนี้\n• ประโยคสมบูรณ์มีผู้กระทำหรือสิ่งที่กล่าวถึง และมีข้อความบอกสิ่งที่เกิดขึ้น\n• การขยายประโยคควรเพิ่มข้อมูลที่จำเป็น เช่น ใคร ทำอะไร ที่ไหน เมื่อไร อย่างไร\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nประโยค “เด็กชายตัวเล็กวิ่งเร็ว”\nภาคประธาน: เด็กชายตัวเล็ก\nภาคแสดง: วิ่งเร็ว\nตัวเล็กขยายคำนาม “เด็กชาย”; เร็วขยายกริยา “วิ่ง”\nตรวจประโยค “ที่สนามตอนเช้า” ยังไม่สมบูรณ์ เพราะไม่บอกว่าใครทำอะไร\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “สาม” ใน “แมวสามตัว” ขยายคำใด\n• เติมภาคแสดงให้ “คุณยาย...”\n• ตัดคำใดออกจากประโยคยาวแล้วใจความยังชัด\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ต่อประโยคให้โต","ครูอธิบายกติกา:\n• เริ่มจากบัตรประโยคสั้น เช่น “ปลาแหวกว่าย”\n• เด็กผลัดกันเติมคำขยายคนละ 1 ส่วน แต่ต้องยังเป็นประโยคสมบูรณ์\n• ทีมได้คะแนนเมื่ออ่านแล้วบอกได้ว่าคำใหม่ขยายคำใด\nบัตรพร้อมใช้: เด็กอ่าน, ฝนตก, รถแล่น, ดอกไม้บาน\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกส่วนสำคัญ 2 ส่วนของประโยค\n• เติมคำวิเศษณ์ใน “เด็กอ่านหนังสือ_____”\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"คำวิเศษณ์ช่วยบอกลักษณะ จำนวน เวลา สถานที่ หรือระดับ เช่น สวย มาก เร็ว สาม วันนี้"},{"type":"p","style":"List Bullet","text":"ประโยคสมบูรณ์มีผู้กระทำหรือสิ่งที่กล่าวถึง และมีข้อความบอกสิ่งที่เกิดขึ้น"},{"type":"p","style":"List Bullet","text":"การขยายประโยคควรเพิ่มข้อมูลที่จำเป็น เช่น ใคร ทำอะไร ที่ไหน เมื่อไร อย่างไร"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"ประโยค “เด็กชายตัวเล็กวิ่งเร็ว”\nภาคประธาน: เด็กชายตัวเล็ก\nภาคแสดง: วิ่งเร็ว\nตัวเล็กขยายคำนาม “เด็กชาย”; เร็วขยายกริยา “วิ่ง”\nตรวจประโยค “ที่สนามตอนเช้า” ยังไม่สมบูรณ์ เพราะไม่บอกว่าใครทำอะไร"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"เด็กอ่าน | ฝนตก | รถแล่น | ดอกไม้บาน"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: เด็กอ่าน, ฝนตก, รถแล่น, ดอกไม้บาน\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูเขียน “นกบิน” แล้วค่อยเติม “นกตัวเล็กบินเร็วเหนือสนามตอนเช้า” ให้เด็กบอกว่าคำใดเพิ่มรายละเอียด\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำวิเศษณ์ช่วยบอกลักษณะ จำนวน เวลา สถานที่ หรือระดับ เช่น สวย มาก เร็ว สาม วันนี้\n• ประโยคสมบูรณ์มีผู้กระทำหรือสิ่งที่กล่าวถึง และมีข้อความบอกสิ่งที่เกิดขึ้น\n• การขยายประโยคควรเพิ่มข้อมูลที่จำเป็น เช่น ใคร ทำอะไร ที่ไหน เมื่อไร อย่างไร\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nประโยค “เด็กชายตัวเล็กวิ่งเร็ว”\nภาคประธาน: เด็กชายตัวเล็ก\nภาคแสดง: วิ่งเร็ว\nตัวเล็กขยายคำนาม “เด็กชาย”; เร็วขยายกริยา “วิ่ง”\nตรวจประโยค “ที่สนามตอนเช้า” ยังไม่สมบูรณ์ เพราะไม่บอกว่าใครทำอะไร\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “สาม” ใน “แมวสามตัว” ขยายคำใด\n• เติมภาคแสดงให้ “คุณยาย...”\n• ตัดคำใดออกจากประโยคยาวแล้วใจความยังชัด\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ต่อประโยคให้โต ครูอธิบายกติกา:\n• เริ่มจากบัตรประโยคสั้น เช่น “ปลาแหวกว่าย”\n• เด็กผลัดกันเติมคำขยายคนละ 1 ส่วน แต่ต้องยังเป็นประโยคสมบูรณ์\n• ทีมได้คะแนนเมื่ออ่านแล้วบอกได้ว่าคำใหม่ขยายคำใด\nบัตรพร้อมใช้: เด็กอ่าน, ฝนตก, รถแล่น, ดอกไม้บาน\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกส่วนสำคัญ 2 ส่วนของประโยค\n• เติมคำวิเศษณ์ใน “เด็กอ่านหนังสือ_____”\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน คำวิเศษณ์ช่วยบอกลักษณะ จำนวน เวลา สถานที่ หรือระดับ เช่น สวย มาก เร็ว สาม วันนี้ ประโยคสมบูรณ์มีผู้กระทำหรือสิ่งที่กล่าวถึง และมีข้อความบอกสิ่งที่เกิดขึ้น การขยายประโยคควรเพิ่มข้อมูลที่จำเป็น เช่น ใคร ทำอะไร ที่ไหน เมื่อไร อย่างไร ตัวอย่างสอนบนกระดาน ประโยค “เด็กชายตัวเล็กวิ่งเร็ว”\nภาคประธาน: เด็กชายตัวเล็ก\nภาคแสดง: วิ่งเร็ว\nตัวเล็กขยายคำนาม “เด็กชาย”; เร็วขยายกริยา “วิ่ง”\nตรวจประโยค “ที่สนามตอนเช้า” ยังไม่สมบูรณ์ เพราะไม่บอกว่าใครทำอะไร ชุดบัตรเกมพร้อมใช้ เด็กอ่าน | ฝนตก | รถแล่น | ดอกไม้บาน"},{"id":"thai-l8-knowledge","title":"ใบความรู้: คำวิเศษณ์และการสร้างประโยคสมบูรณ์","level":0,"parent":"ชั่วโมงที่ 8: คำวิเศษณ์และการสร้างประโยคสมบูรณ์","lessonNo":8,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ภาคประธานมักมีคำนามหรือสรรพนามเป็นแกน"},{"type":"p","style":"List Bullet","text":"ภาคแสดงมักมีคำกริยาเป็นแกน และอาจมีกรรมหรือคำขยาย"},{"type":"p","style":"List Bullet","text":"คำขยายที่ดีทำให้เห็นภาพชัด แต่ถ้ามากเกินไปประโยคจะยืดเยื้อและอ่านยาก"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"ประโยค “เด็กชายตัวเล็กวิ่งเร็ว”\nภาคประธาน: เด็กชายตัวเล็ก\nภาคแสดง: วิ่งเร็ว\nตัวเล็กขยายคำนาม “เด็กชาย”; เร็วขยายกริยา “วิ่ง”\nตรวจประโยค “ที่สนามตอนเช้า” ยังไม่สมบูรณ์ เพราะไม่บอกว่าใครทำอะไร"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"คำวิเศษณ์ช่วยบอกลักษณะ จำนวน เวลา สถานที่ หรือระดับ เช่น สวย มาก เร็ว สาม วันนี้"}],"searchText":"ใบความรู้: คำวิเศษณ์และการสร้างประโยคสมบูรณ์ ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ ภาคประธานมักมีคำนามหรือสรรพนามเป็นแกน ภาคแสดงมักมีคำกริยาเป็นแกน และอาจมีกรรมหรือคำขยาย คำขยายที่ดีทำให้เห็นภาพชัด แต่ถ้าม ิจที่บ้าน 10 นาที เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"},{"id":"thai-l9-overview","title":"แผนการสอนที่ 9: คำพ้อง สำนวน สุภาษิต และคำสุภาพ","level":0,"parent":"ชั่วโมงที่ 9: คำพ้อง สำนวน สุภาษิต และคำสุภาพ","lessonNo":9,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 1.1 ป.4/2 และ ท 4.1 ป.4/6"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"แยกคำพ้องเสียงและคำพ้องรูปจากบริบทได้"},{"type":"p","style":"List Bullet","text":"อธิบายความหมายของสำนวนและสุภาษิตที่ใช้บ่อย"},{"type":"p","style":"List Bullet","text":"เลือกใช้คำสุภาพในสถานการณ์ต่าง ๆ"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"คำพ้องเสียงออกเสียงเหมือนแต่เขียนและหมายต่าง เช่น กฎ–กด"},{"type":"p","style":"List Bullet","text":"คำพ้องรูปเขียนเหมือนแต่อ่านหรือหมายต่าง ต้องดูบริบท"},{"type":"p","style":"List Bullet","text":"สำนวนมีความหมายไม่ตรงตัว ส่วนสุภาษิตมักให้ข้อคิดหรือแนวปฏิบัติ"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ภาพใบ้สำนวน"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 9: คำพ้อง สำนวน สุภาษิต และคำสุภาพ ตัวชี้วัดที่เน้น ท 1.1 ป.4/2 และ ท 4.1 ป.4/6 จุดประสงค์การเรียนรู้ แยกคำพ้องเสียงและคำพ้องรูปจากบริบทได้ อธิบายความหมายของสำนวนและสุภาษิตที่ใช้บ่อย เลือกใช้คำสุภาพในสถานการณ์ต่าง ๆ แนวคิดสำคัญ คำพ้องเสียงออกเสียงเหมือนแต่เขียนและหมายต่าง เช่น กฎ–กด คำพ้องรูปเขียนเหมือนแต่อ่านหรือหมายต่าง ต้องดูบริบท สำนวนมีความหมายไม่ตรงตัว ส่วนสุภาษิตมักให้ข้อคิดหรือแนวปฏิบัติ หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ภาพใบ้สำนวน สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l9-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 9: คำพ้อง สำนวน สุภาษิต และคำสุภาพ","lessonNo":9,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: น้ำขึ้นให้รีบตัก, ช้า ๆ ได้พร้าเล่มงาม, จับปลาสองมือ, ดินพอกหางหมู\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูเขียน “เขากดปุ่มตามกฎ” แล้วให้เด็กหาคำที่เสียงเหมือนกัน\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำพ้องเสียงออกเสียงเหมือนแต่เขียนและหมายต่าง เช่น กฎ–กด\n• คำพ้องรูปเขียนเหมือนแต่อ่านหรือหมายต่าง ต้องดูบริบท\n• สำนวนมีความหมายไม่ตรงตัว ส่วนสุภาษิตมักให้ข้อคิดหรือแนวปฏิบัติ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\n“น้ำขึ้นให้รีบตัก” ไม่ได้หมายถึงตักน้ำจริง แต่หมายถึงเมื่อมีโอกาสควรรีบทำ\n“ช้า ๆ ได้พร้าเล่มงาม” หมายถึงทำอย่างรอบคอบย่อมได้ผลดี\nคำสุภาพ: กิน → รับประทาน, หมา → สุนัข เมื่อใช้ในงานเขียนทางการ\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• เลือกความหมายของ “ขัน” ใน “ขบขัน” และ “ขันน้ำ”\n• สถานการณ์ใดเหมาะกับ “น้ำขึ้นให้รีบตัก”\n• เปลี่ยนประโยค “หมากินข้าว” ให้สุภาพขึ้น\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ภาพใบ้สำนวน","ครูอธิบายกติกา:\n• ทีมหนึ่งสุ่มสำนวนแล้ววาดภาพหรือแสดงท่าทาง ห้ามพูดคำในสำนวน\n• ทีมอื่นทายและอธิบายความหมาย\n• ได้คะแนนพิเศษเมื่อยกสถานการณ์ใช้จริงได้\nบัตรพร้อมใช้: น้ำขึ้นให้รีบตัก, ช้า ๆ ได้พร้าเล่มงาม, จับปลาสองมือ, ดินพอกหางหมู\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• ยกสำนวน 1 สำนวนพร้อมสถานการณ์\n• แต่งประโยคที่มีคำพ้องเสียง 1 คู่\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"คำพ้องเสียงออกเสียงเหมือนแต่เขียนและหมายต่าง เช่น กฎ–กด"},{"type":"p","style":"List Bullet","text":"คำพ้องรูปเขียนเหมือนแต่อ่านหรือหมายต่าง ต้องดูบริบท"},{"type":"p","style":"List Bullet","text":"สำนวนมีความหมายไม่ตรงตัว ส่วนสุภาษิตมักให้ข้อคิดหรือแนวปฏิบัติ"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"“น้ำขึ้นให้รีบตัก” ไม่ได้หมายถึงตักน้ำจริง แต่หมายถึงเมื่อมีโอกาสควรรีบทำ\n“ช้า ๆ ได้พร้าเล่มงาม” หมายถึงทำอย่างรอบคอบย่อมได้ผลดี\nคำสุภาพ: กิน → รับประทาน, หมา → สุนัข เมื่อใช้ในงานเขียนทางการ"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"น้ำขึ้นให้รีบตัก | ช้า ๆ ได้พร้าเล่มงาม | จับปลาสองมือ | ดินพอกหางหมู"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: น้ำขึ้นให้รีบตัก, ช้า ๆ ได้พร้าเล่มงาม, จับปลาสองมือ, ดินพอกหางหมู\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูเขียน “เขากดปุ่มตามกฎ” แล้วให้เด็กหาคำที่เสียงเหมือนกัน\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำพ้องเสียงออกเสียงเหมือนแต่เขียนและหมายต่าง เช่น กฎ–กด\n• คำพ้องรูปเขียนเหมือนแต่อ่านหรือหมายต่าง ต้องดูบริบท\n• สำนวนมีความหมายไม่ตรงตัว ส่วนสุภาษิตมักให้ข้อคิดหรือแนวปฏิบัติ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\n“น้ำขึ้นให้รีบตัก” ไม่ได้หมายถึงตักน้ำจริง แต่หมายถึงเมื่อมีโอกาสควรรีบทำ\n“ช้า ๆ ได้พร้าเล่มงาม” หมายถึงทำอย่างรอบคอบย่อมได้ผลดี\nคำสุภาพ: กิน → รับประทาน, หมา → สุนัข เมื่อใช้ในงานเขียนทางการ\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• เลือกความหมายของ “ขัน” ใน “ขบขัน” และ “ขันน้ำ”\n• สถานการณ์ใดเหมาะกับ “น้ำขึ้นให้รีบตัก”\n• เปลี่ยนประโยค “หมากินข้าว” ให้สุภาพขึ้น\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ภาพใบ้สำนวน ครูอธิบายกติกา:\n• ทีมหนึ่งสุ่มสำนวนแล้ววาดภาพหรือแสดงท่าทาง ห้ามพูดคำในสำนวน\n• ทีมอื่นทายและอธิบายความหมาย\n• ได้คะแนนพิเศษเมื่อยกสถานการณ์ใช้จริงได้\nบัตรพร้อมใช้: น้ำขึ้นให้รีบตัก, ช้า ๆ ได้พร้าเล่มงาม, จับปลาสองมือ, ดินพอกหางหมู\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• ยกสำนวน 1 สำนวนพร้อมสถานการณ์\n• แต่งประโยคที่มีคำพ้องเสียง 1 คู่\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน คำพ้องเสียงออกเสียงเหมือนแต่เขียนและหมายต่าง เช่น กฎ–กด คำพ้องรูปเขียนเหมือนแต่อ่านหรือหมายต่าง ต้องดูบริบท สำนวนมีความหมายไม่ตรงตัว ส่วนสุภาษิตมักให้ข้อคิดหรือแนวปฏิบัติ ตัวอย่างสอนบนกระดาน “น้ำขึ้นให้รีบตัก” ไม่ได้หมายถึงตักน้ำจริง แต่หมายถึงเมื่อมีโอกาสควรรีบทำ\n“ช้า ๆ ได้พร้าเล่มงาม” หมายถึงทำอย่างรอบคอบย่อมได้ผลดี\nคำสุภาพ: กิน → รับประทาน, หมา → สุนัข เมื่อใช้ในงานเขียนทางการ ชุดบัตรเกมพร้อมใช้ น้ำขึ้นให้รีบตัก | ช้า ๆ ได้พร้าเล่มงาม | จับปลาสองมือ | ดินพอกหางหมู"},{"id":"thai-l9-knowledge","title":"ใบความรู้: คำพ้อง สำนวน สุภาษิต และคำสุภาพ","level":0,"parent":"ชั่วโมงที่ 9: คำพ้อง สำนวน สุภาษิต และคำสุภาพ","lessonNo":9,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"อย่าแปลสำนวนทีละคำ ให้ดูความหมายรวมและสถานการณ์ที่ใช้"},{"type":"p","style":"List Bullet","text":"คำพ้องต้องอาศัยบริบท เช่น “รถ” กับ “รส” เสียงใกล้กันแต่ความหมายต่าง"},{"type":"p","style":"List Bullet","text":"คำสุภาพช่วยแสดงความเคารพและเหมาะสมกับกาลเทศะ ไม่จำเป็นต้องใช้คำยากเสมอไป"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"“น้ำขึ้นให้รีบตัก” ไม่ได้หมายถึงตักน้ำจริง แต่หมายถึงเมื่อมีโอกาสควรรีบทำ\n“ช้า ๆ ได้พร้าเล่มงาม” หมายถึงทำอย่างรอบคอบย่อมได้ผลดี\nคำสุภาพ: กิน → รับประทาน, หมา → สุนัข เมื่อใช้ในงานเขียนทางการ"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"คำพ้องเสียงออกเสียงเหมือนแต่เขียนและหมายต่าง เช่น กฎ–กด"}],"searchText":"ใบความรู้: คำพ้อง สำนวน สุภาษิต และคำสุภาพ ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ อย่าแปลสำนวนทีละคำ ให้ดูค งเปรียบเทียบของสำนวนดีขึ้น ควรฝึกอ่านบริบทก่อนเลือกความหมายของคำพ้องและใช้คำสุภาพให้เหมาะกับผู้ฟัง ภารกิจที่บ้าน 10 นาที เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"},{"id":"thai-l10-overview","title":"แผนการสอนที่ 10: เขียนสื่อสารและเรียบเรียงย่อหน้าให้อ่านรู้เรื่อง","level":0,"parent":"ชั่วโมงที่ 10: เขียนสื่อสารและเรียบเรียงย่อหน้าให้อ่านรู้เรื่อง","lessonNo":10,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 2.1 ป.4/2 และ ท 2.1 ป.4/3"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"เขียนประโยคใจความหลักของย่อหน้าได้"},{"type":"p","style":"List Bullet","text":"เรียงประโยคสนับสนุนให้สัมพันธ์กับหัวข้อ"},{"type":"p","style":"List Bullet","text":"ใช้คำเชื่อมและตรวจความชัดเจนของงานเขียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ย่อหน้าที่ดีมีประโยคใจความหลัก รายละเอียดสนับสนุน และประโยคปิด"},{"type":"p","style":"List Bullet","text":"ทุกประโยคในย่อหน้าควรพูดเรื่องเดียวกัน"},{"type":"p","style":"List Bullet","text":"คำเชื่อม เช่น เพราะ ดังนั้น ต่อมา นอกจากนี้ ช่วยแสดงความสัมพันธ์ของความคิด"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ประโยคหลงทาง"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 10: เขียนสื่อสารและเรียบเรียงย่อหน้าให้อ่านรู้เรื่อง ตัวชี้วัดที่เน้น ท 2.1 ป.4/2 และ ท 2.1 ป.4/3 จุดประสงค์การเรียนรู้ เขียนประโยคใจความหลักของย่อหน้าได้ เรียงประโยคสนับสนุนให้สัมพันธ์กับหัวข้อ ใช้คำเชื่อมและตรวจความชัดเจนของงานเขียน แนวคิดสำคัญ ย่อหน้าที่ดีมีประโยคใจความหลัก รายละเอียดสนับสนุน และประโยคปิด ทุกประโยคในย่อหน้าควรพูดเรื่องเดียวกัน คำเชื่อม เช่น เพราะ ดังนั้น ต่อมา นอกจากนี้ ช่วยแสดงความสัมพันธ์ของความคิด หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ประโยคหลงทาง สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l10-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 10: เขียนสื่อสารและเรียบเรียงย่อหน้าให้อ่านรู้เรื่อง","lessonNo":10,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: เราควรรักษาความสะอาดของห้องเรียน, ทุกคนเก็บขยะลงถัง, เวรประจำวันกวาดพื้น, สนามฟุตบอลมีขนาดกว้าง\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูนำประโยค 5 ใบที่มีหนึ่งใบหลุดหัวข้อ ให้เด็กหา “ประโยคหลงทาง”\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ย่อหน้าที่ดีมีประโยคใจความหลัก รายละเอียดสนับสนุน และประโยคปิด\n• ทุกประโยคในย่อหน้าควรพูดเรื่องเดียวกัน\n• คำเชื่อม เช่น เพราะ ดังนั้น ต่อมา นอกจากนี้ ช่วยแสดงความสัมพันธ์ของความคิด\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nหัวข้อ “การดูแลหนังสือ”\nใจความหลัก: เราควรดูแลหนังสือให้สะอาดและใช้ได้นาน\nรายละเอียด: ห่อปก, ไม่พับมุม, เก็บในที่แห้ง\nปิดย่อหน้า: เมื่อดูแลดี หนังสือจะพร้อมใช้และส่งต่อให้ผู้อื่นได้\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ประโยคใดควรเป็นประโยคแรกของย่อหน้า\n• คำเชื่อมใดใช้บอกเหตุผล\n• ข้อมูลใดไม่เกี่ยวกับหัวข้อ “การประหยัดน้ำ”\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ประโยคหลงทาง","ครูอธิบายกติกา:\n• แต่ละทีมได้ประโยค 6 ใบ มี 1 ใบไม่เข้าพวก\n• หาใบที่หลุดหัวข้อแล้วเรียง 5 ใบที่เหลือเป็นย่อหน้า\n• อ่านย่อหน้าและอธิบายเหตุผลในการเรียง\nบัตรพร้อมใช้: เราควรรักษาความสะอาดของห้องเรียน, ทุกคนเก็บขยะลงถัง, เวรประจำวันกวาดพื้น, สนามฟุตบอลมีขนาดกว้าง, ดังนั้นห้องเรียนจึงน่าอยู่\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดโครงย่อหน้า 3 ส่วน\n• ตรวจย่อหน้าตนเองและบอกสิ่งที่จะปรับ 1 อย่าง\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ย่อหน้าที่ดีมีประโยคใจความหลัก รายละเอียดสนับสนุน และประโยคปิด"},{"type":"p","style":"List Bullet","text":"ทุกประโยคในย่อหน้าควรพูดเรื่องเดียวกัน"},{"type":"p","style":"List Bullet","text":"คำเชื่อม เช่น เพราะ ดังนั้น ต่อมา นอกจากนี้ ช่วยแสดงความสัมพันธ์ของความคิด"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"หัวข้อ “การดูแลหนังสือ”\nใจความหลัก: เราควรดูแลหนังสือให้สะอาดและใช้ได้นาน\nรายละเอียด: ห่อปก, ไม่พับมุม, เก็บในที่แห้ง\nปิดย่อหน้า: เมื่อดูแลดี หนังสือจะพร้อมใช้และส่งต่อให้ผู้อื่นได้"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"เราควรรักษาความสะอาดของห้องเรียน | ทุกคนเก็บขยะลงถัง | เวรประจำวันกวาดพื้น | สนามฟุตบอลมีขนาดกว้าง | ดังนั้นห้องเรียนจึงน่าอยู่"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: เราควรรักษาความสะอาดของห้องเรียน, ทุกคนเก็บขยะลงถัง, เวรประจำวันกวาดพื้น, สนามฟุตบอลมีขนาดกว้าง\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูนำประโยค 5 ใบที่มีหนึ่งใบหลุดหัวข้อ ให้เด็กหา “ประโยคหลงทาง”\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ย่อหน้าที่ดีมีประโยคใจความหลัก รายละเอียดสนับสนุน และประโยคปิด\n• ทุกประโยคในย่อหน้าควรพูดเรื่องเดียวกัน\n• คำเชื่อม เช่น เพราะ ดังนั้น ต่อมา นอกจากนี้ ช่วยแสดงความสัมพันธ์ของความคิด\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nหัวข้อ “การดูแลหนังสือ”\nใจความหลัก: เราควรดูแลหนังสือให้สะอาดและใช้ได้นาน\nรายละเอียด: ห่อปก, ไม่พับมุม, เก็บในที่แห้ง\nปิดย่อหน้า: เมื่อดูแลดี หนังสือจะพร้อมใช้และส่งต่อให้ผู้อื่นได้\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ประโยคใดควรเป็นประโยคแรกของย่อหน้า\n• คำเชื่อมใดใช้บอกเหตุผล\n• ข้อมูลใดไม่เกี่ยวกับหัวข้อ “การประหยัดน้ำ”\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ประโยคหลงทาง ครูอธิบายกติกา:\n• แต่ละทีมได้ประโยค 6 ใบ มี 1 ใบไม่เข้าพวก\n• หาใบที่หลุดหัวข้อแล้วเรียง 5 ใบที่เหลือเป็นย่อหน้า\n• อ่านย่อหน้าและอธิบายเหตุผลในการเรียง\nบัตรพร้อมใช้: เราควรรักษาความสะอาดของห้องเรียน, ทุกคนเก็บขยะลงถัง, เวรประจำวันกวาดพื้น, สนามฟุตบอลมีขนาดกว้าง, ดังนั้นห้องเรียนจึงน่าอยู่\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดโครงย่อหน้า 3 ส่วน\n• ตรวจย่อหน้าตนเองและบอกสิ่งที่จะปรับ 1 อย่าง\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน ย่อหน้าที่ดีมีประโยคใจความหลัก รายละเอียดสนับสนุน และประโยคปิด ทุกประโยคในย่อหน้าควรพูดเรื่องเดียวกัน คำเชื่อม เช่น เพราะ ดังนั้น ต่อมา นอกจากนี้ ช่วยแสดงความสัมพันธ์ของความคิด ตัวอย่างสอนบนกระดาน หัวข้อ “การดูแลหนังสือ”\nใจความหลัก: เราควรดูแลหนังสือให้สะอาดและใช้ได้นาน\nรายละเอียด: ห่อปก, ไม่พับมุม, เก็บในที่แห้ง\nปิดย่อหน้า: เมื่อดูแลดี หนังสือจะพร้อมใช้และส่งต่อให้ผู้อื่นได้ ชุดบัตรเกมพร้อมใช้ เราควรรักษาความสะอาดของห้องเรียน | ทุกคนเก็บขยะลงถัง | เวรประจำวันกวาดพื้น | สนามฟุตบอลมีขนาดกว้าง | ดังนั้นห้องเรียนจึงน่าอยู่"},{"id":"thai-l10-knowledge","title":"ใบความรู้: เขียนสื่อสารและเรียบเรียงย่อหน้าให้อ่านรู้เรื่อง","level":0,"parent":"ชั่วโมงที่ 10: เขียนสื่อสารและเรียบเรียงย่อหน้าให้อ่านรู้เรื่อง","lessonNo":10,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ก่อนเขียนให้ทำแผนภาพ 3 ช่อง: หัวข้อ – รายละเอียด – ข้อสรุป"},{"type":"p","style":"List Bullet","text":"หนึ่งย่อหน้าควรมีหัวข้อหลักเดียว ถ้าจะเปลี่ยนเรื่องให้ขึ้นย่อหน้าใหม่"},{"type":"p","style":"List Bullet","text":"ตรวจงาน 3 รอบ: เนื้อหาครบไหม ลำดับลื่นไหลไหม คำสะกดและเครื่องหมายถูกไหม"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style": ด้วยผล/ข้อสรุป 2. ตัวอย่างใจความหลัก: การตรงต่อเวลาช่วยให้เรารับผิดชอบและไม่รบกวนผู้อื่น 3. คำตอบงานเขียนพิจารณาความเกี่ยวข้อง ลำดับ และความชัดเจน เกณฑ์การประเมินรายชั่วโมง ระดับ ลักษณะผลงาน 3 ทำได้ด้วยตนเอง ตอบถูกหรือสื่อความได้ชัด พร้อมอธิบายหลัก/หลักฐาน 2 ทำได้เมื่อมีคำชี้แนะ เข้าใจแนวคิด แต่ยังต้องมีคำถามนำหรือบัตรช่วย 1 ต้องทบทวน ยังสับสนหลักสำคัญ หรือคำตอบไม่สัมพันธ์กับโจทย์ ข้อความ Feedback ผู้ปกครองประจำบท ผู้เรียนเริ่มจัดย่อหน้าเป็นหัวข้อ–รายละเอียด–สรุปได้ ควรฝึกตัดประโยคที่หลุดเรื่องและใช้คำเชื่อมให้หลากหลายแต่ไม่ซ้ำมากเกินไป ภารกิจที่บ้าน 10 นาที เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"},{"id":"thai-l11-overview","title":"แผนการสอนที่ 11: แผนภาพความคิดและการเขียนย่อความ","level":0,"parent":"ชั่วโมงที่ 11: แผนภาพความคิดและการเขียนย่อความ","lessonNo":11,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 2.1 ป.4/3 และ ท 2.1 ป.4/4"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"สร้างแผนภาพความคิดจากเรื่องที่อ่านได้"},{"type":"p","style":"List Bullet","text":"เลือกเฉพาะใจความสำคัญและตัดตัวอย่างย่อย"},{"type":"p","style":"List Bullet","text":"เขียนย่อความด้วยภาษาของตนเองอย่างเป็นลำดับ"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย"},{"type":"p","style":"List Bullet","text":"ตัดคำซ้ำ คำบรรยายละเอียด ตัวอย่าง และบทสนทนาที่ไม่จำเป็น"},{"type":"p","style":"List Bullet","text":"ไม่ใส่ความคิดเห็นของผู้ย่อ และควรใช้สรรพนามบุรุษที่สามเมื่อเล่าเรื่อง"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ย่อให้เหลือแก่น"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 11: แผนภาพความคิดและการเขียนย่อความ ตัวชี้วัดที่เน้น ท 2.1 ป.4/3 และ ท 2.1 ป.4/4 จุดประสงค์การเรียนรู้ สร้างแผนภาพความคิดจากเรื่องที่อ่านได้ เลือกเฉพาะใจความสำคัญและตัดตัวอย่างย่อย เขียนย่อความด้วยภาษาของตนเองอย่างเป็นลำดับ แนวคิดสำคัญ ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย ตัดคำซ้ำ คำบรรยายละเอียด ตัวอย่าง และบทสนทนาที่ไม่จำเป็น ไม่ใส่ความคิดเห็นของผู้ย่อ และควรใช้สรรพนามบุรุษที่สามเมื่อเล่าเรื่อง หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ย่อให้เหลือแก่น สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l11-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 11: แผนภาพความคิดและการเขียนย่อความ","lessonNo":11,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: ใคร, ทำอะไร, เหตุผล, ผลลัพธ์\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูให้ดูข้อความยาว 6 ประโยคกับข้อความสรุป 2 ประโยค แล้วถามว่าสิ่งใดยังต้องคงไว้\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย\n• ตัดคำซ้ำ คำบรรยายละเอียด ตัวอย่าง และบทสนทนาที่ไม่จำเป็น\n• ไม่ใส่ความคิดเห็นของผู้ย่อ และควรใช้สรรพนามบุรุษที่สามเมื่อเล่าเรื่อง\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nเรื่องต้นฉบับ: “เช้าวันอาทิตย์ นัทตื่นแต่เช้า เขาเตรียมถุงผ้าและขวดน้ำ จากนั้นเดินไปตลาดกับคุณแม่ นัทปฏิเสธถุงพลาสติกและใส่ของในถุงผ้า”\nแผนภาพ: ใคร–นัท / ทำอะไร–ไปตลาดและใช้ถุงผ้า / ผล–ลดพลาสติก\nย่อความ: นัทไปตลาดกับคุณแม่และใช้ถุงผ้าแทนถุงพลาสติกเพื่อช่วยลดขยะ\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ประโยคใดเป็นรายละเอียดที่ตัดได้\n• คำว่า “เช้าวันอาทิตย์” จำเป็นต่อใจความหรือไม่\n• ย่อความนี้มีความคิดเห็นส่วนตัวแทรกหรือไม่\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ย่อให้เหลือแก่น","ครูอธิบายกติกา:\n• ครูให้เรื่อง 4 ประโยค ทีมต้องเลือกคำสำคัญไม่เกิน 8 คำ\n• นำคำสำคัญมาแต่งสรุป 1–2 ประโยค\n• ทีมอื่นตรวจว่าสาระสำคัญยังครบหรือไม่\nบัตรพร้อมใช้: ใคร, ทำอะไร, เหตุผล, ผลลัพธ์, ข้อคิด\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอก 1 สิ่งที่ไม่ควรใส่ในย่อความ\n• ย่อประโยคยาวที่ครูกำหนดให้เหลือใจความเดียว\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย"},{"type":"p","style":"List Bullet","text":"ตัดคำซ้ำ คำบรรยายละเอียด ตัวอย่าง และบทสนทนาที่ไม่จำเป็น"},{"type":"p","style":"List Bullet","text":"ไม่ใส่ความคิดเห็นของผู้ย่อ และควรใช้สรรพนามบุรุษที่สามเมื่อเล่าเรื่อง"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"เรื่องต้นฉบับ: “เช้าวันอาทิตย์ นัทตื่นแต่เช้า เขาเตรียมถุงผ้าและขวดน้ำ จากนั้นเดินไปตลาดกับคุณแม่ นัทปฏิเสธถุงพลาสติกและใส่ของในถุงผ้า”\nแผนภาพ: ใคร–นัท / ทำอะไร–ไปตลาดและใช้ถุงผ้า / ผล–ลดพลาสติก\nย่อความ: นัทไปตลาดกับคุณแม่และใช้ถุงผ้าแทนถุงพลาสติกเพื่อช่วยลดขยะ"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"ใคร | ทำอะไร | เหตุผล | ผลลัพธ์ | ข้อคิด"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: ใคร, ทำอะไร, เหตุผล, ผลลัพธ์\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูให้ดูข้อความยาว 6 ประโยคกับข้อความสรุป 2 ประโยค แล้วถามว่าสิ่งใดยังต้องคงไว้\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย\n• ตัดคำซ้ำ คำบรรยายละเอียด ตัวอย่าง และบทสนทนาที่ไม่จำเป็น\n• ไม่ใส่ความคิดเห็นของผู้ย่อ และควรใช้สรรพนามบุรุษที่สามเมื่อเล่าเรื่อง\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nเรื่องต้นฉบับ: “เช้าวันอาทิตย์ นัทตื่นแต่เช้า เขาเตรียมถุงผ้าและขวดน้ำ จากนั้นเดินไปตลาดกับคุณแม่ นัทปฏิเสธถุงพลาสติกและใส่ของในถุงผ้า”\nแผนภาพ: ใคร–นัท / ทำอะไร–ไปตลาดและใช้ถุงผ้า / ผล–ลดพลาสติก\nย่อความ: นัทไปตลาดกับคุณแม่และใช้ถุงผ้าแทนถุงพลาสติกเพื่อช่วยลดขยะ\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ประโยคใดเป็นรายละเอียดที่ตัดได้\n• คำว่า “เช้าวันอาทิตย์” จำเป็นต่อใจความหรือไม่\n• ย่อความนี้มีความคิดเห็นส่วนตัวแทรกหรือไม่\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ย่อให้เหลือแก่น ครูอธิบายกติกา:\n• ครูให้เรื่อง 4 ประโยค ทีมต้องเลือกคำสำคัญไม่เกิน 8 คำ\n• นำคำสำคัญมาแต่งสรุป 1–2 ประโยค\n• ทีมอื่นตรวจว่าสาระสำคัญยังครบหรือไม่\nบัตรพร้อมใช้: ใคร, ทำอะไร, เหตุผล, ผลลัพธ์, ข้อคิด\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอก 1 สิ่งที่ไม่ควรใส่ในย่อความ\n• ย่อประโยคยาวที่ครูกำหนดให้เหลือใจความเดียว\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย ตัดคำซ้ำ คำบรรยายละเอียด ตัวอย่าง และบทสนทนาที่ไม่จำเป็น ไม่ใส่ความคิดเห็นของผู้ย่อ และควรใช้สรรพนามบุรุษที่สามเมื่อเล่าเรื่อง ตัวอย่างสอนบนกระดาน เรื่องต้นฉบับ: “เช้าวันอาทิตย์ นัทตื่นแต่เช้า เขาเตรียมถุงผ้าและขวดน้ำ จากนั้นเดินไปตลาดกับคุณแม่ นัทปฏิเสธถุงพลาสติกและใส่ของในถุงผ้า”\nแผนภาพ: ใคร–นัท / ทำอะไร–ไปตลาดและใช้ถุงผ้า / ผล–ลดพลาสติก\nย่อความ: นัทไปตลาดกับคุณแม่และใช้ถุงผ้าแทนถุงพลาสติกเพื่อช่วยลดขยะ ชุดบัตรเกมพร้อมใช้ ใคร | ทำอะไร | เหตุผล | ผลลัพธ์ | ข้อคิด"},{"id":"thai-l11-knowledge","title":"ใบความรู้: แผนภาพความคิดและการเขียนย่อความ","level":0,"parent":"ชั่วโมงที่ 11: แผนภาพความคิดและการเขียนย่อความ","lessonNo":11,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ขั้นย่อ 4 ขั้น: อ่านจนเข้าใจ → ขีดใจความ → ทำแผนภาพ → เขียนใหม่และตรวจ"},{"type":"p","style":"List Bullet","text":"ไม่คัดลอกประโยคยาวทั้งประโยค ให้รวมข้อมูลที่สัมพันธ์กัน"},{"type":"p","style":"List Bullet","text":"ความยาวไม่มีตัวเลขตายตัว แต่ต้องสั้นกว่าต้นฉบับและยังตอบได้ว่าเรื่องกล่าวถึงอะไร"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"เรื่องต้นฉบับ: “เช้าวันอาทิตย์ นัทตื่นแต่เช้า เขาเตรียมถุงผ้าและขวดน้ำ จากนั้นเดินไปตลาดกับคุณแม่ นัทปฏิเสธถุงพลาสติกและใส่ของในถุงผ้า”\nแผนภาพ: ใคร–นัท / ทำอะไร–ไปตลาดและใช้ถุงผ้า / ผล–ลดพลาสติก\nย่อความ: นัทไปตลาดกับคุณแม่และใช้ถุงผ้าแทนถุงพลาสติกเพื่อช่วยลดขยะ"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย"}],"searchText":"ใบความรู้: แผนภาพความคิดและการเขียนย่อความ ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ ขั้นย่อ 4 ขั้น: อ่านจนเข้าใจ → ขีดใจความ → ทำแผนภาพ → เขียนใหม่และตรวจ ไม่คัดลอกประโยคยาวทั้งประโยค ให้รวมข้อมูลที่สัมพันธ์กัน ความยาวไม่มีตัวเลขตายตัว แต่ต้องสั้นกว่าต้นฉบับและยังตอบได้ว่าเรื่องกล่าวถึงอะไร ตัวอย่างที่ครูใช้สอน เรื่องต้นฉบับ: “เช้าวันอาทิตย์ นัทตื่นแต่เช้า เขาเตรียมถุงผ้าและขวดน้ำ จากนั้นเดินไปตลาดกับคุณแม่ นัทปฏิเสธถุงพลาสติกและใส่ของในถุงผ้า”\nแผนภาพ: ใคร–นัท / ทำอะไร–ไปตลาดและใช้ถุงผ้า / ผล–ลดพลาสติก\nย่อความ: นัทไปตลาดกับคุณแม่และใช้ถุงผ้าแทนถุงพลาสติกเพื่อช่วยลดขยะ จำง่ายในหนึ่งประโยค ย่อความคือการเขียนสาระเดิมให้สั้นลง โดยไม่เปลี่ยนความหมาย"},{"id":"thai-l11-worksheet","title":"ใบงานชั่วโมงที่ 11","level":0,"parent":"ชั่วโมงที่ 11: แผนภาพความคิดและการเขียนย่อความ","lessonNo":11,"kind":"worksheet","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบงาน: ทำจากพื้นฐานไปสู่การประยุกต์"},{"type":"p","style":"Normal","text":"1. อ่านเรื่อง 1 ย่อหน้าแล้วกรอกแผนภาพ ใคร–ทำอะไร–เหตุผล–ผล"},{"type":"p","style":"Normal","text":"........................................"},{"type":"p","style":"Normal","text":"2. ขีดฆ่ารายละเอียดที่ตัดได้ 3 จุด"},{"type":"p","style":"Normal","text":"..............
