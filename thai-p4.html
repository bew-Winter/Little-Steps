<!doctype html>
<html lang="th">
<head>

<meta name="description" content="แผนการสอนพิเศษภาษาไทย ป.4 จำนวน 16 ชั่วโมง พร้อมบทอ่าน หลักภาษา การเขียน เกม ใบความรู้ ใบงาน เฉลย และ Feedback ผู้ปกครอง">
<title>Little Steps ภาษาไทย ป.4 · 16 ชั่วโมง</title>
<style>
:root {
  --navy:#0757A5; --navy-2:#073C7D; --blue:#0F83C9; --cyan:#28B7DF;
  --sky:#EAF8FF; --sky-2:#F5FBFF; --yellow:#FFC83D; --gold:#F5A623;
  --green:#72B94F; --ink:#18344E; --muted:#617B91; --line:#D9ECF7;
  --paper:#FFFFFF; --shadow:0 24px 70px rgba(4,75,130,.16);
  --radius:32px; --sidebar:310px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:"Noto Sans Thai","Leelawadee UI",Tahoma,Arial,sans-serif;color:var(--ink);background:
 radial-gradient(circle at 10% 8%,rgba(40,183,223,.16),transparent 24%),
 radial-gradient(circle at 92% 90%,rgba(255,200,61,.16),transparent 22%),
 linear-gradient(135deg,#f7fcff 0%,#eef8ff 48%,#fffdf4 100%);min-height:100vh;overflow-x:hidden}
button,input,textarea{font:inherit}
button{cursor:pointer}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid rgba(40,183,223,.4);outline-offset:2px}
.app{min-height:100vh}
.topbar{position:fixed;inset:0 0 auto 0;height:68px;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border-bottom:1px solid rgba(7,87,165,.1);z-index:50;display:flex;align-items:center;gap:14px;padding:0 20px}
.brand-mini{display:flex;align-items:center;gap:10px;min-width:260px}
.brand-badge{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--cyan),var(--navy));display:grid;place-items:center;color:white;font-weight:900;box-shadow:0 8px 20px rgba(15,131,201,.25);position:relative}
.brand-badge::after{content:"✦";position:absolute;color:var(--yellow);font-size:12px;right:-5px;top:-5px}
.brand-mini strong{font-size:15px;color:var(--navy)}
.brand-mini small{display:block;color:var(--muted);font-size:11px;margin-top:1px}
.progress-wrap{flex:1;display:flex;align-items:center;gap:10px;min-width:110px}
.progress-track{height:9px;background:#e5f2f9;border-radius:99px;overflow:hidden;flex:1}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--navy),var(--yellow));border-radius:inherit;transition:width .35s ease}
.progress-label{font-size:12px;color:var(--muted);white-space:nowrap}
.toolbar{display:flex;gap:8px;align-items:center}
.icon-btn,.pill-btn{border:1px solid #d7eaf5;background:white;color:var(--navy);height:40px;border-radius:14px;padding:0 12px;display:inline-flex;align-items:center;gap:7px;font-weight:700;box-shadow:0 4px 14px rgba(7,87,165,.06)}
.icon-btn:hover,.pill-btn:hover{background:var(--sky);transform:translateY(-1px)}
.mode-btn[data-mode="teacher"]{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-color:transparent}
.menu-btn{display:none}
.sidebar{position:fixed;left:0;top:68px;bottom:0;width:var(--sidebar);background:rgba(255,255,255,.93);backdrop-filter:blur(18px);border-right:1px solid rgba(7,87,165,.11);z-index:40;overflow-y:auto;padding:18px 14px 30px}
.searchbox{position:sticky;top:-18px;background:rgba(255,255,255,.97);padding:10px 0 12px;z-index:2}
.searchbox input{width:100%;border:1px solid #d9eaf4;background:#f8fcff;border-radius:15px;padding:11px 13px;color:var(--ink)}
.nav-section{margin:10px 0 16px}
.nav-section-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#7c93a7;font-weight:900;margin:0 8px 7px}
.nav-btn{width:100%;border:0;background:transparent;text-align:left;padding:9px 10px;border-radius:13px;color:#41627c;display:flex;gap:9px;align-items:flex-start;line-height:1.35;margin:2px 0}
.nav-btn:hover{background:#eff9ff;color:var(--navy)}
.nav-btn.active{background:linear-gradient(135deg,#e6f7ff,#fff8de);color:var(--navy);font-weight:900;box-shadow:inset 3px 0 var(--cyan)}
.nav-num{flex:0 0 28px;height:28px;border-radius:10px;background:#e9f6fd;color:var(--blue);font-weight:900;display:grid;place-items:center;font-size:12px}
.nav-btn.active .nav-num{background:var(--navy);color:white}
.lesson-group{border:1px solid #e1eff7;border-radius:17px;margin:8px 0;overflow:hidden;background:#fff}
.lesson-group summary{list-style:none;display:flex;align-items:center;gap:10px;padding:11px 10px;cursor:pointer;font-weight:800;color:var(--navy);font-size:13px}
.lesson-group summary::-webkit-details-marker{display:none}
.lesson-group summary::after{content:"＋";margin-left:auto;color:var(--cyan)}
.lesson-group[open] summary::after{content:"−"}
.lesson-group .group-body{padding:0 7px 7px}
.lesson-group .nav-btn{font-size:12px;padding:8px}
.main{margin-left:var(--sidebar);padding:92px 24px 28px;min-height:100vh}
.slide-stage{max-width:1220px;margin:0 auto;position:relative}
.slide-card{background:rgba(255,255,255,.97);border:1px solid rgba(7,87,165,.10);border-radius:var(--radius);box-shadow:var(--shadow);min-height:calc(100vh - 132px);overflow:hidden;position:relative;display:flex;flex-direction:column}
.slide-card::before{content:"";position:absolute;width:250px;height:250px;border:34px solid rgba(40,183,223,.10);border-radius:50%;right:-130px;top:-120px;pointer-events:none}
.slide-card::after{content:"";position:absolute;width:180px;height:28px;border-radius:50%;background:linear-gradient(90deg,rgba(40,183,223,.18),rgba(255,200,61,.22));left:8%;bottom:-8px;filter:blur(8px);pointer-events:none}
.slide-banner{min-height:132px;padding:27px 40px 22px;background:linear-gradient(120deg,#f1fbff 0%,#fff 55%,#fff9e6 100%);border-bottom:1px solid var(--line);position:relative;z-index:1}
.slide-kicker{display:flex;align-items:center;gap:9px;color:var(--blue);font-weight:900;font-size:13px;margin-bottom:9px}
.kicker-dot{width:11px;height:11px;border-radius:50%;background:var(--yellow);box-shadow:18px 0 0 var(--cyan),36px 0 0 var(--navy);margin-right:33px}
.slide-title{font-size:clamp(25px,3vw,42px);line-height:1.18;margin:0;color:var(--navy-2);max-width:970px;letter-spacing:-.02em}
.slide-parent{margin-top:9px;color:var(--muted);font-size:13px}
.slide-body{padding:30px 40px 92px;position:relative;z-index:1;flex:1;overflow:auto}
.slide-footer{position:absolute;left:0;right:0;bottom:0;height:68px;background:linear-gradient(180deg,rgba(255,255,255,.25),rgba(255,255,255,.96) 34%);display:flex;align-items:center;justify-content:space-between;padding:13px 30px;z-index:5;pointer-events:none}
.slide-footer>*{pointer-events:auto}
.footer-note{font-size:12px;color:var(--muted)}
.footer-actions{display:flex;gap:8px}
.nav-arrow{border:0;border-radius:14px;padding:10px 15px;background:#edf8fe;color:var(--navy);font-weight:900}
.nav-arrow.primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;box-shadow:0 8px 20px rgba(7,87,165,.22)}
.nav-arrow:disabled{opacity:.35;cursor:not-allowed}
.content-p{font-size:16px;line-height:1.8;margin:0 0 12px;color:#2c4a62}
.content-p.lead{font-size:18px;line-height:1.85;color:#24445f;background:#f5fbff;border-left:5px solid var(--cyan);padding:17px 19px;border-radius:0 18px 18px 0}
.content-p.subhead{font-size:21px;line-height:1.35;color:var(--navy);font-weight:900;margin:25px 0 12px;display:flex;align-items:center;gap:10px}
.content-p.subhead::before{content:"";width:12px;height:12px;border-radius:4px;background:linear-gradient(135deg,var(--yellow),var(--gold));box-shadow:5px 5px 0 rgba(40,183,223,.2)}
.content-p.question{background:#fbfdff;border:1px solid #dcecf6;border-radius:17px;padding:14px 16px;margin:10px 0;font-weight:650;color:#234963}
.content-p.answer{background:#f3fbf1;border-left:4px solid var(--green);padding:11px 14px;border-radius:0 13px 13px 0}
.list-card{margin:9px 0 18px;padding:18px 22px 18px 42px;border-radius:20px;background:linear-gradient(135deg,#f6fcff,#fffef8);border:1px solid #dfedf5}
.list-card li{margin:8px 0;line-height:1.7;padding-left:3px}
.list-card li::marker{color:var(--blue);font-weight:900}
.table-wrap{margin:18px 0 25px;overflow-x:auto;border-radius:20px;border:1px solid #dbeaf3;box-shadow:0 8px 24px rgba(7,87,165,.06);background:white}
table.content-table{width:100%;border-collapse:collapse;min-width:680px}
table.content-table th{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;text-align:left;padding:13px 14px;font-size:14px;line-height:1.45;position:sticky;top:0}
table.content-table td{padding:13px 14px;border-top:1px solid #e5f0f6;vertical-align:top;line-height:1.55;font-size:14px;color:#34546c}
table.content-table tr:nth-child(even) td{background:#f8fcff}
table.content-table tr:hover td{background:#fffbea}
.note-box{margin:17px 0 24px;padding:20px 22px;border-radius:22px;background:linear-gradient(135deg,#eefaff,#fff9e6);border:1px solid #d6ebf5;position:relative;overflow:hidden}
.note-box::after{content:"✦";position:absolute;right:18px;top:11px;font-size:32px;color:rgba(255,190,35,.35)}
.note-title{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:9px}
.note-box ul{margin:0;padding-left:22px}.note-box li{margin:6px 0;line-height:1.65}
.kv-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px;margin:17px 0 24px}
.kv-item{border:1px solid #dbeaf3;border-radius:18px;padding:16px;background:#fbfdff}
.kv-key{font-size:12px;color:var(--blue);font-weight:900;margin-bottom:6px;text-transform:none}
.kv-value{font-size:14px;line-height:1.65;color:#31516a}
.timeline{display:grid;gap:14px;margin:18px 0 25px}
.step-card{display:grid;grid-template-columns:170px 1fr 1fr 1fr;border:1px solid #dbeaf3;border-radius:21px;overflow:hidden;background:white;box-shadow:0 8px 22px rgba(7,87,165,.05)}
.step-stage{padding:16px;background:linear-gradient(135deg,#e9f8ff,#fff8dc);font-weight:900;color:var(--navy);line-height:1.45}
.step-cell{padding:15px;border-left:1px solid #e3eef5;line-height:1.6;font-size:13px;color:#36546b}
.step-label{display:block;font-size:10px;letter-spacing:.08em;color:var(--blue);font-weight:900;margin-bottom:5px}
.form-field{margin:8px 0 14px}
.form-field label{display:block;font-weight:750;color:#274c67;margin-bottom:7px;line-height:1.55}
.response-input,.response-area{width:100%;border:1.5px dashed #9ccfe8;border-radius:14px;background:#f8fdff;padding:11px 12px;color:#18344e;transition:.2s}
.response-area{min-height:76px;resize:vertical}
.response-input:focus,.response-area:focus{border-style:solid;background:white;box-shadow:0 0 0 4px rgba(40,183,223,.12)}
.save-hint{font-size:11px;color:#7791a5;margin-top:5px}
.teacher-answer-zone{margin-top:24px;border:2px solid #bfe0c0;border-radius:22px;padding:20px;background:#f7fff5}
.teacher-answer-zone::before{content:"เฉลยสำหรับครู";display:inline-flex;background:var(--green);color:white;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:900;margin-bottom:12px}
body[data-mode="student"] .teacher-answer-zone{display:none}
.teacher-lock{display:none;text-align:center;padding:80px 20px;color:var(--muted)}
.teacher-lock strong{display:block;color:var(--navy);font-size:25px;margin:10px}
.cover-slide{min-height:calc(100vh - 132px);padding:46px;display:grid;grid-template-columns:1.08fr .92fr;gap:34px;align-items:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#f1fbff 0%,#fff 52%,#fff9e6 100%)}
.cover-slide::before{content:"";position:absolute;width:520px;height:170px;border:28px solid rgba(40,183,223,.13);border-radius:50%;left:-110px;bottom:-95px;transform:rotate(-7deg)}
.cover-copy{position:relative;z-index:2}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:white;border:1px solid #d8edf7;border-radius:99px;padding:7px 13px;color:var(--blue);font-weight:900;box-shadow:0 6px 18px rgba(7,87,165,.07)}
.cover-title{font-size:clamp(44px,6vw,78px);line-height:1.05;color:var(--navy);margin:20px 0 10px;letter-spacing:-.04em}
.cover-title span{display:block;color:var(--cyan)}
.cover-subtitle{font-size:20px;line-height:1.7;color:#3e6078;max-width:650px}
.cover-pills{display:flex;flex-wrap:wrap;gap:9px;margin:23px 0}
.cover-pill{padding:9px 13px;border-radius:13px;background:#fff;border:1px solid #d9ebf5;font-weight:800;color:var(--navy)}
.cta-row{display:flex;gap:11px;flex-wrap:wrap;margin-top:24px}
.cta{border:0;border-radius:16px;padding:13px 19px;font-weight:900}
.cta.primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;box-shadow:0 12px 28px rgba(7,87,165,.25)}
.cta.secondary{background:#fff5cd;color:#8e6410;border:1px solid #f5dc7a}
.cover-logo{position:relative;z-index:2;background:rgba(255,255,255,.78);border:1px solid rgba(7,87,165,.11);border-radius:36px;padding:20px;box-shadow:0 28px 70px rgba(7,87,165,.15);transform:rotate(1deg)}
.cover-logo img{width:100%;display:block;border-radius:24px}
.float-star{position:absolute;color:var(--yellow);font-size:30px;animation:float 4s ease-in-out infinite}.star-1{top:10%;right:8%}.star-2{top:24%;left:48%;font-size:18px;animation-delay:1.3s}.star-3{bottom:16%;right:41%;font-size:22px;animation-delay:.7s}
@keyframes float{50%{transform:translateY(-9px) rotate(8deg)}}
.map-wrap{padding:32px 36px 90px}
.map-intro{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:22px}
.map-intro h2{font-size:34px;color:var(--navy);margin:0}.map-intro p{margin:6px 0 0;color:var(--muted)}
.lesson-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.lesson-card{border:1px solid #dcecf5;background:linear-gradient(145deg,#fff,#f6fbff);border-radius:20px;padding:17px;text-align:left;min-height:150px;transition:.22s;position:relative;overflow:hidden}
.lesson-card::after{content:"";position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(40,183,223,.09);right:-18px;bottom:-23px}
.lesson-card:hover{transform:translateY(-5px);box-shadow:0 15px 32px rgba(7,87,165,.13);border-color:#acdcef}
.lesson-card .n{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--navy));color:white;display:grid;place-items:center;font-weight:900;margin-bottom:12px;box-shadow:0 8px 18px rgba(15,131,201,.22)}
.lesson-card h3{font-size:14px;line-height:1.45;color:var(--navy);margin:0;position:relative;z-index:1}
.lesson-card small{display:block;margin-top:9px;color:var(--muted)}
.presentation .sidebar{display:none}.presentation .main{margin-left:0;padding:74px 0 0}.presentation .slide-stage{max-width:none}.presentation .slide-card{min-height:calc(100vh - 74px);border-radius:0;border:0;box-shadow:none}.presentation .topbar{height:60px}.presentation .brand-mini,.presentation .progress-label{display:none}
.toast{position:fixed;right:22px;bottom:22px;background:#123c5d;color:white;padding:11px 15px;border-radius:13px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:100;opacity:0;transform:translateY(8px);pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:none}
.print-area{display:none}
@media(max-width:1080px){.lesson-grid{grid-template-columns:repeat(3,1fr)}.step-card{grid-template-columns:145px 1fr}.step-cell{border-top:1px solid #e3eef5}.step-cell:nth-child(2){border-top:0}.cover-slide{grid-template-columns:1fr}.cover-logo{max-width:540px;margin:auto}.kv-grid{grid-template-columns:1fr}}
@media(max-width:820px){
  :root{--sidebar:286px}.menu-btn{display:inline-flex}.brand-mini{min-width:auto}.brand-mini .brand-text{display:none}.toolbar .desktop-only{display:none}
  .sidebar{transform:translateX(-105%);transition:.26s;box-shadow:12px 0 35px rgba(7,87,165,.16)}body.drawer-open .sidebar{transform:none}
  .main{margin-left:0;padding:82px 10px 14px}.slide-card{min-height:calc(100vh - 96px);border-radius:24px}.slide-banner{padding:23px 20px 18px}.slide-body{padding:23px 19px 84px}.slide-footer{padding:12px 16px}.footer-note{display:none}
  .cover-slide{padding:28px 20px 84px;min-height:calc(100vh - 96px)}.cover-title{font-size:48px}.cover-subtitle{font-size:17px}.lesson-grid{grid-template-columns:repeat(2,1fr)}.map-wrap{padding:25px 18px 82px}.map-intro{align-items:start;flex-direction:column}.map-intro h2{font-size:29px}
}
@media(max-width:540px){.topbar{padding:0 9px;gap:7px}.progress-wrap{min-width:60px}.pill-btn{padding:0 9px}.mode-label{display:none}.slide-title{font-size:26px}.content-p{font-size:15px}.content-p.subhead{font-size:19px}.lesson-grid{grid-template-columns:1fr}.cover-title{font-size:42px}.cover-pills{gap:6px}.cover-pill{font-size:12px}.step-card{grid-template-columns:1fr}.step-cell{border-left:0}.map-intro h2{font-size:26px}}

/* ===== Little Steps UI refinement v2 ===== */
:root{
  --topbar-h:76px;

}

.topbar{height:var(--topbar-h);padding:0 max(18px,env(safe-area-inset-left)) 0 max(18px,env(safe-area-inset-left));gap:16px;background:rgba(255,255,255,.91);-webkit-backdrop-filter:blur(22px) saturate(1.12);backdrop-filter:blur(22px) saturate(1.12);box-shadow:0 1px 14px rgba(7,87,165,.055)}
.brand-mini{min-width:285px;gap:12px}.brand-badge{width:46px;height:46px;border-radius:16px;font-size:17px}.brand-mini strong{font-size:16px;line-height:1.25}.brand-mini small{font-size:12px;line-height:1.35;margin-top:3px}
.progress-wrap{gap:12px}.progress-track{height:10px;box-shadow:inset 0 1px 2px rgba(7,87,165,.08)}.progress-bar{transition:width .42s cubic-bezier(.2,.8,.2,1)}.progress-label{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.icon-btn,.pill-btn{min-width:46px;height:46px;border-radius:15px;padding:0 14px;font-size:15px;font-weight:800;box-shadow:0 5px 16px rgba(7,87,165,.07)}
.icon-btn:hover,.pill-btn:hover,.cta:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(7,87,165,.13)}.icon-btn:active,.pill-btn:active,.cta:active,.lesson-card:active{transform:translateY(0) scale(.98)}
.sidebar{top:var(--topbar-h);width:var(--sidebar);padding:20px 16px calc(34px + env(safe-area-inset-bottom));background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);scrollbar-width:thin;scrollbar-color:#c8e5f4 transparent}

et"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 1: อ่านออกเสียงอย่างมั่นใจ: แบ่งวรรคตอนและออกเสียงชัด ตัวชี้วัดที่เน้น ท 1.1 ป.4/1 และ ท 1.1 ป.4/8 จุดประสงค์การเรียนรู้ อ่านบทร้อยแก้วได้ถูกต้อง ชัดเจน และเว้นวรรคตามความหมาย สังเกตคำที่มักอ่านผิด เช่น คำควบกล้ำ ร ล ว และคำที่มีอักษรนำ ประเมินการอ่านของตนเองด้วยเกณฑ์ 4 ด้าน แนวคิดสำคัญ เครื่องหมายจุลภาค (,) หยุดสั้น จุด (.) หยุดจบ และย่อหน้าใหม่หยุดเพื่อเปลี่ยนใจความ ใช้ดินสอขีด / เพื่อหยุดสั้น และ // เพื่อหยุดยาวก่อนอ่าน คำควบกล้ำต้องออกเสียงพยัญชนะต้นทั้งสองเสียง เช่น กล้วย กว้าง ครู ปรบมือ หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ส่งไม้ไมค์นักอ่าน สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l1-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 1: อ่านออกเสียงอย่างมั่นใจ: แบ่งวรรคตอนและออกเสียงชัด","lessonNo":1,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: ครูกรองน้ำก่อนดื่ม, ปลากระโดดพ้นผิวน้ำ, กลุ่มนักเรียนปรบมือพร้อมกัน, คุณยายกวาดลานกว้าง\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูอ่านประโยคเดียวกัน 2 แบบ คืออ่านรวดเดียวกับอ่านแบ่งวรรค แล้วถามว่าแบบใดฟังเข้าใจง่ายกว่า เพราะเหตุใด\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• เครื่องหมายจุลภาค (,) หยุดสั้น จุด (.) หยุดจบ และย่อหน้าใหม่หยุดเพื่อเปลี่ยนใจความ\n• ใช้ดินสอขีด / เพื่อหยุดสั้น และ // เพื่อหยุดยาวก่อนอ่าน\n• คำควบกล้ำต้องออกเสียงพยัญชนะต้นทั้งสองเสียง เช่น กล้วย กว้าง ครู ปรบมือ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nข้อความ: “เช้าวันเสาร์ เด็ก ๆ ช่วยกันปลูกต้นกล้าในแปลงผักของโรงเรียน ทุกคนทำงานอย่างตั้งใจ จนแปลงผักดูสะอาดและเป็นระเบียบ”\nทำเครื่องหมาย: เช้าวันเสาร์ / เด็ก ๆ ช่วยกันปลูกต้นกล้า / ในแปลงผักของโรงเรียน // ทุกคนทำงานอย่างตั้งใจ / จนแปลงผักดูสะอาดและเป็นระเบียบ //\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ต้นกล้า” ต้องออกเสียงพยัญชนะต้นอย่างไร\n• หลังคำว่า “เช้าวันเสาร์” ควรหยุดสั้นหรือหยุดยาว\n• ลองเปลี่ยนน้ำเสียงตรงคำว่า “อย่างตั้งใจ” ให้สื่อความรู้สึก\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ส่งไม้ไมค์นักอ่าน","ครูอธิบายกติกา:\n• ครูแจกบัตรประโยคสั้น 8 ใบ\n• เด็กอ่านทีละคน เมื่ออ่านถูกให้ส่ง “ไมค์กระดาษ” ต่อ\n• เพื่อนได้ 1 คะแนนเมื่อบอกจุดเด่น 1 อย่างและจุดปรับ 1 อย่างด้วยถ้อยคำสุภาพ\nบัตรพร้อมใช้: ครูกรองน้ำก่อนดื่ม, ปลากระโดดพ้นผิวน้ำ, กลุ่มนักเรียนปรบมือพร้อมกัน, คุณยายกวาดลานกว้าง\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• วันนี้ฉันรู้ว่าควรหยุดอ่านตรงไหนจากสิ่งใด\n• อ่านคำว่า “ครอบครัว” และ “กว้างขวาง” ให้ครูฟัง\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"เครื่องหมายจุลภาค (,) หยุดสั้น จุด (.) หยุดจบ และย่อหน้าใหม่หยุดเพื่อเปลี่ยนใจความ"},{"type":"p","style":"List Bullet","text":"ใช้ดินสอขีด / เพื่อหยุดสั้น และ // เพื่อหยุดยาวก่อนอ่าน"},{"type":"p","style":"List Bullet","text":"คำควบกล้ำต้องออกเสียงพยัญชนะต้นทั้งสองเสียง เช่น กล้วย กว้าง ครู ปรบมือ"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"ข้อความ: “เช้าวันเสาร์ เด็ก ๆ ช่วยกันปลูกต้นกล้าในแปลงผักของโรงเรียน ทุกคนทำงานอย่างตั้งใจ จนแปลงผักดูสะอาดและเป็นระเบียบ”\nทำเครื่องหมาย: เช้าวันเสาร์ / เด็ก ๆ ช่วยกันปลูกต้นกล้า / ในแปลงผักของโรงเรียน // ทุกคนทำงานอย่างตั้งใจ / จนแปลงผักดูสะอาดและเป็นระเบียบ //"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"ครูกรองน้ำก่อนดื่ม | ปลากระโดดพ้นผิวน้ำ | กลุ่มนักเรียนปรบมือพร้อมกัน | คุณยายกวาดลานกว้าง"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: ครูกรองน้ำก่อนดื่ม, ปลากระโดดพ้นผิวน้ำ, กลุ่มนักเรียนปรบมือพร้อมกัน, คุณยายกวาดลานกว้าง\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูอ่านประโยคเดียวกัน 2 แบบ คืออ่านรวดเดียวกับอ่านแบ่งวรรค แล้วถามว่าแบบใดฟังเข้าใจง่ายกว่า เพราะเหตุใด\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• เครื่องหมายจุลภาค (,) หยุดสั้น จุด (.) หยุดจบ และย่อหน้าใหม่หยุดเพื่อเปลี่ยนใจความ\n• ใช้ดินสอขีด / เพื่อหยุดสั้น และ // เพื่อหยุดยาวก่อนอ่าน\n• คำควบกล้ำต้องออกเสียงพยัญชนะต้นทั้งสองเสียง เช่น กล้วย กว้าง ครู ปรบมือ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nข้อความ: “เช้าวันเสาร์ เด็ก ๆ ช่วยกันปลูกต้นกล้าในแปลงผักของโรงเรียน ทุกคนทำงานอย่างตั้งใจ จนแปลงผักดูสะอาดและเป็นระเบียบ”\nทำเครื่องหมาย: เช้าวันเสาร์ / เด็ก ๆ ช่วยกันปลูกต้นกล้า / ในแปลงผักของโรงเรียน // ทุกคนทำงานอย่างตั้งใจ / จนแปลงผักดูสะอาดและเป็นระเบียบ //\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ต้นกล้า” ต้องออกเสียงพยัญชนะต้นอย่างไร\n• หลังคำว่า “เช้าวันเสาร์” ควรหยุดสั้นหรือหยุดยาว\n• ลองเปลี่ยนน้ำเสียงตรงคำว่า “อย่างตั้งใจ” ให้สื่อความรู้สึก\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ส่งไม้ไมค์นักอ่าน ครูอธิบายกติกา:\n• ครูแจกบัตรประโยคสั้น 8 ใบ\n• เด็กอ่านทีละคน เมื่ออ่านถูกให้ส่ง “ไมค์กระดาษ” ต่อ\n• เพื่อนได้ 1 คะแนนเมื่อบอกจุดเด่น 1 อย่างและจุดปรับ 1 อย่างด้วยถ้อยคำสุภาพ\nบัตรพร้อมใช้: ครูกรองน้ำก่อนดื่ม, ปลากระโดดพ้นผิวน้ำ, กลุ่มนักเรียนปรบมือพร้อมกัน, คุณยายกวาดลานกว้าง\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• วันนี้ฉันรู้ว่าควรหยุดอ่านตรงไหนจากสิ่งใด\n• อ่านคำว่า “ครอบครัว” และ “กว้างขวาง” ให้ครูฟัง\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน เครื่องหมายจุลภาค (,) หยุดสั้น จุด (.) หยุดจบ และย่อหน้าใหม่หยุดเพื่อเปลี่ยนใจความ ใช้ดินสอขีด / เพื่อหยุดสั้น และ // เพื่อหยุดยาวก่อนอ่าน คำควบกล้ำต้องออกเสียงพยัญชนะต้นทั้งสองเสียง เช่น กล้วย กว้าง ครู ปรบมือ ตัวอย่างสอนบนกระดาน ข้อความ: “เช้าวันเสาร์ เด็ก ๆ ช่วยกันปลูกต้นกล้าในแปลงผักของโรงเรียน ทุกคนทำงานอย่างตั้งใจ จนแปลงผักดูสะอาดและเป็นระเบียบ”\nทำเครื่องหมาย: เช้าวันเสาร์ / เด็ก ๆ ช่วยกันปลูกต้นกล้า / ในแปลงผักของโรงเรียน // ทุกคนทำงานอย่างตั้งใจ / จนแปลงผักดูสะอาดและเป็นระเบียบ // ชุดบัตรเกมพร้อมใช้ ครูกรองน้ำก่อนดื่ม | ปลากระโดดพ้นผิวน้ำ | กลุ่มนักเรียนปรบมือพร้อมกัน | คุณยายกวาดลานกว้าง"},{"id":"thai-l1-knowledge","title":"ใบความรู้: อ่านออกเสียงอย่างมั่นใจ: แบ่งวรรคตอนและออกเสียงชัด","level":0,"parent":"ชั่วโมงที่ 1: อ่านออกเสียงอย่างมั่นใจ: แบ่งวรรคตอนและออกเสียงชัด","lessonNo":1,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"การอ่านออกเสียงที่ดีมี 4 ด้าน: ถูกคำ ชัดเสียง เหมาะจังหวะ และสื่ออารมณ์"},{"type":"p","style":"List Bullet","text":"ก่อนอ่านให้กวาดสายตาดูคำยาก ทำเครื่องหมายหยุด และลองอ่านในใจหนึ่งรอบ"},{"type":"p","style":"List Bullet","text":"เมื่ออ่านผิดให้ย้อนอ่านทั้งวลี ไม่อ่านแก้เฉพาะคำ เพราะจะช่วยรักษาความหมายของประโยค"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"ข้อความ: “เช้าวันเสาร์ เด็ก ๆ ช่วยกันปลูกต้นกล้าในแปลงผักของโรงเรียน ทุกคนทำงานอย่างตั้งใจ จนแปลงผักดูสะอาดและเป็นระเบียบ”\nทำเครื่องหมาย: เช้าวันเสาร์ / เด็ก ๆ ช่วยกันปลูกต้นกล้า / ในแปลงผักของโรงเรียน // ทุกคนทำงานอย่างตั้งใจ / จนแปลงผักดูสะอาดและเป็นระเบียบ //"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"เครื่องหมายจุลภาค (,) หยุดสั้น จุด (.) หยุดจบ และย่อหน้าใหม่หยุดเพื่อเปลี่ยนใจความ"}],"searchText":"ใบความรู้: อ่านออกเสียงอย่างมั่นใจ: แบ่งวรรคตอนและออกเสียงชัด ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ การอ่านออกเสียงที่ดีมี 4 ด้าน: ถูกคำ ชัดเสียง เหมาะจังหวะ และสื่ออารมณ์ ก่อนอ่านให้กวาดสายตาดูคำยาก ทำเครื่องหมายหยุด และลองอ่านในใจหนึ่งรอบ เมื่ออ่านผิดให้ย้อนอ่านทั้งวลี ไม่อ่านแก้เฉพาะคำ เพราะจะช่วยรักษาความ องหมายแบ่งวรรคได้ จุดที่ควรฝึกต่อคือคำควบกล้ำและการรักษาจังหวะเมื่อพบประโยคยาว ภารกิจที่บ้าน 10 นาที เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"},{"id":"thai-l2-overview","title":"แผนการสอนที่ 2: จับใจความสำคัญและเรียงลำดับเหตุการณ์","level":0,"parent":"ชั่วโมงที่ 2: จับใจความสำคัญและเรียงลำดับเหตุการณ์","lessonNo":2,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 1.1 ป.4/3, ท 1.1 ป.4/5 และ ท 1.1 ป.4/6"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"ตอบคำถาม ใคร ทำอะไร ที่ไหน เมื่อไร และผลเป็นอย่างไร"},{"type":"p","style":"List Bullet","text":"ระบุใจความสำคัญของย่อหน้าได้ด้วยประโยคเดียว"},{"type":"p","style":"List Bullet","text":"เรียงเหตุการณ์ก่อน–หลังและสรุปข้อคิดจากเรื่อง"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก”"},{"type":"p","style":"List Bullet","text":"รายละเอียดสนับสนุนช่วยขยายว่าเกิดอย่างไร ที่ไหน เมื่อไร หรือเพราะเหตุใด"},{"type":"p","style":"List Bullet","text":"การเรียงเหตุการณ์ให้สังเกตคำบอกลำดับ เช่น ก่อน ต่อมา จากนั้น สุดท้าย"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","รถไฟเรียงเรื่อง"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 2: จับใจความสำคัญและเรียงลำดับเหตุการณ์ ตัวชี้วัดที่เน้น ท 1.1 ป.4/3, ท 1.1 ป.4/5 และ ท 1.1 ป.4/6 จุดประสงค์การเรียนรู้ ตอบคำถาม ใคร ทำอะไร ที่ไหน เมื่อไร และผลเป็นอย่างไร ระบุใจความสำคัญของย่อหน้าได้ด้วยประโยคเดียว เรียงเหตุการณ์ก่อน–หลังและสรุปข้อคิดจากเรื่อง แนวคิดสำคัญ ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก” รายละเอียดสนับสนุนช่วยขยายว่าเกิดอย่างไร ที่ไหน เมื่อไร หรือเพราะเหตุใด การเรียงเหตุการณ์ให้สังเกตคำบอกลำดับ เช่น ก่อน ต่อมา จากนั้น สุดท้าย หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท รถไฟเรียงเรื่อง สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l2-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 2: จับใจความสำคัญและเรียงลำดับเหตุการณ์","lessonNo":2,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: เมย์เตรียมกระถาง, เมย์ใส่ดิน, เมย์หยอดเมล็ด, เมย์รดน้ำ\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูเล่าเรื่องสั้นสลับลำดับ 4 เหตุการณ์ แล้วให้เด็กบอกว่าฟังแล้วติดขัดตรงไหน\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก”\n• รายละเอียดสนับสนุนช่วยขยายว่าเกิดอย่างไร ที่ไหน เมื่อไร หรือเพราะเหตุใด\n• การเรียงเหตุการณ์ให้สังเกตคำบอกลำดับ เช่น ก่อน ต่อมา จากนั้น สุดท้าย\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nเรื่อง: “วันจันทร์ นักเรียนชั้น ป.4 ช่วยกันทำแปลงผัก หลังจากพรวนดิน ทุกคนปลูกเมล็ดผักบุ้ง จากนั้นรดน้ำ และติดป้ายชื่อแปลง สองสัปดาห์ต่อมา ผักบุ้งเริ่มงอกเขียวเต็มแปลง”\nใจความสำคัญ: นักเรียน ป.4 ร่วมกันทำแปลงผักจนผักบุ้งงอกงาม\nลำดับ: พรวนดิน → ปลูกเมล็ด → รดน้ำ → ติดป้าย → ผักงอก\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ใครเป็นผู้ทำกิจกรรม\n• เหตุการณ์ใดเกิดก่อนการรดน้ำ\n• ถ้าตัดประโยค “วันจันทร์” ออก ใจความสำคัญยังอยู่หรือไม่\n• เรื่องนี้ให้ข้อคิดเรื่องใด\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: รถไฟเรียงเรื่อง","ครูอธิบายกติกา:\n• แต่ละทีมได้รับบัตรเหตุการณ์ 5 ใบที่สลับลำดับ\n• อ่านทุกใบและขีดเส้นใต้คำบอกเวลา\n• เรียงให้ถูกแล้วพูดสรุปเรื่องไม่เกิน 2 ประโยค\nบัตรพร้อมใช้: เมย์เตรียมกระถาง, เมย์ใส่ดิน, เมย์หยอดเมล็ด, เมย์รดน้ำ, ต้นอ่อนเริ่มงอก\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดใจความสำคัญของบทเรียนวันนี้ภายใน 10 วินาที\n• เรียงคำว่า “ก่อน–จากนั้น–สุดท้าย” ให้เป็นโครงเรื่อง 3 ขั้น\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก”"},{"type":"p","style":"List Bullet","text":"รายละเอียดสนับสนุนช่วยขยายว่าเกิดอย่างไร ที่ไหน เมื่อไร หรือเพราะเหตุใด"},{"type":"p","style":"List Bullet","text":"การเรียงเหตุการณ์ให้สังเกตคำบอกลำดับ เช่น ก่อน ต่อมา จากนั้น สุดท้าย"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"เรื่อง: “วันจันทร์ นักเรียนชั้น ป.4 ช่วยกันทำแปลงผัก หลังจากพรวนดิน ทุกคนปลูกเมล็ดผักบุ้ง จากนั้นรดน้ำ และติดป้ายชื่อแปลง สองสัปดาห์ต่อมา ผักบุ้งเริ่มงอกเขียวเต็มแปลง”\nใจความสำคัญ: นักเรียน ป.4 ร่วมกันทำแปลงผักจนผักบุ้งงอกงาม\nลำดับ: พรวนดิน → ปลูกเมล็ด → รดน้ำ → ติดป้าย → ผักงอก"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"เมย์เตรียมกระถาง | เมย์ใส่ดิน | เมย์หยอดเมล็ด | เมย์รดน้ำ | ต้นอ่อนเริ่มงอก"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: เมย์เตรียมกระถาง, เมย์ใส่ดิน, เมย์หยอดเมล็ด, เมย์รดน้ำ\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูเล่าเรื่องสั้นสลับลำดับ 4 เหตุการณ์ แล้วให้เด็กบอกว่าฟังแล้วติดขัดตรงไหน\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก”\n• รายละเอียดสนับสนุนช่วยขยายว่าเกิดอย่างไร ที่ไหน เมื่อไร หรือเพราะเหตุใด\n• การเรียงเหตุการณ์ให้สังเกตคำบอกลำดับ เช่น ก่อน ต่อมา จากนั้น สุดท้าย\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nเรื่อง: “วันจันทร์ นักเรียนชั้น ป.4 ช่วยกันทำแปลงผัก หลังจากพรวนดิน ทุกคนปลูกเมล็ดผักบุ้ง จากนั้นรดน้ำ และติดป้ายชื่อแปลง สองสัปดาห์ต่อมา ผักบุ้งเริ่มงอกเขียวเต็มแปลง”\nใจความสำคัญ: นักเรียน ป.4 ร่วมกันทำแปลงผักจนผักบุ้งงอกงาม\nลำดับ: พรวนดิน → ปลูกเมล็ด → รดน้ำ → ติดป้าย → ผักงอก\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ใครเป็นผู้ทำกิจกรรม\n• เหตุการณ์ใดเกิดก่อนการรดน้ำ\n• ถ้าตัดประโยค “วันจันทร์” ออก ใจความสำคัญยังอยู่หรือไม่\n• เรื่องนี้ให้ข้อคิดเรื่องใด\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: รถไฟเรียงเรื่อง ครูอธิบายกติกา:\n• แต่ละทีมได้รับบัตรเหตุการณ์ 5 ใบที่สลับลำดับ\n• อ่านทุกใบและขีดเส้นใต้คำบอกเวลา\n• เรียงให้ถูกแล้วพูดสรุปเรื่องไม่เกิน 2 ประโยค\nบัตรพร้อมใช้: เมย์เตรียมกระถาง, เมย์ใส่ดิน, เมย์หยอดเมล็ด, เมย์รดน้ำ, ต้นอ่อนเริ่มงอก\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดใจความสำคัญของบทเรียนวันนี้ภายใน 10 วินาที\n• เรียงคำว่า “ก่อน–จากนั้น–สุดท้าย” ให้เป็นโครงเรื่อง 3 ขั้น\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก” รายละเอียดสนับสนุนช่วยขยายว่าเกิดอย่างไร ที่ไหน เมื่อไร หรือเพราะเหตุใด การเรียงเหตุการณ์ให้สังเกตคำบอกลำดับ เช่น ก่อน ต่อมา จากนั้น สุดท้าย ตัวอย่างสอนบนกระดาน เรื่อง: “วันจันทร์ นักเรียนชั้น ป.4 ช่วยกันทำแปลงผัก หลังจากพรวนดิน ทุกคนปลูกเมล็ดผักบุ้ง จากนั้นรดน้ำ และติดป้ายชื่อแปลง สองสัปดาห์ต่อมา ผักบุ้งเริ่มงอกเขียวเต็มแปลง”\nใจความสำคัญ: นักเรียน ป.4 ร่วมกันทำแปลงผักจนผักบุ้งงอกงาม\nลำดับ: พรวนดิน → ปลูกเมล็ด → รดน้ำ → ติดป้าย → ผักงอก ชุดบัตรเกมพร้อมใช้ เมย์เตรียมกระถาง | เมย์ใส่ดิน | เมย์หยอดเมล็ด | เมย์รดน้ำ | ต้นอ่อนเริ่มงอก"},{"id":"thai-l2-knowledge","title":"ใบความรู้: จับใจความสำคัญและเรียงลำดับเหตุการณ์","level":0,"parent":"ชั่วโมงที่ 2: จับใจความสำคัญและเรียงลำดับเหตุการณ์","lessonNo":2,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"สูตรช่วยจับใจความ: ใคร + ทำอะไร + ผลเป็นอย่างไร"},{"type":"p","style":"List Bullet","text":"ไม่คัดลอกทุกประโยค แต่เลือกเฉพาะข้อมูลที่จำเป็นต่อความเข้าใจ"},{"type":"p","style":"List Bullet","text":"ข้อคิดต้องสัมพันธ์กับเหตุการณ์ เช่น ตัวละครขยัน จึงได้ผลดี → ความขยันนำไปสู่ความสำเร็จ"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"เรื่อง: “วันจันทร์ นักเรียนชั้น ป.4 ช่วยกันทำแปลงผัก หลังจากพรวนดิน ทุกคนปลูกเมล็ดผักบุ้ง จากนั้นรดน้ำ และติดป้ายชื่อแปลง สองสัปดาห์ต่อมา ผักบุ้งเริ่มงอกเขียวเต็มแปลง”\nใจความสำคัญ: นักเรียน ป.4 ร่วมกันทำแปลงผักจนผักบุ้งงอกงาม\nลำดับ: พรวนดิน → ปลูกเมล็ด → รดน้ำ → ติดป้าย → ผักงอก"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก”"}],"searchText":"ใบความรู้: จับใจความสำคัญและเรียงลำดับเหตุการณ์ ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ สูตรช่วยจับใจความ: ใคร + ทำอะไร + ผลเป็นอย่างไร ไม่คัดลอกทุกประโยค แต่เลือกเฉพาะข้อมูลที่จำเป็นต่อความเข้าใจ ข้อคิดต้องสัมพันธ์กับเหตุการณ์ เช่น ตัวละครขยัน จึงได้ผลดี → ความขยันนำไปสู่ความสำเร็จ ตัวอย่างที่ครูใช้สอน เรื่อง: “วันจันทร์ นักเรียนชั้น ป.4 ช่วยกันทำแปลงผัก หลังจากพรวนดิน ทุกคนปลูกเมล็ดผักบุ้ง จากนั้นรดน้ำ และติดป้ายชื่อแปลง สองสัปดาห์ต่อมา ผักบุ้งเริ่มงอกเขียวเต็มแปลง”\nใจความสำคัญ: นักเรียน ป.4 ร่วมกันทำแปลงผักจนผักบุ้งงอกงาม\nลำดับ: พรวนดิน → ปลูกเมล็ด → รดน้ำ → ติดป้าย → ผักงอก จำง่ายในหนึ่งประโยค ใจความสำคัญคือข้อความที่บอกว่า “ย่อหน้านี้กล่าวถึงเรื่องใดเป็นหลัก”"},{"id":"thai-l2-worksheet","title":"ใบงานชั่วโมงที่ 2","level":0,"parent":"ชั่วโมงที่ 2: จับใจความสำคัญและเรียงลำดับเหตุการณ์","lessonNo":2,"kind":"worksheet","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบงาน: ทำจากพื้นฐานไปสู่การประยุกต์"},{"type":"p","style":"Normal","text":"1. อ่านเรื่อง “น้องภูเก็บขวดพลาสติกในสนาม ล้างให้สะอาด แล้วนำไปทำกระถางต้นไม้” เขียนใจความสำคัญ 1 ประโยค"},{"type":"p", ข้อเท็จจริงตรวจสอบได้ด้วยการสังเกต นับ วัด หรือค้นข้อมูล"},{"type":"p","style":"List Bullet","text":"ข้อคิดเห็นเป็นความรู้สึก การประเมิน หรือความเชื่อของผู้พูด"},{"type":"p","style":"List Bullet","text":"การคาดคะเนที่ดีต้องมีคำว่า “เพราะ...” และอ้างสิ่งที่เกิดขึ้นในเรื่อง"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","จริงหรือคิด"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 3: แยกข้อเท็จจริง ข้อคิดเห็น และคาดคะเนเหตุการณ์ ตัวชี้วัดที่เน้น ท 1.1 ป.4/4 และ ท 1.1 ป.4/5 จุดประสงค์การเรียนรู้ แยกข้อความที่ตรวจสอบได้ออกจากความคิดเห็นส่วนบุคคล สังเกตคำบอกความคิดเห็น เช่น คิดว่า น่าจะ สวยที่สุด คาดคะเนเหตุการณ์โดยยกหลักฐานจากเรื่องประกอบ แนวคิดสำคัญ ข้อเท็จจริงตรวจสอบได้ด้วยการสังเกต นับ วัด หรือค้นข้อมูล ข้อคิดเห็นเป็นความรู้สึก การประเมิน หรือความเชื่อของผู้พูด การคาดคะเนที่ดีต้องมีคำว่า “เพราะ...” และอ้างสิ่งที่เกิดขึ้นในเรื่อง หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท จริงหรือคิด สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l3-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 3: แยกข้อเท็จจริง ข้อคิดเห็น และคาดคะเนเหตุการณ์","lessonNo":3,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: น้ำแข็งละลายเมื่อได้รับความร้อน, มะม่วงเป็นผลไม้ที่อร่อยที่สุด, รถคันนี้มีล้อ 4 ล้อ, หนังสือเล่มนี้น่าตื่นเต้นมาก\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูยกข้อความ “ห้องนี้มีหน้าต่าง 4 บาน” และ “ห้องนี้สวยที่สุด” ให้เด็กยืนคนละฝั่งตามประเภท\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ข้อเท็จจริงตรวจสอบได้ด้วยการสังเกต นับ วัด หรือค้นข้อมูล\n• ข้อคิดเห็นเป็นความรู้สึก การประเมิน หรือความเชื่อของผู้พูด\n• การคาดคะเนที่ดีต้องมีคำว่า “เพราะ...” และอ้างสิ่งที่เกิดขึ้นในเรื่อง\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nข้อความ 1: “วันนี้อุณหภูมิ 34 องศาเซลเซียส” = ข้อเท็จจริง เพราะวัดได้\nข้อความ 2: “วันนี้อากาศร้อนเกินไป” = ข้อคิดเห็น เพราะความรู้สึกแต่ละคนต่างกัน\nคาดคะเน: เมฆดำมากและลมแรง → น่าจะมีฝนตก เพราะมีสัญญาณของฝน\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ที่สุด” มักบอกข้อมูลชนิดใด\n• ข้อความ “โรงเรียนเปิดเวลา 8.00 น.” ตรวจสอบอย่างไร\n• ถ้าตัวละครลืมร่มและท้องฟ้ามืด เด็กคาดว่าจะเกิดอะไร เพราะอะไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: จริงหรือคิด","ครูอธิบายกติกา:\n• ครูอ่านบัตรทีละใบ เด็กชูป้าย จ = จริง หรือ ค = ความคิดเห็น\n• ผู้ตอบต้องอธิบายวิธีตรวจสอบหรือคำที่เป็นสัญญาณ\n• รอบสุดท้ายให้แต่ละทีมแต่งข้อความอีกทีมละ 2 ข้อ\nบัตรพร้อมใช้: น้ำแข็งละลายเมื่อได้รับความร้อน, มะม่วงเป็นผลไม้ที่อร่อยที่สุด, รถคันนี้มีล้อ 4 ล้อ, หนังสือเล่มนี้น่าตื่นเต้นมาก\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกวิธีตรวจสอบข้อเท็จจริง 1 วิธี\n• แต่งข้อคิดเห็นที่มีคำว่า “น่าจะ” 1 ประโยค\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ข้อเท็จจริงตรวจสอบได้ด้วยการสังเกต นับ วัด หรือค้นข้อมูล"},{"type":"p","style":"List Bullet","text":"ข้อคิดเห็นเป็นความรู้สึก การประเมิน หรือความเชื่อของผู้พูด"},{"type":"p","style":"List Bullet","text":"การคาดคะเนที่ดีต้องมีคำว่า “เพราะ...” และอ้างสิ่งที่เกิดขึ้นในเรื่อง"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"ข้อความ 1: “วันนี้อุณหภูมิ 34 องศาเซลเซียส” = ข้อเท็จจริง เพราะวัดได้\nข้อความ 2: “วันนี้อากาศร้อนเกินไป” = ข้อคิดเห็น เพราะความรู้สึกแต่ละคนต่างกัน\nคาดคะเน: เมฆดำมากและลมแรง → น่าจะมีฝนตก เพราะมีสัญญาณของฝน"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"น้ำแข็งละลายเมื่อได้รับความร้อน | มะม่วงเป็นผลไม้ที่อร่อยที่สุด | รถคันนี้มีล้อ 4 ล้อ | หนังสือเล่มนี้น่าตื่นเต้นมาก"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: น้ำแข็งละลายเมื่อได้รับความร้อน, มะม่วงเป็นผลไม้ที่อร่อยที่สุด, รถคันนี้มีล้อ 4 ล้อ, หนังสือเล่มนี้น่าตื่นเต้นมาก\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูยกข้อความ “ห้องนี้มีหน้าต่าง 4 บาน” และ “ห้องนี้สวยที่สุด” ให้เด็กยืนคนละฝั่งตามประเภท\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• ข้อเท็จจริงตรวจสอบได้ด้วยการสังเกต นับ วัด หรือค้นข้อมูล\n• ข้อคิดเห็นเป็นความรู้สึก การประเมิน หรือความเชื่อของผู้พูด\n• การคาดคะเนที่ดีต้องมีคำว่า “เพราะ...” และอ้างสิ่งที่เกิดขึ้นในเรื่อง\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nข้อความ 1: “วันนี้อุณหภูมิ 34 องศาเซลเซียส” = ข้อเท็จจริง เพราะวัดได้\nข้อความ 2: “วันนี้อากาศร้อนเกินไป” = ข้อคิดเห็น เพราะความรู้สึกแต่ละคนต่างกัน\nคาดคะเน: เมฆดำมากและลมแรง → น่าจะมีฝนตก เพราะมีสัญญาณของฝน\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “ที่สุด” มักบอกข้อมูลชนิดใด\n• ข้อความ “โรงเรียนเปิดเวลา 8.00 น.” ตรวจสอบอย่างไร\n• ถ้าตัวละครลืมร่มและท้องฟ้ามืด เด็กคาดว่าจะเกิดอะไร เพราะอะไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: จริงหรือคิด ครูอธิบายกติกา:\n• ครูอ่านบัตรทีละใบ เด็กชูป้าย จ = จริง หรือ ค = ความคิดเห็น\n• ผู้ตอบต้องอธิบายวิธีตรวจสอบหรือคำที่เป็นสัญญาณ\n• รอบสุดท้ายให้แต่ละทีมแต่งข้อความอีกทีมละ 2 ข้อ\nบัตรพร้อมใช้: น้ำแข็งละลายเมื่อได้รับความร้อน, มะม่วงเป็นผลไม้ที่อร่อยที่สุด, รถคันนี้มีล้อ 4 ล้อ, หนังสือเล่มนี้น่าตื่นเต้นมาก\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกวิธีตรวจสอบข้อเท็จจริง 1 วิธี\n• แต่งข้อคิดเห็นที่มีคำว่า “น่าจะ” 1 ประโยค\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน ข้อเท็จจริงตรวจสอบได้ด้วยการสังเกต นับ วัด หรือค้นข้อมูล ข้อคิดเห็นเป็นความรู้สึก การประเมิน หรือความเชื่อของผู้พูด การคาดคะเนที่ดีต้องมีคำว่า “เพราะ...” และอ้างสิ่งที่เกิดขึ้นในเรื่อง ตัวอย่างสอนบนกระดาน ข้อความ 1: “วันนี้อุณหภูมิ 34 องศาเซลเซียส” = ข้อเท็จจริง เพราะวัดได้\nข้อความ 2: “วันนี้อากาศร้อนเกินไป” = ข้อคิดเห็น เพราะความรู้สึกแต่ละคนต่างกัน\nคาดคะเน: เมฆดำมากและลมแรง → น่าจะมีฝนตก เพราะมีสัญญาณของฝน ชุดบัตรเกมพร้อมใช้ น้ำแข็งละลายเมื่อได้รับความร้อน | มะม่วงเป็นผลไม้ที่อร่อยที่สุด | รถคันนี้มีล้อ 4 ล้อ | หนังสือเล่มนี้น่าตื่นเต้นมาก"},{"id":"thai-l3-knowledge","title":"ใบความรู้: แยกข้อเท็จจริง ข้อคิดเห็น และคาดคะเนเหตุการณ์","level":0,"parent":"ชั่วโมงที่ 3: แยกข้อเท็จจริง ข้อคิดเห็น และคาดคะเนเหตุการณ์","lessonNo":3,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"คำสัญญาณความคิดเห็น: น่าจะ ควร ดีที่สุด สวยมาก ฉันชอบ ฉันคิดว่า"},{"type":"p","style":"List Bullet","text":"ข้อความหนึ่งอาจมีทั้งข้อเท็จจริงและข้อคิดเห็น ต้องแยกพิจารณาทีละส่วน"},{"type":"p","style":"List Bullet","text":"การคาดคะเนไม่ใช่การเดาสุ่ม แต่เป็นการใช้ข้อมูลเดิมมาคิดถึงสิ่งที่อาจเกิดขึ้นต่อไป"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"ข้อความ 1: “วันนี้อุณหภูมิ 34 องศาเซลเซียส” = ข้อเท็จจริง เพราะวัดได้\nข้อความ 2: “วันนี้อากาศร้อนเกินไป” = ข้อคิดเห็น เพราะความรู้สึกแต่ละคนต่างกัน\nคาดคะเน: เมฆดำมากและลมแรง → น่าจะมีฝนตก เพราะมีสัญญาณของฝน"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"ข้อเท็จจริงตรวจสอบได้ด้วยการสังเกต นับ วัด หรือค้นข้อมูล"}],"searchText":"ใบความรู้: แยกข้อเท็จจริง ข้อคิดเห็น และคาดคะเนเหตุการณ์ ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ คำสัญญาณความคิดเห็น: น่าจะ ควร ดีที่สุด สวยมาก ฉันชอบ ฉันคิดว่า ข้อความหนึ่งอาจมีทั้งข้อเท็จจริงและข้อคิดเห็น ต้องแยกพิจารณาทีละส่วน กา ิจที่บ้าน 10 นาที เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"},{"id":"thai-l4-overview","title":"แผนการสอนที่ 4: ค้นความหมายของคำจากบริบทและพจนานุกรม","level":0,"parent":"ชั่วโมงที่ 4: ค้นความหมายของคำจากบริบทและพจนานุกรม","lessonNo":4,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 1.1 ป.4/2 และ ท 4.1 ป.4/3"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"เดาความหมายของคำจากคำรอบข้างได้"},{"type":"p","style":"List Bullet","text":"เรียงคำตามลำดับพยัญชนะและสระเพื่อค้นพจนานุกรม"},{"type":"p","style":"List Bullet","text":"เลือกความหมายที่เหมาะกับบริบทของประโยค"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"บริบทคือคำหรือประโยครอบ ๆ คำที่ช่วยบอกความหมาย"},{"type":"p","style":"List Bullet","text":"พจนานุกรมเรียงตามพยัญชนะต้น ต่อด้วยสระ ตัวสะกด และวรรณยุกต์"},{"type":"p","style":"List Bullet","text":"คำหนึ่งคำอาจมีหลายความหมาย ต้องเลือกความหมายที่เข้ากับประโยค"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","นักสืบคำศัพท์"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 4: ค้นความหมายของคำจากบริบทและพจนานุกรม ตัวชี้วัดที่เน้น ท 1.1 ป.4/2 และ ท 4.1 ป.4/3 จุดประสงค์การเรียนรู้ เดาความหมายของคำจากคำรอบข้างได้ เรียงคำตามลำดับพยัญชนะและสระเพื่อค้นพจนานุกรม เลือกความหมายที่เหมาะกับบริบทของประโยค แนวคิดสำคัญ บริบทคือคำหรือประโยครอบ ๆ คำที่ช่วยบอกความหมาย พจนานุกรมเรียงตามพยัญชนะต้น ต่อด้วยสระ ตัวสะกด และวรรณยุกต์ คำหนึ่งคำอาจมีหลายความหมาย ต้องเลือกความหมายที่เข้ากับประโยค หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท นักสืบคำศัพท์ สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l4-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 4: ค้นความหมายของคำจากบริบทและพจนานุกรม","lessonNo":4,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: กระจ่าง, ขยัน, ประณีต, สามัคคี\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูเขียน “เด็ก ๆ หลบแดดใต้ร่มไม้” และ “พ่อกางร่ม” แล้วถามว่าคำว่า “ร่ม” เหมือนหรือต่างกันอย่างไร\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• บริบทคือคำหรือประโยครอบ ๆ คำที่ช่วยบอกความหมาย\n• พจนานุกรมเรียงตามพยัญชนะต้น ต่อด้วยสระ ตัวสะกด และวรรณยุกต์\n• คำหนึ่งคำอาจมีหลายความหมาย ต้องเลือกความหมายที่เข้ากับประโยค\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nประโยค “ใบไม้แห้งกรอบ แตกเป็นชิ้นเมื่อจับ” คำว่า “กรอบ” หมายถึงแห้งและแตกง่าย เพราะมีคำว่า “แตกเป็นชิ้น” ช่วยบอก\nการค้นคำ: กบ → กรอบ → กล้วย → กวาง โดยเปรียบเทียบตัวอักษรทีละตำแหน่ง\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “เบา” ใน “กระเป๋าเบา” กับ “พูดเบา ๆ” ต่างกันอย่างไร\n• คำใดมาก่อนในพจนานุกรม: ขนม หรือ ขนาด\n• เมื่อพจนานุกรมให้หลายความหมาย เราจะเลือกอย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: นักสืบคำศัพท์","ครูอธิบายกติกา:\n• ทีมละ 1 พจนานุกรมหรือบัตรหน้าพจนานุกรมจำลอง\n• ครูบอกคำ เด็กค้นและยกมือเมื่อพบ\n• ได้คะแนนเพิ่มเมื่อยกตัวอย่างประโยคที่ใช้ความหมายนั้นได้ถูกต้อง\nบัตรพร้อมใช้: กระจ่าง, ขยัน, ประณีต, สามัคคี, อนุรักษ์\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกเบาะแสบริบท 1 แบบพร้อมตัวอย่าง\n• เรียงคำ “นา–นก–นวด” ตามพจนานุกรม\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"บริบทคือคำหรือประโยครอบ ๆ คำที่ช่วยบอกความหมาย"},{"type":"p","style":"List Bullet","text":"พจนานุกรมเรียงตามพยัญชนะต้น ต่อด้วยสระ ตัวสะกด และวรรณยุกต์"},{"type":"p","style":"List Bullet","text":"คำหนึ่งคำอาจมีหลายความหมาย ต้องเลือกความหมายที่เข้ากับประโยค"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"ประโยค “ใบไม้แห้งกรอบ แตกเป็นชิ้นเมื่อจับ” คำว่า “กรอบ” หมายถึงแห้งและแตกง่าย เพราะมีคำว่า “แตกเป็นชิ้น” ช่วยบอก\nการค้นคำ: กบ → กรอบ → กล้วย → กวาง โดยเปรียบเทียบตัวอักษรทีละตำแหน่ง"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"กระจ่าง | ขยัน | ประณีต | สามัคคี | อนุรักษ์"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: กระจ่าง, ขยัน, ประณีต, สามัคคี\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูเขียน “เด็ก ๆ หลบแดดใต้ร่มไม้” และ “พ่อกางร่ม” แล้วถามว่าคำว่า “ร่ม” เหมือนหรือต่างกันอย่างไร\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• บริบทคือคำหรือประโยครอบ ๆ คำที่ช่วยบอกความหมาย\n• พจนานุกรมเรียงตามพยัญชนะต้น ต่อด้วยสระ ตัวสะกด และวรรณยุกต์\n• คำหนึ่งคำอาจมีหลายความหมาย ต้องเลือกความหมายที่เข้ากับประโยค\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nประโยค “ใบไม้แห้งกรอบ แตกเป็นชิ้นเมื่อจับ” คำว่า “กรอบ” หมายถึงแห้งและแตกง่าย เพราะมีคำว่า “แตกเป็นชิ้น” ช่วยบอก\nการค้นคำ: กบ → กรอบ → กล้วย → กวาง โดยเปรียบเทียบตัวอักษรทีละตำแหน่ง\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “เบา” ใน “กระเป๋าเบา” กับ “พูดเบา ๆ” ต่างกันอย่างไร\n• คำใดมาก่อนในพจนานุกรม: ขนม หรือ ขนาด\n• เมื่อพจนานุกรมให้หลายความหมาย เราจะเลือกอย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: นักสืบคำศัพท์ ครูอธิบายกติกา:\n• ทีมละ 1 พจนานุกรมหรือบัตรหน้าพจนานุกรมจำลอง\n• ครูบอกคำ เด็กค้นและยกมือเมื่อพบ\n• ได้คะแนนเพิ่มเมื่อยกตัวอย่างประโยคที่ใช้ความหมายนั้นได้ถูกต้อง\nบัตรพร้อมใช้: กระจ่าง, ขยัน, ประณีต, สามัคคี, อนุรักษ์\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกเบาะแสบริบท 1 แบบพร้อมตัวอย่าง\n• เรียงคำ “นา–นก–นวด” ตามพจนานุกรม\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน บริบทคือคำหรือประโยครอบ ๆ คำที่ช่วยบอกความหมาย พจนานุกรมเรียงตามพยัญชนะต้น ต่อด้วยสระ ตัวสะกด และวรรณยุกต์ คำหนึ่งคำอาจมีหลายความหมาย ต้องเลือกความหมายที่เข้ากับประโยค ตัวอย่างสอนบนกระดาน ประโยค “ใบไม้แห้งกรอบ แตกเป็นชิ้นเมื่อจับ” คำว่า “กรอบ” หมายถึงแห้งและแตกง่าย เพราะมีคำว่า “แตกเป็นชิ้น” ช่วยบอก\nการค้นคำ: กบ → กรอบ → กล้วย → กวาง โดยเปรียบเทียบตัวอักษรทีละตำแหน่ง ชุดบัตรเกมพร้อมใช้ กระจ่าง | ขยัน | ประณีต | สามัคคี | อนุรักษ์"},{"id":"thai-l4-knowledge","title":"ใบความรู้: ค้นความหมายของคำจากบริบทและพจนานุกรม","level":0,"parent":"ชั่วโมงที่ 4: ค้นความหมายของคำจากบริบทและพจนานุกรม","lessonNo":4,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"เบาะแสบริบท 4 แบบ: คำอธิบาย ตัวอย่าง คำตรงข้าม และผลที่เกิดขึ้น"},{"type":"p","style":"List Bullet","text":"ก่อนเปิดพจนานุกรมให้หาพยัญชนะต้น แล้วดูตัวอักษรถัดไปทีละตัว"},{"type":"p","style":"List Bullet","text":"จดคำศัพท์เป็น 3 ช่อง: คำ – ความหมาย – ประโยคตัวอย่าง จะช่วยจำได้ดีขึ้น"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"ประโยค “ใบไม้แห้งกรอบ แตกเป็นชิ้นเมื่อจับ” คำว่า “กรอบ” หมายถึงแห้งและแตกง่าย เพราะมีคำว่า “แตกเป็นชิ้น” ช่วยบอก\nการค้นคำ: กบ → กรอบ → กล้วย → กวาง โดยเปรียบเทียบตัวอักษรทีละตำแหน่ง"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"บริบทคือคำหรือประโยครอบ ๆ คำที่ช่วยบอกความหมาย"}],"searchText":"ใบความรู้: ค้นความหมายของคำจากบริบทและพจนานุกรม ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ เบาะแสบริบท 4 แบบ: คำอธิบาย ตัวอย่าง คำตรงข้าม และผลที่เกิดขึ้น ก่อนเปิดพจนานุกรมให้หาพยัญ  สะกดคำแม่นยำด้วยมาตราตัวสะกด","level":0,"parent":"ชั่วโมงที่ 5: สะกดคำแม่นยำด้วยมาตราตัวสะกด","lessonNo":5,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 4.1 ป.4/1"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"จำแนกคำตามมาตราตัวสะกดได้"},{"type":"p","style":"List Bullet","text":"เชื่อมเสียงตัวสะกดกับพยัญชนะที่ใช้เขียนจริง"},{"type":"p","style":"List Bullet","text":"ตรวจและแก้คำสะกดผิดจากประโยคได้"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"มาตราตัวสะกดมีแม่ ก กา กก กด กบ กน กม เกย และเกอว"},{"type":"p","style":"List Bullet","text":"บางมาตรามีพยัญชนะหลายตัวออกเสียงเดียวกัน เช่น แม่กด: ด จ ช ซ ฎ ฏ ฐ ฑ ฒ ต ถ ท ธ ศ ษ ส"},{"type":"p","style":"List Bullet","text":"การจำคำต้องดูทั้งเสียงและรูปเขียน ไม่เขียนตามเสียงเพียงอย่างเดียว"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ส่งคำเข้าบ้านมาตรา"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 5: สะกดคำแม่นยำด้วยมาตราตัวสะกด ตัวชี้วัดที่เน้น ท 4.1 ป.4/1 จุดประสงค์การเรียนรู้ จำแนกคำตามมาตราตัวสะกดได้ เชื่อมเสียงตัวสะกดกับพยัญชนะที่ใช้เขียนจริง ตรวจและแก้คำสะกดผิดจากประโยคได้ แนวคิดสำคัญ มาตราตัวสะกดมีแม่ ก กา กก กด กบ กน กม เกย และเกอว บางมาตรามีพยัญชนะหลายตัวออกเสียงเดียวกัน เช่น แม่กด: ด จ ช ซ ฎ ฏ ฐ ฑ ฒ ต ถ ท ธ ศ ษ ส การจำคำต้องดูทั้งเสียงและรูปเขียน ไม่เขียนตามเสียงเพียงอย่างเดียว หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ส่งคำเข้าบ้านมาตรา สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l5-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 5: สะกดคำแม่นยำด้วยมาตราตัวสะกด","lessonNo":5,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: เมฆ, พืช, รูป, ลิง\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูออกเสียง “รด” “รถ” “รส” แล้วให้เด็กสังเกตว่าเสียงท้ายเหมือนกันแต่รูปเขียนต่างกัน\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• มาตราตัวสะกดมีแม่ ก กา กก กด กบ กน กม เกย และเกอว\n• บางมาตรามีพยัญชนะหลายตัวออกเสียงเดียวกัน เช่น แม่กด: ด จ ช ซ ฎ ฏ ฐ ฑ ฒ ต ถ ท ธ ศ ษ ส\n• การจำคำต้องดูทั้งเสียงและรูปเขียน ไม่เขียนตามเสียงเพียงอย่างเดียว\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nนก → เสียงท้าย ก = แม่กก\nภาพ → เสียงท้าย บ = แม่กบ แม้เขียนด้วย พ\nอาหาร → เสียงท้าย น = แม่กน แม้เขียนด้วย ร\nวิธีตรวจ: อ่านช้า ๆ ฟังเสียงท้าย แล้วดูรูปคำจากคลังคำหรือพจนานุกรม\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “เลข” อยู่แม่ใด เพราะเหตุใด\n• คำว่า “ลาภ” ออกเสียงตัวสะกดใด\n• ประโยค “ฉันเห็นก้อนเมก” ผิดตรงไหนและควรแก้อย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ส่งคำเข้าบ้านมาตรา","ครูอธิบายกติกา:\n• วางป้ายบ้านมาตรา 9 หลังรอบห้อง\n• เด็กหยิบบัตรคำ อ่าน แล้วเดินไปวางบ้านที่ถูก\n• เมื่อวางแล้วต้องบอกเสียงตัวสะกดและตัวอักษรที่ใช้เขียน\nบัตรพร้อมใช้: เมฆ, พืช, รูป, ลิง, ลม, เนย, ดาว, ปลา\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกคำไม่ตรงมาตรา 2 คำพร้อมมาตรา\n• เขียนคำว่า “อาหาร” และอธิบายเสียงตัวสะกด\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"มาตราตัวสะกดมีแม่ ก กา กก กด กบ กน กม เกย และเกอว"},{"type":"p","style":"List Bullet","text":"บางมาตรามีพยัญชนะหลายตัวออกเสียงเดียวกัน เช่น แม่กด: ด จ ช ซ ฎ ฏ ฐ ฑ ฒ ต ถ ท ธ ศ ษ ส"},{"type":"p","style":"List Bullet","text":"การจำคำต้องดูทั้งเสียงและรูปเขียน ไม่เขียนตามเสียงเพียงอย่างเดียว"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"นก → เสียงท้าย ก = แม่กก\nภาพ → เสียงท้าย บ = แม่กบ แม้เขียนด้วย พ\nอาหาร → เสียงท้าย น = แม่กน แม้เขียนด้วย ร\nวิธีตรวจ: อ่านช้า ๆ ฟังเสียงท้าย แล้วดูรูปคำจากคลังคำหรือพจนานุกรม"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"เมฆ | พืช | รูป | ลิง | ลม | เนย | ดาว | ปลา"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: เมฆ, พืช, รูป, ลิง\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูออกเสียง “รด” “รถ” “รส” แล้วให้เด็กสังเกตว่าเสียงท้ายเหมือนกันแต่รูปเขียนต่างกัน\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• มาตราตัวสะกดมีแม่ ก กา กก กด กบ กน กม เกย และเกอว\n• บางมาตรามีพยัญชนะหลายตัวออกเสียงเดียวกัน เช่น แม่กด: ด จ ช ซ ฎ ฏ ฐ ฑ ฒ ต ถ ท ธ ศ ษ ส\n• การจำคำต้องดูทั้งเสียงและรูปเขียน ไม่เขียนตามเสียงเพียงอย่างเดียว\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nนก → เสียงท้าย ก = แม่กก\nภาพ → เสียงท้าย บ = แม่กบ แม้เขียนด้วย พ\nอาหาร → เสียงท้าย น = แม่กน แม้เขียนด้วย ร\nวิธีตรวจ: อ่านช้า ๆ ฟังเสียงท้าย แล้วดูรูปคำจากคลังคำหรือพจนานุกรม\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำว่า “เลข” อยู่แม่ใด เพราะเหตุใด\n• คำว่า “ลาภ” ออกเสียงตัวสะกดใด\n• ประโยค “ฉันเห็นก้อนเมก” ผิดตรงไหนและควรแก้อย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ส่งคำเข้าบ้านมาตรา ครูอธิบายกติกา:\n• วางป้ายบ้านมาตรา 9 หลังรอบห้อง\n• เด็กหยิบบัตรคำ อ่าน แล้วเดินไปวางบ้านที่ถูก\n• เมื่อวางแล้วต้องบอกเสียงตัวสะกดและตัวอักษรที่ใช้เขียน\nบัตรพร้อมใช้: เมฆ, พืช, รูป, ลิง, ลม, เนย, ดาว, ปลา\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกคำไม่ตรงมาตรา 2 คำพร้อมมาตรา\n• เขียนคำว่า “อาหาร” และอธิบายเสียงตัวสะกด\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน มาตราตัวสะกดมีแม่ ก กา กก กด กบ กน กม เกย และเกอว บางมาตรามีพยัญชนะหลายตัวออกเสียงเดียวกัน เช่น แม่กด: ด จ ช ซ ฎ ฏ ฐ ฑ ฒ ต ถ ท ธ ศ ษ ส การจำคำต้องดูทั้งเสียงและรูปเขียน ไม่เขียนตามเสียงเพียงอย่างเดียว ตัวอย่างสอนบนกระดาน นก → เสียงท้าย ก = แม่กก\nภาพ → เสียงท้าย บ = แม่กบ แม้เขียนด้วย พ\nอาหาร → เสียงท้าย น = แม่กน แม้เขียนด้วย ร\nวิธีตรวจ: อ่านช้า ๆ ฟังเสียงท้าย แล้วดูรูปคำจากคลังคำหรือพจนานุกรม ชุดบัตรเกมพร้อมใช้ เมฆ | พืช | รูป | ลิง | ลม | เนย | ดาว | ปลา"},{"id":"thai-l5-knowledge","title":"ใบความรู้: สะกดคำแม่นยำด้วยมาตราตัวสะกด","level":0,"parent":"ชั่วโมงที่ 5: สะกดคำแม่นยำด้วยมาตราตัวสะกด","lessonNo":5,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"แม่ ก กา ไม่มีเสียงพยัญชนะท้าย เช่น มา ดู เรือ"},{"type":"p","style":"List Bullet","text":"คำไม่ตรงมาตราคือคำที่ใช้พยัญชนะอื่นแทนเสียงตัวสะกดหลัก เช่น ภาพอยู่แม่กบ"},{"type":"p","style":"List Bullet","text":"เทคนิคจำคำยาก: แบ่งพยางค์ อ่าน–ปิด–เขียน–เปิดตรวจ และนำไปแต่งประโยค"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"นก → เสียงท้าย ก = แม่กก\nภาพ → เสียงท้าย บ = แม่กบ แม้เขียนด้วย พ\nอาหาร → เสียงท้าย น = แม่กน แม้เขียนด้วย ร\nวิธีตรวจ: อ่านช้า ๆ ฟังเสียงท้าย แล้วดูรูปคำจากคลังคำหรือพจนานุกรม"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"มาตราตัวสะกดมีแม่ ก กา กก กด กบ กน กม เกย และเกอว"}],"searchText":"ใบความรู้: สะกดคำแม่นยำด้วยมาตราตัวสะกด ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ แม่ ก กา ไม่มีเสียงพยัญชนะท้าย เช่น มา ดู เรือ คำไม่ตรงมาตราคือคำที่ใช้พยัญชนะอื่นแทนเสียงตัวสะกดหลัก เช่น ภาพอยู่แม่กบ เทคนิคจำคำยาก: แบ่งพยางค์ อ่าน–ปิด–เขียน–เปิดตรวจ และนำไปแต่งประโยค ตัวอย่างที่ครูใช้สอน นก → เสียงท้าย ก = แม่กก\nภาพ → เสียงท้าย บ = แม่กบ แม้เขียนด้วย พ\nอาหาร → เสียงท้า
