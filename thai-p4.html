  if(shortHeads.includes(text) || /^(เกมส่วนที่|วิธีใช้:|สรุปผล|รายงานผล|แหล่งข้อมูล)/.test(text) || (text.length<55 && /^(หลักการ|วัตถุประสงค์|สาระ|กิจกรรม|การวัด|การประเมิน)/.test(text))) return 'subhead';
  if(/^\d+\.\s/.test(text)) return answerMode?'answer':'question';
  if(text.length>145 && !answerMode) return 'lead';
  if(answerMode) return 'answer';
  return '';
}
function isBlankLine(text){return /^\.{20,}$/.test(text) || /^_{10,}$/.test(text)}
function inputKey(slideId, idx){return `littleStepsThaiP4-response:${slideId}:${idx}`}
function makeField(label, slideId, idx, area=true){const saved=Store.get(inputKey(slideId,idx))||'';return `<div class="form-field"><label>${esc(label)}</label>${area?`<textarea class="response-area" data-save-key="${esc(inputKey(slideId,idx))}" placeholder="พิมพ์คำตอบที่นี่...">${esc(saved)}</textarea>`:`<input class="response-input" data-save-key="${esc(inputKey(slideId,idx))}" value="${esc(saved)}" placeholder="พิมพ์คำตอบ...">`}<div class="save-hint">บันทึกอัตโนมัติบนอุปกรณ์นี้</div></div>`}

function renderList(blocks, start, slide){
  const numbered=blocks[start].style.includes('Number'); let i=start; let items=[];
  while(i<blocks.length && blocks[i].type==='p' && ((numbered && blocks[i].style.includes('Number')) || (!numbered && blocks[i].style.includes('Bullet')))){items.push(`<li>${esc(blocks[i].text)}</li>`);i++;}
  return {html:`<${numbered?'ol':'ul'} class="list-card">${items.join('')}</${numbered?'ol':'ul'}>`,next:i};
}
function splitCell(text){return text.split('\n').filter(Boolean)}
function renderTable(rows){
  if(!rows.length)return '';
  if(rows.length===1 && rows[0].length===1){const lines=splitCell(rows[0][0]);const title=lines.shift()||'หมายเหตุ';const lis=lines.map(x=>`<li>${esc(x.replace(/^•\s*/,''))}</li>`).join('');return `<div class="note-box"><div class="note-title">${esc(title)}</div>${lis?`<ul>${lis}</ul>`:''}</div>`;}
  const header=rows[0];
  if(header.length===2 && header[0]==='หัวข้อ'){
    return `<div class="kv-grid">${rows.slice(1).map(r=>`<div class="kv-item"><div class="kv-key">${esc(r[0])}</div><div class="kv-value">${esc(r[1]).replace(/\n/g,'<br>')}</div></div>`).join('')}</div>`;
  }
  if(header[0]==='ช่วงกิจกรรม' && header.length===4){
    const richStep=(value)=>{
      const lines=String(value||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);let out='',ul=false;
      const close=()=>{if(ul){out+='</ul>';ul=false;}};
      lines.forEach(line=>{if(/^•\s*/.test(line)){if(!ul){out+='<ul class="step-bullets">';ul=true;}out+=`<li>${esc(line.replace(/^•\s*/,''))}</li>`;return;}close();const m=line.match(/^([^:：]{1,34})[:：]\s*(.*)$/);out+=m?`<div class="step-line"><strong>${esc(m[1])}:</strong> ${esc(m[2])}</div>`:`<div class="step-line">${esc(line)}</div>`;});close();return out;
    };
    return `<div class="timeline">${rows.slice(1).map(r=>`<div class="step-card"><div class="step-stage">${esc(r[0])}</div><div class="step-cell"><span class="step-label">ครูทำอะไร</span>${richStep(r[1])}</div><div class="step-cell"><span class="step-label">เด็กทำอะไร</span>${richStep(r[2])}</div><div class="step-cell"><span class="step-label">เหตุผล</span>${richStep(r[3])}</div></div>`).join('')}</div>`;
  }
  return `<div class="table-wrap"><table class="content-table"><thead><tr>${header.map(h=>`<th>${esc(h).replace(/\n/g,'<br>')}</th>`).join('')}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr>${r.map((c,j)=>`<td data-label="${esc(header[j]||'')}">${esc(c).replace(/\n/g,'<br>')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function renderBlocks(slide){
  let html='';let i=0;let fieldIdx=0;let answerMode=false;let answerOpen=false;
  const blocks=slide.blocks||[];
  while(i<blocks.length){const b=blocks[i];
    if(b.type==='table'){html+=renderTable(b.rows);i++;continue;}
    if(b.style.includes('Bullet')||b.style.includes('Number')){const res=renderList(blocks,i,slide);html+=res.html;i=res.next;continue;}
    const text=b.text;
    if(text==='เฉลยแบบทดสอบ'){if(!answerOpen){html+='<div class="teacher-answer-zone">';answerOpen=true;}answerMode=true;html+=`<div class="content-p subhead">${esc(text)}</div>`;i++;continue;}
    if(isBlankLine(text)){html+=makeField('คำตอบ',slide.id,fieldIdx++,true);i++;continue;}
    const answerInline=text.match(/^(.*?)(?:\s+ตอบ\s+)(\.{10,})$/);
    if(answerInline){html+=makeField(answerInline[1].trim(),slide.id,fieldIdx++,false);i++;continue;}
    const underscore=text.match(/^(.*?):\s*_{5,}(.*)$/);
    if(underscore){html+=makeField(underscore[1].trim(),slide.id,fieldIdx++,false);i++;continue;}
    // Skip duplicate dotted answer line immediately after a question by treating it as one response field already handled above.
    const cls=paragraphClass(text,b.style,answerMode);
    html+=`<p class="content-p ${cls}">${esc(text)}</p>`;i++;
  }
  if(answerOpen)html+='</div>';
  return html;
}

function coverHTML(){return `<div class="cover-slide"><span class="float-star star-1">✦</span><span class="float-star star-2">✦</span><span class="float-star star-3">✦</span><div class="cover-copy"><div class="eyebrow">✦ Little Steps Thai Language</div><h1 class="cover-title">ก้าวเล็ก<span>พัฒนาการใหญ่</span></h1><p class="cover-subtitle">เว็บไซต์แผนการสอนพิเศษภาษาไทย ป.4 แบบครบชุด 16 ชั่วโมง พร้อมบทอ่าน หลักภาษา งานเขียน เกม ใบความรู้ ใบงาน เฉลย และ Feedback ผู้ปกครอง</p><div class="cover-pills"><span class="cover-pill">16 ชั่วโมงจบในตัว</span><span class="cover-pill">ครูทำอะไร–เด็กทำอะไรละเอียด</span><span class="cover-pill">ใบงานบันทึกอัตโนมัติ</span><span class="cover-pill">โหมดครู / ผู้เรียน</span></div><div class="cta-row"><button type="button" class="cta primary" onclick="goTo('course-map')">เริ่มดูแผนการสอน →</button><button type="button" class="cta secondary" onclick="goTo('${LESSON_FIRST['1']||''}')">เข้าสู่ชั่วโมงที่ 1</button></div></div><div class="cover-logo"><img src="${LOGO_SRC}" alt="ก้าวเล็ก พัฒนาการใหญ่"></div></div>`}
function dashboardHTML(){return `<div class="map-wrap"><div class="map-intro"><div><div class="eyebrow">แผนที่คอร์สภาษาไทย</div><h2>16 ก้าวเล็ก สู่การอ่าน คิด และสื่อสารที่มั่นใจ</h2><p>เลือกบทเรียนเพื่อเปิดภาพรวม ขั้นสอน ใบความรู้ ใบงาน และเฉลย</p></div><button type="button" class="pill-btn" onclick="printAll()">🖨️ พิมพ์ทั้งชุด</button></div><div class="lesson-grid">${Object.keys(LESSON_TITLES).map(n=>`<button type="button" class="lesson-card" onclick="goTo('${LESSON_FIRST[n]}')"><span class="n">${n}</span><h3>${esc(LESSON_TITLES[n])}</h3><small>เปิดบทเรียน →</small></button>`).join('')}</div></div>`}

function renderSlide(direction=0){
  let slide=currentSlide();
  if(state.mode==='student' && slide.teacherOnly){goToNearestVisible(-1);slide=currentSlide();}
  const card=$('.slide-card');
  if(slide.kind==='cover'){card.innerHTML=coverHTML();}
  else if(slide.kind==='dashboard'){card.innerHTML=dashboardHTML();}
  else{
    const locked=slide.teacherOnly && state.mode!=='teacher';
    card.innerHTML=`<header class="slide-banner"><div class="slide-kicker"><span class="kicker-dot"></span>${esc(kindLabels[slide.kind]||'เนื้อหา')}${slide.lessonNo?` · ชั่วโมงที่ ${slide.lessonNo}`:''}</div><h1 class="slide-title">${esc(slide.title)}</h1>${slide.parent?`<div class="slide-parent">${esc(slide.parent)}</div>`:''}</header><main class="slide-body">${locked?'<div class="teacher-lock">🔒<strong>หน้านี้สำหรับโหมดครู</strong>สลับเป็นโหมดครูเพื่อดูเฉลยและแบบประเมิน</div>':renderBlocks(slide)}</main><footer class="slide-footer"><div class="footer-note">Little Steps ภาษาไทย · เพราะทุกก้าวเล็ก ๆ สร้างพัฒนาการที่ยิ่งใหญ่</div><div class="footer-actions"><button type="button" class="nav-arrow" data-nav="prev" onclick="prevSlide()">← ก่อนหน้า</button><button type="button" class="nav-arrow primary" data-nav="next" onclick="nextSlide()">ถัดไป →</button></div></footer>`;
  }
  card.classList.remove('slide-forward','slide-backward','slide-fade');
  void card.offsetWidth;
  card.classList.add(direction>0?'slide-forward':direction<0?'slide-backward':'slide-fade');
  bindAutoSave();
  updateProgress();
  updateActiveNav();
  Store.set('littleStepsThaiP4Slide',slide.id);
  document.title=`${slide.title} | Little Steps ภาษาไทย ป.4`;
  card.scrollTop=0;const body=$('.slide-body');if(body)body.scrollTop=0;
  requestAnimationFrame(()=>window.scrollTo({top:0,left:0,behavior:'auto'}));
}
let saveNoticeTimer;
function bindAutoSave(){$$('[data-save-key]').forEach(el=>el.addEventListener('input',e=>{Store.set(e.target.dataset.saveKey,e.target.value);clearTimeout(saveNoticeTimer);saveNoticeTimer=setTimeout(()=>showToast('บันทึกคำตอบแล้ว'),520);}));}
let toastTimer;function showToast(msg){const t=$('.toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1350)}
const NAV_BREAKPOINT=1180;
function goTo(id,{replace=false,fromHistory=false}={}){if(!id)return;const s=SLIDES.find(x=>x.id===id);if(!s)return;if(state.mode==='student'&&s.teacherOnly){showToast('หน้านี้เปิดได้ในโหมดครู');return;}const vis=visibleSlides();const oldIndex=vis.findIndex(x=>x.id===state.currentId);const newIndex=vis.findIndex(x=>x.id===id);const direction=newIndex===oldIndex?0:(newIndex>oldIndex?1:-1);state.currentId=id;if(!fromHistory){const method=replace?'replaceState':'pushState';history[method]({slide:id},'',`#${id}`);}renderSlide(direction);if(innerWidth<=NAV_BREAKPOINT)closeDrawer();}
function nextSlide(){const vis=visibleSlides();let i=vis.findIndex(s=>s.id===state.currentId);if(i<vis.length-1)goTo(vis[i+1].id)}
function prevSlide(){const vis=visibleSlides();let i=vis.findIndex(s=>s.id===state.currentId);if(i>0)goTo(vis[i-1].id)}
function updateProgress(){const vis=visibleSlides();const i=Math.max(0,vis.findIndex(s=>s.id===state.currentId));const pct=((i+1)/vis.length)*100;const bar=$('.progress-bar');if(bar)bar.style.width=`${pct}%`;const label=$('.progress-label');if(label)label.textContent=`${i+1} / ${vis.length}`;const track=$('.progress-track');if(track){track.setAttribute('aria-valuemax',vis.length);track.setAttribute('aria-valuenow',i+1);track.setAttribute('aria-valuetext',`หน้า ${i+1} จาก ${vis.length}`);}$$('[data-nav="prev"]').forEach(b=>b.disabled=i<=0);$$('[data-nav="next"]').forEach(b=>b.disabled=i>=vis.length-1);const page=$('.dock-page');if(page)page.textContent=`หน้า ${i+1} จาก ${vis.length}`;const title=$('.dock-title');if(title)title.textContent=currentSlide().title;}

function navButton(s, labelOverride=''){return `<button type="button" class="nav-btn" data-slide-id="${esc(s.id)}" data-search="${esc((s.searchText||s.title).toLowerCase())}" onclick="goTo('${s.id}')"><span class="nav-num">${kindIcons[s.kind]||'•'}</span><span>${esc(labelOverride||s.title.replace(/^แผนการสอนที่\s*\d+\s*:\s*/,''))}</span></button>`}
function renderNav(){
  const nav=$('.nav-content');const starts=SLIDES.filter(s=>!s.lessonNo && !['final-report','references'].includes(s.kind));
  let html=`<div class="nav-section"><div class="nav-section-title">เริ่มต้นและภาพรวม</div>${starts.filter(s=>state.mode==='teacher'||!s.teacherOnly).map(s=>navButton(s)).join('')}</div>`;
  for(let n=1;n<=16;n++){const ss=SLIDES.filter(s=>s.lessonNo===n&&(state.mode==='teacher'||!s.teacherOnly));if(!ss.length)continue;html+=`<details class="lesson-group" data-lesson="${n}"><summary><span class="nav-num">${n}</span><span>ชั่วโมงที่ ${n}<br><small>${esc(LESSON_TITLES[n]||'')}</small></span></summary><div class="group-body">${ss.map(s=>navButton(s,kindLabels[s.kind]||s.title)).join('')}</div></details>`;}
  const ends=SLIDES.filter(s=>['final-report','references'].includes(s.kind));html+=`<div class="nav-section"><div class="nav-section-title">สรุปและอ้างอิง</div>${ends.map(s=>navButton(s)).join('')}</div><div class="nav-empty">ไม่พบเนื้อหาที่ค้นหา<br><small>ลองใช้คำค้นที่สั้นลง</small></div>`;nav.innerHTML=html;updateActiveNav();bindSearch();$$('.lesson-group').forEach(group=>group.addEventListener('toggle',()=>{if(group.open&&innerWidth<=NAV_BREAKPOINT){$$('.lesson-group').forEach(other=>{if(other!==group)other.open=false;});}}));
}
function updateActiveNav(){$$('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.slideId===state.currentId));const cur=currentSlide();if(cur.lessonNo){const d=$(`details[data-lesson="${cur.lessonNo}"]`);if(d)d.open=true;}}
function bindSearch(){const input=$('#searchInput');if(!input)return;input.oninput=()=>{const q=input.value.trim().toLowerCase();let shown=0;$$('.nav-btn').forEach(b=>{const visible=!q||b.dataset.search.includes(q);b.style.display=visible?'':'none';if(visible)shown++;});$$('.lesson-group').forEach(g=>{const any=$$('.nav-btn',g).some(b=>b.style.display!=='none');g.style.display=any?'':'none';if(q&&any)g.open=true;});const empty=$('.nav-empty');if(empty)empty.style.display=shown?'none':'block';};}
function setDrawer(open){document.body.classList.toggle('drawer-open',open);const btn=$('.menu-btn');if(btn)btn.setAttribute('aria-expanded',String(open));if(open&&matchMedia('(pointer:fine)').matches)setTimeout(()=>{$('#searchInput')?.focus({preventScroll:true});},220);}
function toggleDrawer(){setDrawer(!document.body.classList.contains('drawer-open'))}
function closeDrawer(){setDrawer(false)}
function togglePresentation(){state.presentation=!state.presentation;document.body.classList.toggle('presentation',state.presentation);$('.present-label').textContent=state.presentation?'ออกจากนำเสนอ':'นำเสนอ';if(state.presentation&&document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});else if(!state.presentation&&document.fullscreenElement)document.exitFullscreen().catch(()=>{})}
function renderPrintableSlide(slide){if(slide.kind==='cover')return `<section class="print-slide">${coverHTML()}</section>`;if(slide.kind==='dashboard')return `<section class="print-slide">${dashboardHTML()}</section>`;return `<section class="print-slide"><div class="slide-kicker">${esc(kindLabels[slide.kind]||'เนื้อหา')}${slide.lessonNo?` · ชั่วโมงที่ ${slide.lessonNo}`:''}</div><h1>${esc(slide.title)}</h1>${slide.parent?`<div class="slide-parent">${esc(slide.parent)}</div>`:''}${renderBlocks(slide)}</section>`}
function printCurrent(){const area=$('.print-area');area.innerHTML=renderPrintableSlide(currentSlide());setTimeout(()=>window.print(),80)}
function printAll(){const area=$('.print-area');area.innerHTML=visibleSlides().map(renderPrintableSlide).join('');setTimeout(()=>window.print(),120)}
window.addEventListener('afterprint',()=>{const area=$('.print-area');if(area)area.innerHTML='';})
function syncRouteFromLocation(){const id=safeHash();if(id&&id!==state.currentId&&SLIDES.some(s=>s.id===id)){const vis=visibleSlides();const oldIndex=vis.findIndex(x=>x.id===state.currentId);const newIndex=vis.findIndex(x=>x.id===id);state.currentId=id;renderSlide(newIndex>oldIndex?1:-1);closeDrawer();}}
window.addEventListener('popstate',syncRouteFromLocation);window.addEventListener('hashchange',syncRouteFromLocation);
window.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;if(e.key==='ArrowRight'||e.key==='PageDown'){e.preventDefault();nextSlide()}if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prevSlide()}if(e.key.toLowerCase()==='f'){e.preventDefault();togglePresentation()}if(e.key.toLowerCase()==='t'){e.preventDefault();toggleMode()}if(e.key==='Escape'&&document.body.classList.contains('drawer-open'))closeDrawer();});
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement&&state.presentation){state.presentation=false;document.body.classList.remove('presentation');const label=$('.present-label');if(label)label.textContent='นำเสนอ';}})
window.addEventListener('resize',()=>{if(innerWidth>NAV_BREAKPOINT)closeDrawer();},{passive:true});
let swipeStart=null;function bindSwipe(){const stage=$('.slide-stage');if(!stage)return;stage.addEventListener('touchstart',e=>{const t=e.target;if(t.closest('input,textarea,select,.table-wrap,button,a,summary')){swipeStart=null;return;}const p=e.touches[0];swipeStart={x:p.clientX,y:p.clientY,time:Date.now()};},{passive:true});stage.addEventListener('touchend',e=>{if(!swipeStart)return;const p=e.changedTouches[0],dx=p.clientX-swipeStart.x,dy=p.clientY-swipeStart.y,dt=Date.now()-swipeStart.time;swipeStart=null;if(dt<650&&Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.35){dx<0?nextSlide():prevSlide();}},{passive:true});}

function init(){if(!SLIDES.some(s=>s.id===state.currentId)||(state.mode==='student'&&currentSlide().teacherOnly))state.currentId='home';document.body.dataset.mode=state.mode;setMode(state.mode,{render:false});history.replaceState({slide:state.currentId},'',`#${state.currentId}`);renderSlide(0);bindSwipe();}
init();
</script>
