style":"Normal","text":"ภารกิจที่บ้าน 10 นาที"},{"type":"p","style":"Normal","text":"เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"}],"searchText":"เฉลย การประเมิน และ Feedback เฉลยใบงาน 1. คำตอบขึ้นกับเรื่อง แต่ต้องมีผู้เกี่ยวข้อง เหตุการณ์หลัก และผล 2. เกณฑ์: สั้นลง ความหมายเดิม ลำดับชัด ภาษาเป็นของตนเอง ไม่มีความคิดเห็นส่วนตัว เกณฑ์การประเมินรายชั่วโมง ระดับ ลักษณะผลงาน 3 ทำได้ด้วยตนเอง ตอบถูกหรือสื่อความได้ชัด พร้อมอธิบายหลัก/หลักฐาน 2 ทำได้เมื่อมีคำชี้แนะ เข้าใจแนวคิด แต่ยังต้องมีคำถามนำหรือบัตรช่วย 1 ต้องทบทวน ยังสับสนหลักสำคัญ หรือคำตอบไม่สัมพันธ์กับโจทย์ ข้อความ Feedback ผู้ปกครองประจำบท ผู้เรียนเลือกใจความหลักได้ดีขึ้น ควรฝึกเขียนใหม่ด้วยภาษาของตนเองและตัดรายละเอียดที่น่าสนใจแต่ไม่จำเป็นต่อสาระ ภารกิจที่บ้าน 10 นาที เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"},{"id":"thai-l12-overview","title":"แผนการสอนที่ 12: เขียนจดหมาย บันทึก และข้อความเชิญชวน","level":0,"parent":"ชั่วโมงที่ 12: เขียนจดหมาย บันทึก และข้อความเชิญชวน","lessonNo":12,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 2.1 ป.4/5, ท 2.1 ป.4/6 และ ท 2.1 ป.4/8"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"จัดส่วนประกอบของจดหมายส่วนตัวได้ถูกต้อง"},{"type":"p","style":"List Bullet","text":"เขียนบันทึกสั้น ๆ ที่มีวันเวลา เหตุการณ์ และสิ่งที่ได้เรียนรู้"},{"type":"p","style":"List Bullet","text":"เขียนข้อความเชิญชวนที่บอกกิจกรรม เวลา สถานที่ และการติดต่อครบ"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน"},{"type":"p","style":"List Bullet","text":"บันทึกเน้นสิ่งที่เกิดขึ้นจริงและความคิดเรียนรู้ของผู้เขียน"},{"type":"p","style":"List Bullet","text":"ข้อความเชิญชวนต้องชัดเจน ไม่โอ้อวดเกินจริง และใช้ถ้อยคำสุภาพ"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","จดหมายสลับส่วน"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 12: เขียนจดหมาย บันทึก และข้อความเชิญชวน ตัวชี้วัดที่เน้น ท 2.1 ป.4/5, ท 2.1 ป.4/6 และ ท 2.1 ป.4/8 จุดประสงค์การเรียนรู้ จัดส่วนประกอบของจดหมายส่วนตัวได้ถูกต้อง เขียนบันทึกสั้น ๆ ที่มีวันเวลา เหตุการณ์ และสิ่งที่ได้เรียนรู้ เขียนข้อความเชิญชวนที่บอกกิจกรรม เวลา สถานที่ และการติดต่อครบ แนวคิดสำคัญ จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน บันทึกเน้นสิ่งที่เกิดขึ้นจริงและความคิดเรียนรู้ของผู้เขียน ข้อความเชิญชวนต้องชัดเจน ไม่โอ้อวดเกินจริง และใช้ถ้อยคำสุภาพ หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท จดหมายสลับส่วน สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l12-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 12: เขียนจดหมาย บันทึก และข้อความเชิญชวน","lessonNo":12,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: วันที่, คำขึ้นต้น, เนื้อหา, คำลงท้าย\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูนำจดหมายที่ส่วนต่าง ๆ สลับตำแหน่งมาให้เด็กช่วยจัดใหม่\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน\n• บันทึกเน้นสิ่งที่เกิดขึ้นจริงและความคิดเรียนรู้ของผู้เขียน\n• ข้อความเชิญชวนต้องชัดเจน ไม่โอ้อวดเกินจริง และใช้ถ้อยคำสุภาพ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nตัวอย่างจดหมายถึงเพื่อน\nวันที่ 15 มิถุนายน 2569\nถึง มิน เพื่อนรัก\nวันเสาร์นี้โรงเรียนจัดกิจกรรมปลูกต้นไม้ ฉันอยากชวนเธอมาร่วม...\nด้วยความคิดถึง\nเมย์\nครูชี้ว่าภาษาจดหมายถึงเพื่อนเป็นกันเองแต่ยังสุภาพ\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำขึ้นต้นถึงผู้ปกครองควรใช้แบบใด\n• ข้อความเชิญชวนขาด “สถานที่” จะเกิดปัญหาอะไร\n• บันทึกต่างจากจดหมายตรงผู้รับอย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: จดหมายสลับส่วน","ครูอธิบายกติกา:\n• แจกแถบข้อความจากจดหมาย 6 ส่วน\n• ทีมเรียงให้ถูกและติดป้ายชื่อส่วนประกอบ\n• รอบสองแก้ข้อความที่ไม่สุภาพให้เหมาะสม\nบัตรพร้อมใช้: วันที่, คำขึ้นต้น, เนื้อหา, คำลงท้าย, ลายมือชื่อ, สถานที่จัดกิจกรรม\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกส่วนประกอบจดหมาย 5 ส่วน\n• อ่านข้อความเชิญชวนของตนเองแล้วตรวจข้อมูลที่อาจขาด\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน"},{"type":"p","style":"List Bullet","text":"บันทึกเน้นสิ่งที่เกิดขึ้นจริงและความคิดเรียนรู้ของผู้เขียน"},{"type":"p","style":"List Bullet","text":"ข้อความเชิญชวนต้องชัดเจน ไม่โอ้อวดเกินจริง และใช้ถ้อยคำสุภาพ"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"ตัวอย่างจดหมายถึงเพื่อน\nวันที่ 15 มิถุนายน 2569\nถึง มิน เพื่อนรัก\nวันเสาร์นี้โรงเรียนจัดกิจกรรมปลูกต้นไม้ ฉันอยากชวนเธอมาร่วม...\nด้วยความคิดถึง\nเมย์\nครูชี้ว่าภาษาจดหมายถึงเพื่อนเป็นกันเองแต่ยังสุภาพ"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"วันที่ | คำขึ้นต้น | เนื้อหา | คำลงท้าย | ลายมือชื่อ | สถานที่จัดกิจกรรม"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: วันที่, คำขึ้นต้น, เนื้อหา, คำลงท้าย\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูนำจดหมายที่ส่วนต่าง ๆ สลับตำแหน่งมาให้เด็กช่วยจัดใหม่\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน\n• บันทึกเน้นสิ่งที่เกิดขึ้นจริงและความคิดเรียนรู้ของผู้เขียน\n• ข้อความเชิญชวนต้องชัดเจน ไม่โอ้อวดเกินจริง และใช้ถ้อยคำสุภาพ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nตัวอย่างจดหมายถึงเพื่อน\nวันที่ 15 มิถุนายน 2569\nถึง มิน เพื่อนรัก\nวันเสาร์นี้โรงเรียนจัดกิจกรรมปลูกต้นไม้ ฉันอยากชวนเธอมาร่วม...\nด้วยความคิดถึง\nเมย์\nครูชี้ว่าภาษาจดหมายถึงเพื่อนเป็นกันเองแต่ยังสุภาพ\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำขึ้นต้นถึงผู้ปกครองควรใช้แบบใด\n• ข้อความเชิญชวนขาด “สถานที่” จะเกิดปัญหาอะไร\n• บันทึกต่างจากจดหมายตรงผู้รับอย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: จดหมายสลับส่วน ครูอธิบายกติกา:\n• แจกแถบข้อความจากจดหมาย 6 ส่วน\n• ทีมเรียงให้ถูกและติดป้ายชื่อส่วนประกอบ\n• รอบสองแก้ข้อความที่ไม่สุภาพให้เหมาะสม\nบัตรพร้อมใช้: วันที่, คำขึ้นต้น, เนื้อหา, คำลงท้าย, ลายมือชื่อ, สถานที่จัดกิจกรรม\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• บอกส่วนประกอบจดหมาย 5 ส่วน\n• อ่านข้อความเชิญชวนของตนเองแล้วตรวจข้อมูลที่อาจขาด\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน บันทึกเน้นสิ่งที่เกิดขึ้นจริงและความคิดเรียนรู้ของผู้เขียน ข้อความเชิญชวนต้องชัดเจน ไม่โอ้อวดเกินจริง และใช้ถ้อยคำสุภาพ ตัวอย่างสอนบนกระดาน ตัวอย่างจดหมายถึงเพื่อน\nวันที่ 15 มิถุนายน 2569\nถึง มิน เพื่อนรัก\nวันเสาร์นี้โรงเรียนจัดกิจกรรมปลูกต้นไม้ ฉันอยากชวนเธอมาร่วม...\nด้วยความคิดถึง\nเมย์\nครูชี้ว่าภาษาจดหมายถึงเพื่อนเป็นกันเองแต่ยังสุภาพ ชุดบัตรเกมพร้อมใช้ วันที่ | คำขึ้นต้น | เนื้อหา | คำลงท้าย | ลายมือชื่อ | สถานที่จัดกิจกรรม"},{"id":"thai-l12-knowledge","title":"ใบความรู้: เขียนจดหมาย บันทึก และข้อความเชิญชวน","level":0,"parent":"ชั่วโมงที่ 12: เขียนจดหมาย บันทึก และข้อความเชิญชวน","lessonNo":12,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ก่อนเขียนถามตนเองว่าเขียนถึงใคร เพื่ออะไร และผู้รับต้องรู้อะไรบ้าง"},{"type":"p","style":"List Bullet","text":"ข้อความเชิญชวนใช้หัวข้อเด่นและข้อมูลสั้น เช่น “ร่วมกันปลูกต้นไม้ วันเสาร์ 9.00 น. ณ สนามโรงเรียน”"},{"type":"p","style":"List Bullet","text":"มารยาทการเขียน: ลายมืออ่านง่าย ไม่ใช้ถ้อยคำทำร้ายผู้อื่น และตรวจชื่อกับวันเวลาให้ถูกต้อง"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"ตัวอย่างจดหมายถึงเพื่อน\nวันที่ 15 มิถุนายน 2569\nถึง มิน เพื่อนรัก\nวันเสาร์นี้โรงเรียนจัดกิจกรรมปลูกต้นไม้ ฉันอยากชวนเธอมาร่วม...\nด้วยความคิดถึง\nเมย์\nครูชี้ว่าภาษาจดหมายถึงเพื่อนเป็นกันเองแต่ยังสุภาพ"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน"}],"searchText":"ใบความรู้: เขียนจดหมาย บันทึก และข้อความเชิญชวน ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ ก่อนเขียนถามตนเองว่าเขียนถึงใคร เพื่ออะไร และผู้รับต้องรู้อะไรบ้าง ข้อความเชิญชวนใช้หัวข้อเด่นและข้อมูลสั้น เช่น “ร่วมกันปลูกต้นไม้ วันเสาร์ 9.00 น. ณ สนามโรงเรียน” มารยาทการเขียน: ลายมืออ่านง่าย ไม่ใช้ถ้อยคำทำร้ายผู้อื่น และตรวจชื่อกับวันเวลาให้ถูกต้อง ตัวอย่างที่ครูใช้สอน ตัวอย่างจดหมายถึงเพื่อน\nวันที่ 15 มิถุนายน 2569\nถึง มิน เพื่อนรัก\nวันเสาร์นี้โรงเรียนจัดกิจกรรมปลูกต้นไม้ ฉันอยากชวนเธอมาร่วม...\nด้วยความคิดถึง\nเมย์\nครูชี้ว่าภาษาจดหมายถึงเพื่อนเป็นกันเองแต่ยังสุภาพ จำง่ายในหนึ่งประโยค จดหมายส่วนตัวประกอบด้วยสถานที่/วันที่ คำขึ้นต้น เนื้อหา คำลงท้าย และชื่อผู้เขียน"},{"id":"thai-l12-worksheet","title":"ใบงานชั่วโมงที่ 12","level":0,"parent":"ชั่วโมงที่ 12: เขียนจดหมาย บันทึก และข้อความเชิญชวน","lessonNo":12,"kind":"worksheet","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบงาน: ทำจากพื้นฐานไปสู่การประยุกต์"},{"typ "style":"List Bullet","text":"โครงเรื่องพื้นฐาน: แนะนำตัวละครและฉาก → เกิดปัญหา → ลงมือแก้ → ผลและข้อคิด"},{"type":"p","style":"List Bullet","text":"ทุกเหตุการณ์ต้องมีเหตุและผล ไม่กระโดดจากเรื่องหนึ่งไปอีกเรื่องโดยไม่มีคำเชื่อม"},{"type":"p","style":"List Bullet","text":"ชื่อเรื่องควรสั้นและสัมพันธ์กับเหตุการณ์สำคัญ"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ลูกเต๋านักเล่า"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 13: เขียนเรื่องจากภาพและจินตนาการอย่างมีโครงเรื่อง ตัวชี้วัดที่เน้น ท 2.1 ป.4/7 และ ท 2.1 ป.4/8 จุดประสงค์การเรียนรู้ วางโครงเรื่องต้น–กลาง–จบจากภาพหรือคำกำหนดได้ สร้างตัวละคร ฉาก ปัญหา และวิธีแก้ที่สัมพันธ์กัน ใช้คำบรรยายและบทสนทนาเท่าที่จำเป็นเพื่อให้เรื่องน่าสนใจ แนวคิดสำคัญ โครงเรื่องพื้นฐาน: แนะนำตัวละครและฉาก → เกิดปัญหา → ลงมือแก้ → ผลและข้อคิด ทุกเหตุการณ์ต้องมีเหตุและผล ไม่กระโดดจากเรื่องหนึ่งไปอีกเรื่องโดยไม่มีคำเชื่อม ชื่อเรื่องควรสั้นและสัมพันธ์กับเหตุการณ์สำคัญ หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ลูกเต๋านักเล่า สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l13-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 13: เขียนเรื่องจากภาพและจินตนาการอย่างมีโครงเรื่อง","lessonNo":13,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: เด็กนักประดิษฐ์, ห้องสมุด, กุญแจเก่า, ไฟดับ\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูเปิดภาพ “ลูกสุนัขยืนข้างกล่องเปียกฝน” แล้วให้เด็กเสนอว่าเกิดอะไรก่อนหน้าและจะเกิดอะไรต่อ\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• โครงเรื่องพื้นฐาน: แนะนำตัวละครและฉาก → เกิดปัญหา → ลงมือแก้ → ผลและข้อคิด\n• ทุกเหตุการณ์ต้องมีเหตุและผล ไม่กระโดดจากเรื่องหนึ่งไปอีกเรื่องโดยไม่มีคำเชื่อม\n• ชื่อเรื่องควรสั้นและสัมพันธ์กับเหตุการณ์สำคัญ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nโครงเรื่อง “กล่องลึกลับหน้าบ้าน”\nต้น: แพรวพบกล่องเปียกฝนและได้ยินเสียงเบา ๆ\nกลาง: เธอเปิดพบลูกสุนัข จึงเช็ดตัวและประกาศหาเจ้าของ\nจบ: เจ้าของมารับและขอบคุณ แพรวเรียนรู้ว่าความเมตตาช่วยผู้อื่นได้\nครูสาธิตเปลี่ยนโครงเป็นย่อหน้าโดยใช้ ต่อมา เพราะ ดังนั้น สุดท้าย\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ปัญหาของตัวละครคืออะไร\n• วิธีแก้สัมพันธ์กับปัญหาหรือไม่\n• ถ้าเรื่องจบโดยตัวละครไปเที่ยวทะเลทันที จะขาดความเชื่อมโยงตรงไหน\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ลูกเต๋านักเล่า","ครูอธิบายกติกา:\n• ทอยลูกเต๋า 4 ลูกหรือสุ่มบัตร: ตัวละคร–สถานที่–สิ่งของ–ปัญหา\n• ทีมมีเวลา 3 นาทีวางโครงเรื่อง 4 ช่อง\n• เล่าเรื่อง 1 นาที โดยสมาชิกทุกคนต้องพูดอย่างน้อย 1 ประโยค\nบัตรพร้อมใช้: เด็กนักประดิษฐ์, ห้องสมุด, กุญแจเก่า, ไฟดับ, แมวพูดได้, สวนสาธารณะ\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• เล่าเรื่องของตนเองใน 3 ประโยค: ต้น–กลาง–จบ\n• บอกจุดที่จะแก้ไขก่อนส่งงาน 1 จุด\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"โครงเรื่องพื้นฐาน: แนะนำตัวละครและฉาก → เกิดปัญหา → ลงมือแก้ → ผลและข้อคิด"},{"type":"p","style":"List Bullet","text":"ทุกเหตุการณ์ต้องมีเหตุและผล ไม่กระโดดจากเรื่องหนึ่งไปอีกเรื่องโดยไม่มีคำเชื่อม"},{"type":"p","style":"List Bullet","text":"ชื่อเรื่องควรสั้นและสัมพันธ์กับเหตุการณ์สำคัญ"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"โครงเรื่อง “กล่องลึกลับหน้าบ้าน”\nต้น: แพรวพบกล่องเปียกฝนและได้ยินเสียงเบา ๆ\nกลาง: เธอเปิดพบลูกสุนัข จึงเช็ดตัวและประกาศหาเจ้าของ\nจบ: เจ้าของมารับและขอบคุณ แพรวเรียนรู้ว่าความเมตตาช่วยผู้อื่นได้\nครูสาธิตเปลี่ยนโครงเป็นย่อหน้าโดยใช้ ต่อมา เพราะ ดังนั้น สุดท้าย"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"เด็กนักประดิษฐ์ | ห้องสมุด | กุญแจเก่า | ไฟดับ | แมวพูดได้ | สวนสาธารณะ"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: เด็กนักประดิษฐ์, ห้องสมุด, กุญแจเก่า, ไฟดับ\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูเปิดภาพ “ลูกสุนัขยืนข้างกล่องเปียกฝน” แล้วให้เด็กเสนอว่าเกิดอะไรก่อนหน้าและจะเกิดอะไรต่อ\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• โครงเรื่องพื้นฐาน: แนะนำตัวละครและฉาก → เกิดปัญหา → ลงมือแก้ → ผลและข้อคิด\n• ทุกเหตุการณ์ต้องมีเหตุและผล ไม่กระโดดจากเรื่องหนึ่งไปอีกเรื่องโดยไม่มีคำเชื่อม\n• ชื่อเรื่องควรสั้นและสัมพันธ์กับเหตุการณ์สำคัญ\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nโครงเรื่อง “กล่องลึกลับหน้าบ้าน”\nต้น: แพรวพบกล่องเปียกฝนและได้ยินเสียงเบา ๆ\nกลาง: เธอเปิดพบลูกสุนัข จึงเช็ดตัวและประกาศหาเจ้าของ\nจบ: เจ้าของมารับและขอบคุณ แพรวเรียนรู้ว่าความเมตตาช่วยผู้อื่นได้\nครูสาธิตเปลี่ยนโครงเป็นย่อหน้าโดยใช้ ต่อมา เพราะ ดังนั้น สุดท้าย\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ปัญหาของตัวละครคืออะไร\n• วิธีแก้สัมพันธ์กับปัญหาหรือไม่\n• ถ้าเรื่องจบโดยตัวละครไปเที่ยวทะเลทันที จะขาดความเชื่อมโยงตรงไหน\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ลูกเต๋านักเล่า ครูอธิบายกติกา:\n• ทอยลูกเต๋า 4 ลูกหรือสุ่มบัตร: ตัวละคร–สถานที่–สิ่งของ–ปัญหา\n• ทีมมีเวลา 3 นาทีวางโครงเรื่อง 4 ช่อง\n• เล่าเรื่อง 1 นาที โดยสมาชิกทุกคนต้องพูดอย่างน้อย 1 ประโยค\nบัตรพร้อมใช้: เด็กนักประดิษฐ์, ห้องสมุด, กุญแจเก่า, ไฟดับ, แมวพูดได้, สวนสาธารณะ\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• เล่าเรื่องของตนเองใน 3 ประโยค: ต้น–กลาง–จบ\n• บอกจุดที่จะแก้ไขก่อนส่งงาน 1 จุด\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน โครงเรื่องพื้นฐาน: แนะนำตัวละครและฉาก → เกิดปัญหา → ลงมือแก้ → ผลและข้อคิด ทุกเหตุการณ์ต้องมีเหตุและผล ไม่กระโดดจากเรื่องหนึ่งไปอีกเรื่องโดยไม่มีคำเชื่อม ชื่อเรื่องควรสั้นและสัมพันธ์กับเหตุการณ์สำคัญ ตัวอย่างสอนบนกระดาน โครงเรื่อง “กล่องลึกลับหน้าบ้าน”\nต้น: แพรวพบกล่องเปียกฝนและได้ยินเสียงเบา ๆ\nกลาง: เธอเปิดพบลูกสุนัข จึงเช็ดตัวและประกาศหาเจ้าของ\nจบ: เจ้าของมารับและขอบคุณ แพรวเรียนรู้ว่าความเมตตาช่วยผู้อื่นได้\nครูสาธิตเปลี่ยนโครงเป็นย่อหน้าโดยใช้ ต่อมา เพราะ ดังนั้น สุดท้าย ชุดบัตรเกมพร้อมใช้ เด็กนักประดิษฐ์ | ห้องสมุด | กุญแจเก่า | ไฟดับ | แมวพูดได้ | สวนสาธารณะ"},{"id":"thai-l13-knowledge","title":"ใบความรู้: เขียนเรื่องจากภาพและจินตนาการอย่างมีโครงเรื่อง","level":0,"parent":"ชั่วโมงที่ 13: เขียนเรื่องจากภาพและจินตนาการอย่างมีโครงเรื่อง","lessonNo":13,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ใช้ประสาทสัมผัสช่วยบรรยาย: เห็น ได้ยิน ได้กลิ่น สัมผัส และความรู้สึก"},{"type":"p","style":"List Bullet","text":"บทสนทนาควรทำให้เรื่องเดินหน้า ไม่ใส่เพื่อยืดเรื่อง"},{"type":"p","style":"List Bullet","text":"หลังเขียนให้ตรวจ 5 จุด: ชื่อเรื่อง โครงเรื่อง เหตุผล คำเชื่อม และคำสะกด"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"โครงเรื่อง “กล่องลึกลับหน้าบ้าน”\nต้น: แพรวพบกล่องเปียกฝนและได้ยินเสียงเบา ๆ\nกลาง: เธอเปิดพบลูกสุนัข จึงเช็ดตัวและประกาศหาเจ้าของ\nจบ: เจ้าของมารับและขอบคุณ แพรวเรียนรู้ว่าความเมตตาช่วยผู้อื่นได้\nครูสาธิตเปลี่ยนโครงเป็นย่อหน้าโดยใช้ ต่อมา เพราะ ดังนั้น สุดท้าย"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"โครงเรื่องพื้นฐาน: แนะนำตัวละครและฉาก → เกิดปัญหา → ลงมือแก้ → ผลและข้อคิด"}],"searchText":"ใบความรู้: เขียนเรื่องจากภาพและจินตนาการอย่างมีโครงเรื่อง ใบความรู้สำหรับผู้เรียน แนวคิดสำคัญ ใช้ประสาทสัมผัสช่วยบรรยาย: เห็น ได้ยิน ได้กลิ่น สัมผัส และความรู้สึก บทสนทนาควรทำให้เรื่อง :"แผนการสอนที่ 14: ฟัง ดู พูด และตั้งคำถามเชิงเหตุผล","level":0,"parent":"ชั่วโมงที่ 14: ฟัง ดู พูด และตั้งคำถามเชิงเหตุผล","lessonNo":14,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 3.1 ป.4/1–ป.4/6"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"จับประเด็นสำคัญจากเรื่องที่ฟังหรือดูได้"},{"type":"p","style":"List Bullet","text":"แยกข้อเท็จจริงกับข้อคิดเห็นจากคำพูด"},{"type":"p","style":"List Bullet","text":"ตั้งและตอบคำถาม “เพราะเหตุใด/อย่างไร” โดยมีเหตุผล"},{"type":"p","style":"List Bullet","text":"พูดสรุปอย่างสุภาพและมีลำดับ"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"การฟังอย่างมีเป้าหมายให้จดคำสำคัญ ไม่เขียนทุกคำ"},{"type":"p","style":"List Bullet","text":"คำถามเชิงเหตุผลต้องการเหตุและหลักฐาน ไม่ใช่ตอบเพียงใช่หรือไม่"},{"type":"p","style":"List Bullet","text":"มารยาท: มองผู้พูด ไม่พูดแทรก รอจังหวะ และวิจารณ์เนื้อหาไม่โจมตีบุคคล"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ฟังแล้วจับประเด็น"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 14: ฟัง ดู พูด และตั้งคำถามเชิงเหตุผล ตัวชี้วัดที่เน้น ท 3.1 ป.4/1–ป.4/6 จุดประสงค์การเรียนรู้ จับประเด็นสำคัญจากเรื่องที่ฟังหรือดูได้ แยกข้อเท็จจริงกับข้อคิดเห็นจากคำพูด ตั้งและตอบคำถาม “เพราะเหตุใด/อย่างไร” โดยมีเหตุผล พูดสรุปอย่างสุภาพและมีลำดับ แนวคิดสำคัญ การฟังอย่างมีเป้าหมายให้จดคำสำคัญ ไม่เขียนทุกคำ คำถามเชิงเหตุผลต้องการเหตุและหลักฐาน ไม่ใช่ตอบเพียงใช่หรือไม่ มารยาท: มองผู้พูด ไม่พูดแทรก รอจังหวะ และวิจารณ์เนื้อหาไม่โจมตีบุคคล หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ฟังแล้วจับประเด็น สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l14-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 14: ฟัง ดู พูด และตั้งคำถามเชิงเหตุผล","lessonNo":14,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: ใคร, เหตุการณ์หลัก, หลักฐาน, ผลลัพธ์\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูอ่านข้อความ 30 วินาทีเพียงครั้งเดียว แล้วถามเด็กว่าจำได้เฉพาะรายละเอียดหรือจับประเด็นหลักได้\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• การฟังอย่างมีเป้าหมายให้จดคำสำคัญ ไม่เขียนทุกคำ\n• คำถามเชิงเหตุผลต้องการเหตุและหลักฐาน ไม่ใช่ตอบเพียงใช่หรือไม่\n• มารยาท: มองผู้พูด ไม่พูดแทรก รอจังหวะ และวิจารณ์เนื้อหาไม่โจมตีบุคคล\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nครูอ่านข่าวจำลอง “โรงเรียนลดขยะพลาสติกโดยให้นักเรียนนำแก้วน้ำส่วนตัวมาใช้ หลังหนึ่งเดือน ขยะถ้วยพลาสติกลดลงครึ่งหนึ่ง”\nคำสำคัญ: โรงเรียน–แก้วส่วนตัว–ขยะลดครึ่งหนึ่ง\nสรุป: การใช้แก้วส่วนตัวช่วยลดขยะพลาสติกในโรงเรียน\nคำถามเหตุผล: เพราะเหตุใดขยะจึงลดลง\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ข้อมูล “ลดลงครึ่งหนึ่ง” เป็นข้อเท็จจริงหรือข้อคิดเห็น\n• ควรจดคำใดแทนการจดทุกประโยค\n• ตั้งคำถามที่ขึ้นต้นด้วย “อย่างไร” 1 ข้อ\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ฟังแล้วจับประเด็น","ครูอธิบายกติกา:\n• ครูอ่านเรื่องสั้น 2 รอบ รอบแรกห้ามจด รอบสองจดได้ไม่เกิน 8 คำ\n• ทีมตอบ ใคร–ทำอะไร–ผลอย่างไร และตั้งคำถามเหตุผล\n• ทีมอื่นฟังคำตอบและให้ข้อเสนอแนะอย่างสุภาพ\nบัตรพร้อมใช้: ใคร, เหตุการณ์หลัก, หลักฐาน, ผลลัพธ์, คำถามเพราะเหตุใด, ข้อคิดเห็น\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดสรุปเรื่องวันนี้ภายใน 20 วินาที\n• บอกมารยาทการฟัง 1 ข้อและเหตุผล\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"การฟังอย่างมีเป้าหมายให้จดคำสำคัญ ไม่เขียนทุกคำ"},{"type":"p","style":"List Bullet","text":"คำถามเชิงเหตุผลต้องการเหตุและหลักฐาน ไม่ใช่ตอบเพียงใช่หรือไม่"},{"type":"p","style":"List Bullet","text":"มารยาท: มองผู้พูด ไม่พูดแทรก รอจังหวะ และวิจารณ์เนื้อหาไม่โจมตีบุคคล"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"ครูอ่านข่าวจำลอง “โรงเรียนลดขยะพลาสติกโดยให้นักเรียนนำแก้วน้ำส่วนตัวมาใช้ หลังหนึ่งเดือน ขยะถ้วยพลาสติกลดลงครึ่งหนึ่ง”\nคำสำคัญ: โรงเรียน–แก้วส่วนตัว–ขยะลดครึ่งหนึ่ง\nสรุป: การใช้แก้วส่วนตัวช่วยลดขยะพลาสติกในโรงเรียน\nคำถามเหตุผล: เพราะเหตุใดขยะจึงลดลง"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"ใคร | เหตุการณ์หลัก | หลักฐาน | ผลลัพธ์ | คำถามเพราะเหตุใด | ข้อคิดเห็น"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: ใคร, เหตุการณ์หลัก, หลักฐาน, ผลลัพธ์\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูอ่านข้อความ 30 วินาทีเพียงครั้งเดียว แล้วถามเด็กว่าจำได้เฉพาะรายละเอียดหรือจับประเด็นหลักได้\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• การฟังอย่างมีเป้าหมายให้จดคำสำคัญ ไม่เขียนทุกคำ\n• คำถามเชิงเหตุผลต้องการเหตุและหลักฐาน ไม่ใช่ตอบเพียงใช่หรือไม่\n• มารยาท: มองผู้พูด ไม่พูดแทรก รอจังหวะ และวิจารณ์เนื้อหาไม่โจมตีบุคคล\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nครูอ่านข่าวจำลอง “โรงเรียนลดขยะพลาสติกโดยให้นักเรียนนำแก้วน้ำส่วนตัวมาใช้ หลังหนึ่งเดือน ขยะถ้วยพลาสติกลดลงครึ่งหนึ่ง”\nคำสำคัญ: โรงเรียน–แก้วส่วนตัว–ขยะลดครึ่งหนึ่ง\nสรุป: การใช้แก้วส่วนตัวช่วยลดขยะพลาสติกในโรงเรียน\nคำถามเหตุผล: เพราะเหตุใดขยะจึงลดลง\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ข้อมูล “ลดลงครึ่งหนึ่ง” เป็นข้อเท็จจริงหรือข้อคิดเห็น\n• ควรจดคำใดแทนการจดทุกประโยค\n• ตั้งคำถามที่ขึ้นต้นด้วย “อย่างไร” 1 ข้อ\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ฟังแล้วจับประเด็น ครูอธิบายกติกา:\n• ครูอ่านเรื่องสั้น 2 รอบ รอบแรกห้ามจด รอบสองจดได้ไม่เกิน 8 คำ\n• ทีมตอบ ใคร–ทำอะไร–ผลอย่างไร และตั้งคำถามเหตุผล\n• ทีมอื่นฟังคำตอบและให้ข้อเสนอแนะอย่างสุภาพ\nบัตรพร้อมใช้: ใคร, เหตุการณ์หลัก, หลักฐาน, ผลลัพธ์, คำถามเพราะเหตุใด, ข้อคิดเห็น\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดสรุปเรื่องวันนี้ภายใน 20 วินาที\n• บอกมารยาทการฟัง 1 ข้อและเหตุผล\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน การฟังอย่างมีเป้าหมายให้จดคำสำคัญ ไม่เขียนทุกคำ คำถามเชิงเหตุผลต้องการเหตุและหลักฐาน ไม่ใช่ตอบเพียงใช่หรือไม่ มารยาท: มองผู้พูด ไม่พูดแทรก รอจังหวะ และวิจารณ์เนื้อหาไม่โจมตีบุคคล ตัวอย่างสอนบนกระดาน ครูอ่านข่าวจำลอง “โรงเรียนลดขยะพลาสติกโดยให้นักเรียนนำแก้วน้ำส่วนตัวมาใช้ หลังหนึ่งเดือน ขยะถ้วยพลาสติกลดลงครึ่งหนึ่ง”\nคำสำคัญ: โรงเรียน–แก้วส่วนตัว–ขยะลดครึ่งหนึ่ง\nสรุป: การใช้แก้วส่วนตัวช่วยลดขยะพลาสติกในโรงเรียน\nคำถามเหตุผล: เพราะเหตุใดขยะจึงลดลง ชุดบัตรเกมพร้อมใช้ ใคร | เหตุการณ์หลัก | หลักฐาน | ผลลัพธ์ | คำถามเพราะเหตุใด | ข้อคิดเห็น"},{"id":"thai-l14-knowledge","title":"ใบความรู้: ฟัง ดู พูด และตั้งคำถามเชิงเหตุผล","level":0,"parent":"ชั่วโมงที่ 14: ฟัง ดู พูด และตั้งคำถามเชิงเหตุผล","lessonNo":14,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"วิธีจดฟัง: ใช้คำสั้น ลูกศร และสัญลักษณ์ เช่น ขยะ↓ แทนประโยคยาว"},{"type":"p","style":"List Bullet","text":"ก่อนพูดสรุปให้เรียง 3 ส่วน: ประเด็น–หลักฐาน–ข้อสรุป"},{"type":"p","style":"List Bullet","text":"เมื่อไม่เห็นด้วยให้ใช้ “ฉันคิดต่างเพราะ...” แทน “ผิด” หรือ “ไม่จริง” โดยไม่มีเหตุผล"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"ครูอ่านข่าวจำลอง “โรงเรียนลดขยะพลาสติกโดยให้นักเรียนนำแก้วน้ำส่วนตัวมาใช้ หลังหนึ่งเดือน ขยะถ้วยพลาสติกลดลงครึ่ ่วโมงที่ 14 ใบงาน: ทำจากพื้นฐานไปสู่การประยุกต์ 1. ฟังเรื่องจากครูแล้วจดคำสำคัญไม่เกิน 8 คำ ........................................ 2. เขียนสรุป 2 ประโยค ........................................ 3. แยกข้อเท็จจริงและข้อคิดเห็นอย่างละ 1 ข้อ ........................................ 4. ตั้งคำถามเชิงเหตุผล 2 ข้อและตอบ 1 ข้อ ........................................ ตรวจงานตนเอง □ ตอบตรงคำถาม  □ มีเหตุผล/หลักฐาน  □ ลำดับชัด  □ สะกดและวรรคตอนถูก"},{"id":"thai-l14-answers","title":"เฉลย การประเมิน และ Feedback","level":0,"parent":"ชั่วโมงที่ 14: ฟัง ดู พูด และตั้งคำถามเชิงเหตุผล","lessonNo":14,"kind":"answers","teacherOnly":true,"blocks":[{"type":"p","style":"Normal","text":"เฉลยใบงาน"},{"type":"p","style":"Normal","text":"1. คำตอบขึ้นกับเรื่องที่ครูอ่าน ตรวจว่าจับประเด็นหลักและมีหลักฐาน"},{"type":"p","style":"Normal","text":"2. คำถามเชิงเหตุผลควรตอบได้จากข้อมูลหรือการอนุมาน ไม่ใช่คำถามรายละเอียดเล็กน้อย"},{"type":"p","style":"Normal","text":"เกณฑ์การประเมินรายชั่วโมง"},{"type":"table","rows":[["ระดับ","ลักษณะผลงาน"],["3 ทำได้ด้วยตนเอง","ตอบถูกหรือสื่อความได้ชัด พร้อมอธิบายหลัก/หลักฐาน"],["2 ทำได้เมื่อมีคำชี้แนะ","เข้าใจแนวคิด แต่ยังต้องมีคำถามนำหรือบัตรช่วย"],["1 ต้องทบทวน","ยังสับสนหลักสำคัญ หรือคำตอบไม่สัมพันธ์กับโจทย์"]]},{"type":"p","style":"Normal","text":"ข้อความ Feedback ผู้ปกครองประจำบท"},{"type":"p","style":"Normal","text":"ผู้เรียนฟังและจดคำสำคัญได้ดีขึ้น ควรฝึกตอบโดยอ้างหลักฐานจากเรื่องและรอจังหวะก่อนแสดงความคิดเห็น"},{"type":"p","style":"Normal","text":"ภารกิจที่บ้าน 10 นาที"},{"type":"p","style":"Normal","text":"เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"}],"searchText":"เฉลย การประเมิน และ Feedback เฉลยใบงาน 1. คำตอบขึ้นกับเรื่องที่ครูอ่าน ตรวจว่าจับประเด็นหลักและมีหลักฐาน 2. คำถามเชิงเหตุผลควรตอบได้จากข้อมูลหรือการอนุมาน ไม่ใช่คำถามรายละเอียดเล็กน้อย เกณฑ์การประเมินรายชั่วโมง ระดับ ลักษณะผลงาน 3 ทำได้ด้วยตนเอง ตอบถูกหรือสื่อความได้ชัด พร้อมอธิบายหลัก/หลักฐาน 2 ทำได้เมื่อมีคำชี้แนะ เข้าใจแนวคิด แต่ยังต้องมีคำถามนำหรือบัตรช่วย 1 ต้องทบทวน ยังสับสนหลักสำคัญ หรือคำตอบไม่สัมพันธ์กับโจทย์ ข้อความ Feedback ผู้ปกครองประจำบท ผู้เรียนฟังและจดคำสำคัญได้ดีขึ้น ควรฝึกตอบโดยอ้างหลักฐานจากเรื่องและรอจังหวะก่อนแสดงความคิดเห็น ภารกิจที่บ้าน 10 นาที เลือกคำ/ย่อหน้า/งานเขียนจากบทนี้ 1 ชิ้น ฝึกซ้ำสั้น ๆ แล้วให้เด็กอธิบายสิ่งที่ปรับดีขึ้น"},{"id":"thai-l15-overview","title":"แผนการสอนที่ 15: คำคล้องจอง คำขวัญ กลอนสี่ และข้อคิดจากวรรณกรรม","level":0,"parent":"ชั่วโมงที่ 15: คำคล้องจอง คำขวัญ กลอนสี่ และข้อคิดจากวรรณกรรม","lessonNo":15,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ตัวชี้วัดที่เน้น"},{"type":"p","style":"Normal","text":"ท 4.1 ป.4/5 และ ท 5.1 ป.4/1–ป.4/4"},{"type":"p","style":"Normal","text":"จุดประสงค์การเรียนรู้"},{"type":"p","style":"List Bullet","text":"หาคำคล้องจองและแต่งวรรคสั้น ๆ ได้"},{"type":"p","style":"List Bullet","text":"เขียนคำขวัญที่สั้น จำง่าย และมีสาระ"},{"type":"p","style":"List Bullet","text":"อ่านกลอนสี่ง่าย ๆ พร้อมสังเกตสัมผัส"},{"type":"p","style":"List Bullet","text":"บอกข้อคิดจากนิทานหรือวรรณกรรมและเชื่อมกับชีวิตจริง"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"คำคล้องจองมีเสียงสระและตัวสะกดสอดคล้องกัน เช่น ใจ–ไกล, เรียน–เพียร"},{"type":"p","style":"List Bullet","text":"คำขวัญควรสั้น ชัด ใช้ถ้อยคำจดจำง่าย เช่น “อ่านทุกวัน สร้างฝันให้ไกล”"},{"type":"p","style":"List Bullet","text":"กลอนสี่ระดับพื้นฐานมักมี 4 วรรค วรรคละประมาณ 4 พยางค์ และเชื่อมเสียงสัมผัสระหว่างวรรค"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","รถไฟคำคล้องจอง"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 15: คำคล้องจอง คำขวัญ กลอนสี่ และข้อคิดจากวรรณกรรม ตัวชี้วัดที่เน้น ท 4.1 ป.4/5 และ ท 5.1 ป.4/1–ป.4/4 จุดประสงค์การเรียนรู้ หาคำคล้องจองและแต่งวรรคสั้น ๆ ได้ เขียนคำขวัญที่สั้น จำง่าย และมีสาระ อ่านกลอนสี่ง่าย ๆ พร้อมสังเกตสัมผัส บอกข้อคิดจากนิทานหรือวรรณกรรมและเชื่อมกับชีวิตจริง แนวคิดสำคัญ คำคล้องจองมีเสียงสระและตัวสะกดสอดคล้องกัน เช่น ใจ–ไกล, เรียน–เพียร คำขวัญควรสั้น ชัด ใช้ถ้อยคำจดจำง่าย เช่น “อ่านทุกวัน สร้างฝันให้ไกล” กลอนสี่ระดับพื้นฐานมักมี 4 วรรค วรรคละประมาณ 4 พยางค์ และเชื่อมเสียงสัมผัสระหว่างวรรค หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท รถไฟคำคล้องจอง สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l15-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 15: คำคล้องจอง คำขวัญ กลอนสี่ และข้อคิดจากวรรณกรรม","lessonNo":15,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: ใจ, เรียน, ดาว, ดี\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูพูดคำว่า “เรียน” แล้วให้เด็กต่อคำคล้องจองให้ได้มากที่สุดใน 30 วินาที\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำคล้องจองมีเสียงสระและตัวสะกดสอดคล้องกัน เช่น ใจ–ไกล, เรียน–เพียร\n• คำขวัญควรสั้น ชัด ใช้ถ้อยคำจดจำง่าย เช่น “อ่านทุกวัน สร้างฝันให้ไกล”\n• กลอนสี่ระดับพื้นฐานมักมี 4 วรรค วรรคละประมาณ 4 พยางค์ และเชื่อมเสียงสัมผัสระหว่างวรรค\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nกลอนตัวอย่างที่แต่งขึ้นใหม่\nเช้าวันใหม่ / ใจสดใส\nตั้งใจเรียน / เพียรทำดี\nครูชี้เสียงสัมผัส ใหม่–ใส และ เรียน–เพียร\nนิทานสั้น: มดเก็บอาหารทีละน้อยทุกวัน เมื่อฝนตกจึงมีอาหารพอ → ข้อคิดเรื่องความขยันและการเตรียมพร้อม\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำใดคล้องกับ “ฝัน”\n• คำขวัญ “ทิ้งขยะให้ถูกที่ เมืองเราดีทุกวัน” มีสาระอะไร\n• ข้อคิดต้องตรงกับการกระทำของตัวละครอย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: รถไฟคำคล้องจอง","ครูอธิบายกติกา:\n• เด็กนั่งเป็นวง ครูเริ่มคำ 1 คำ\n• คนถัดไปต้องต่อคำคล้องจองภายใน 5 วินาที ห้ามซ้ำ\n• รอบทีมให้นำคำ 4–6 คำมาแต่งคำขวัญหรือกลอนสั้น\nบัตรพร้อมใช้: ใจ, เรียน, ดาว, ดี, รักษ์โลก, สามัคคี\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดคำคล้องจองต่อจากคำว่า “ดี”\n• บอกข้อคิดจากนิทานมดใน 1 ประโยค\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"คำคล้องจองมีเสียงสระและตัวสะกดสอดคล้องกัน เช่น ใจ–ไกล, เรียน–เพียร"},{"type":"p","style":"List Bullet","text":"คำขวัญควรสั้น ชัด ใช้ถ้อยคำจดจำง่าย เช่น “อ่านทุกวัน สร้างฝันให้ไกล”"},{"type":"p","style":"List Bullet","text":"กลอนสี่ระดับพื้นฐานมักมี 4 วรรค วรรคละประมาณ 4 พยางค์ และเชื่อมเสียงสัมผัสระหว่างวรรค"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"กลอนตัวอย่างที่แต่งขึ้นใหม่\nเช้าวันใหม่ / ใจสดใส\nตั้งใจเรียน / เพียรทำดี\nครูชี้เสียงสัมผัส ใหม่–ใส และ เรียน–เพียร\nนิทานสั้น: มดเก็บอาหารทีละน้อยทุกวัน เมื่อฝนตกจึงมีอาหารพอ → ข้อคิดเรื่องความขยันและการเตรียมพร้อม"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"ใจ | เรียน | ดาว | ดี | รักษ์โลก | สามัคคี"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: ใจ, เรียน, ดาว, ดี\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูพูดคำว่า “เรียน” แล้วให้เด็กต่อคำคล้องจองให้ได้มากที่สุดใน 30 วินาที\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• คำคล้องจองมีเสียงสระและตัวสะกดสอดคล้องกัน เช่น ใจ–ไกล, เรียน–เพียร\n• คำขวัญควรสั้น ชัด ใช้ถ้อยคำจดจำง่าย เช่น “อ่านทุกวัน สร้างฝันให้ไกล”\n• กลอนสี่ระดับพื้นฐานมักมี 4 วรรค วรรคละประมาณ 4 พยางค์ และเชื่อมเสียงสัมผัสระหว่างวรรค\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nกลอนตัวอย่างที่แต่งขึ้นใหม่\nเช้าวันใหม่ / ใจสดใส\nตั้งใจเรียน / เพียรทำดี\nครูชี้เสียงสัมผัส ใหม่–ใส และ เรียน–เพียร\nนิทานสั้น: มดเก็บอาหารทีละน้อยทุกวัน เมื่อฝนตกจึงมีอาหารพอ → ข้อคิดเรื่องความขยันและการเตรียมพร้อม\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• คำใดคล้องกับ “ฝัน”\n• คำขวัญ “ทิ้งขยะให้ถูกที่ เมืองเราดีทุกวัน” มีสาระอะไร\n• ข้อคิดต้องตรงกับการกระทำของตัวละครอย่างไร\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: รถไฟคำคล้องจอง ครูอธิบายกติกา:\n• เด็กนั่งเป็นวง ครูเริ่มคำ 1 คำ\n• คนถัดไปต้องต่อคำคล้องจองภายใน 5 วินาที ห้ามซ้ำ\n• รอบทีมให้นำคำ 4–6 คำมาแต่งคำขวัญหรือกลอนสั้น\nบัตรพร้อมใช้: ใจ, เรียน, ดาว, ดี, รักษ์โลก, สามัคคี\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• พูดคำคล้องจองต่อจากคำว่า “ดี”\n• บอกข้อคิดจากนิทานมดใน 1 ประโยค\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน คำคล้องจองมีเสียงสระและตัวสะกดสอดคล้องกัน เช่น ใจ–ไกล, เรียน–เพียร คำขวัญควรสั้น ชัด ใช้ถ้อยคำจดจำง่าย เช่น “อ่านทุกวัน สร้างฝันให้ไกล” กลอนสี่ระดับพื้นฐานมักมี 4 วรรค วรรคละประมาณ 4 พยางค์ และเชื่อมเสียงสัมผัสระหว่างวรรค ตัวอย่างสอนบนกระดาน กลอนตัวอย่างที่แต่งขึ้นใหม่\nเช้าวันใหม่ / ใจสดใส\nตั้งใจเรียน / เพียรทำดี\nครูชี้เสียงสัมผัส ใหม่–ใส และ เรียน–เพียร\nนิทานสั้น: มดเก็บอาหารทีละน้อยทุกวัน เมื่อฝนตกจึงมีอาหารพอ → ข้อคิดเรื่องความขยันและการเตรียมพร้อม ชุดบัตรเกมพร้อมใช้ ใจ | เรียน | ดาว | ดี | รักษ์โลก | สามัคคี"},{"id":"thai-l15-knowledge","title":"ใบความรู้: คำคล้องจอง คำขวัญ กลอนสี่ และข้อคิดจากวรรณกรรม","level":0,"parent":"ชั่วโมงที่ 15: คำคล้องจอง คำขวัญ กลอนสี่ และข้อคิดจากวรรณกรรม","lessonNo":15,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"เสียงคล้องจองดูจากเสียง ไม่ใช่ตัวเขียนเหมือนกันเท่านั้น"},{"type":"p","style":"List Bullet","text":"คำขวัญไม่ควรยาวจนจำยาก และควรบอกการกระทำหรือคุณค่าที่ต้องการ"},{"type":"p","style":"List Bullet","text":" ","รายละเอียด"],["เกมประจำคอร์ส","Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย"],["เกมเฉพาะบท","ด่านพิชิตภาษาไทย"],["สื่อ","บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket"],["หลักฐานประเมิน","คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"]]}],"searchText":"แผนการสอนที่ 16: อ่านวรรณกรรม สรุปข้อคิด และภารกิจภาษาไทยรอบด้าน ตัวชี้วัดที่เน้น บูรณาการ ท 1.1, ท 2.1, ท 3.1, ท 4.1 และ ท 5.1 ระดับชั้น ป.4 จุดประสงค์การเรียนรู้ ประยุกต์การอ่านจับใจความ หลักภาษา และการเขียนในงานเดียว สรุปข้อคิดจากวรรณกรรมพร้อมหลักฐาน สะท้อนจุดแข็งและเป้าหมายพัฒนาของตนเอง ทำแบบทดสอบหลังเรียนและเปรียบเทียบผลก่อน–หลัง แนวคิดสำคัญ งานภาษาไทยที่แท้จริงใช้หลายทักษะพร้อมกัน: อ่านเพื่อเข้าใจ คิดเพื่อวิเคราะห์ และเขียน/พูดเพื่อสื่อสาร คำตอบที่ดีมีหลักฐานจากข้อความและใช้ภาษาชัดเจน การตรวจแก้เป็นส่วนหนึ่งของการเขียน ไม่ใช่ทำเฉพาะเมื่อเขียนผิด หัวข้อ รายละเอียด เกมประจำคอร์ส Language Hero: คำไวใน 60 วินาที + ดาวจากการอธิบาย เกมเฉพาะบท ด่านพิชิตภาษาไทย สื่อ บัตรคำ กระดาน/สไลด์ ใบความรู้ ใบงาน และ Exit Ticket หลักฐานประเมิน คำตอบระหว่างเรียน ผลเกม ใบงาน และการอธิบายท้ายชั่วโมง"},{"id":"thai-l16-steps","title":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้","level":0,"parent":"ชั่วโมงที่ 16: อ่านวรรณกรรม สรุปข้อคิด และภารกิจภาษาไทยรอบด้าน","lessonNo":16,"kind":"steps","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด"},{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมประจำคอร์ส: คำไวใน 60 วินาที","ครูแสดงคำหรือข้อความ 4 ใบ: อ่านออกเสียงย่อหน้า, หาคำสำคัญ 5 คำ, จำแนกชนิดคำ, เขียนสรุป 2 ประโยค\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว","อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค","เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล"],["2. ขั้นต้น: เปิดสถานการณ์","ครูดำเนินสถานการณ์นี้: ครูให้เด็กดู “แผนที่ทักษะ” 5 ด้าน แล้วเลือกด้านที่ตนเองพัฒนามากที่สุดตลอดคอร์ส\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด”","สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ","ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม"],["3. ขั้นสอน: สร้างหลักจากตัวอย่าง","ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• งานภาษาไทยที่แท้จริงใช้หลายทักษะพร้อมกัน: อ่านเพื่อเข้าใจ คิดเพื่อวิเคราะห์ และเขียน/พูดเพื่อสื่อสาร\n• คำตอบที่ดีมีหลักฐานจากข้อความและใช้ภาษาชัดเจน\n• การตรวจแก้เป็นส่วนหนึ่งของการเขียน ไม่ใช่ทำเฉพาะเมื่อเขียนผิด\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง","อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด","เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง"],["4. ครูสาธิตคิดให้ดู","ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nวรรณกรรมสั้นแต่งใหม่ “ต้นมะม่วงกับนกน้อย”\nนกน้อยทำรังบนต้นมะม่วงและช่วยกินแมลงที่กัดใบ เมื่อลมแรง ต้นมะม่วงช่วยบังรัง ทั้งสองพึ่งพากันจนผ่านฤดูฝน\nใจความ: สิ่งมีชีวิตช่วยเหลือและพึ่งพากัน\nหลักฐาน: นกกินแมลงให้ต้นไม้ และต้นไม้บังลมให้รัง\nข้อคิด: การช่วยเหลือกันทำให้ทุกฝ่ายผ่านปัญหาได้\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน","ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ","การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ"],["5. ฝึกร่วมกันแบบมีคำชี้แนะ","ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ข้อความใดเป็นหลักฐานของข้อคิด\n• แยกคำนามและคำกริยาจากประโยคหนึ่งในเรื่อง\n• ย่อเรื่องให้เหลือ 2 ประโยค\n• แต่งคำขวัญจากข้อคิดของเรื่อง\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม","ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ","ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป"],["6. เกมเฉพาะบท: ด่านพิชิตภาษาไทย","ครูอธิบายกติกา:\n• ตั้ง 5 ด่าน: อ่าน–จับใจความ–หลักภาษา–เขียน–พูด\n• ทีมหมุนเวียนด่านละ 5–7 นาทีและสะสมตราประทับ\n• ด่านสุดท้ายทุกคนเลือกผลงานที่ภูมิใจมาอธิบาย 30 วินาที\nบัตรพร้อมใช้: อ่านออกเสียงย่อหน้า, หาคำสำคัญ 5 คำ, จำแนกชนิดคำ, เขียนสรุป 2 ประโยค, พูดข้อคิดพร้อมหลักฐาน\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้”","เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม","เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม"],["7. ใบงานและการช่วยรายบุคคล","ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย","ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี","ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว"],["8. ขั้นสรุปและ Exit Ticket","ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• ฉันพัฒนามากที่สุดด้านใด เพราะมีหลักฐานอะไร\n• เป้าหมายภาษาไทย 1 ข้อสำหรับ 4 สัปดาห์ถัดไป\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง","สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง","การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"งานภาษาไทยที่แท้จริงใช้หลายทักษะพร้อมกัน: อ่านเพื่อเข้าใจ คิดเพื่อวิเคราะห์ และเขียน/พูดเพื่อสื่อสาร"},{"type":"p","style":"List Bullet","text":"คำตอบที่ดีมีหลักฐานจากข้อความและใช้ภาษาชัดเจน"},{"type":"p","style":"List Bullet","text":"การตรวจแก้เป็นส่วนหนึ่งของการเขียน ไม่ใช่ทำเฉพาะเมื่อเขียนผิด"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"Normal","text":"วรรณกรรมสั้นแต่งใหม่ “ต้นมะม่วงกับนกน้อย”\nนกน้อยทำรังบนต้นมะม่วงและช่วยกินแมลงที่กัดใบ เมื่อลมแรง ต้นมะม่วงช่วยบังรัง ทั้งสองพึ่งพากันจนผ่านฤดูฝน\nใจความ: สิ่งมีชีวิตช่วยเหลือและพึ่งพากัน\nหลักฐาน: นกกินแมลงให้ต้นไม้ และต้นไม้บังลมให้รัง\nข้อคิด: การช่วยเหลือกันทำให้ทุกฝ่ายผ่านปัญหาได้"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"Normal","text":"อ่านออกเสียงย่อหน้า | หาคำสำคัญ 5 คำ | จำแนกชนิดคำ | เขียนสรุป 2 ประโยค | พูดข้อคิดพร้อมหลักฐาน"}],"searchText":"ขั้นสอนแบบละเอียดและเกมพร้อมใช้ ขั้นสอนแบบละเอียด: ครูพูดอะไร เด็กทำอะไร และใช้เนื้อหาใด ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมประจำคอร์ส: คำไวใน 60 วินาที ครูแสดงคำหรือข้อความ 4 ใบ: อ่านออกเสียงย่อหน้า, หาคำสำคัญ 5 คำ, จำแนกชนิดคำ, เขียนสรุป 2 ประโยค\nโจทย์: ให้อ่านหรือบอกสิ่งที่สังเกตจากคำอย่างรวดเร็ว แล้วถามต่อ “รู้ได้อย่างไร”\nการให้ดาว: ตอบถูก 1 ดาว อธิบายเหตุผลได้อีก 1 ดาว อ่าน/ตอบทีละใบ ยกมืออธิบาย และฟังวิธีคิดของเพื่อน\nเมื่อคำตอบต่างกันให้ชี้หลักฐานจากตัวคำหรือประโยค เปิดสมองด้วยเนื้อหาจริงของบทและสร้างนิสัยตอบพร้อมเหตุผล 2. ขั้นต้น: เปิดสถานการณ์ ครูดำเนินสถานการณ์นี้: ครูให้เด็กดู “แผนที่ทักษะ” 5 ด้าน แล้วเลือกด้านที่ตนเองพัฒนามากที่สุดตลอดคอร์ส\nครูไม่เฉลยทันที แต่จดคำตอบเด็กเป็น 2–3 กลุ่มบนกระดาน แล้วถาม “คำตอบใดมีหลักฐานชัดที่สุด” สังเกต ฟัง เปรียบเทียบคำตอบ และบอกเหตุผลของตนเองด้วยประโยคสั้น ๆ ทำให้เด็กเห็นปัญหาของบทก่อนเรียนกฎ จึงเกิดความอยากรู้และเชื่อมกับประสบการณ์เดิม 3. ขั้นสอน: สร้างหลักจากตัวอย่าง ครูเขียนหัวข้อ “สิ่งที่ต้องรู้วันนี้” และสอนทีละข้อ:\n• งานภาษาไทยที่แท้จริงใช้หลายทักษะพร้อมกัน: อ่านเพื่อเข้าใจ คิดเพื่อวิเคราะห์ และเขียน/พูดเพื่อสื่อสาร\n• คำตอบที่ดีมีหลักฐานจากข้อความและใช้ภาษาชัดเจน\n• การตรวจแก้เป็นส่วนหนึ่งของการเขียน ไม่ใช่ทำเฉพาะเมื่อเขียนผิด\nทุกข้อครูยกตัวอย่างหนึ่งตัวอย่างและตัวอย่างที่ผิดหนึ่งตัวอย่าง แล้วให้เด็กบอกความต่าง อ่านตัวอย่าง ชี้จุดสำคัญ จดสรุปสั้น ๆ และช่วยแก้ตัวอย่างที่ผิด เด็ก ป.4 เข้าใจหลักภาษาได้ดีเมื่อเห็นคู่เปรียบเทียบ “ถูก–ผิด” และได้อธิบายด้วยภาษาตนเอง 4. ครูสาธิตคิดให้ดู ครูทำตัวอย่างบนกระดานแบบคิดออกเสียง:\nวรรณกรรมสั้นแต่งใหม่ “ต้นมะม่วงกับนกน้อย”\nนกน้อยทำรังบนต้นมะม่วงและช่วยกินแมลงที่กัดใบ เมื่อลมแรง ต้นมะม่วงช่วยบังรัง ทั้งสองพึ่งพากันจนผ่านฤดูฝน\nใจความ: สิ่งมีชีวิตช่วยเหลือและพึ่งพากัน\nหลักฐาน: นกกินแมลงให้ต้นไม้ และต้นไม้บังลมให้รัง\nข้อคิด: การช่วยเหลือกันทำให้ทุกฝ่ายผ่านปัญหาได้\nหลังแต่ละขั้นครูถาม “ทำไมจึงเลือกแบบนี้” และขีดเส้นใต้หลักฐาน ติดตามทีละขั้น พูดคำตอบพร้อมครู แล้วจดเฉพาะขั้นคิดสำคัญ ไม่คัดทุกคำ การคิดออกเสียงทำให้เด็กมองเห็นกระบวนการที่ซ่อนอยู่ ไม่จำเฉพาะคำตอบ 5. ฝึกร่วมกันแบบมีคำชี้แนะ ครูใช้คำถามต่อไปนี้ทีละข้อ:\n• ข้อความใดเป็นหลักฐานของข้อคิด\n• แยกคำนามและคำกริยาจากประโยคหนึ่งในเรื่อง\n• ย่อเรื่องให้เหลือ 2 ประโยค\n• แต่งคำขวัญจากข้อคิดของเรื่อง\nถ้าเด็กติด ครูใช้คำใบ้ 3 ระดับ: ชี้ตำแหน่ง → ให้ตัวเลือก → ทำข้อคล้ายกันหนึ่งข้อ แล้วกลับมาข้อเดิม ตอบบนกระดานเล็ก/กระดาษ อธิบายกับคู่ และแก้คำตอบหลังฟังคำชี้แนะ ครูเห็นความเข้าใจทันทีและช่วยเท่าที่จำเป็น โดยไม่บอกคำตอบเร็วเกินไป 6. เกมเฉพาะบท: ด่านพิชิตภาษาไทย ครูอธิบายกติกา:\n• ตั้ง 5 ด่าน: อ่าน–จับใจความ–หลักภาษา–เขียน–พูด\n• ทีมหมุนเวียนด่านละ 5–7 นาทีและสะสมตราประทับ\n• ด่านสุดท้ายทุกคนเลือกผลงานที่ภูมิใจมาอธิบาย 30 วินาที\nบัตรพร้อมใช้: อ่านออกเสียงย่อหน้า, หาคำสำคัญ 5 คำ, จำแนกชนิดคำ, เขียนสรุป 2 ประโยค, พูดข้อคิดพร้อมหลักฐาน\nก่อนให้คะแนน ครูสุ่มถามหนึ่งทีมว่า “คำตอบนี้ใช้หลักใดจากใบความรู้” เล่นตามกติกา ผลัดกันทำหน้าที่ และบันทึกคำ/คำตอบที่ทีมทำพลาดไว้แก้หลังเกม เกมทำหน้าที่เป็นการฝึกซ้ำหลายรอบและเปลี่ยนข้อผิดพลาดให้เป็นข้อมูลสำหรับสอนเสริม 7. ใบงานและการช่วยรายบุคคล ครูให้เด็กทำใบงานตามลำดับข้อพื้นฐาน → อธิบายเหตุผล → ประยุกต์\nระหว่างทำ ครูใช้คำถาม “โจทย์ถามอะไร–มีหลักฐานตรงไหน–ใช้กฎข้อใด–ตรวจอย่างไร”\nเด็กที่ทำเร็วให้สร้างข้อใหม่ 1 ข้อ ส่วนเด็กที่ยังติดให้ใช้บัตรคำหรือแผนภาพช่วย ทำงานด้วยตนเอง เขียนร่องรอยความคิด ตรวจคู่ และแก้ด้วยปากกาคนละสี ทุกคนได้งานในระดับเหมาะสมและครูมองเห็นว่าเด็กคิดอย่างไร ไม่ประเมินจากคำตอบสุดท้ายอย่างเดียว 8. ขั้นสรุปและ Exit Ticket ครูให้เด็กพูดสรุป “วันนี้ฉันใช้หลัก...” แล้วทำ Exit Ticket:\n• ฉันพัฒนามากที่สุดด้านใด เพราะมีหลักฐานอะไร\n• เป้าหมายภาษาไทย 1 ข้อสำหรับ 4 สัปดาห์ถัดไป\nครูจัดระดับ: ผ่านด้วยตนเอง / ผ่านเมื่อมีคำชี้แนะ / ต้องทบทวน และจดประโยค Feedback ผู้ปกครอง สรุปด้วยภาษาตนเอง ส่งคำตอบสั้น ๆ และเลือกดาวความมั่นใจ 1–3 ดวง การดึงความรู้กลับมาใช้ท้ายชั่วโมงช่วยให้จำได้นานและให้ข้อมูลวางแผนครั้งถัดไป เนื้อหาพร้อมเขียนบนกระดาน งานภาษาไทยที่แท้จริงใช้หลายทักษะพร้อมกัน: อ่านเพื่อเข้าใจ คิดเพื่อวิเคราะห์ และเขียน/พูดเพื่อสื่อสาร คำตอบที่ดีมีหลักฐานจากข้อความและใช้ภาษาชัดเจน การตรวจแก้เป็นส่วนหนึ่งของการเขียน ไม่ใช่ทำเฉพาะเมื่อเขียนผิด ตัวอย่างสอนบนกระดาน วรรณกรรมสั้นแต่งใหม่ “ต้นมะม่วงกับนกน้อย”\nนกน้อยทำรังบนต้นมะม่วงและช่วยกินแมลงที่กัดใบ เมื่อลมแรง ต้นมะม่วงช่วยบังรัง ทั้งสองพึ่งพากันจนผ่านฤดูฝน\nใจความ: สิ่งมีชีวิตช่วยเหลือและพึ่งพากัน\nหลักฐาน: นกกินแมลงให้ต้นไม้ และต้นไม้บังลมให้รัง\nข้อคิด: การช่วยเหลือกันทำให้ทุกฝ่ายผ่านปัญหาได้ ชุดบัตรเกมพร้อมใช้ อ่านออกเสียงย่อหน้า | หาคำสำคัญ 5 คำ | จำแนกชนิดคำ | เขียนสรุป 2 ประโยค | พูดข้อคิดพร้อมหลักฐาน"},{"id":"thai-l16-knowledge","title":"ใบความรู้: อ่านวรรณกรรม สรุปข้อคิด และภารกิจภาษาไทยรอบด้าน","level":0,"parent":"ชั่วโมงที่ 16: อ่านวรรณกรรม สรุปข้อคิด และภารกิจภาษาไทยรอบด้าน","lessonNo":16,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใบความรู้สำหรับผู้เรียน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ใช้เช็กลิสต์ก่อนส่งงาน: อ่านคำสั่งครบ ตอบตรงคำถาม มีหลักฐาน ลำดับชัด สะกดและวรรคตอนถูก"},{"type":"p","style":"List Bullet","text":"เปรียบเทียบผลงานครั้งแรกกับครั้งสุดท้ายเพื่อเห็นพัฒนาการ ไม่เปรียบเทียบกับเพื่อน"},{"type":"p","style":"List Bullet","text":"ตั้งเป้าหมายหลังจบคอร์สให้เฉพาะเจาะจง เช่น อ่านวันละ 10 นาที หรือจดคำใหม่วันละ 3 คำ"},{"type":"p","style":"Normal","text":"ตัวอย่างที่ครูใช้สอน"},{"type":"p","style":"Normal","text":"วรรณกรรมสั้นแต่งใหม่ “ต้นมะม่วงกับนกน้อย”\nนกน้อยทำรังบนต้นมะม่วงและช่วยกินแมลงที่กัดใบ เมื่อลมแรง ต้นมะม่วงช่วยบังรัง ทั้งสองพึ่งพากันจนผ่านฤดูฝน\nใจความ: สิ่งมีชีวิตช่วยเหลือและพึ่งพากัน\nหลักฐาน: นกกินแมลงให้ต้นไม้ และต้นไม้บังลมให้รัง\nข้อคิด: การช่วยเหลือกันทำให้ทุกฝ่ายผ่านปัญหาได้"},{"type":"p","style":"Normal","text":"จำง่ายในหนึ่งประโยค"},{"type":"p","style":"Normal","text":"งานภาษาไทยที่แท้จริงใช้หลายทักษะพร้อมกัน: อ่านเพื่อเข้าใจ คิดเพื่อวิเคราะห์ และเขียน/พูดเพื่อสื่อสาร"}],"searchText":"ใบความรู้: อ่านวรรณกรรม สรุปข้อคิด และภารกิจภาษาไทยรอบด้าน ใบความร function setMode(mode,{render=true}={}){state.mode=mode;document.body.dataset.mode=mode;Store.set('littleStepsThaiP4Mode',mode);const btn=$('.mode-btn');if(btn)btn.dataset.mode=mode;const label=$('.mode-label');if(label)label.textContent=mode==='teacher'?'โหมดครู':'โหมดผู้เรียน';const icon=$('.mode-icon');if(icon)icon.textContent=mode==='teacher'?'👩‍🏫':'🧑‍🎓';if(mode==='student' && currentSlide().teacherOnly){goToNearestVisible(-1)}renderNav();if(render)renderSlide(0);}

function goToNearestVisible(dir=1){const vis=visibleSlides();const allIndex=SLIDES.findIndex(s=>s.id===state.currentId);let candidates=vis.map(s=>({s,i:SLIDES.findIndex(x=>x.id===s.id)}));let pick=dir>0?candidates.find(x=>x.i>allIndex):[...candidates].reverse().find(x=>x.i<allIndex);state.currentId=(pick||candidates[0]).s.id;}
