s": " แผนที่พัฒนาการ 8 ด้าน เริ่มต้น"}, {"id": "guide", "title": "วิธีใช้ชุดกิจกรรม", "group": "เริ่มต้น", "kind": "content", "body": "<div class=\"two\"><div class=\"note\"><h3>โครงสร้างแต่ละหน่วย</h3><ol><li>ภาพรวมและเป้าหมาย</li><li>ขั้นสอนแบบครูทำอะไร–เด็กทำอะไร</li><li>ใบความรู้สำหรับผู้สอน</li><li>กิจกรรมหลักและเกมเสริม</li><li>ใบงานพร้อมคำสั่ง</li><li>แบบสังเกตและ Feedback ผู้ปกครอง</li></ol></div><div class=\"note warm\"><h3>หลักการสำคัญ</h3><ul><li>เริ่มจากง่ายและของจริงก่อนใบงาน</li><li>ฝึกช่วงสั้น สลับการเคลื่อนไหว</li><li>ชมความพยายามและความก้าวหน้ารายบุคคล</li><li>แบบประเมินใช้เพื่อวางแผนส่งเสริม ไม่ใช้วินิจฉัยพัฒนาการ</li></ul></div></div><h3 class=\"sub\">รูปแบบเวลาแนะนำ</h3><div class=\"flow\"><span>เปิดกิจกรรม 5 นาที</span><b>→</b><span>สอนและสาธิต 10 นาที</span><b>→</b><span>ลงมือทำ 15–20 นาที</span><b>→</b><span>เกม 5–10 นาที</span><b>→</b><span>สรุป 5 นาที</span></div>", "keywords": " วิธีใช้ชุดกิจกรรม เริ่มต้น"}, {"id": "u1-overview", "title": "✋ กล้ามเนื้อมัดเล็ก: ภาพรวม", "group": "หน่วย 1 · กล้ามเนื้อมัดเล็ก", "kind": "content", "body": "<p class=\"lead\"><b>เริ่มต้นจากมือเล็ก ๆ สู่การเรียนรู้ที่มั่นคง</b><br>ควบคุมมือ นิ้ว และสายตาได้ดีขึ้น เพื่อเตรียมพร้อมสำหรับการเขียน ระบายสี ตัดแปะ และงานประดิษฐ์</p><h3 class=\"sub\">ทักษะที่เด็กจะได้รับ</h3><ul class=\"list\"><li>จับดินสอด้วยนิ้ว 3 นิ้วอย่างผ่อนคลาย</li><li>ลากเส้นตามทิศทางจากซ้ายไปขวาและบนลงล่าง</li><li>ประสานมือกับสายตาในการต่อจุดและระบายสี</li><li>หยิบ จับ บีบ คีบ ฉีก และปะวัสดุชิ้นเล็กอย่างปลอดภัย</li></ul><div class=\"tip\"><b>จุดเน้นของผู้สอน</b><span>สังเกตว่าเด็กใช้วิธีใดและช่วยด้วยคำใบ้ทีละน้อย ไม่ทำแทนทันที</span></div>", "keywords": "ควบคุมมือ นิ้ว และสายตาได้ดีขึ้น เพื่อเตรียมพร้อมสำหรับการเขียน ระบายสี ตัดแปะ และงานประดิษฐ์ ✋ กล้ามเนื้อมัดเล็ก: ภาพรวม หน่วย 1 · กล้ามเนื้อมัดเล็ก"}, {"id": "u1-teach", "title": "ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร", "group": "หน่วย 1 · กล้ามเนื้อมัดเล็ก", "kind": "teach", "body": "<p class=\"lead\">ใช้ขั้นตอนด้านล่างเป็นบทสอนได้ทันที ครูสามารถลดหรือเพิ่มรอบฝึกตามสมาธิและความพร้อมของเด็ก</p><div class=\"timeline\"><div class=\"step\"><div class=\"stage\">เตรียมมือ</div><div><b>ครูทำอะไร</b><p>ชวนเด็กกำ–แบมือ แตะนิ้วโป้งกับนิ้วอื่น และบีบลูกบอลนิ่ม</p></div><div><b>เด็กทำอะไร</b><p>ทำตามครูช้า ๆ คนละ 5 ครั้ง</p></div><div><b>เหตุผล</b><p>ลดความตึงของมือและกระตุ้นกล้ามเนื้อนิ้ว</p></div></div><div class=\"step\"><div class=\"stage\">สาธิตการจับ</div><div><b>ครูทำอะไร</b><p>ครูหันมือด้านข้างให้เด็กเห็นตำแหน่งนิ้วโป้ง นิ้วชี้ และนิ้วกลาง พร้อมพูด “จับเบา ๆ ไม่บีบแน่น”</p></div><div><b>เด็กทำอะไร</b><p>เด็กลองจับดินสอและยกให้ครูดู</p></div><div><b>เหตุผล</b><p>สร้างรูปแบบการจับที่เหมาะสมก่อนฝึกเส้น</p></div></div><div class=\"step\"><div class=\"stage\">สอนทิศทาง</div><div><b>ครูทำอะไร</b><p>วาดจุดเริ่มสีเขียวและจุดจบสีเหลือง สาธิตเส้นตรง เส้นโค้ง และซิกแซกทีละแบบ</p></div><div><b>เด็กทำอะไร</b><p>ใช้นิ้วลากตามบนอากาศและบนโต๊ะก่อนลงกระดาษ</p></div><div><b>เหตุผล</b><p>ช่วยให้สมองจำทิศทางโดยยังไม่กังวลเรื่องดินสอ</p></div></div><div class=\"step\"><div class=\"stage\">ฝึกพร้อมกัน</div><div><b>ครูทำอะไร</b><p>ครูพูดกำกับ “เริ่ม–ลาก–หยุด” และสังเกตการหมุนกระดาษ/ท่านั่ง</p></div><div><b>เด็กทำอะไร</b><p>ทำใบงานเส้น 1 แถว แล้วหยุดตรวจมือของตนเอง</p></div><div><b>เหตุผล</b><p>ทำให้เด็กฝึกอย่างมีจังหวะและแก้ท่าทางได้ทันที</p></div></div><div class=\"step\"><div class=\"stage\">ประยุกต์</div><div><b>ครูทำอะไร</b><p>ให้เด็กเลือกเส้นทางพาสัตว์กลับบ้านและถามว่าทำไมเลือกเส้นนี้</p></div><div><b>เด็กทำอะไร</b><p>ลากเส้นจนถึงเป้าหมายและเล่าเส้นทางของตน</p></div><div><b>เหตุผล</b><p>เชื่อมทักษะมือกับการตัดสินใจง่าย ๆ</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 1 · กล้ามเนื้อมัดเล็ก"}, {"id": "u1-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 1 · กล้ามเนื้อมัดเล็ก", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><li>กล้ามเนื้อมัดเล็กคือการทำงานร่วมกันของนิ้วมือ ฝ่ามือ และสายตา</li><li>ควรเริ่มจากการขยับมือและนิ้วก่อนใช้ดินสอจริง</li><li>ฝึกสั้น ๆ แต่สม่ำเสมอดีกว่าฝึกนานจนเด็กเมื่อย</li><li>เน้นความพยายามและการควบคุมมือ ไม่เน้นความสวยสมบูรณ์ในครั้งแรก</li></ul><div class=\"board\"><h3>ข้อความพร้อมใช้กับเด็ก</h3><p>“เราจะค่อย ๆ ลองทีละขั้น ไม่ต้องรีบ ทำไม่ได้ครั้งแรกไม่เป็นไร ครูจะช่วยด้วยคำใบ้ และหนูเลือกลองใหม่ได้”</p></div>", "keywords": "ใบความรู้ สาระสำคัญ ใบความรู้สำหรับผู้สอน หน่วย 1 · กล้ามเนื้อมัดเล็ก"}, {"id": "u1-activity", "title": "กิจกรรมหลักและเกมเสริม", "group": "หน่วย 1 · กล้ามเนื้อมัดเล็ก", "kind": "content", "body": "<div class=\"activity-card\"><span>กิจกรรมหลัก</span><h3>เส้นทางกลับบ้าน</h3><p>เส้นทางกลับบ้าน: วางภาพลูกไก่ด้านซ้ายและแม่ไก่ด้านขวา ทำเส้นทาง 3 ระดับ—ตรง โค้ง และซิกแซก ให้เด็กเลือกเริ่มจากระดับที่ทำได้ แล้วเพิ่มความยากเมื่อควบคุมมือได้</p></div><div class=\"activity-card game\"><span>เกมเสริม</span><h3>คีบสีเข้าบ้าน</h3><p>คีบสีเข้าบ้าน: ใช้ที่คีบและลูกปอมปอม 3 สี เด็กคีบตามบัตรคำสั่ง เช่น “สีฟ้า 2 ลูก สีเหลือง 1 ลูก” ได้ฝึกนิ้ว สมาธิ และการฟัง</p></div><h3 class=\"sub\">วิธีสรุปหลังเล่น</h3><ul class=\"list\"><li>ถามว่าเด็กทำส่วนใดได้ดี</li><li>ให้เด็กบอกส่วนที่อยากลองใหม่</li><li>ครูสรุปทักษะด้วยประโยคสั้นและเชื่อมกับชีวิตประจำวัน</li></ul>", "keywords": "กิจกรรม เกม กิจกรรมหลักและเกมเสริม หน่วย 1 · กล้ามเนื้อมัดเล็ก"}, {"id": "u1-worksheet", "title": "ใบงานและตัวงานเด็ก", "group": "หน่วย 1 · กล้ามเนื้อมัดเล็ก", "kind": "worksheet", "body": "<p class=\"lead\">เลือกทำ 2–3 งานต่อครั้ง ไม่จำเป็นต้องทำครบในวันเดียว ช่องบันทึกด้านล่างจะเก็บข้อมูลไว้ในอุปกรณ์นี้</p><div class=\"tasks\"><div class=\"task\"><span>1</span><p>ลากเส้นตรงจากเครื่องบินไปก้อนเมฆ 5 แถว</p><textarea rows=\"2\" data-save=\"u1-work-1\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>2</span><p>ลากเส้นโค้งพาปลาไปหาฟองอากาศ</p><textarea rows=\"2\" data-save=\"u1-work-2\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>3</span><p>ต่อจุด 1–10 เป็นรูปผลไม้</p><textarea rows=\"2\" data-save=\"u1-work-3\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>4</span><p>ระบายสีวงกลมโดยพยายามไม่ออกนอกกรอบ</p><textarea rows=\"2\" data-save=\"u1-work-4\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>5</span><p>ฉีกกระดาษสีเป็นชิ้นเล็กแล้วปะเป็นต้นไม้</p><textarea rows=\"2\" data-save=\"u1-work-5\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div></div>", "keywords": "ใบงาน ตัวงานเด็ก ใบงานและตัวงานเด็ก หน่วย 1 · กล้ามเนื้อมัดเล็ก"}, {"id": "u1-assessment", "title": "การประเมินและ Feedback ผู้ปกครอง", "group": "หน่วย 1 · กล้ามเนื้อมัดเล็ก", "kind": "assessment", "body": "<h3 class=\"sub\">แบบสังเกตเบื้องต้น</h3><div class=\"checklist\"><label><input type=\"checkbox\" data-save=\"u1-assess-1\"><span>จับดินสอได้เหมาะสมโดยไม่บีบแน่นเกินไป</span></label><label><input type=\"checkbox\" data-save=\"u1-assess-2\"><span>ลากเส้นตามรอยได้ต่อเนื่อง</span></label><label><input type=\"checkbox\" data-save=\"u1-assess-3\"><span>หยุดมือใกล้จุดจบได้</span></label><label><input type=\"checkbox\" data-save=\"u1-assess-4\"><span>ทำงานต่อเนื่องประมาณ 5–10 นาทีตามความพร้อม</span></label></div><div class=\"feedback\"><h3>ข้อความ Feedback พร้อมใช้</h3><p>วันนี้เด็กได้ฝึก <b>กล้ามเนื้อมัดเล็ก</b> และมีความก้าวหน้าในด้าน ____________________ สิ่งที่ควรฝึกต่อคือ ____________________</p><textarea rows=\"4\" data-save=\"u1-feedback\" placeholder=\"บันทึกเฉพาะบุคคลสำหรับส่งผู้ปกครอง\"></textarea><h4>แนวทางส่งเสริมที่บ้าน</h4><p>ฝึกวันละ 5–10 นาทีด้วยงานบ้านและการเล่น เช่น คีบผ้า ปั้นดินน้ำมัน ร้อยหลอด ฉีกกระดาษ หรือหยิบเมล็ดถั่ว โดยมีผู้ใหญ่ดูแลเรื่องชิ้นส่วนขนาดเล็ก</p></div>", "keywords": "ประเมิน ผู้ปกครอง feedback การประเมินและ Feedback ผู้ปกครอง หน่วย 1 · กล้ามเนื้อมัดเล็ก"}, {"id": "u1-image", "title": "ไอเดียภาพประกอบสำหรับหน่วยนี้", "group": "หน่วย 1 · กล้ามเนื้อมัดเล็ก", "kind": "prompt", "body": "<p class=\"lead\">ใช้ Prompt นี้เพื่อสร้างภาพประกอบที่เข้ากับโทน Little Steps แล้วนำไฟล์ภาพมาแทรกในหน้ากิจกรรมหรือใบงาน</p><div class=\"prompt-box\"><pre>cute educational illustration for fine motor skills, happy preschool child tracing lines and using tweezers to sort colorful pom poms, clean white background, pastel blue yellow and soft pink palette, rounded shapes, friendly Thai educational website style, clear composition, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก Prompt</button></div><div class=\"image-guide\"><b>ตำแหน่งแนะนำ</b><span>ภาพปกหน่วย · การ์ดกิจกรรม · หน้าคั่นใบงาน · ภาพสถานการณ์สำหรับชวนคุย</span></div>", "keywords": "prompt เจนภาพ image ไอเดียภาพประกอบสำหรับหน่วยนี้ หน่วย 1 · กล้ามเนื้อมัดเล็ก"}, {"id": "u2-overview", "title": "✎ ฝึกเขียนพื้นฐาน: ภาพรวม", "group": "หน่วย 2 · ฝึกเขียนพื้นฐาน", "kind": "content", "body": "<p class=\"lead\"><b>จากเส้นง่าย ๆ สู่ตัวอักษรแรกของเด็ก</b><br>วางท่านั่ง จับดินสอ และสร้างเส้นพื้นฐาน เพื่อนำไปสู่การเขียนตัวเลข ตัวอักษร คำง่าย ๆ และชื่อตนเอง</p><h3 class=\"sub\">ทักษะที่เด็กจะได้รับ</h3><ul class=\"list\"><li>รู้จักทิศทางเริ่มต้น–สิ้นสุดของเส้น</li><li>คัดตามรอยประโดยรักษาขนาดใกล้เคียงตัวอย่าง</li><li>เขียนตัวเลข 1–10 และตัวอักษรง่าย ๆ</li><li>เขียนชื่อของตนเองจากแบบได้</li></ul><div class=\"tip\"><b>จุดเน้นของผู้สอน</b><span>สังเกตว่าเด็กใช้วิธีใดและช่วยด้วยคำใบ้ทีละน้อย ไม่ทำแทนทันที</span></div>", "keywords": "วางท่านั่ง จับดินสอ และสร้างเส้นพื้นฐาน เพื่อนำไปสู่การเขียนตัวเลข ตัวอักษร คำง่าย ๆ และชื่อตนเอง ✎ ฝึกเขียนพื้นฐาน: ภาพรวม หน่วย 2 · ฝึกเขียนพื้นฐาน"}, {"id": "u2-teach", "title": "ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร", "group": "หน่วย 2 · ฝึกเขียนพื้นฐาน", "kind": "teach", "body": "<p class=\"lead\">ใช้ขั้นตอนด้านล่างเป็นบทสอนได้ทันที ครูสามารถลดหรือเพิ่มรอบฝึกตามสมาธิและความพร้อมของเด็ก</p><div class=\"timeline\"><div class=\"step\"><div class=\"stage\">จัดท่า</div><div><b>ครูทำอะไร</b><p>ครูสาธิตหลังพิงพนัก เท้าวางมั่นคง แขนพักบนโต๊ะ และกระดาษอยู่ด้านหน้ามือถนัด</p></div><div><b>เด็กทำอะไร</b><p>เด็กจัดที่นั่งและตรวจตนเองจากภาพตัวอย่าง</p></div><div><b>เหตุผล</b><p>ลดความเมื่อยและช่วยให้ควบคุมมือ</p></div></div><div class=\"step\"><div class=\"stage\">เขียนใหญ่</div><div><b>ครูทำอะไร</b><p>วาดเส้นพื้นฐานขนาดใหญ่บนกระดาน พร้อมลูกศรบอกทิศ</p></div><div><b>เด็กทำอะไร</b><p>เขียนตามด้วยนิ้วบนอากาศหรือถาดทราย</p></div><div><b>เหตุผล</b><p>ให้เด็กเข้าใจรูปทรงก่อนใช้พื้นที่เล็ก</p></div></div><div class=\"step\"><div class=\"stage\">เชื่อมกับตัวอักษร</div><div><b>ครูทำอะไร</b><p>ชี้ให้เห็นว่าเลข 1 มาจากเส้นตรง เลข 0 มาจากวงกลม และคำง่ายประกอบด้วยเส้นใด</p></div><div><b>เด็กทำอะไร</b><p>เด็กวงเส้นพื้นฐานที่พบในตัวอย่าง</p></div><div><b>เหตุผล</b><p>ช่วยให้เด็กเห็นโครงสร้าง ไม่จำรูปร่างแบบแยกส่วน</p></div></div><div class=\"step\"><div class=\"stage\">คัดทีละช่วง</div><div><b>ครูทำอะไร</b><p>ครูสาธิตหนึ่งตัว แล้วให้เด็กทำเพียง 2–3 ตัวก่อนหยุดตรวจ</p></div><div><b>เด็กทำอะไร</b><p>เด็กคัดตามรอยและเลือกตัวที่ตนทำดีที่สุด</p></div><div><b>เหตุผล</b><p>ลดการฝึกจำนวนมากโดยไม่ตรวจคุณภาพ</p></div></div><div class=\"step\"><div class=\"stage\">เขียนจากความหมาย</div><div><b>ครูทำอะไร</b><p>ครูแสดงภาพ ปลา บ้าน แม่ แล้วอ่านคำช้า ๆ</p></div><div><b>เด็กทำอะไร</b><p>เด็กเลือกภาพหนึ่งภาพ คัดคำ และวาดสัญลักษณ์เล็ก ๆ ข้างคำ</p></div><div><b>เหตุผล</b><p>ทำให้งานเขียนมีความหมายต่อเด็ก</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 2 · ฝึกเขียนพื้นฐาน"}, {"id": "u2-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 2 · ฝึกเขียนพื้นฐาน", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><li>เส้นตั้ง เส้นนอน เส้นเฉียง วงกลม และครึ่งวงกลมเป็นส่วนประกอบของตัวอักษร</li><li>กระดาษควรวางเอียงตามมือถนัดเล็กน้อย</li><li>ควรฝึกขนาดใหญ่ก่อนลดขนาดลง</li><li>การเขียนที่ดีในวัยเริ่มต้นหมายถึงเด็กกล้าลองและควบคุมทิศทางได้ ไม่ใช่ต้องสวยเหมือนแบบทันที</li></ul><div class=\"board\"><h3>ข้อความพร้อมใช้กับเด็ก</h3><p>“เราจะค่อย ๆ ลองทีละขั้น ไม่ต้องรีบ ทำไม่ได้ครั้งแรกไม่เป็นไร ครูจะช่วยด้วยคำใบ้ และหนูเลือกลองใหม่ได้”</p></div>", "keywords": "ใบความรู้ สาระสำคัญ ใบความรู้สำหรับผู้สอน หน่วย 2 · ฝึกเขียนพื้นฐาน"}, {"id": "u2-activity", "title": "กิจกรรมหลักและเกมเสริม", "group": "หน่วย 2 · ฝึกเขียนพื้นฐาน", "kind": "content", "body": "<div class=\"activity-card\"><span>กิจกรรมหลัก</span><h3>เขียนจากภาพ</h3><p>เขียนจากภาพ: ใช้บัตรภาพคำใกล้ตัว เช่น ตา ปลา บ้าน แมว แม่ ครูอ่านคำ ให้เด็กใช้นิ้วเขียนบนอากาศ แล้วคัดตามรอยและลองเขียนเองหนึ่งครั้ง</p></div><div class=\"activity-card game\"><span>เกมเสริม</span><h3>นักเขียนบนอากาศ</h3><p>นักเขียนบนอากาศ: ครูชูบัตรเลขหรือตัวอักษร เด็กใช้นิ้วเขียนขนาดใหญ่กลางอากาศ เพื่อนทายสิ่งที่เขียน</p></div><h3 class=\"sub\">วิธีสรุปหลังเล่น</h3><ul class=\"list\"><li>ถามว่าเด็กทำส่วนใดได้ดี</li><li>ให้เด็กบอกส่วนที่อยากลองใหม่</li><li>ครูสรุปทักษะด้วยประโยคสั้นและเชื่อมกับชีวิตประจำวัน</li></ul>", "keywords": "กิจกรรม เกม กิจกรรมหลักและเกมเสริม หน่วย 2 · ฝึกเขียนพื้นฐาน"}, {"id": "u2-worksheet", "title": "ใบงานและตัวงานเด็ก", "group": "หน่วย 2 · ฝึกเขียนพื้นฐาน", "kind": "worksheet", "body": "<p class=\"lead\">เลือกทำ 2–3 งานต่อครั้ง ไม่จำเป็นต้องทำครบในวันเดียว ช่องบันทึกด้านล่างจะเก็บข้อมูลไว้ในอุปกรณ์นี้</p><div class=\"tasks\"><div class=\"task\"><span>1</span><p>คัดเส้นตั้ง–นอน–เฉียงแบบละ 1 แถว</p><textarea rows=\"2\" data-save=\"u2-work-1\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>2</span><p>คัดวงกลมและครึ่งวงกลม</p><textarea rows=\"2\" data-save=\"u2-work-2\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>3</span><p>คัดตัวเลข 1–10 ตามรอยประ</p><textarea rows=\"2\" data-save=\"u2-work-3\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>4</span><p>คัดคำสั้น เช่น ตา ปลา บ้าน แม่</p><textarea rows=\"2\" data-save=\"u2-work-4\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>5</span><p>เขียนชื่อตนเองจากป้ายชื่อ 2 ครั้ง</p><textarea rows=\"2\" data-save=\"u2-work-5\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div></div>", "keywords": "ใบงาน ตัวงานเด็ก ใบงานและตัวงานเด็ก หน่วย 2 · ฝึกเขียนพื้นฐาน"}, {"id": "u2-assessment", "title": "การประเมินและ Feedback ผู้ปกครอง", "group": "หน่วย 2 · ฝึกเขียนพื้นฐาน", "kind": "assessment", "body": "<h3 class=\"sub\">แบบสังเกตเบื้องต้น</h3><div class=\"checklist\"><label><input type=\"checkbox\" data-save=\"u2-assess-1\"><span>จัดท่านั่งและวางกระดาษเหมาะสม</span></label><label><input type=\"checkbox\" data-save=\"u2-assess-2\"><span>เริ่มเขียนจากตำแหน่งที่กำหนด</span></label><label><input type=\"checkbox\" data-save=\"u2-assess-3\"><span>คัดตามรอยโดยไม่ยกดินสอบ่อยเกินไป</span></label><label><input type=\"checkbox\" data-save=\"u2-assess-4\"><span>เขียนชื่อจากแบบได้ตามระดับความพร้อม</span></label></div><div class=\"feedback\"><h3>ข้อความ Feedback พร้อมใช้</h3><p>วันนี้เด็กได้ฝึก <b>ฝึกเขียนพื้นฐาน</b> และมีความก้าวหน้าในด้าน ____________________ สิ่งที่ควรฝึกต่อคือ ____________________</p><textarea rows=\"4\" data-save=\"u2-feedback\" placeholder=\"บันทึกเฉพาะบุคคลสำหรับส่งผู้ปกครอง\"></textarea><h4>แนวทางส่งเสริมที่บ้าน</h4><p>เตรียมดินสอขนาดจับถนัด กระดาษไม่มีเส้นหรือเส้นกว้าง ฝึกวันละคำหรือเลขเพียงเล็กน้อย และให้เด็กเลือกผลงานที่ภูมิใจติดไว้ที่บ้าน</p></div>", "keywords": "ประเมิน ผู้ปกครอง feedback การประเมินและ Feedback ผู้ปกครอง หน่วย 2 · ฝึกเขียนพื้นฐาน"}, {"id": "u2-image", "title": "ไอเดียภาพประกอบสำหรับหน่วยนี้", "group": "หน่วย 2 · ฝึกเขียนพื้นฐาน", "kind": "prompt", "body": "<p class=\"lead\">ใช้ Prompt นี้เพื่อสร้างภาพประกอบที่เข้ากับโทน Little Steps แล้วนำไฟล์ภาพมาแทรกในหน้ากิจกรรมหรือใบงาน</p><div class=\"prompt-box\"><pre>adorable preschool handwriting practice illustration, child holding pencil correctly and tracing large simple lines on a worksheet, open learning table, pastel blue yellow and coral accents, clean modern educational style, white background, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก Prompt</button></div><div class=\"image-guide\"><b>ตำแหน่งแนะนำ</b><span>ภาพปกหน่วย ุผล</b><p>ป้องกันการมองภาพโดยไม่มองคำ</p></div></div><div class=\"step\"><div class=\"stage\">สลับบัตร</div><div><b>ครูทำอะไร</b><p>นำภาพออก เหลือบัตรคำ 2–3 ใบ ให้เด็กเลือกคำที่ครูอ่าน</p></div><div><b>เด็กทำอะไร</b><p>เด็กฟัง เลือก และลองอ่านคำที่เลือก</p></div><div><b>เหตุผล</b><p>ตรวจว่าจำคำหรือพึ่งภาพ</p></div></div><div class=\"step\"><div class=\"stage\">ใช้ในประโยค</div><div><b>ครูทำอะไร</b><p>ครูพูดประโยคสั้น เช่น “มีปลา” “แมวนอน” และให้เด็กชี้คำเป้าหมาย</p></div><div><b>เด็กทำอะไร</b><p>เด็กชี้และอ่านคำสำคัญ</p></div><div><b>เหตุผล</b><p>เชื่อมคำเดี่ยวกับภาษาใช้งานจริง</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 3 · ฝึกอ่านพื้นฐาน"}, {"id": "u3-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 3 · ฝึกอ่านพื้นฐาน", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><li>การอ่านเริ่มจากการฟังเสียงและพูดตาม ก่อนจดจำรูปคำ</li><li>ควรใช้คำสั้น คุ้นเคย และมีภาพประกอบชัดเจน</li><li>ชี้ใต้คำจากซ้ายไปขวาขณะอ่าน</li><li>การเห็นคำเดิมซ้ำในนิทาน ป้ายชื่อ และเกม ช่วยให้จำได้โดยไม่กดดัน</li></ul><div class=\"board\"><h3>ข้อความพร้อมใช้กับเด็ก</h3><p>“เราจะค่อย ๆ ลองทีละขั้น ไม่ต้องรีบ ทำไม่ได้ครั้งแรกไม่เป็นไร ครูจะช่วยด้วยคำใบ้ และหนูเลือกลองใหม่ได้”</p></div>", "keywords": "ใบความรู้ สาระสำคัญ ใบความรู้สำหรับผู้สอน หน่วย 3 · ฝึกอ่านพื้นฐาน"}, {"id": "u3-activity", "title": "กิจกรรมหลักและเกมเสริม", "group": "หน่วย 3 · ฝึกอ่านพื้นฐาน", "kind": "content", "body": "<div class=\"activity-card\"><span>กิจกรรมหลัก</span><h3>จับคู่ภาพกับคำ</h3><p>จับคู่ภาพกับคำ: วางบัตรภาพ 4 ใบและบัตรคำ 4 ใบ เด็กจับคู่ อ่านตามครู แล้วปิดภาพเพื่ออ่านจากคำอีกครั้ง</p></div><div class=\"activity-card game\"><span>เกมเสริม</span><h3>เสียงต้นพาเพลิน</h3><p>เสียงต้นพาเพลิน: ครูออกเสียง /ป/ /ม/ /บ/ เด็กเลือกบัตรภาพที่ขึ้นต้นด้วยเสียงนั้น แล้วพูดชื่อภาพเต็มคำ</p></div><h3 class=\"sub\">วิธีสรุปหลังเล่น</h3><ul class=\"list\"><li>ถามว่าเด็กทำส่วนใดได้ดี</li><li>ให้เด็กบอกส่วนที่อยากลองใหม่</li><li>ครูสรุปทักษะด้วยประโยคสั้นและเชื่อมกับชีวิตประจำวัน</li></ul>", "keywords": "กิจกรรม เกม กิจกรรมหลักและเกมเสริม หน่วย 3 · ฝึกอ่านพื้นฐาน"}, {"id": "u3-worksheet", "title": "ใบงานและตัวงานเด็ก", "group": "หน่วย 3 · ฝึกอ่านพื้นฐาน", "kind": "worksheet", "body": "<p class=\"lead\">เลือกทำ 2–3 งานต่อครั้ง ไม่จำเป็นต้องทำครบในวันเดียว ช่องบันทึกด้านล่างจะเก็บข้อมูลไว้ในอุปกรณ์นี้</p><div class=\"tasks\"><div class=\"task\"><span>1</span><p>ลากเส้นจับคู่ภาพกับคำ 5 คู่</p><textarea rows=\"2\" data-save=\"u3-work-1\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>2</span><p>วงคำที่ตรงกับภาพจากตัวเลือก 3 คำ</p><textarea rows=\"2\" data-save=\"u3-work-2\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>3</span><p>เติมพยัญชนะต้นที่หายไปในคำง่าย</p><textarea rows=\"2\" data-save=\"u3-work-3\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>4</span><p>ระบายสีเฉพาะภาพที่ขึ้นต้นด้วยเสียงที่กำหนด</p><textarea rows=\"2\" data-save=\"u3-work-4\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>5</span><p>อ่านคำ 5 คำให้ผู้ใหญ่ฟังและติดดาวคำที่อ่านได้</p><textarea rows=\"2\" data-save=\"u3-work-5\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div></div>", "keywords": "ใบงาน ตัวงานเด็ก ใบงานและตัวงานเด็ก หน่วย 3 · ฝึกอ่านพื้นฐาน"}, {"id": "u3-assessment", "title": "การประเมินและ Feedback ผู้ปกครอง", "group": "หน่วย 3 · ฝึกอ่านพื้นฐาน", "kind": "assessment", "body": "<h3 class=\"sub\">แบบสังเกตเบื้องต้น</h3><div class=\"checklist\"><label><input type=\"checkbox\" data-save=\"u3-assess-1\"><span>มองและชี้คำขณะอ่าน</span></label><label><input type=\"checkbox\" data-save=\"u3-assess-2\"><span>ออกเสียงตามได้ชัดขึ้น</span></label><label><input type=\"checkbox\" data-save=\"u3-assess-3\"><span>จับคู่ภาพกับคำได้</span></label><label><input type=\"checkbox\" data-save=\"u3-assess-4\"><span>จำคำที่ฝึกซ้ำได้อย่างน้อยบางคำ</span></label></div><div class=\"feedback\"><h3>ข้อความ Feedback พร้อมใช้</h3><p>วันนี้เด็กได้ฝึก <b>ฝึกอ่านพื้นฐาน</b> และมีความก้าวหน้าในด้าน ____________________ สิ่งที่ควรฝึกต่อคือ ____________________</p><textarea rows=\"4\" data-save=\"u3-feedback\" placeholder=\"บันทึกเฉพาะบุคคลสำหรับส่งผู้ปกครอง\"></textarea><h4>แนวทางส่งเสริมที่บ้าน</h4><p>อ่านนิทานภาพวันละ 5–10 นาที ชี้คำสั้นที่พบซ้ำ และเล่นเกมหาคำบนบรรจุภัณฑ์หรือป้ายรอบบ้าน โดยไม่ทดสอบต่อเนื่องจนเด็กรู้สึกกดดัน</p></div>", "keywords": "ประเมิน ผู้ปกครอง feedback การประเมินและ Feedback ผู้ปกครอง หน่วย 3 · ฝึกอ่านพื้นฐาน"}, {"id": "u3-image", "title": "ไอเดียภาพประกอบสำหรับหน่วยนี้", "group": "หน่วย 3 · ฝึกอ่านพื้นฐาน", "kind": "prompt", "body": "<p class=\"lead\">ใช้ Prompt นี้เพื่อสร้างภาพประกอบที่เข้ากับโทน Little Steps แล้วนำไฟล์ภาพมาแทรกในหน้ากิจกรรมหรือใบงาน</p><div class=\"prompt-box\"><pre>early reading illustration, preschool child matching picture cards with simple word cards, cute fish cat house and car icons, clean white background, pastel blue yellow palette, friendly modern learning graphic, no readable text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก Prompt</button></div><div class=\"image-guide\"><b>ตำแหน่งแนะนำ</b><span>ภาพปกหน่วย · การ์ดกิจกรรม · หน้าคั่นใบงาน · ภาพสถานการณ์สำหรับชวนคุย</span></div>", "keywords": "prompt เจนภาพ image ไอเดียภาพประกอบสำหรับหน่วยนี้ หน่วย 3 · ฝึกอ่านพื้นฐาน"}, {"id": "u4-overview", "title": "💬 ฟังและพูด: ภาพรวม", "group": "หน่วย 4 · ฟังและพูด", "kind": "content", "body": "<p class=\"lead\"><b>ฟังเข้าใจ พูดมั่นใจ สื่อสารอย่างเหมาะสม</b><br>พัฒนาการฟังคำสั่ง การตอบคำถาม การเล่าเรื่อง และการใช้ถ้อยคำสุภาพในสถานการณ์ใกล้ตัว</p><h3 class=\"sub\">ทักษะที่เด็กจะได้รับ</h3><ul class=\"list\"><li>ฟังคำสั่ง 1–2 ขั้นตอนและทำตาม</li><li>ตอบคำถามใคร อะไร ที่ไหน อย่างง่าย</li><li>เล่าเรื่องจากภาพตามลำดับก่อน–ต่อมา–สุดท้าย</li><li>พูดบอกความต้องการและความรู้สึกอย่างสุภาพ</li></ul><div class=\"tip\"><b>จุดเน้นของผู้สอน</b><span>สังเกตว่าเด็กใช้วิธีใดและช่วยด้วยคำใบ้ทีละน้อย ไม่ทำแทนทันที</span></div>", "keywords": "พัฒนาการฟังคำสั่ง การตอบคำถาม การเล่าเรื่อง และการใช้ถ้อยคำสุภาพในสถานการณ์ใกล้ตัว 💬 ฟังและพูด: ภาพรวม หน่วย 4 · ฟังและพูด"}, {"id": "u4-teach", "title": "ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร", "group": "หน่วย 4 · ฟังและพูด", "kind": "teach", "body": "<p class=\"lead\">ใช้ขั้นตอนด้านล่างเป็นบทสอนได้ทันที ครูสามารถลดหรือเพิ่มรอบฝึกตามสมาธิและความพร้อมของเด็ก</p><div class=\"timeline\"><div class=\"step\"><div class=\"stage\">สนทนาเปิด</div><div><b>ครูทำอะไร</b><p>ถามเรื่องใกล้ตัว เช่น “เช้านี้หนูกินอะไร” และรอคำตอบ 5–7 วินาที</p></div><div><b>เด็กทำอะไร</b><p>เด็กตอบด้วยคำหรือประโยคตามระดับของตน</p></div><div><b>เหตุผล</b><p>สร้างความปลอดภัยและฝึกเรียบเรียงความคิด</p></div></div><div class=\"step\"><div class=\"stage\">ฟังคำสั่งหนึ่งขั้น</div><div><b>ครูทำอะไร</b><p>ครูพูด “หยิบบัตรสีแดง” โดยไม่ทำท่าประกอบในรอบแรก</p></div><div><b>เด็กทำอะไร</b><p>เด็กฟังและปฏิบัติ</p></div><div><b>เหตุผล</b><p>ตรวจความเข้าใจจากภาษา</p></div></div><div class=\"step\"><div class=\"stage\">เพิ่มเป็นสองขั้น</div><div><b>ครูทำอะไร</b><p>พูด “หยิบบัตรสีฟ้าแล้ววางข้างหนังสือ” จากนั้นให้เด็กทวนคำสั่ง</p></div><div><b>เด็กทำอะไร</b><p>เด็กทวนและทำตามทีละขั้น</p></div><div><b>เหตุผล</b><p>ฝึกความจำใช้งานและลำดับ</p></div></div><div class=\"step\"><div class=\"stage\">เล่าจากภาพ</div><div><b>ครูทำอะไร</b><p>แสดงภาพ 3 ช่อง ถามว่าเกิดอะไรขึ้นก่อน ต่อมา และสุดท้าย</p></div><div><b>เด็กทำอะไร</b><p>เด็กเล่าโดยใช้คำเชื่อมอย่างง่าย</p></div><div><b>เหตุผล</b><p>พัฒนาลำดับเรื่องและประโยค</p></div></div><div class=\"step\"><div class=\"stage\">สะท้อนคำพูด</div><div><b>ครูทำอะไร</b><p>ครูทวนประโยคเด็กให้สมบูรณ์ เช่น เด็กพูด “หมาวิ่ง” ครูตอบ “ใช่ สุนัขกำลังวิ่งไปหาลูกบอล”</p></div><div><b>เด็กทำอะไร</b><p>เด็กฟังและลองพูดประโยคยาวขึ้น</p></div><div><b>เหตุผล</b><p>เพิ่มภาษาโดยไม่ทำให้เด็กรู้สึกว่าถูกแก้</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 4 · ฟังและพูด"}, {"id": "u4-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 4 · ฟังและพูด", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><li>เด็กฟังได้ดีขึ้นเมื่อคำสั่งสั้น ชัด และมีช่วงให้ประมวลผล</li><li>คำถามปลายเปิดช่วยให้เด็กขยายประโยคมากกว่าคำถามที่ตอบใช่/ไม่ใช่</li><li>ผู้ใหญ่ควรรอฟังจนเด็กพูดจบก่อนช่วยเติมคำ</li><li>การพูดผิดเป็นส่วนหนึ่งของการเรียนรู้ ควรทวนรูปประโยคที่ถูกโดยไม่ตำหนิ</li></ul><div class=\"board\"><h3>ข้อความพร้อมใช้กับเด็ก</h3><p>“เราจะค่อย ๆ ลองทีละขั้น ไม่ต้องรีบ ทำไม่ได้ครั้งแรกไม่เป็นไร ครูจะช่วยด้วยคำใบ้ และหนูเลือกลองใหม่ได้”</p></div>", "keywords": "ใบความรู้ สาระสำคัญ ใบความรู้สำหรับผู้สอน หน่วย 4 · ฟังและพูด"}, {"id": "u4-activity", "title": "กิจกรรมหลักและเกมเสริม", "group": "หน่วย 4 · ฟังและพูด", "kind": "content", "body": "<div class=\"activity-card\"><span>กิจกรรมหลัก</span><h3>เล่าจากภาพ 3 ช่อง</h3><p>เล่าจากภาพ 3 ช่อง: ใช้ภาพกิจวัตร เช่น ปลูกเมล็ด–รดน้ำ–ต้นอ่อน เด็กจัดลำดับและเล่าด้วยคำว่า ก่อน ต่อมา สุดท้าย</p></div><div class=\"activity-card game\"><span>เกมเสริม</span><h3>ฟังแล้วทำ</h3><p>ฟังแล้วทำ: ครูให้คำสั่งสนุก ๆ เช่น “ยิ้มแล้วแตะหัว” “ยืนขึ้น หมุนหนึ่งรอบ แล้วนั่ง” ปรับจำนวนขั้นตามความพร้อม</p></div><h3 class=\"sub\">วิธีสรุปหลังเล่น</h3><ul class=\"list\"><li>ถามว่าเด็กทำส่วนใดได้ดี</li><li>ให้เด็กบอกส่วนที่อยากลองใหม่</li><li>ครูสรุปทักษะด้วยประโยคสั้นและเชื่อมกับชีวิตประจำวัน</li></ul>", "keywords": "กิจกรรม เกม กิจกรรมหลักและเกมเสริม หน่วย 4 · ฟังและพูด"}, {"id": "u4-worksheet", "title": "ใบงานและตัวงานเด็ก", "group": "หน่วย 4 · ฟังและพูด", "kind": "worksheet", "body": "<p class=\"lead\">เลือกทำ 2–3 งานต่อครั้ง ไม่จำเป็นต้องทำครบในวันเดียว ช่องบันทึกด้านล่างจะเก็บข้อมูลไว้ในอุปกรณ์นี้</p><div class=\"tasks\"><div class=\"task\"><span>1</span><p>ฟังครูอ่านคำสั่งแล้ววงภาพที่ถูก</p><textarea rows=\"2\" data-save=\"u4-work-1\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>2</span><p>เรียงภาพเหตุการณ์ 3 ช่อง</p><textarea rows=\"2\" data-save=\"u4-work-2\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>3</span><p>ตอบคำถามจากภาพด้วยประโยคสั้น</p><textarea rows=\"2\" data-save=\"u4-work-3\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>4</span><p>วาดสิ่งที่ชอบแล้วพูดแนะนำ 2 ประโยค</p><textarea rows=\"2\" data-save=\"u4-work-4\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>5</span><p>ฝึกคำสุภาพ ขออนุญาต ขอบคุณ และขอโทษ</p><textarea rows=\"2\" data-save=\"u4-work-5\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div></div>", "keywords": "ใบงาน ตัวงานเด็ก ใบงานและตัวงานเด็ก หน่วย 4 · ฟังและพูด"}, {"id": "u4-assessment", "title": "การประเมินและ Feedback ผู้ปกครอง", "group": "หน่วย 4 · ฟังและพูด", "kind": "assessment", "body": "<h3 class=\"sub\">แบบสังเกตเบื้องต้น</h3><div class=\"checklist\"><label><input type=\"checkbox\" data-save=\"u4-assess-1\"><span>หันมาฟังและรอจนคำสั่งจบ</span></label><label><input type=\"checkbox\" data-save=\"u4-assess-2\"><span>ทำตามคำสั่งหนึ่งขั้นได้</span></label><label><input type=\"checkbox\" data-save=\"u4-assess-3\"><span>ตอบคำถามจากภาพได้</span></label><label><input type=\"checkbox\" data-save=\"u4-assess-4\"><span>เล่าเหตุการณ์ต่อเนื่องอย่างน้อย 2 ส่วน</span></label></div><div class=\"feedback\"><h3>ข้อความ Feedback พร้อมใช้</h3><p>วันนี้เด็กได้ฝึก <b>ฟังและพูด</b> และมีความก้าวหน้าในด้าน ____________________ สิ่งที่ควรฝึกต่อคือ ____________________</p><textarea rows=\"4\" data-save=\"u4-feedback\" placeholder=\"บันทึกเฉพาะบุคคลสำหรับส่งผู้ปกครอง\"></textarea><h4>แนวทางส่งเสริมที่บ้าน</h4><p>ชวนลูกเล่าเหตุการณ์ประจำวันโดยใช้คำถาม “แล้วเกิดอะไรต่อ” ฟังจนจบ และช่วยขยายประโยคแทนการถามทดสอบหลายคำถามติดกัน</p></div>", "keywords": "ประเมิน ผู้ปกครอง feedback การประเมินและ Feedback ผู้ปกครอง หน่วย 4 · ฟังและพูด"}, {"id": "u4-image", "title": "ไอเดียภาพประกอบสำหรับหน่วยนี้", "group": "หน่วย 4 · ฟังและพูด", "kind": "prompt", "body": "<p class=\"lead\">ใช้ Prompt นี้เพื่อสร้างภาพประกอบที่เข้ากับโทน Little Steps แล้วนำไฟล์ภาพมาแทรกในหน้ากิจกรรมหรือใบงาน</p><div class=\"prompt-box\"><pre>social communication learning illustration, preschool child listening to teacher and telling a story from three picture cards, speech bubbles without text, pastel blue yellow soft orange, clean educational website style, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก Prompt</button></div><div class=\"image-guide\"><b>ตำแหน่งแนะนำ</b><span>ภาพปกหน่วย · การ์ดกิจกรรม · หน้าคั่นใบงาน · ภาพสถานการณ์สำหรับชวนคุย</span></div>", "keywords": "prompt เจนภาพ image ไอเดียภาพประกอบสำหรับหน่วยนี้ หน่วย 4 · ฟังและพูด"}, {"id": "u5-overview", "title": "🔎 คิดและสังเกต: ภาพรวม", "group": "หน่วย 5 · คิดและสังเกต", "kind": "content", "body": "<p class=\"lead\"><b>มองเห็น จัดหมวด จับคู่ และคิดเป็นลำดับ</b><br>พัฒนาการสังเกต เปรียบเทียบ จำแนก เรียงลำดับ และแก้ปัญหาเบื้องต้นผ่านภาพและสิ่งของจริง</p><h3 class=\"sub\">ทักษะที่เด็กจะได้รับ</h3><ul class=\"list\"><li>บอกความเหมือนและความต่าง</li><li>จัดสิ่งของตามสี รูปร่าง ขนาด หรือประเภท</li><li>เรียงลำดับเหตุการณ์และแบบรูปง่าย ๆ</li><li>อธิบายเหตุผลสั้น ๆ ว่าทำไมจึงเลือกคำตอบ</li></ul><div class=\"tip\"><b>จุดเน้นของผู้สอน</b><span>สังเกตว่าเด็กใช้วิธีใดและช่วยด้วยคำใบ้ทีละน้อย ไม่ทำแทนทันที</span></div>", "keywords": "พัฒนาการสังเกต เปรียบเทียบ จำแนก เรียงลำดับ และแก้ปัญหาเบื้องต้นผ่านภาพและสิ่งของจริง 🔎 คิดและสังเกต: ภาพรวม หน่วย 5 · คิดและสังเกต"}, {"id": "u5-teach", "title": "ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร", "group": "หน่วย 5 · คิดและสังเกต", "kind": "teach", "body": "<p class=\"lead\">ใช้ขั้นตอนด้านล่างเป็นบทสอนได้ทันที ครูสามารถลดหรือเพิ่มรอบฝึกตามสมาธิและความพร้อมของเด็ก</p><div class=\"timeline\"><div class=\"step\"><div class=\"stage\">สำรวจของจริง</div><div><b>ครูทำอะไร</b><p>วางของ 6 ชิ้นต่างสี/รูปทรง ถามว่าเห็นอะไรบ้างโดยยังไม่บอกเกณฑ์</p></div><div><b>เด็กทำอะไร</b><p>เด็กหยิบและบอกลักษณะที่สังเกต</p></div><div><b>เหตุผล</b><p>ฝึกมองรายละเอียดก่อนจำแนก</p></div></div><div class=\"step\"><div class=\"stage\">จัดหมวดรอบแรก</div><div><b>ครูทำอะไร</b><p>ครูชวนแยกตามสีและให้เด็กบอกชื่อกลุ่ม</p></div><div><b>เด็กทำอะไร</b><p>เด็กวางของลงกลุ่มและตรวจว่ามีชิ้นใดไม่เข้ากลุ่ม</p></div><div><b>เหตุผล</b><p>สร้างความเข้าใจเรื่องเกณฑ์</p></div></div><div class=\"step\"><div class=\"stage\">เปลี่ยนเกณฑ์</div><div><b>ครูทำอะไร</b><p>นำของชุดเดิมมาแยกตามรูปทรงหรือการใช้งาน</p></div><div><b>เด็กทำอะไร</b><p>เด็กจัดใหม่และบอกว่าทำไมตำแหน่งเปลี่ยน</p></div><div><b>เหตุผล</b><p>ทำให้เห็นว่าข้อมูลเดียวกันจัดได้หลายวิธี</p></div></div><div class=\"step\"><div class=\"stage\">เรียงลำดับ</div><div><b>ครูทำอะไร</b><p>แสดงภาพเหตุการณ์ 3–4 ใบแบบสลับและถามว่าใบใดควรมาก่อน</p></div><div><b>เด็กทำอะไร</b><p>เด็กจัดและเล่าเหตุผล</p></div><div><b>เหตุผล</b><p>ฝึกเหตุและผล</p></div></div><div class=\"step\"><div class=\"stage\">โจทย์เปิด</div><div><b>ครูทำอะไร</b><p>ถาม “มีวิธีจัดแบบอื่นอีกไหม” หรือ “ภาพใดไม่เข้าพวก เพราะอะไร”</p></div><div><b>เด็กทำอะไร</b><p>เด็กเสนอคำตอบและรับฟังเพื่อน</p></div><div><b>เหตุผล</b><p>พัฒนาความยืดหยุ่นทางความคิด</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 5 · คิดและสังเกต"}, {"id": "u5-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 5 · คิดและสังเกต", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><li>เด็กเล็กเรียนรู้แนวคิดได้ดีจากของจริงก่อนภาพและสัญลักษณ์</li><li>การจัดหมวดหนึ่งชุดอาจทำได้หลายเกณฑ์ เช่น สีหรือประเภท</li><li>ควรถาม “หนูรู้ได้อย่างไร” เพื่อฝึกอธิบาย ไม่เน้นเพียงคำตอบถูก</li><li>โจทย์ควรมีจำนวนตัวเลือกพอเหมาะ เริ่ม 2–3 ตัวเลือกแล้วเพิ่มขึ้น</li></ul><div class=\"board\"><h3>ข้อความพร้อมใช้กับเด็ก</h3><p>“เราจะค่อย ๆ ลองทีละขั้น ไม่ต้องรีบ ทำไม่ได้ครั้งแรกไม่เป็นไร ครูจะช่วยด้วยคำใบ้ และหนูเลือกลองใหม่ได้”</p></div>", "keywords": "ใบความรู้ สาระสำคัญ ใบความรู้สำหรับผู้สอน หน่วย 5 · คิดและสังเกต"}, {"id": "u5-activity", "title": "กิจกรรมหลักและเกมเสริม", "group": "หน่วย 5 · คิดและสังเกต", "kind": "content", "body": "<div class=\"activity-card\"><span>กิจกรรมหลัก</span><h3>จัดหมวดของรอบตัว</h3><p>จัดหมวดของรอบตัว: ใช้ภาพผลไม้ ของเล่น เสื้อผ้า และสัตว์ ให้เด็กแยกตามประเภท จากนั้นลองจัดใหม่ตามสีหรือขนาด</p></div><div class=\"activity-card game\"><span>เกมเสริม</span><h3>นักสืบหาจุดต่าง</h3><p>นักสืบหาจุดต่าง: ให้ภาพคล้ายกัน 2 ภาพ เริ่ม 3 จุดและเพิ่มเป็น 5 จุด เด็กใช้แว่นขยายของเล่นชี้พร้อมบอกความแตกต่าง</p></div><h3 class=\"sub\">วิธีสรุปหลังเล่น</h3><ul class=\"list\"><li>ถามว่าเด็กทำส่วนใดได้ดี</li><li>ให้เด็กบอกส่วนที่อยากลองใหม่</li><li>ครูสรุปทักษะด้วยประโยคสั้นและเชื่อมกับชีวิตประจำวัน</li></ul>", "keywords": "กิจกรรม เกม กิจกรรมหลักและเกมเสริม หน่วย 5 · คิดและสังเกต"}, {"id": "u5-worksheet", "title": "ใบงานและตัวงานเด็ก", "group": "หน่วย 5 · คิดและสังเกต", "kind": "worksheet", "body": "<p class=\"lead\">เลือกทำ 2–3 งานต่อครั้ง ไม่จำเป็นต้องทำครบในวันเดียว ช่องบันทึกด้านล่างจะเก็บข้อมูลไว้ในอุปกรณ์นี้</p><div class=\"tasks\"><div class=\"task\"><span>1</span><p>จับคู่ภาพที่เหมือนกัน</p><textarea rows=\"2\" data-save=\"u5-work-1\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>2</span><p>วงสิ่งที่ไม่เข้าพวกและบอกเหตุผล</p><textarea rows=\"2\" data-save=\"u5-work-2\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>3</span><p>หาความแตกต่าง 3–5 จุด</p><textarea rows=\"2\" data-save=\"u5-work-3\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>4</span><p>เรียงลำดับเหตุการณ์ 3 ช่อง</p><textarea rows=\"2\" data-save=\"u5-work-4\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>5</span><p>เติมภาพถัดไปในแบบรูปสี/รูปร่าง</p><textarea rows=\"2\" data-save=\"u5-work-5\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div></div>", "keywords": "ใบงาน ตัวงานเด็ก ใบงานและตัวงานเด็ก หน่วย 5 · คิดและสังเกต"}, {"id": "u5-assessment", "title": "การประเมินและ Feedback ผู้ปกครอง", "group": "หน่วย 5 · คิดและสังเกต", "kind": "assessment", "body": "<h3 class=\"sub\">แบบสังเกตเบื้องต้น</h3><div class=\"checklist\"><label><input type=\"checkbox\" data-save=\"u5-assess-1\"><span>สังเกตรายละเอียดสำคัญได้</span></label><label><input type=\"checkbox\" data-save=\"u5-assess-2\"><span>จัดหมวดตามเกณฑ์หนึ่งอย่างได้</span></label><label><input type=\"checkbox\" data-save=\"u5-assess-3\"><span>เปลี่ยนเกณฑ์ตามคำแนะนำได้</span></label><label><input type=\"checkbox\" data-save=\"u5-assess-4\"><span>เรียงลำดับและอธิบายเหตุผลสั้น ๆ ได้</span></label></div><div class=\"feedback\"><h3>ข้อความ Feedback พร้อมใช้</h3><p>วันนี้เด็กได้ฝึก <b>คิดและสังเกต</b> และมีความก้าวหน้าในด้าน ____________________ สิ่งที่ควรฝึกต่อคือ ____________________</p><textarea rows=\"4\" data-save=\"u5-feedback\" placeholder=\"บันทึกเฉพาะบุคคลสำหรับส่งผู้ปกครอง\"></textarea><h4>แนวทางส่งเสริมที่บ้าน</h4><p>ชวนลูกจัดของในบ้าน เช่น ช้อน–ส้อม เสื้อผ้า หรือของเล่น แล้วถามว่ามีวิธีจัดแบบอื่นไหม รวมทั้งเล่นเกมมองหาของสีหรือรูปทรงที่กำหนด</p></div>", "keywords": "ประเมิน ผู้ปกครอง feedback การประเมินและ Feedback ผู้ปกครอง หน่วย 5 · คิดและสังเกต"}, {"id": "u5-image", "title": "ไอเดียภาพประกอบสำหรับหน่วยนี้", "group": "หน่วย 5 · คิดและสังเกต", "kind": "prompt", "body": "<p class=\"lead\">ใช้ Prompt นี้เพื่อสร้างภาพประกอบที่เข้ากับโทน Little Steps แล้วนำไฟล์ภาพมาแทรกในหน้ากิจกรรมหรือใบงาน</p><div class=\"prompt-box\"><pre>cute observation and thinking activity illustration, preschool children sorting toys by color and shape, magnifying glass, simple sequence cards, clean white background, pastel blue yellow green, friendly educational graphic, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก Prompt</button></div><div class=\"image-guide\"><b>ตำแหน่งแนะนำ</b><span>ภาพปกหน่วย · การ์ดกิจกรรม · หน้าคั่นใบงาน · ภาพสถานการณ์สำหรับชวนคุย</span></div>", "keywords": "prompt เจนภาพ image ไอเดียภาพประกอบสำหรับหน่วยนี้ หน่วย 5 · คิดและสังเกต"}, {"id": "u6-overview", "title": "♡ อารมณ์และสังคม: ภาพรวม", "group": "หน่วย 6 · อารมณ์และสังคม", "kind": "content", "body": "<p class=\"lead\"><b>รู้จักใจตนเอง อยู่ร่วมกับผู้อื่นอย่างอบอุ่น</b><br>รู้จักอารมณ์พื้นฐาน บอกความต้องการอย่างเหมาะสม รอคอย แบ่งปัน และแก้ปัญหาความขัดแย้งง่าย ๆ</p><h3 class=\"sub\">ทักษะที่เด็กจะได้รับ</h3><ul class=\"list\"><li>บอกชื่ออารมณ์พื้นฐานและสัญญาณในร่างกาย</li><li>ใช้ประโยค “ฉันรู้สึก… เพราะ…”</li><li>รอคิวและปฏิบัติตามกติกาสั้น ๆ</li><li>ใช้คำขอบคุณ ขอโทษ ขออนุญาต และขอความช่วยเหลือ</li></ul><div class=\"tip\"><b>จุดเน้นของผู้สอน</b><span>สังเกตว่าเด็กใช้วิธีใดและช่วยด้วยคำใบ้ทีละน้อย ไม่ทำแทนทันที</span></div>", "keywords": "รู้จักอารมณ์พื้นฐาน บอกความต้องการอย่างเหมาะสม รอคอย แบ่งปัน และแก้ปัญหาความขัดแย้งง่าย ๆ ♡ อารมณ์และสังคม: ภาพรวม หน่วย 6 · อารมณ์และสังคม"}, {"id": "u6-teach", "title": "ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร", "group": "หน่วย 6 · อารมณ์และสังคม", "kind": "teach", "body": "<p class=\"lead\">ใช้ขั้นตอนด้านล่างเป็นบทสอนได้ทันที ครูสามารถลดหรือเพิ่มรอบฝึกตามสมาธิและความพร้อมของเด็ก</p><div class=\"timeline\"><div class=\"step\"><div class=\"stage\">เช็กอินอารมณ์</div><div><b>ครูทำอะไร</b><p>ให้เด็กเลือกการ์ดสีหน้าและพูด “วันนี้ฉันรู้สึก…”</p></div><div><b>เด็กทำอะไร</b><p>เด็กเลือกและบอกเหตุผลได้เท่าที่พร้อม</p></div><div><b>เหตุผล</b><p>สร้างนิสัยรับรู้อารมณ์</p></div></div><div class=\"step\"><div class=\"stage\">อ่านสัญญาณ</div><div><b>ครูทำอะไร</b><p>ถามว่าตอนโกรธ ร่างกายรู้สึกอย่างไร เช่น ใจเต้น มือกำ</p></div><div><b>เด็กทำอะไร</b><p>เด็กสังเกตและลองทำท่าทาง</p></div><div><b>เหตุผล</b><p>ช่วยให้รู้ตัวก่อนแสดงพฤติกรรม</p></div></div><div class=\"step\"><div class=\"stage\">สอนทางเลือก</div><div><b>ครูทำอะไร</b><p>ครูสาธิตหยุด–หายใจ–บอกความต้องการ เช่น “ฉันยังเล่นอยู่ ขออีก 2 นาที”</p></div><div><b>เด็กทำอะไร</b><p>เด็กฝึกพูดตามในบทบาทสมมติ</p></div><div><b>เหตุผล</b><p>ให้เครื่องมือแทนการแย่งหรือผลัก</p></div></div><div class=\"step\"><div class=\"stage\">ฝึกรอคิว</div><div><b>ครูทำอะไร</b><p>เล่นเกมที่ต้องส่งอุปกรณ์ทีละคน ใช้นาฬิกาทรายสั้น ๆ</p></div><div><b>เด็กทำอะไร</b><p>เด็กรอและส่งต่อเมื่อถึงเวลา</p></div><div><b>เหตุผล</b><p>ฝึกควบคุมตนเองในสถานการณ์จริง</p></div></div><div class=\"step\"><div class=\"stage\">สะท้อนหลังเกม</div><div><b>ครูทำอะไร</b><p>ถามว่าอะไรทำให้เล่นร่วมกันได้ดี และครั้งหน้าจะทำอย่างไร</p></div><div><b>เด็กทำอะไร</b><p>เด็กบอกกติกาหรือคำพูดที่ช่วยกัน</p></div><div><b>เหตุผล</b><p>เชื่อมประสบการณ์กับหลักการ</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 6 · อารมณ์และสังคม"}, {"id": "u6-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 6 · อารมณ์และสังคม", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><li>ทุกอารมณ์เกิดขึ้นได้ แต่การกระทำต้องปลอดภัย</li><li>การตั้งชื่ออารมณ์ช่วยให้เด็กควบคุมตนเองได้ดีขึ้น</li><li>เด็กเรียนรู้การแบ่งปันและรอคอยจากกิจกรรมจริง ไม่ใช่การบอกเพียงอย่างเดียว</li><li>ครูควรเป็นแบบอย่างของน้ำเสียงสงบและคำพูดสุภาพ</li></ul><div class=\"board\"><h3>ข้อความพร้อมใช้กับเด็ก</h3><p>“เราจะค่อย ๆ ลองทีละขั้น ไม่ต้องรีบ ทำไม่ได้ครั้งแรกไม่เป็นไร ครูจะช่วยด้วยคำใบ้ และหนูเลือกลองใหม่ได้”</p></div>", "keywords": "ใบความรู้ สาระสำคัญ ใบความรู้สำหรับผู้สอน หน่วย 6 · อารมณ์และสังคม"}, {"id": "u6-activity", "title": "กิจกรรมหลักและเกมเสริม", "group": "หน่วย 6 · อารมณ์และสังคม", "kind": "content", "body": "<div class=\"activity-card\"><span>กิจกรรมหลัก</span><h3>ฉันรู้สึกอย่างไร</h3><p>ฉันรู้สึกอย่างไร: เด็กเลือกการ์ดอารมณ์ วางบนมาตรวัด 1–3 และบอกสิ่งที่ต้องการ เช่น ขอพัก ขอความช่วยเหลือ หรืออยากเล่า</p></div><div class=\"activity-card game\"><span>เกมเสริม</span><h3>บทบาทสมมติคำพูดสุภาพ</h3><p>บทบาทสมมติคำพูดสุภาพ: สถานการณ์ยืมดินสอ ต่อคิว เล่นของชิ้นเดียว หรือทำของเพื่อนตก เด็กเลือกประโยคที่เหมาะสมและลองพูดจริง</p></div><h3 class=\"sub\">วิธีสรุปหลังเล่น</h3><ul class=\"list\"><li>ถามว่าเด็กทำส่วนใดได้ดี</li><li>ให้เด็กบอกส่วนที่อยากลองใหม่</li><li>ครูสรุปทักษะด้วยประโยคสั้นและเชื่อมกับชีวิตประจำวัน</li></ul>", "keywords": "กิจกรรม เกม กิจกรรมหลักและเกมเสริม หน่วย 6 · อารมณ์และสังคม"}, {"id": "u6-worksheet", "title": "ใบงานและตัวงานเด็ก", "group": "หน่วย 6 · อารมณ์และสังคม", "kind": "worksheet", "body": "<p class=\"lead\">เลือกทำ 2–3 งานต่อครั้ง ไม่จำเป็นต้องทำครบในวันเดียว ช่องบันทึกด้านล่างจะเก็บข้อมูลไว้ในอุปกรณ์นี้</p><div class=\"tasks\"><div class=\"task\"><span>1</span><p>จับคู่สีหน้ากับคำอารมณ์</p><textarea rows=\"2\" data-save=\"u6-work-1\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>2</span><p>วงภาพวิธีสงบใจที่ปลอดภัย</p><textarea rows=\"2\" data-save=\"u6-work-2\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>3</span><p>เติมคำในประโยค “ฉันรู้สึก… เพราะ…”</p><textarea rows=\"2\" data-save=\"u6-work-3\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>4</span><p>เลือกคำพูดสุภาพในสถานการณ์</p><textarea rows=\"2\" data-save=\"u6-work-4\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>5</span><p>วาดภาพสิ่งที่ช่วยให้ตนเองรู้สึกดีขึ้น</p><textarea rows=\"2\" data-save=\"u6-work-5\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div></div>", "keywords": "ใบงาน ตัวงานเด็ก ใบงานและตัวงานเด็ก หน่วย 6 · อารมณ์และสังคม"}, {"id": "u6-assessment", "title": "การประเมินและ Feedback ผู้ปกครอง", "group": "หน่วย 6 · อารมณ์และสังคม", "kind": "assessment", "body": "<h3 class=\"sub\">แบบสังเกตเบื้องต้น</h3><div class=\"checklist\"><label><input type=\"checkbox\" data-save=\"u6-assess-1\"><span>บอกอารมณ์พื้นฐานได้</span></label><label><input type=\"checkbox\" data-save=\"u6-assess-2\"><span>ยอมรับการช่วยหายใจหรือพักเมื่ออารมณ์แรง</span></label><label><input type=\"checkbox\" data-save=\"u6-assess-3\"><span>รอคิวช่วงสั้นได้</span></label><label><input type=\"checkbox\" data-save=\"u6-assess-4\"><span>ใช้คำพูดแทนการกระทำรุนแรงได้มากขึ้น</span></label></div><div class=\"feedback\"><h3>ข้อความ Feedback พร้อมใช้</h3><p>วันนี้เด็กได้ฝึก <b>อารมณ์และสังคม</b> และมี ไหวตามคำสั่งอย่างปลอดภัย ★ พัฒนาการร่างกาย: ภาพรวม หน่วย 7 · พัฒนาการร่างกาย"}, {"id": "u7-teach", "title": "ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร", "group": "หน่วย 7 · พัฒนาการร่างกาย", "kind": "teach", "body": "<p class=\"lead\">ใช้ขั้นตอนด้านล่างเป็นบทสอนได้ทันที ครูสามารถลดหรือเพิ่มรอบฝึกตามสมาธิและความพร้อมของเด็ก</p><div class=\"timeline\"><div class=\"step\"><div class=\"stage\">ตรวจพื้นที่</div><div><b>ครูทำอะไร</b><p>เก็บของเกะกะ วางเส้นทางและจุดหยุดให้ห่างกัน พร้อมบอกกติกาความปลอดภัย</p></div><div><b>เด็กทำอะไร</b><p>เด็กเดินสำรวจพื้นที่โดยยังไม่วิ่ง</p></div><div><b>เหตุผล</b><p>ลดอุบัติเหตุและสร้างความเข้าใจกติกา</p></div></div><div class=\"step\"><div class=\"stage\">อบอุ่นร่างกาย</div><div><b>ครูทำอะไร</b><p>นำยืดแขน หมุนไหล่ ย่อเข่า และเดินตามจังหวะ</p></div><div><b>เด็กทำอะไร</b><p>เด็กทำตามโดยเว้นระยะห่าง</p></div><div><b>เหตุผล</b><p>เตรียมกล้ามเนื้อและการฟัง</p></div></div><div class=\"step\"><div class=\"stage\">สาธิตทักษะ</div><div><b>ครูทำอะไร</b><p>แสดงการเดินตามเส้น มองไปข้างหน้า และกางแขนช่วยทรงตัว</p></div><div><b>เด็กทำอะไร</b><p>เด็กลองทีละคนหรือเป็นกลุ่มเล็ก</p></div><div><b>เหตุผล</b><p>ให้เห็นรูปแบบการเคลื่อนไหวที่ปลอดภัย</p></div></div><div class=\"step\"><div class=\"stage\">สร้างเส้นทาง</div><div><b>ครูทำอะไร</b><p>จัดเดิน–กระโดด–คลานแบบสั้น และอธิบายทีละสถานี</p></div><div><b>เด็กทำอะไร</b><p>เด็กผ่านเส้นทางตามลำดับ</p></div><div><b>เหตุผล</b><p>ฝึกลำดับและกล้ามเนื้อหลายส่วน</p></div></div><div class=\"step\"><div class=\"stage\">ผ่อนคลาย</div><div><b>ครูทำอะไร</b><p>ชวนหายใจช้า ยืดตัว และดื่มน้ำ</p></div><div><b>เด็กทำอะไร</b><p>เด็กบอกส่วนที่ตนทำได้ดี</p></div><div><b>เหตุผล</b><p>ช่วยคืนสภาพร่างกายและสร้างความภูมิใจ</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 7 · พัฒนาการร่างกาย"}, {"id": "u7-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 7 · พัฒนาการร่างกาย", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><l ><p>เด็กชี้ภาพตามสิ่งที่ครูทำ</p></div><div><b>เหตุผล</b><p>เชื่อมภาพกับการกระทำ</p></div></div><div class=\"step\"><div class=\"stage\">ทำพร้อมกัน</div><div><b>ครูทำอะไร</b><p>ให้เด็กทำทีละขั้น ครูใช้คำใบ้สั้น ๆ แทนการทำให้</p></div><div><b>เด็กทำอะไร</b><p>เด็กลงมือและย้อนดูภาพเมื่อจำไม่ได้</p></div><div><b>เหตุผล</b><p>สร้างความเป็นอิสระ</p></div></div><div class=\"step\"><div class=\"stage\">ฝึกในสถานการณ์จริง</div><div><b>ครูทำอะไร</b><p>นำทักษะไปใช้ก่อนอาหาร หลังเล่น หรือก่อนกลับบ้าน</p></div><div><b>เด็กทำอะไร</b><p>เด็กทำกิจวัตรในช่วงเวลาจริง</p></div><div><b>เหตุผล</b><p>ทำให้ทักษะใช้ได้จริง ไม่อยู่เฉพาะใบงาน</p></div></div><div class=\"step\"><div class=\"stage\">สะท้อนและเก็บงาน</div><div><b>ครูทำอะไร</b><p>ถามว่าขั้นใดยาก และให้เด็กติดดาวทักษะที่ทำเองได้</p></div><div><b>เด็กทำอะไร</b><p>เด็กบอกและจัดอุปกรณ์คืนที่</p></div><div><b>เหตุผล</b><p>ฝึกประเมินตนเองและความรับผิดชอบ</p></div></div></div>", "keywords": "ครูทำอะไร เด็กทำอะไร ขั้นสอน ขั้นสอนละเอียด: ครูทำอะไร–เด็กทำอะไร หน่วย 8 · ช่วยเหลือตนเอง"}, {"id": "u8-knowledge", "title": "ใบความรู้สำหรับผู้สอน", "group": "หน่วย 8 · ช่วยเหลือตนเอง", "kind": "content", "body": "<h3 class=\"sub\">สาระที่ควรรู้ก่อนสอน</h3><ul class=\"list\"><li>ทักษะช่วยเหลือตนเองสร้างความมั่นใจและความรับผิดชอบ</li><li>ผู้ใหญ่ควรสาธิตเป็นขั้น ใช้ภาพลำดับ และให้เวลามากพอ</li><li>ช่วยเฉพาะส่วนที่เด็กยังทำไม่ได้ แล้วค่อยลดการช่วย</li><li>ความสม่ำเสมอของกิจวัตรสำคัญกว่าความเร็ว</li></ul><div class=\"board\"><h3>ข้อความพร้อมใช้กับเด็ก</h3><p>“เราจะค่อย ๆ ลองทีละขั้น ไม่ต้องรีบ ทำไม่ได้ครั้งแรกไม่เป็นไร ครูจะช่วยด้วยคำใบ้ และหนูเลือกลองใหม่ได้”</p></div>", "keywords": "ใบความรู้ สาระสำคัญ ใบความรู้สำหรับผู้สอน หน่วย 8 · ช่วยเหลือตนเอง"}, {"id": "u8-activity", "title": "กิจกรรมหลักและเกมเสริม", "group": "หน่วย 8 · ช่วยเหลือตนเอง", "kind": "content", "body": "<div class=\"activity-card\"><span>กิจกรรมหลัก</span><h3>ฐานทำเองได้</h3><p>ฐานทำเองได้: ฐานล้างมือ ฐานติดกระดุม/รูดซิป ฐานพับผ้าผืนเล็ก และฐานเก็บของเล่น เด็กหมุนเวียนทีละฐาน</p></div><div class=\"activity-card game\"><span>เกมเสริม</span><h3>เรียงลำดับภารกิจ</h3><p>เรียงลำดับภารกิจ: แจกภาพขั้นตอนกิจวัตรแบบสลับ เด็กแข่งกับเวลาอย่างไม่กดดันเพื่อเรียงให้ถูก แล้วสาธิตจริงหนึ่งชุด</p></div><h3 class=\"sub\">วิธีสรุปหลังเล่น</h3><ul class=\"list\"><li>ถามว่าเด็กทำส่วนใดได้ดี</li><li>ให้เด็กบอกส่วนที่อยากลองใหม่</li><li>ครูสรุปทักษะด้วยประโยคสั้นและเชื่อมกับชีวิตประจำวัน</li></ul>", "keywords": "กิจกรรม เกม กิจกรรมหลักและเกมเสริม หน่วย 8 · ช่วยเหลือตนเอง"}, {"id": "u8-worksheet", "title": "ใบงานและตัวงานเด็ก", "group": "หน่วย 8 · ช่วยเหลือตนเอง", "kind": "worksheet", "body": "<p class=\"lead\">เลือกทำ 2–3 งานต่อครั้ง ไม่จำเป็นต้องทำครบในวันเดียว ช่องบันทึกด้านล่างจะเก็บข้อมูลไว้ในอุปกรณ์นี้</p><div class=\"tasks\"><div class=\"task\"><span>1</span><p>เรียงภาพขั้นตอนล้างมือ</p><textarea rows=\"2\" data-save=\"u8-work-1\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>2</span><p>วงของใช้ส่วนตัวและของใช้ร่วมกัน</p><textarea rows=\"2\" data-save=\"u8-work-2\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>3</span><p>จับคู่กิจกรรมกับอุปกรณ์</p><textarea rows=\"2\" data-save=\"u8-work-3\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>4</span><p>ระบายสีภาพเด็กเก็บของเข้าที่</p><textarea rows=\"2\" data-save=\"u8-work-4\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div><div class=\"task\"><span>5</span><p>ทำตารางติดดาว “วันนี้ฉันทำเองได้”</p><textarea rows=\"2\" data-save=\"u8-work-5\" placeholder=\"ครูจดผลงานหรือคำตอบของเด็ก...\"></textarea></div></div>", "keywords": "ใบงาน ตัวงานเด็ก ใบงานและตัวงานเด็ก หน่วย 8 · ช่วยเหลือตนเอง"}, {"id": "u8-assessment", "title": "การประเมินและ Feedback ผู้ปกครอง", "group": "หน่วย 8 · ช่วยเหลือตนเอง", "kind": "assessment", "body": "<h3 class=\"sub\">แบบสังเกตเบื้องต้น</h3><div class=\"checklist\"><label><input type=\"checkbox\" data-save=\"u8-assess-1\"><span>ทำตามภาพลำดับได้</span></label><label><input type=\"checkbox\" data-save=\"u8-assess-2\"><span>เริ่มลงมือด้วยตนเอง</span></label><label><input type=\"checkbox\" data-save=\"u8-assess-3\"><span>เก็บอุปกรณ์กลับตำแหน่ง</span></label><label><input type=\"checkbox\" data-save=\"u8-assess-4\"><span>ขอความช่วยเหลือด้วยคำพูดเหมาะสม</span></label></div><div class=\"feedback\"><h3>ข้อความ Feedback พร้อมใช้</h3><p>วันนี้เด็กได้ฝึก <b>ช่วยเหลือตนเอง</b> และมีความก้าวหน้าในด้าน ____________________ สิ่งที่ควรฝึกต่อคือ ____________________</p><textarea rows=\"4\" data-save=\"u8-feedback\" placeholder=\"บันทึกเฉพาะบุคคลสำหรับส่งผู้ปกครอง\"></textarea><h4>แนวทางส่งเสริมที่บ้าน</h4><p>กำหนดหน้าที่เล็ก ๆ ที่ทำเป็นประจำ เช่น เก็บรองเท้า วางจาน หรือจัดกระเป๋า ให้เวลาเด็กทำเอง แม้ช้าบ้าง และชมขั้นตอนที่ทำสำเร็จ</p></div>", "keywords": "ประเมิน ผู้ปกครอง feedback การประเมินและ Feedback ผู้ปกครอง หน่วย 8 · ช่วยเหลือตนเอง"}, {"id": "u8-image", "title": "ไอเดียภาพประกอบสำหรับหน่วยนี้", "group": "หน่วย 8 · ช่วยเหลือตนเอง", "kind": "prompt", "body": "<p class=\"lead\">ใช้ Prompt นี้เพื่อสร้างภาพประกอบที่เข้ากับโทน Little Steps แล้วนำไฟล์ภาพมาแทรกในหน้ากิจกรรมหรือใบงาน</p><div class=\"prompt-box\"><pre>self help skills illustration for young children, child washing hands, putting on shoes and storing toys in labeled baskets, step by step visual style, pastel blue yellow orange, clean white background, friendly educational design, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก Prompt</button></div><div class=\"image-guide\"><b>ตำแหน่งแนะนำ</b><span>ภาพปกหน่วย · การ์ดกิจกรรม · หน้าคั่นใบงาน · ภาพสถานการณ์สำหรับชวนคุย</span></div>", "keywords": "prompt เจนภาพ image ไอเดียภาพประกอบสำหรับหน่วยนี้ หน่วย 8 · ช่วยเหลือตนเอง"}, {"id": "worksheet-bank", "title": "คลังใบงานรวม", "group": "เครื่องมือเสริม", "kind": "content", "body": "<p class=\"lead\">เลือกใบงานตามทักษะ ไม่จำเป็นต้องเรียงตามหน่วย และควรจัดระดับจาก “ทำร่วมกับครู” → “ทำโดยมีคำใบ้” → “ทำเอง”</p><div class=\"three\"><div class=\"note\"><h3>ก่อนเขียนและอ่าน</h3><ul><li>ลากเส้น 6 แบบ</li><li>ต่อจุด 1–10</li><li>คัดเลขและคำสั้น</li><li>จับคู่ภาพกับคำ</li></ul></div><div class=\"note\"><h3>คิดและสื่อสาร</h3><ul><li>หาจุดต่าง</li><li>จัดหมวด</li><li>เรียงภาพ 3 ช่อง</li><li>เล่าภาพและตอบคำถาม</li></ul></div><div class=\"note\"><h3>ทักษะชีวิต</h3><ul><li>อารมณ์และคำพูด</li><li>ลำดับล้างมือ</li><li>ตารางทำเองได้</li><li>บันทึกกิจกรรมร่างกาย</li></ul></div></div>", "keywords": " คลังใบงานรวม เครื่องมือเสริม"}, {"id": "assessment-all", "title": "แบบสังเกตพัฒนาการรวม", "group": "เครื่องมือเสริม", "kind": "assessment", "body": "<p class=\"lead\">ประเมินจากพฤติกรรมหลายครั้งและหลายสถานการณ์ ใช้เพื่อดูความก้าวหน้าและเลือกกิจกรรมเสริม ไม่ใช้แทนการประเมินโดยผู้เชี่ยวชาญ</p><div class=\"rubric\"><div><b>ทำได้สม่ำเสมอ</b><span>ทำได้เองในสถานการณ์คุ้นเคย</span></div><div><b>ทำได้เมื่อมีคำใบ้</b><span>ต้องเตือนหรือสาธิตบางส่วน</span></div><div><b>กำลังพัฒนา</b><span>ยังต้องช่วยใกล้ชิดและฝึกซ้ำ</span></div></div><h3 class=\"sub\">บันทึกภาพรวม</h3><textarea class=\"big-area\" rows=\"9\" data-save=\"overall-assessment\" placeholder=\"จุดเด่นของเด็ก / สิ่งที่ควรเสริม / กิจกรรมที่ตอบสนองดี / แผนครั้งถัดไป\"></textarea>", "keywords": " แบบสังเกตพัฒนาการรวม เครื่องมือเสริม"}, {"id": "parent-feedback", "title": "แบบ Feedback สำหรับผู้ปกครอง", "group": "เครื่องมือเสริม", "kind": "worksheet", "body": "<div class=\"form-grid\"><label>ชื่อเด็ก<input data-save=\"parent-name\" placeholder=\"ชื่อ–นามสกุล\"></label><label>วันที่<input data-save=\"parent-date\" type=\"date\"></label><label>ด้านที่ฝึก<input data-save=\"parent-area\" placeholder=\"เช่น ฝึกเขียนพื้นฐาน\"></label><label>กิจกรรมที่ทำ<input data-save=\"parent-activity\" placeholder=\"เช่น เขียนจากภาพ\"></label></div><label class=\"wide-label\">ด้านที่ทำได้ดี<textarea rows=\"3\" data-save=\"parent-strength\"></textarea></label><label class=\"wide-label\">สิ่งที่ควรฝึกต่อ<textarea rows=\"3\" data-save=\"parent-next\"></textarea></label><label class=\"wide-label\">คำแนะนำสำหรับที่บ้าน<textarea rows=\"3\" data-save=\"parent-home\"></textarea></label><div class=\"actions\"><button type=\"button\" onclick=\"window.print()\">พิมพ์ / บันทึกเป็น PDF</button></div>", "keywords": " แบบ Feedback สำหรับผู้ปกครอง เครื่องมือเสริม"}, {"id": "prompt-library", "title": "คลัง Prompt ภาพประกอบ 8 หน่วย", "group": "เครื่องมือเสริม", "kind": "prompt", "body": "<p class=\"lead\">Prompt ทุกชุดออกแบบให้ได้ภาพพื้นขาว โทนฟ้า–เหลืองร่วมกับสีเสริม เหมาะกับการวางในเว็บไซต์และใบงาน</p><div class=\"prompt-grid\"><div class=\"prompt-mini\"><b>1. กล้ามเนื้อมัดเล็ก</b><pre>cute educational illustration for fine motor skills, happy preschool child tracing lines and using tweezers to sort colorful pom poms, clean white background, pastel blue yellow and soft pink palette, rounded shapes, friendly Thai educational website style, clear composition, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div><div class=\"prompt-mini\"><b>2. ฝึกเขียนพื้นฐาน</b><pre>adorable preschool handwriting practice illustration, child holding pencil correctly and tracing large simple lines on a worksheet, open learning table, pastel blue yellow and coral accents, clean modern educational style, white background, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div><div class=\"prompt-mini\"><b>3. ฝึกอ่านพื้นฐาน</b><pre>early reading illustration, preschool child matching picture cards with simple word cards, cute fish cat house and car icons, clean white background, pastel blue yellow palette, friendly modern learning graphic, no readable text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div><div class=\"prompt-mini\"><b>4. ฟังและพูด</b><pre>social communication learning illustration, preschool child listening to teacher and telling a story from three picture cards, speech bubbles without text, pastel blue yellow soft orange, clean educational website style, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div><div class=\"prompt-mini\"><b>5. คิดและสังเกต</b><pre>cute observation and thinking activity illustration, preschool children sorting toys by color and shape, magnifying glass, simple sequence cards, clean white background, pastel blue yellow green, friendly educational graphic, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div><div class=\"prompt-mini\"><b>6. อารมณ์และสังคม</b><pre>social emotional learning illustration for preschool children, diverse kids sharing toys and showing happy sad angry calm emotions, gentle supportive teacher, pastel blue yellow pink palette, clean professional educational poster style, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div><div class=\"prompt-mini\"><b>7. พัฒนาการร่างกาย</b><pre>gross motor activity illustration for preschool children, balancing on a colored line, jumping through hoops and tossing a soft ball, safe indoor activity area, pastel blue yellow green, clean friendly educational style, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div><div class=\"prompt-mini\"><b>8. ช่วยเหลือตนเอง</b><pre>self help skills illustration for young children, child washing hands, putting on shoes and storing toys in labeled baskets, step by step visual style, pastel blue yellow orange, clean white background, friendly educational design, no text</pre><button type=\"button\" onclick=\"copyPrompt(this)\">คัดลอก</button></div></div>", "keywords": " คลัง Prompt ภาพประกอบ 8 หน่วย เครื่องมือเสริม"}, {"id": "closing", "title": "สรุปการใช้งาน", "group": "เครื่องมือเสริม", "kind": "content", "body": "<div class=\"closing\"><img src=\"assets/logo.png\" alt=\"Little Steps\"><h2>ทุกก้าวเล็ก ๆ คือพัฒนาการ</h2><p>เลือกกิจกรรมให้เหมาะกับความพร้อม ฝึกอย่างสม่ำเสมอ รับฟังเด็ก และบันทึกความก้าวหน้าเพื่อเชื่อมการดูแลระหว่างครูกับผู้ปกครอง</p><div><button type=\"button\" onclick=\"go('map')\">กลับแผนที่พัฒนาการ</button><a href=\"index.html\">กลับหน้าหลัก</a></div></div>", "keywords": " สรุปการใช้งาน เครื่องมือเสริม"}];
const $=(q,r=document)=>r.querySelector(q), $$=(q,r=document)=>[...r.querySelectorAll(q)];
const MEM={}; const Store={get(k){try{return localStorage.getItem(k)}catch(e){return MEM[k]??null}},set(k,v){try{localStorage.setItem(k,v)}catch(e){MEM[k]=String(v)}}};
let current=decodeURIComponent(location.hash.slice(1))||Store.get('littleStepsEarlySlide')||'home';
if(!SLIDES.some(s=>s.id===current)) current='home';
function cover(){return `<div class="cover"><div><div class="kicker">✦ EARLY CHILDHOOD DEVELOPMENT</div><h1>พัฒนาการ<span>เด็กเล็ก</span></h1><p>ชุดกิจกรรมพร้อมใช้สำหรับครูและผู้ปกครอง ครอบคลุมการฝึกเขียน ฝึกอ่าน ฝึกฟัง–พูด ฝึกคิด กล้ามเนื้อ อารมณ์ สังคม และการช่วยเหลือตนเอง</p><div class="pills"><span class="pill">8 ด้านพัฒนาการ</span><span class="pill">ขั้นสอนละเอียด</span><span class="pill">ใบงาน + แบบสังเกต</span><span class="pill">Prompt ภาพพร้อมใช้</span></div><div class="cover-actions"><button onclick="go('map')">ดูแผนที่พัฒนาการ →</button><button class="secondary" onclick="go('u1-overview')">เริ่มหน่วยแรก</button></div></div><div class="cover-logo"><img src="assets/logo.png" alt="Little Steps ก้าวเล็ก พัฒนาการใหญ่"></div></div>`}
function renderNav(filter=''){
 const nav=$('.nav'); nav.innerHTML=''; let last=''; let n=0;
 const term=filter.trim().toLowerCase();
 SLIDES.forEach(s=>{if(term && !(s.keywords+' '+s.title+' '+s.body.replace(/<[^>]+>/g,' ')).toLowerCase().includes(term)) return;
   if(s.group!==last){const h=document.createElement('div');h.className='group-title';h.textContent=s.group;nav.appendChild(h);last=s.group}
   n++; const b=document.createElement('button');b.type='button';b.className='navbtn'+(s.id===current?' active':'');b.innerHTML=`<span class="navnum">${n}</span><span>${s.title}</span>`;b.onclick=()=>go(s.id);nav.appendChild(b)
 })
}
function render(){
 const i=Math.max(0,SLIDES.findIndex(s=>s.id===current)), s=SLIDES[i], el=$('.slide');
 if(s.kind==='cover'){el.innerHTML=`<div class="body">${cover()}</div><div class="footer"><span>Little Steps · ก้าวเล็ก พัฒนาการใหญ่</span><div><button class="arrow primary" onclick="next()">ถัดไป →</button></div></div>`}
 else{el.innerHTML=`<header class="banner"><div class="kicker">${s.group}</div><h1 class="title">${s.title}</h1></header><div class="body">${s.body}</div><footer class="footer"><span>Little Steps · พัฒนาการเด็กเล็ก</span><div><button class="arrow" onclick="prev()" ${i===0?'disabled':''}>← ก่อนหน้า</button><button class="arrow primary" onclick="next()" ${i===SLIDES.length-1?'disabled':''}>ถัดไป →</button></div></footer>`}
 $('.bar').style.width=((i+1)/SLIDES.length*100)+'%'; $('.page-no').textContent=`หน้า ${i+1}/${SLIDES.length}`; $('.dock span').textContent=s.title; document.title=`${s.title} · Little Steps`; Store.set('littleStepsEarlySlide',current); bindSave(); renderNav($('#search').value||''); closeMenu(); el.querySelector('.body')?.scrollTo(0,0)
}
function bindSave(){ $$('[data-save]').forEach(el=>{const k='littleStepsEarly-'+el.dataset.save;const saved=Store.get(k);if(el.type==='checkbox')el.checked=saved==='1';else if(saved!==null)el.value=saved;el.addEventListener('input',()=>Store.set(k,el.type==='checkbox'?(el.checked?'1':'0'):el.value))}) }
function go(id){if(!SLIDES.some(s=>s.id===id))return;current=id;history.pushState({id},'',`#${encodeURIComponent(id)}`);render()}
function prev(){const i=SLIDES.findIndex(s=>s.id===current);if(i>0)go(SLIDES[i-1].id)} function next(){const i=SLIDES.findIndex(s=>s.id===current);if(i<SLIDES.length-1)go(SLIDES[i+1].id)}
function toggleMenu(){document.body.classList.toggle('menu-open')} function closeMenu(){document.body.classList.remove('menu-open')}
function copyPrompt(btn){const txt=btn.closest('.prompt-box,.prompt-mini').querySelector('pre').innerText;navigator.clipboard?.writeText(txt).then(()=>toast('คัดลอก Prompt แล้ว')).catch(()=>{const r=document.createRange();r.selectNode(btn.previousElementSibling);const s=getSelection();s.removeAllRanges();s.addRange(r);document.execCommand('copy');toast('คัดลอก Prompt แล้ว')})}
function toast(t){const el=$('.toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1700)}
$('#search').addEventListener('input',e=>renderNav(e.target.value));window.addEventListener('popstate',()=>{current=decodeURIComponent(location.hash.slice(1))||'home';render()});document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')closeMenu()});let sx=0;$('.slide').addEventListener('touchstart',e=>sx=e.changedTouches[0].clientX,{passive:true});$('.slide').addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-sx;if(Math.abs(d)>70)(d<0?next:prev)()},{passive:true});render();
</script></body></html>
