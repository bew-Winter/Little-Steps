อธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Loop Dance</div><p class=\"content-p \">อุปกรณ์: บัตรท่าเต้น บัตร REPEAT และตัวเลข</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูวาง [ตบมือ–ก้าวขวา] ซ้ำ 3</li><li>เด็กทำและนับ iteration</li><li>กลุ่มสร้างท่า 2–3 คำสั่งแล้วใส่ลูป</li><li>อีกกลุ่มคลี่ลูปและทดสอบว่าตรงหรือไม่</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">clap</span><span class=\"chip\">step</span><span class=\"chip\">turn</span><span class=\"chip\">jump</span><span class=\"chip\">REPEAT 2</span><span class=\"chip\">REPEAT 4</span><span class=\"chip\">UNTIL music stops</span></div><p class=\"content-p question\">เกณฑ์คะแนน: จำนวนรอบถูก 1 + ขอบเขตลูปชัด 1 + ผลลัพธ์ตรง 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l7-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การทำซ้ำ: Loops","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ย่อคำสั่งซ้ำด้วย repeat จำนวนครั้งหรือทำซ้ำจนเงื่อนไขเป็นจริง และเปรียบเทียบความกระชับกับความถูกต้อง</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">loop</span><span class=\"chip\">repeat</span><span class=\"chip\">times</span><span class=\"chip\">until</span><span class=\"chip\">iteration</span><span class=\"chip\">pattern</span><span class=\"chip\">body</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>นับผลรวมจำนวนรอบ×การเคลื่อนที่ในหนึ่งรอบ</li><li>คำสั่งนอกลูปทำครั้งเดียว</li><li>เงื่อนไข until ตรวจหลัง/ก่อนตามกติกาที่กำหนดให้ชัด</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>หน้า 1 ช่อง ซ้ำ 4 ครั้ง</td><td>ไปข้างหน้า 4 ช่อง</td></tr><tr><td>ซ้ำ [หน้า,ขวา] 4 ครั้ง</td><td>เดินเป็นสี่เหลี่ยม</td></tr><tr><td>ทำจนถึงกำแพง แต่ไม่มีการเคลื่อนที่</td><td>อาจวนไม่จบ</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>นับผลรวมจำนวนรอบ×การเคลื่อนที่ในหนึ่งรอบ</li><li>คำสั่งนอกลูปทำครั้งเดียว</li><li>เงื่อนไข until ตรวจหลัง/ก่อนตามกติกาที่กำหนดให้ชัด</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ loop repeat times until iteration pattern body"},{"id":"l7-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การทำซ้ำ: Loops","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เขียนย่อ: หน้า หน้า หน้า หน้า</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. REPEAT 3 [ตบมือ 2 ครั้ง] ตบรวมกี่ครั้ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. คำสั่งหลังปิดวงเล็บทำกี่ครั้ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. อธิบาย infinite loop</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ออกแบบลูปวาดสี่เหลี่ยม</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เปรียบเทียบคำสั่งยาวกับลูป</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":7,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l7-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การทำซ้ำ: Loops","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>REPEAT 4 TIMES [หน้า]</td></tr><tr><td>2</td><td>6 ครั้ง</td></tr><tr><td>3</td><td>ทำตามตำแหน่ง; ถ้าอยู่นอกลูปทำครั้งเดียว</td></tr><tr><td>4</td><td>การทำซ้ำที่ไม่มีเงื่อนไข/ทางหยุด</td></tr><tr><td>5</td><td>REPEAT 4 [เดินหน้าเท่ากัน, หันขวา 90°]</td></tr><tr><td>6</td><td>ลูปสั้น ตรวจง่าย ลดการเขียนซ้ำ แต่ต้องกำหนดขอบเขตถูก</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเข้าใจการทำซ้ำและคลี่ลูปได้ ควรฝึกวงเล็บว่าคำสั่งใดอยู่ในลูป และตรวจว่าลูปมีทางหยุด</p></div>","lessonNo":7,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l8-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 8: ตัวแปรและข้อมูลในกล่อง","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">เข้าใจตัวแปรเป็นกล่องมีชื่อที่เก็บค่าและเปลี่ยนค่าได้ ใช้ติดตามคะแนน จำนวน หรือสถานะผ่านกิจกรรมกระดาษ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/2</span><span class=\"chip\">ว 4.2 ป.4/4</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>เครื่องหมาย = ในคำสั่งอาจหมายถึงนำค่าด้านขวาไปเก็บด้านซ้าย</li><li>ค่าเดิมถูกแทนเมื่อ set ใหม่</li><li>ต้องติดตามค่าทีละคำสั่ง</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":8,"teacherOnly":false,"icon":"◎","search":"variable name value set update score data state"},{"id":"l8-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ตัวแปรและข้อมูลในกล่อง","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ตัวแปรคล้ายอะไร</li><li>score เริ่ม 2 เพิ่ม 1 เป็นเท่าไร</li><li>SET ต่างจาก UPDATE อย่างไร</li><li>ชื่อ x กับ score แบบใดชัดกว่า</li><li>ตัวแปรเก็บข้อความได้ไหม</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “เกมกระดานต้องนับคะแนนและพลังชีวิตโดยไม่มีเครื่องคิดเลข เด็กเป็น “หน่วยความจำ” ถือกล่องตัวแปรและอัปเดตตามเหตุการณ์” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ตัวแปรมีชื่อและค่าปัจจุบัน</li><li>SET score = 0 คือกำหนดค่า</li><li>score = score + 1 คืออัปเดตจากค่าเดิม</li><li>ชื่อควรสื่อความหมายและไม่ซ้ำในบริบทเดียวกัน</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>score=0; score=score+1</td><td>ค่าใหม่ 1</td></tr><tr><td>lives=3; lives=lives-1</td><td>ค่าใหม่ 2</td></tr><tr><td>name=&quot;Mali&quot;</td><td>เก็บข้อมูลข้อความ</td></tr></tbody></table></div>","lessonNo":8,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l8-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ตัวแปรและข้อมูลในกล่อง","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ใช้ซองกระดาษแทนตัวแปร</li><li>ทำ trace table ค่าแต่ละรอบ</li><li>ตรวจคำสั่ง update ที่ใช้ค่าเดิม</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Human Memory Boxes</div><p class=\"content-p \">อุปกรณ์: ซองเขียนชื่อ score/lives/level และบัตรค่าตัวเลข</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ใส่ค่าเริ่มต้นในแต่ละซอง</li><li>ครูอ่านเหตุการณ์ เช่น ได้ดาว score+2</li><li>เด็กเปิดซอง คำนวณจากค่าเดิม แล้วแทนบัตรค่าใหม่</li><li>เพื่อนบันทึก trace และตรวจว่าตรงกัน</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">SET score=0</span><span class=\"chip\">score=score+1</span><span class=\"chip\">score=score+5</span><span class=\"chip\">lives=lives-1</span><span class=\"chip\">level=level+1</span></div><p class=\"content-p question\">เกณฑ์คะแนน: อ่านค่าเดิมถูก 1 + อัปเดตถูก 1 + บันทึก trace 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":8,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l8-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ตัวแปรและข้อมูลในกล่อง","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เข้าใจตัวแปรเป็นกล่องมีชื่อที่เก็บค่าและเปลี่ยนค่าได้ ใช้ติดตามคะแนน จำนวน หรือสถานะผ่านกิจกรรมกระดาษ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">variable</span><span class=\"chip\">name</span><span class=\"chip\">value</span><span class=\"chip\">set</span><span class=\"chip\">update</span><span class=\"chip\">score</span><span class=\"chip\">data</span><span class=\"chip\">state</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>เครื่องหมาย = ในคำสั่งอาจหมายถึงนำค่าด้านขวาไปเก็บด้านซ้าย</li><li>ค่าเดิมถูกแทนเมื่อ set ใหม่</li><li>ต้องติดตามค่าทีละคำสั่ง</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>score=0; score=score+1</td><td>ค่าใหม่ 1</td></tr><tr><td>lives=3; lives=lives-1</td><td>ค่าใหม่ 2</td></tr><tr><td>name=&quot;Mali&quot;</td><td>เก็บข้อมูลข้อความ</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>เครื่องหมาย = ในคำสั่งอาจหมายถึงนำค่าด้านขวาไปเก็บด้านซ้าย</li><li>ค่าเดิมถูกแทนเมื่อ set ใหม่</li><li>ต้องติดตามค่าทีละคำสั่ง</li></ul></div>","lessonNo":8,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ variable name value set update score data state"},{"id":"l8-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ตัวแปรและข้อมูลในกล่อง","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. score=3 แล้ว score=score+2 ค่าใหม่</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. lives=2 แล้ว lives=lives-1 ค่าใหม่</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. SET score=0 ทำอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ทำตาราง trace 5 คำสั่ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l8-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ตั้งชื่อตัวแปรเก็บจำนวนหนังสือ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l8-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. ออกแบบกติกาคะแนนเกม 3 เหตุการณ์</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l8-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l8-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":8,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l8-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ตัวแปรและข้อมูลในกล่อง","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>5</td></tr><tr><td>2</td><td>1</td></tr><tr><td>3</td><td>กำหนด/แทนค่าตัวแปร score เป็น 0</td></tr><tr><td>4</td><td>ค่าหลังแต่ละขั้นถูก</td></tr><tr><td>5</td><td>bookCount / numberOfBooks หรือชื่อสื่อความหมาย</td></tr><tr><td>6</td><td>ระบุค่าเพิ่ม/ลดชัดเจน</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนติดตามค่าตัวแปรทีละขั้นได้ดี ควรฝึกอ่านคำสั่ง score = score + 1 ว่า “นำค่าเดิมมาบวกหนึ่งแล้วเก็บกลับ”</p></div>","lessonNo":8,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l9-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 9: ข้อมูลแบบเลขฐานสองและการเข้ารหัสภาพ","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">เห็นว่าข้อมูลสามารถแทนด้วยสัญลักษณ์สองค่า เช่น 0/1 และใช้ตารางพิกเซลสร้างภาพโดยไม่ต้องใช้เครื่องคอมพิวเตอร์</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/4</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>0 ไม่ได้แปลว่า “ไม่มีค่า” เสมอ แต่เป็นสัญลักษณ์ตามกติกา</li><li>เปลี่ยนกติกาแล้วภาพเปลี่ยน</li><li>จำนวนพิกเซลมากช่วยแสดงรายละเอียดมากขึ้น</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":9,"teacherOnly":false,"icon":"◎","search":"binary bit 0 1 pixel code encode decode"},{"id":"l9-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ข้อมูลแบบเลขฐานสองและการเข้ารหัสภาพ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>binary ใช้สัญลักษณ์ใด</li><li>ต้องรู้กติกาก่อน decode ไหม</li><li>pixel คืออะไร</li><li>ตาราง 5×5 มีกี่ช่อง</li><li>0 แปลว่าขาวเสมอไหม</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “พิพิธภัณฑ์ส่งข้อความภาพเป็นแถว 0 และ 1 เด็กต้องถอดรหัสและตรวจว่ามีบิตใดคัดลอกผิด” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ระบบสองค่าใช้ 0 และ 1 แทนสถานะ เช่น ปิด/เปิด</li><li>หนึ่งช่องข้อมูลเรียก bit แบบเบื้องต้น</li><li>ภาพดิจิทัลประกอบจากจุดเล็ก ๆ หรือพิกเซล</li><li>ต้องตกลงกติกา เช่น 0=ขาว 1=ดำ ก่อนถอดรหัส</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>101 / 010 / 101</td><td>ถ้า 1=ดำ ได้ลวดลาย X</td></tr><tr><td>0=ปิด 1=เปิด</td><td>แทนสถานะสวิตช์</td></tr><tr><td>ตาราง 4×4</td><td>มี 16 พิกเซล/บิตสีสองค่า</td></tr></tbody></table></div>","lessonNo":9,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l9-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ข้อมูลแบบเลขฐานสองและการเข้ารหัสภาพ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ระบายตารางตามรหัส</li><li>เขียนรหัสจากภาพ</li><li>เปรียบเทียบภาพความละเอียดต่ำ/สูง</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Pixel Art Mail</div><p class=\"content-p \">อุปกรณ์: ตาราง 8×8 ดินสอดำ บัตรรหัส และซองจดหมาย</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ตกลง 1=ระบาย 0=เว้น</li><li>คน A วาดภาพลับบนตารางและเขียนรหัสทีละแถว</li><li>คน B รับเฉพาะรหัสแล้วถอดภาพ</li><li>เทียบภาพและหาตำแหน่งบิตที่ผิดถ้าไม่ตรง</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">heart 5×5</span><span class=\"chip\">arrow 5×5</span><span class=\"chip\">letter A 5×5</span><span class=\"chip\">smiley 8×8</span></div><p class=\"content-p question\">เกณฑ์คะแนน: เข้ารหัสครบแถว 1 + ถอดตรง 2 + หา bit ผิด 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":9,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l9-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ข้อมูลแบบเลขฐานสองและการเข้ารหัสภาพ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เห็นว่าข้อมูลสามารถแทนด้วยสัญลักษณ์สองค่า เช่น 0/1 และใช้ตารางพิกเซลสร้างภาพโดยไม่ต้องใช้เครื่องคอมพิวเตอร์</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">binary</span><span class=\"chip\">bit</span><span class=\"chip\">0</span><span class=\"chip\">1</span><span class=\"chip\">pixel</span><span class=\"chip\">code</span><span class=\"chip\">encode</span><span class=\"chip\">decode</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>0 ไม่ได้แปลว่า “ไม่มีค่า” เสมอ แต่เป็นสัญลักษณ์ตามกติกา</li><li>เปลี่ยนกติกาแล้วภาพเปลี่ยน</li><li>จำนวนพิกเซลมากช่วยแสดงรายละเอียดมากขึ้น</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>101 / 010 / 101</td><td>ถ้า 1=ดำ ได้ลวดลาย X</td></tr><tr><td>0=ปิด 1=เปิด</td><td>แทนสถานะสวิตช์</td></tr><tr><td>ตาราง 4×4</td><td>มี 16 พิกเซล/บิตสีสองค่า</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>0 ไม่ได้แปลว่า “ไม่มีค่า” เสมอ แต่เป็นสัญลักษณ์ตามกติกา</li><li>เปลี่ยนกติกาแล้วภาพเปลี่ยน</li><li>จำนวนพิกเซลมากช่วยแสดงรายละเอียดมากขึ้น</li></ul></div>","lessonNo":9,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ binary bit 0 1 pixel code encode decode"},{"id":"l9-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ข้อมูลแบบเลขฐานสองและการเข้ารหัสภาพ","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เมื่อ 1=ดำ ถอด 101</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ตาราง 4×6 มีกี่พิกเซล</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ทำไมต้องบอกกติกา 0/1</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ถอดรหัสภาพ 5×5 ที่กำหนด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l9-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. สร้างภาพ 5×5 และเขียนรหัส</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l9-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบายผลของเพิ่มจำนวนพิกเซล</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l9-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l9-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":9,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l9-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ข้อมูลแบบเลขฐานสองและการเข้ารหัสภาพ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ดำ–ขาว–ดำ</td></tr><tr><td>2</td><td>24</td></tr><tr><td>3</td><td>เพื่อให้ผู้ส่งและรับตีความเหมือนกัน</td></tr><tr><td>4</td><td>ภาพตามรหัส</td></tr><tr><td>5</td><td>รหัสตรงกับภาพ</td></tr><tr><td>6</td><td>แสดงรายละเอียดได้มากขึ้น แต่ข้อมูลมากขึ้น</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเข้าใจการแทนข้อมูลด้วยสองสถานะและถอดรหัสพิกเซลได้ดี ลองสร้างภาพ 8×8 ส่งให้คนในครอบครัวถอดรหัส</p></div>","lessonNo":9,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l10-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 10: การค้นหาอย่างเป็นระบบ","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">เปรียบเทียบการค้นหาแบบตรวจทีละรายการกับการแบ่งครึ่งในข้อมูลที่เรียงแล้ว และเลือกวิธีตามลักษณะข้อมูล</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>binary search ใช้กับกองบัตรสลับไม่ได้</li><li>ข้อมูลน้อย linear อาจง่ายกว่า</li><li>การเรียงมีต้นทุนเวลาแต่ช่วยค้นหลายครั้ง</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":10,"teacherOnly":false,"icon":"◎","search":"search linear search binary search sorted target comparison efficient"},{"id":"l10-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การค้นหาอย่างเป็นระบบ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>linear ตรวจอย่างไร</li><li>binary ต้องมีเงื่อนไขอะไร</li><li>วัดประสิทธิภาพด้วยอะไร</li><li>ข้อมูล 5 ใบควรใช้แบบใดก็ได้ไหม</li><li>ทำไมสมุดโทรศัพท์เรียงตัวอักษร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “บรรณารักษ์ต้องหาหนังสือจำนวนมาก เด็กทดลองสองวิธีและนับจำนวนครั้งเพื่อเสนอระบบชั้นหนังสือ” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>Linear search ตรวจจากต้นไปทีละรายการ ใช้ได้แม้ข้อมูลไม่เรียง</li><li>Binary search แบ่งครึ่ง ใช้ได้เมื่อข้อมูลเรียง</li><li>นับจำนวนครั้งเปรียบเทียบเพื่อวัดประสิทธิภาพ</li><li>ก่อนเลือกวิธีต้องดูว่าข้อมูลเรียงหรือไม่</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>หา 9 ใน [2,5,9,12] แบบ linear</td><td>เทียบ 3 ครั้ง</td></tr><tr><td>หา 70 ในเลขเรียง 1–100 แบบแบ่งครึ่ง</td><td>ตัดครึ่งช่วงซ้ำ</td></tr><tr><td>รายชื่อไม่เรียง</td><td>ใช้ linear หรือเรียงก่อน</td></tr></tbody></table></div>","lessonNo":10,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l10-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การค้นหาอย่างเป็นระบบ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ค้นบัตรเลขไม่เรียงแบบทีละใบ</li><li>เรียงบัตรแล้วเล่น higher/lower แบ่งครึ่ง</li><li>บันทึกจำนวน comparisons</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Guess My Number Search Lab</div><p class=\"content-p \">อุปกรณ์: บัตรเลข 1–32 ตารางคะแนน และป้าย higher/lower</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>รอบ 1 วางบัตรสลับและค้นจากซ้ายไปขวา</li><li>รอบ 2 เรียงเลขและเลือกค่ากลาง</li><li>ผู้ถือเป้าหมายตอบ higher/lower</li><li>เปรียบเทียบจำนวนครั้งหลายเป้าหมายและสรุป</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">target 3</span><span class=\"chip\">target 17</span><span class=\"chip\">target 29</span><span class=\"chip\">unsorted deck</span><span class=\"chip\">sorted deck</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ใช้วิธีตามกติกา 1 + นับ comparisons 1 + เลือกวิธีมีเหตุผล 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":10,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l10-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การค้นหาอย่างเป็นระบบ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เปรียบเทียบการค้นหาแบบตรวจทีละรายการกับการแบ่งครึ่งในข้อมูลที่เรียงแล้ว และเลือกวิธีตามลักษณะข้อมูล</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">search</span><span class=\"chip\">linear search</span><span class=\"chip\">binary search</span><span class=\"chip\">sorted</span><span class=\"chip\">target</span><span class=\"chip\">comparison</span><span class=\"chip\">efficient</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>binary search ใช้กับกองบัตรสลับไม่ได้</li><li>ข้อมูลน้อย linear อาจง่ายกว่า</li><li>การเรียงมีต้นทุนเวลาแต่ช่วยค้นหลายครั้ง</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>หา 9 ใน [2,5,9,12] แบบ linear</td><td>เทียบ 3 ครั้ง</td></tr><tr><td>หา 70 ในเลขเรียง 1–100 แบบแบ่งครึ่ง</td><td>ตัดครึ่งช่วงซ้ำ</td></tr><tr><td>รายชื่อไม่เรียง</td><td>ใช้ linear หรือเรียงก่อน</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>binary search ใช้กับกองบัตรสลับไม่ได้</li><li>ข้อมูลน้อย linear อาจง่ายกว่า</li><li>การเรียงมีต้นทุนเวลาแต่ช่วยค้นหลายครั้ง</li></ul></div>","lessonNo":10,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ search linear search binary search sorted target comparison efficient"},{"id":"l10-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การค้นหาอย่างเป็นระบบ","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. linear search ทำอย่างไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l10-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. binary search ใช้ได้เมื่อใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l10-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. หาเป้าหมายตัวแรกในรายการ linear ใช้กี่ครั้ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l10-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ทดลองค้นเลขหนึ่งค่าและบันทึก comparisons</label><input type=\"text\" class=\"response-input \" data-save-key=\"l10-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ข้อมูลรายชื่อไม่เรียง 20 คน ควรทำอย่างไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l10-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบาย trade-off ของการเรียง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l10-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l10-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":10,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l10-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การค้นหาอย่างเป็นระบบ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ตรวจรายการทีละตัวตามลำดับจนพบ/หมด</td></tr><tr><td>2</td><td>ข้อมูลเรียงลำดับแล้ว</td></tr><tr><td>3</td><td>1 ครั้ง</td></tr><tr><td>4</td><td>ตามการทดลอง</td></tr><tr><td>5</td><td>linear หรือเรียงก่อนหากต้องค้นหลายครั้ง</td></tr><tr><td>6</td><td>เสียเวลาเตรียม แต่ค้นซ้ำได้เร็ว/เป็นระบบขึ้น</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเปรียบเทียบวิธีค้นจากจำนวนครั้งได้และรู้ว่า binary search ต้องใช้ข้อมูลเรียง ลองเล่นทายเลข 1–100 ด้วยคำใบ้สูงกว่า/ต่ำกว่า</p></div>","lessonNo":10,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l11-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 11: การเรียงลำดับข้อมูล","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">จัดข้อมูลตามเกณฑ์และจำลองวิธี bubble sort อย่างง่าย โดยเปรียบเทียบคู่ติดกันและทำซ้ำจนเรียงครบ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/4</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>เกณฑ์ต่างกันได้ผลเรียงต่างกัน</li><li>ค่าซ้ำต้องไม่หาย</li><li>ตรวจหลังจบว่าทุกคู่เป็นลำดับ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":11,"teacherOnly":false,"icon":"◎","search":"sort ascending descending compare swap pass criterion"},{"id":"l11-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การเรียงลำดับข้อมูล","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ascending คืออะไร</li><li>swap คืออะไร</li><li>bubble เปรียบเทียบคู่แบบใด</li><li>เมื่อไรหยุด</li><li>ค่าซ้ำควรหายไหม</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ศูนย์กีฬาได้รับบัตรนักวิ่งปะปน ต้องเรียงตามเวลาโดยไม่ทำชื่อกับเวลาแยกจากกัน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ต้องกำหนดเกณฑ์ เช่น เลขน้อย→มาก หรือชื่อ A→Z</li><li>Bubble sort เปรียบเทียบคู่ติดกันและสลับเมื่อผิดลำดับ</li><li>ทำหลาย pass จนไม่มีการสลับ</li><li>เก็บข้อมูลแต่ละรายการให้ครบเมื่อย้ายตำแหน่ง</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>[4,2,3] pass แรก</td><td>เปรียบ 4/2 สลับ → [2,4,3]; 4/3 สลับ → [2,3,4]</td></tr><tr><td>เรียงส่วนสูง</td><td>ต้องระบุเตี้ย→สูงหรือสูง→เตี้ย</td></tr><tr><td>ข้อมูลนักเรียน</td><td>ย้ายชื่อพร้อมคะแนน ห้ามแยกกัน</td></tr></tbody></table></div>","lessonNo":11,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l11-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การเรียงลำดับข้อมูล","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เรียงคนถือบัตรตัวเลข</li><li>ทำ pass ทีละรอบ</li><li>เปลี่ยนเกณฑ์ ascending/descending</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Human Bubble Sort</div><p class=\"content-p \">อุปกรณ์: บัตรตัวเลขคล้องคอ พื้นที่แถว และตารางบันทึก pass</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็ก 6 คนยืนถือเลขสลับกัน</li><li>เริ่มซ้าย เปรียบเทียบคู่ติดกันและสลับหากซ้ายมากกว่า</li><li>ทำต่อถึงท้ายแถว เรียกหนึ่ง pass</li><li>เริ่มใหม่จน pass หนึ่งไม่มีการสลับ แล้วอธิบายเหตุหยุด</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">8</span><span class=\"chip\">3</span><span class=\"chip\">5</span><span class=\"chip\">1</span><span class=\"chip\">7</span><span class=\"chip\">3</span></div><p class=\"content-p question\">เกณฑ์คะแนน: เปรียบคู่ถูก 1 + บันทึกแต่ละ pass 1 + รู้เงื่อนไขหยุด 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":11,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l11-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การเรียงลำดับข้อมูล","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">จัดข้อมูลตามเกณฑ์และจำลองวิธี bubble sort อย่างง่าย โดยเปรียบเทียบคู่ติดกันและทำซ้ำจนเรียงครบ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">sort</span><span class=\"chip\">ascending</span><span class=\"chip\">descending</span><span class=\"chip\">compare</span><span class=\"chip\">swap</span><span class=\"chip\">pass</span><span class=\"chip\">criterion</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>เกณฑ์ต่างกันได้ผลเรียงต่างกัน</li><li>ค่าซ้ำต้องไม่หาย</li><li>ตรวจหลังจบว่าทุกคู่เป็นลำดับ</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>[4,2,3] pass แรก</td><td>เปรียบ 4/2 สลับ → [2,4,3]; 4/3 สลับ → [2,3,4]</td></tr><tr><td>เรียงส่วนสูง</td><td>ต้องระบุเตี้ย→สูงหรือสูง→เตี้ย</td></tr><tr><td>ข้อมูลนักเรียน</td><td>ย้ายชื่อพร้อมคะแนน ห้ามแยกกัน</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>เกณฑ์ต่างกันได้ผลเรียงต่างกัน</li><li>ค่าซ้ำต้องไม่หาย</li><li>ตรวจหลังจบว่าทุกคู่เป็นลำดับ</li></ul></div>","lessonNo":11,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ sort ascending descending compare swap pass criterion"},{"id":"l11-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การเรียงลำดับข้อมูล","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เรียง 5,2,8,1 จากน้อยไปมาก</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เรียงจากมากไปน้อยเรียกว่า</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ทำ bubble pass แรกของ 4,1,3</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ทำไมต้องย้ายชื่อพร้อมคะแนน</label><input type=\"text\" class=\"response-input \" data-save-key=\"l11-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. บันทึกทุก pass ของ 6,2,4,1</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l11-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. สร้างเกณฑ์เรียงหนังสือ 2 แบบ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l11-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l11-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":11,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l11-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การเรียงลำดับข้อมูล","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>1,2,5,8</td></tr><tr><td>2</td><td>descending</td></tr><tr><td>3</td><td>1,3,4</td></tr><tr><td>4</td><td>เป็นข้อมูลรายการเดียวกัน หากแยกจะผิดคน</td></tr><tr><td>5</td><td>ลำดับแต่ละรอบจน 1,2,4,6</td></tr><tr><td>6</td><td>ชื่อ ก–ฮ / ความสูง / หมวด / เลขเรียก ฯลฯ</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเรียงข้อมูลอย่างเป็นระบบและเข้าใจการสลับคู่ติดกัน ควรฝึกบันทึกแต่ละ pass เพื่อไม่ข้ามการเปรียบเทียบ</p></div>","lessonNo":11,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l12-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 12: เครือข่ายและการส่งข้อมูล","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">เข้าใจแนวคิดเครือข่าย แพ็กเก็ต เส้นทาง และความผิดพลาดผ่านเกมส่งข้อความด้วยกระดาษ โดยไม่ใช้เครื่องคอมพิวเตอร์</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>อินเทอร์เน็ตไม่ใช่เมฆลึกลับ แต่เป็นเครือข่ายจำนวนมาก</li><li>packet อาจมาถึงคนละลำดับ</li><li>ไม่ควรส่งข้อมูลส่วนตัวโดยไม่จำเป็น</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":12,"teacherOnly":false,"icon":"◎","search":"network node link packet address route sender receiver"},{"id":"l12-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"เครือข่ายและการส่งข้อมูล","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>node คืออะไร</li><li>packet ต้องมีข้อมูลใด</li><li>ถ้ามาถึงสลับลำดับทำอย่างไร</li><li>ทางหนึ่งปิดข้อมูลยังไปได้ไหม</li><li>ข้อมูลใดไม่ควรใส่ในการ์ดสาธารณะ</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “เมืองกระดาษต้องส่งข่าวจากโรงเรียนไปโรงพยาบาลผ่านจุดส่งหลายแห่ง โดยมีถนนปิดและการ์ดอาจสลับลำดับ” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>เครือข่ายประกอบด้วยจุดเชื่อม (node) และเส้นทาง (link)</li><li>ข้อมูลแบ่งเป็นส่วนย่อยหรือ packet ได้</li><li>packet ต้องมีที่อยู่/ลำดับเพื่อประกอบกลับ</li><li>หลายเส้นทางช่วยเมื่อทางหนึ่งขัดข้อง</li><li>การตรวจความครบช่วยลดข้อมูลหาย</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>ข้อความ 12 คำแบ่ง 3 packet</td><td>แต่ละใบมีลำดับ 1/3,2/3,3/3</td></tr><tr><td>ทาง A ปิด</td><td>เลือกเส้นทาง B</td></tr><tr><td>packet หายหนึ่งใบ</td><td>ผู้รับรู้จากเลขลำดับและขอส่งใหม่</td></tr></tbody></table></div>","lessonNo":12,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l12-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"เครือข่ายและการส่งข้อมูล","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>สร้างแผนที่ node/link</li><li>แบ่งข้อความเป็น packet</li><li>จำลองเส้นทางและการขอส่งใหม่</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Paper Packet Network</div><p class=\"content-p \">อุปกรณ์: ป้าย node เชือก link ซอง packet และบัตร road closed</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กยืนเป็น node เชื่อมด้วยเชือก</li><li>ผู้ส่งแบ่งข้อความ 3 packet ใส่ที่อยู่และเลขลำดับ</li><li>ส่งต่อได้ทีละ link ครูสุ่มปิดทาง/ทำ packet ช้า</li><li>ผู้รับเรียง ตรวจครบ และขอส่งใหม่หากขาด</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">packet 1/3</span><span class=\"chip\">packet 2/3</span><span class=\"chip\">packet 3/3</span><span class=\"chip\">route closed</span><span class=\"chip\">delay</span><span class=\"chip\">wrong address</span></div><p class=\"content-p question\">เกณฑ์คะแนน: จ่าหน้าครบ 1 + เลือกเส้นทาง 1 + ตรวจ/ประกอบข้อความ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":12,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l12-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: เครือข่ายและการส่งข้อมูล","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เข้าใจแนวคิดเครือข่าย แพ็กเก็ต เส้นทาง และความผิดพลาดผ่านเกมส่งข้อความด้วยกระดาษ โดยไม่ใช้เครื่องคอมพิวเตอร์</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">network</span><span class=\"chip\">node</span><span class=\"chip\">link</span><span class=\"chip\">packet</span><span class=\"chip\">address</span><span class=\"chip\">route</span><span class=\"chip\">sender</span><span class=\"chip\">receiver</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>อินเทอร์เน็ตไม่ใช่เมฆลึกลับ แต่เป็นเครือข่ายจำนวนมาก</li><li>packet อาจมาถึงคนละลำดับ</li><li>ไม่ควรส่งข้อมูลส่วนตัวโดยไม่จำเป็น</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>ข้อความ 12 คำแบ่ง 3 packet</td><td>แต่ละใบมีลำดับ 1/3,2/3,3/3</td></tr><tr><td>ทาง A ปิด</td><td>เลือกเส้นทาง B</td></tr><tr><td>packet หายหนึ่งใบ</td><td>ผู้รับรู้จากเลขลำดับและขอส่งใหม่</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>อินเทอร์เน็ตไม่ใช่เมฆลึกลับ แต่เป็นเครือข่ายจำนวนมาก</li><li>packet อาจมาถึงคนละลำดับ</li><li>ไม่ควรส่งข้อมูลส่วนตัวโดยไม่จำเป็น</li></ul></div>","lessonNo":12,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ network node link packet address route sender receiver"},{"id":"l12-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"เครือข่ายและการส่งข้อมูล","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. node และ link ต่างกันอย่างไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ทำไม packet ต้องมีลำดับ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ถ้า packet 2/3 หาย ผู้รับรู้ได้อย่างไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. วาดเครือข่าย 5 node ที่มีทางสำรอง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l12-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เลือกเส้นทางเมื่อ link หนึ่งปิด</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l12-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนข้อมูลที่ควร/ไม่ควรส่งสาธารณะ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l12-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l12-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":12,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l12-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"เครือข่ายและการส่งข้อมูล","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>node คือจุด/อุปกรณ์; link คือทางเชื่อม</td></tr><tr><td>2</td><td>เพื่อประกอบกลับถูกแม้มาถึงสลับ</td></tr><tr><td>3</td><td>เห็นเลข 1/3 และ 3/3 แต่ขาด 2/3</td></tr><tr><td>4</td><td>กราฟเชื่อมและมีมากกว่าหนึ่งเส้นทาง</td></tr><tr><td>5</td><td>เส้นทางอื่นที่ยังเชื่อมถึงปลายทาง</td></tr><tr><td>6</td><td>ข้อความทั่วไปได้; รหัสผ่าน ที่อยู่ละเอียด ข้อมูลส่วนตัวไม่ควร</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเข้าใจการส่งข้อมูลเป็นส่วนและการมีเส้นทางสำรอง ควรย้ำว่าเครือข่ายส่งข้อมูลได้ แต่ผู้ใช้ต้องเลือกข้อมูลที่จะส่งอย่างปลอดภัย</p></div>","lessonNo":12,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l13-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 13: ค้นข้อมูลและประเมินความน่าเชื่อถือ","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ตั้งคำค้นที่เจาะจงและประเมินข้อมูลด้วยผู้เขียน วันที่ หลักฐาน จุดประสงค์ และการเปรียบเทียบหลายแหล่ง โดยใช้บัตรบทความจำลอง</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>เว็บสวยไม่รับประกันข้อมูลถูก</li><li>ข้อมูลเก่าอาจไม่เหมาะกับคำถามปัจจุบัน</li><li>ผู้เขียนมีผลประโยชน์อาจมีอคติ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":13,"teacherOnly":false,"icon":"◎","search":"keyword source author date evidence fact opinion reliable"},{"id":"l13-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ค้นข้อมูลและประเมินความน่าเชื่อถือ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>คำค้นที่ดีประกอบด้วยอะไร</li><li>fact ต่างจาก opinion อย่างไร</li><li>ควรตรวจวันที่ไหม</li><li>แหล่งเดียวพอทุกกรณีไหม</li><li>ชื่อผู้เขียนสำคัญอย่างไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “มีบัตรข่าวสามใบพูดเรื่องเดียวกันแต่ข้อมูลไม่ตรง เด็กต้องเลือกแหล่งที่ควรเชื่อก่อนและอธิบายด้วยเกณฑ์” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>คำค้นควรมีหัวข้อ + รายละเอียดสำคัญ</li><li>ตรวจว่าใครเขียน เผยแพร่เมื่อใด และมีหลักฐานอะไร</li><li>แยกข้อเท็จจริงที่ตรวจได้จากความคิดเห็น</li><li>เปรียบเทียบอย่างน้อย 2 แหล่งเมื่อเรื่องสำคัญ</li><li>หัวข้อหวือหวาไม่เท่ากับน่าเชื่อถือ</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>คำค้น “ดาว”</td><td>กว้างเกิน ควรเป็น “ลำดับดาวเคราะห์ ป.4”</td></tr><tr><td>“ฉันคิดว่ามะม่วงอร่อยที่สุด”</td><td>ความคิดเห็น</td></tr><tr><td>“น้ำเดือดใกล้ 100°C ที่ระดับน้ำทะเล”</td><td>ข้อเท็จจริงที่ตรวจสอบได้</td></tr></tbody></table></div>","lessonNo":13,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l13-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ค้นข้อมูลและประเมินความน่าเชื่อถือ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ปรับคำค้นกว้างให้แคบ</li><li>ไฮไลต์ผู้เขียน/วันที่/หลักฐาน</li><li>จัดอันดับบัตรแหล่งข้อมูล</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Source Detective</div><p class=\"content-p \">อุปกรณ์: บัตรบทความจำลอง 6 ใบ แว่นขยายกระดาษ และ checklist</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กลุ่มรับคำถามวิจัย 1 ข้อ</li><li>อ่านบัตรแหล่งข้อมูลและวง author/date/evidence</li><li>ให้คะแนนความน่าเชื่อถือ 0–3 พร้อมเหตุผล</li><li>เลือกสองแหล่งที่สอดคล้อง/ขัดกันและสรุปสิ่งที่ยังไม่แน่ใจ</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">หน่วยงานวิชาการมีผู้เขียน/วันที่</span><span class=\"chip\">โฆษณาสินค้า</span><span class=\"chip\">โพสต์ไม่ระบุที่มา</span><span class=\"chip\">หนังสือเก่า</span><span class=\"chip\">ข่าวมีการอ้างงานวิจัย</span><span class=\"chip\">ความคิดเห็นส่วนตัว</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ใช้ checklist ครบ 2 + เหตุผลไม่ดูแค่หน้าตา 1 + ระบุความไม่แน่ใจ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":13,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l13-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ค้นข้อมูลและประเมินความน่าเชื่อถือ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ตั้งคำค้นที่เจาะจงและประเมินข้อมูลด้วยผู้เขียน วันที่ หลักฐาน จุดประสงค์ และการเปรียบเทียบหลายแหล่ง โดยใช้บัตรบทความจำลอง</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">keyword</span><span class=\"chip\">source</span><span class=\"chip\">author</span><span class=\"chip\">date</span><span class=\"chip\">evidence</span><span class=\"chip\">fact</span><span class=\"chip\">opinion</span><span class=\"chip\">reliable</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>เว็บสวยไม่รับประกันข้อมูลถูก</li><li>ข้อมูลเก่าอาจไม่เหมาะกับคำถามปัจจุบัน</li><li>ผู้เขียนมีผลประโยชน์อาจมีอคติ</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>คำค้น “ดาว”</td><td>กว้างเกิน ควรเป็น “ลำดับดาวเคราะห์ ป.4”</td></tr><tr><td>“ฉันคิดว่ามะม่วงอร่อยที่สุด”</td><td>ความคิดเห็น</td></tr><tr><td>“น้ำเดือดใกล้ 100°C ที่ระดับน้ำทะเล”</td><td>ข้อเท็จจริงที่ตรวจสอบได้</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>เว็บสวยไม่รับประกันข้อมูลถูก</li><li>ข้อมูลเก่าอาจไม่เหมาะกับคำถามปัจจุบัน</li><li>ผู้เขียนมีผลประโยชน์อาจมีอคติ</li></ul></div>","lessonNo":13,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ keyword source author date evidence fact opinion reliable"},{"id":"l13-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ค้นข้อมูลและประเมินความน่าเชื่อถือ","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. ปรับคำค้น “สัตว์” ให้เจาะจง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l13-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ประโยค “ช้างเป็นสัตว์ที่ดีที่สุด” เป็นอะไร</label><input type=\"text\" class=
