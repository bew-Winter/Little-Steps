\"response-input \" data-save-key=\"l13-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. บอกเกณฑ์ตรวจแหล่ง 4 ข้อ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l13-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เหตุใดควรเทียบหลายแหล่ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l13-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ประเมินบัตรแหล่งข้อมูลที่กำหนด</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l13-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนสรุปที่ระบุความมั่นใจ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l13-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l13-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":13,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l13-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ค้นข้อมูลและประเมินความน่าเชื่อถือ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>เช่น การจำแนกสัตว์มีกระดูกสันหลัง ป.4</td></tr><tr><td>2</td><td>ความคิดเห็น</td></tr><tr><td>3</td><td>ผู้เขียน วันที่ หลักฐาน จุดประสงค์/หน่วยงาน</td></tr><tr><td>4</td><td>ลดความผิดพลาด/อคติและตรวจความสอดคล้อง</td></tr><tr><td>5</td><td>ให้คะแนนพร้อมหลักฐานจากบัตร</td></tr><tr><td>6</td><td>เช่น หลายแหล่งตรงกันว่า… แต่ยังต้องตรวจ…</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเริ่มตรวจผู้เขียน วันที่ และหลักฐานก่อนเชื่อข้อมูล ควรถามเป็นนิสัยว่า “ใครพูด รู้ได้อย่างไร และมีแหล่งอื่นยืนยันไหม”</p></div>","lessonNo":13,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l14-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 14: ความปลอดภัยไซเบอร์: รหัสผ่านและการหลอกลวง","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ปกป้องข้อมูลส่วนตัว สร้าง passphrase ที่เดายาก รู้จักข้อความหลอกลวง และใช้ขั้น หยุด–คิด–ถามผู้ใหญ่</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/5</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ตัวอย่างในชั้นต้องเป็นรหัสสมมติ ห้ามเขียนรหัสจริง</li><li>ความยาวและความไม่คาดเดาสำคัญกว่าการเปลี่ยนตัวเดียว</li><li>ผู้ให้บริการจริงไม่ควรขอรหัสผ่านทางแชต</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"◎","search":"personal information password passphrase phishing link private report block"},{"id":"l14-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ความปลอดภัยไซเบอร์: รหัสผ่านและการหลอกลวง","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ข้อมูลใดเป็นส่วนตัว</li><li>ควรบอกรหัสผ่านกับเพื่อนไหม</li><li>ข้อความเร่งด่วนเป็นสัญญาณอะไร</li><li>เมื่อเจอลิงก์แปลกทำ 3 ขั้นอะไร</li><li>ใช้ชื่อวันเกิดเป็นรหัสดีไหม</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักสืบความปลอดภัยได้รับข้อความจำลองหลายแบบ ต้องแยกว่า ปลอดภัย–น่าสงสัย–อันตราย และเลือกการตอบสนอง” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ไม่แชร์รหัสผ่าน แม้กับเพื่อน</li><li>ใช้ passphrase ยาว จำได้แต่เดายาก และไม่ใช้ข้อมูลส่วนตัวตรง ๆ</li><li>ข้อความเร่งด่วน/รางวัลเกินจริง/ขอรหัสเป็นสัญญาณเตือน</li><li>ไม่กดลิงก์น่าสงสัย: หยุด–ตรวจ–ถามผู้ใหญ่</li><li>บล็อกและรายงานเมื่อถูกคุกคาม</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>123456</td><td>อ่อน เดาง่าย</td></tr><tr><td>BlueTiger!Reads7</td><td>ตัวอย่าง passphrase สมมติที่ยาวและหลากหลาย</td></tr><tr><td>“รับของฟรีภายใน 5 นาที กดลิงก์และส่งรหัส”</td><td>สัญญาณ phishing หลายข้อ</td></tr></tbody></table></div>","lessonNo":14,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l14-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ความปลอดภัยไซเบอร์: รหัสผ่านและการหลอกลวง","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จัดบัตรข้อมูลส่วนตัว/สาธารณะ</li><li>ประเมินรหัสสมมติ</li><li>อ่านสัญญาณ phishing</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Stop–Think–Ask</div><p class=\"content-p \">อุปกรณ์: บัตรข้อความจำลอง ป้ายเขียว/เหลือง/แดง และ checklist</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูย้ำว่าไม่ใช้รหัสจริงในการเรียน</li><li>เด็กอ่านบัตรข้อความและยืนเขียว/เหลือง/แดง</li><li>ชี้คำที่เป็นสัญญาณ เช่น เร่งด่วน ขอรหัส ลิงก์แปลก</li><li>พูดการตอบสนอง: ไม่กด เก็บหลักฐาน บอกผู้ใหญ่ บล็อก/รายงาน</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">เพื่อนส่งการบ้าน</span><span class=\"chip\">ผู้ไม่รู้จักขอที่อยู่</span><span class=\"chip\">คุณถูกรางวัล คลิกด่วน</span><span class=\"chip\">ระบบขอรหัสผ่านในแชต</span><span class=\"chip\">ครูส่งประกาศผ่านช่องทางทางการ</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ระดับความเสี่ยงถูก 1 + ชี้สัญญาณ 1 + เลือกการตอบสนองปลอดภัย 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l14-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ความปลอดภัยไซเบอร์: รหัสผ่านและการหลอกลวง","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ปกป้องข้อมูลส่วนตัว สร้าง passphrase ที่เดายาก รู้จักข้อความหลอกลวง และใช้ขั้น หยุด–คิด–ถามผู้ใหญ่</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">personal information</span><span class=\"chip\">password</span><span class=\"chip\">passphrase</span><span class=\"chip\">phishing</span><span class=\"chip\">link</span><span class=\"chip\">private</span><span class=\"chip\">report</span><span class=\"chip\">block</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ตัวอย่างในชั้นต้องเป็นรหัสสมมติ ห้ามเขียนรหัสจริง</li><li>ความยาวและความไม่คาดเดาสำคัญกว่าการเปลี่ยนตัวเดียว</li><li>ผู้ให้บริการจริงไม่ควรขอรหัสผ่านทางแชต</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>123456</td><td>อ่อน เดาง่าย</td></tr><tr><td>BlueTiger!Reads7</td><td>ตัวอย่าง passphrase สมมติที่ยาวและหลากหลาย</td></tr><tr><td>“รับของฟรีภายใน 5 นาที กดลิงก์และส่งรหัส”</td><td>สัญญาณ phishing หลายข้อ</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ตัวอย่างในชั้นต้องเป็นรหัสสมมติ ห้ามเขียนรหัสจริง</li><li>ความยาวและความไม่คาดเดาสำคัญกว่าการเปลี่ยนตัวเดียว</li><li>ผู้ให้บริการจริงไม่ควรขอรหัสผ่านทางแชต</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ personal information password passphrase phishing link private report block"},{"id":"l14-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"ความปลอดภัยไซเบอร์: รหัสผ่านและการหลอกลวง","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. บอกข้อมูลส่วนตัว 4 อย่างที่ไม่ควรเผยสาธารณะ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. รหัสผ่านควรยาวและเดายากเพราะอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ข้อความขอรหัสผ่านควรทำอย่างไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เขียน passphrase สมมติ ห้ามใช้ของจริง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. วิเคราะห์ข้อความ phishing จำลอง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนแผน Stop–Think–Ask 3 ขั้น</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":14,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l14-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ความปลอดภัยไซเบอร์: รหัสผ่านและการหลอกลวง","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ที่อยู่ เบอร์โทร รหัสผ่าน ตำแหน่ง/ข้อมูลโรงเรียนละเอียด ฯลฯ</td></tr><tr><td>2</td><td>ลดโอกาสถูกเดา/เจาะ</td></tr><tr><td>3</td><td>ไม่ตอบ ไม่กด ตรวจช่องทางและบอกผู้ใหญ่</td></tr><tr><td>4</td><td>ตัวอย่างยาวหลายคำ/สัญลักษณ์ ไม่ใช้ข้อมูลส่วนตัวตรง</td></tr><tr><td>5</td><td>ระบุเร่งด่วน รางวัล ขอข้อมูล ลิงก์ผิดปกติ</td></tr><tr><td>6</td><td>หยุดไม่กด–คิด/ตรวจผู้ส่ง–ถามผู้ใหญ่/รายงาน</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนรู้สัญญาณข้อความหลอกลวงและขั้น Stop–Think–Ask โปรดย้ำที่บ้านว่าไม่ควรเขียนหรือบอกรหัสจริงในใบงาน และเมื่อไม่แน่ใจให้ถามผู้ใหญ่ก่อนกด</p></div>","lessonNo":14,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l15-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 15: พลเมืองดิจิทัล ความเป็นส่วนตัว และลิขสิทธิ์","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ตัดสินใจก่อนโพสต์ เคารพผู้อื่น ขออนุญาตใช้ภาพ/ผลงาน อ้างที่มา และเข้าใจร่องรอยดิจิทัลผ่านสถานการณ์กระดาษ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/5</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ลบโพสต์ไม่ได้แปลว่าสำเนาทั้งหมดหาย</li><li>ให้เครดิตไม่ได้ทำให้ใช้ทุกอย่างได้เสมอ ต้องดูสิทธิ</li><li>มุกตลกที่ทำให้คนอื่นเสียใจไม่ใช่ “แค่ล้อเล่น”</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"◎","search":"digital citizen privacy permission copyright credit digital footprint kindness"},{"id":"l15-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"พลเมืองดิจิทัล ความเป็นส่วนตัว และลิขสิทธิ์","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ก่อนโพสต์ควรถามอะไร</li><li>ใช้ภาพเพื่อนต้องทำอะไร</li><li>credit คืออะไร</li><li>digital footprint คืออะไร</li><li>เมื่อเห็น cyberbullying ควรทำอย่างไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “คณะกรรมการชั้นเรียนต้องตัดสินสถานการณ์ออนไลน์จำลองและเขียน “กติกาชุมชนดิจิทัล” ที่ยุติธรรม” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>คิดก่อนโพสต์: จริง จำเป็น สุภาพ ปลอดภัยหรือไม่</li><li>ภาพ/ข้อมูลของผู้อื่นควรขออนุญาต</li><li>ผลงานมีเจ้าของ ต้องอ้างที่มาและใช้ตามสิทธิ</li><li>สิ่งที่โพสต์อาจถูกบันทึก/ส่งต่อเป็นร่องรอยดิจิทัล</li><li>เมื่อเห็นการกลั่นแกล้ง อย่าร่วมแชร์ เก็บหลักฐาน บอกผู้ใหญ่/รายงาน</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>โพสต์รูปเพื่อนโดยไม่ถาม</td><td>ละเมิดความเป็นส่วนตัว</td></tr><tr><td>ใช้ภาพที่อนุญาตและใส่ที่มา</td><td>เป็นการใช้รับผิดชอบ</td></tr><tr><td>ส่งต่อข่าวลือ</td><td>เพิ่มความเสียหายและร่องรอย</td></tr></tbody></table></div>","lessonNo":15,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l15-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"พลเมืองดิจิทัล ความเป็นส่วนตัว และลิขสิทธิ์","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>แยก public/private</li><li>ใช้กรอบ Think Before You Post</li><li>ฝึกเขียนเครดิตแหล่งที่มา</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Digital Choices Court</div><p class=\"content-p \">อุปกรณ์: บัตรสถานการณ์ ป้าย OK/Ask First/Do Not Post และกระดาษกติกา</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กลุ่มอ่านสถานการณ์หนึ่งใบ</li><li>เลือกป้ายการตัดสินใจ</li><li>อ้างหลัก privacy/copyright/kindness</li><li>เขียนทางเลือกที่ปลอดภัยกว่า</li><li>รวมเป็นกติกาห้อง 6 ข้อ</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">โพสต์รูปเพื่อน</span><span class=\"chip\">คัดลอกภาพทำรายงาน</span><span class=\"chip\">แชร์ข่าวไม่รู้ที่มา</span><span class=\"chip\">ส่งข้อความล้อรูปร่าง</span><span class=\"chip\">ให้เครดิตผู้สร้าง</span><span class=\"chip\">รายงานบัญชีคุกคาม</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ตัดสินเหมาะ 1 + อ้างหลัก 1 + เสนอทางเลือก 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l15-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: พลเมืองดิจิทัล ความเป็นส่วนตัว และลิขสิทธิ์","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ตัดสินใจก่อนโพสต์ เคารพผู้อื่น ขออนุญาตใช้ภาพ/ผลงาน อ้างที่มา และเข้าใจร่องรอยดิจิทัลผ่านสถานการณ์กระดาษ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">digital citizen</span><span class=\"chip\">privacy</span><span class=\"chip\">permission</span><span class=\"chip\">copyright</span><span class=\"chip\">credit</span><span class=\"chip\">digital footprint</span><span class=\"chip\">kindness</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ลบโพสต์ไม่ได้แปลว่าสำเนาทั้งหมดหาย</li><li>ให้เครดิตไม่ได้ทำให้ใช้ทุกอย่างได้เสมอ ต้องดูสิทธิ</li><li>มุกตลกที่ทำให้คนอื่นเสียใจไม่ใช่ “แค่ล้อเล่น”</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>โพสต์รูปเพื่อนโดยไม่ถาม</td><td>ละเมิดความเป็นส่วนตัว</td></tr><tr><td>ใช้ภาพที่อนุญาตและใส่ที่มา</td><td>เป็นการใช้รับผิดชอบ</td></tr><tr><td>ส่งต่อข่าวลือ</td><td>เพิ่มความเสียหายและร่องรอย</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ลบโพสต์ไม่ได้แปลว่าสำเนาทั้งหมดหาย</li><li>ให้เครดิตไม่ได้ทำให้ใช้ทุกอย่างได้เสมอ ต้องดูสิทธิ</li><li>มุกตลกที่ทำให้คนอื่นเสียใจไม่ใช่ “แค่ล้อเล่น”</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ digital citizen privacy permission copyright credit digital footprint kindness"},{"id":"l15-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"พลเมืองดิจิทัล ความเป็นส่วนตัว และลิขสิทธิ์","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. digital footprint คืออะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ก่อนโพสต์รูปเพื่อนควรทำอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ทำไมต้องอ้างที่มา</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เมื่อพบการกลั่นแกล้งออนไลน์</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. วิเคราะห์ 3 สถานการณ์ด้วย OK/Ask/Do Not</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนกติกาพลเมืองดิจิทัล 5 ข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":15,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l15-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"พลเมืองดิจิทัล ความเป็นส่วนตัว และลิขสิทธิ์","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ร่องรอยข้อมูลจากการใช้งาน/โพสต์ที่อาจคงอยู่หรือถูกส่งต่อ</td></tr><tr><td>2</td><td>ขออนุญาตและเคารพคำตอบ</td></tr><tr><td>3</td><td>เคารพเจ้าของและให้ผู้อ่านตรวจแหล่ง</td></tr><tr><td>4</td><td>ไม่ร่วมแชร์ เก็บหลักฐาน บอกผู้ใหญ่ บล็อก/รายงาน</td></tr><tr><td>5</td><td>เหตุผลตรงหลัก</td></tr><tr><td>6</td><td>ครอบคลุมความสุภาพ ความเป็นส่วนตัว ลิขสิทธิ์ ความปลอดภัย</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนตัดสินใจเรื่องความเป็นส่วนตัวและการใช้ผลงานได้ดี ควรฝึกถาม “เจ้าของอนุญาตหรือยัง” และ “ข้อความนี้สุภาพและปลอดภัยไหม” ก่อนโพสต์ทุกครั้ง</p></div>","lessonNo":15,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l16-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 16: การเก็บข้อมูลและนำเสนอด้วยกระดาษ","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ออกแบบคำถาม เก็บข้อมูลอย่างเป็นธรรม ตรวจความครบ และนำเสนอด้วยตาราง/แผนภูมิบนกระดาษเพื่อใช้ตัดสินใจ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/4</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ตัวอย่างน้อยไม่แทนทุกคน</li><li>คำถามชี้นำทำให้ข้อมูลลำเอียง</li><li>กราฟที่แกนเริ่มผิด/มาตราส่วนไม่เท่ากันอาจทำให้เข้าใจผิด</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":16,"teacherOnly":false,"icon":"◎","search":"data survey category tally table chart scale conclusion"},{"id":"l16-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การเก็บข้อมูลและนำเสนอด้วยกระดาษ","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>tally 5 เขียนอย่างไร</li><li>ผลรวมต้องตรวจเทียบอะไร</li><li>กราฟต้องมีชื่อไหม</li><li>คำถามชี้นำคืออะไร</li><li>สรุปเกินข้อมูลหมายถึงอะไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “สภานักเรียนต้องเลือกกิจกรรมวันศุกร์จากเสียงของห้อง โดยห้ามเดาและต้องแสดงข้อมูลให้ทุกคนตรวจได้” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>คำถามสำรวจต้องชัดและตัวเลือกไม่ทับกัน</li><li>ใช้ tally mark ช่วยนับ</li><li>รวมยอดตรวจให้เท่าจำนวนผู้ตอบ</li><li>แผนภูมิต้องมีชื่อ แกน หมวด และมาตราส่วน</li><li>ข้อสรุปต้องไม่เกินข้อมูล</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>อาหารกลางวันที่ชอบที่สุด เลือก 1</td><td>คำถามและคำตอบชัด</td></tr><tr><td>||||/ = 5</td><td>tally กลุ่มละห้า</td></tr><tr><td>แท่งสูง 4 ช่องเมื่อ 1 ช่อง=2 คน</td><td>แทน 8 คน</td></tr></tbody></table></div>","lessonNo":16,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l16-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การเก็บข้อมูลและนำเสนอด้วยกระดาษ","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>สร้างคำถามสำรวจ</li><li>เก็บ tally จากเพื่อน</li><li>ทำตารางและแผนภูมิแท่งกระดาษ</li><li>เขียนข้อสรุป/ข้อจำกัด</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Human Data Lab</div><p class=\"content-p \">อุปกรณ์: สติกเกอร์โหวต ตาราง tally กระดาษกราฟ และบัตรตัวเลือก</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ร่วมกันแก้คำถามให้เป็นกลาง</li><li>เด็กโหวตหนึ่งตัวเลือกและผู้บันทึกทำ tally</li><li>ตรวจยอดรวม</li><li>สร้าง human bar chart โดยยืนเป็นแถว แล้วถ่ายลงกระดาษ</li><li>เขียนข้อสรุป 2 ข้อและข้อจำกัด 1 ข้อ</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">reading</span><span class=\"chip\">sports</span><span class=\"chip\">art</span><span class=\"chip\">music</span><span class=\"chip\">science game</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ข้อมูลครบ 1 + กราฟถูก 1 + สรุปตรงข้อมูล 1 + บอกข้อจำกัด 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":16,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l16-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: การเก็บข้อมูลและนำเสนอด้วยกระดาษ","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ออกแบบคำถาม เก็บข้อมูลอย่างเป็นธรรม ตรวจความครบ และนำเสนอด้วยตาราง/แผนภูมิบนกระดาษเพื่อใช้ตัดสินใจ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">data</span><span class=\"chip\">survey</span><span class=\"chip\">category</span><span class=\"chip\">tally</span><span class=\"chip\">table</span><span class=\"chip\">chart</span><span class=\"chip\">scale</span><span class=\"chip\">conclusion</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ตัวอย่างน้อยไม่แทนทุกคน</li><li>คำถามชี้นำทำให้ข้อมูลลำเอียง</li><li>กราฟที่แกนเริ่มผิด/มาตราส่วนไม่เท่ากันอาจทำให้เข้าใจผิด</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>อาหารกลางวันที่ชอบที่สุด เลือก 1</td><td>คำถามและคำตอบชัด</td></tr><tr><td>||||/ = 5</td><td>tally กลุ่มละห้า</td></tr><tr><td>แท่งสูง 4 ช่องเมื่อ 1 ช่อง=2 คน</td><td>แทน 8 คน</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ตัวอย่างน้อยไม่แทนทุกคน</li><li>คำถามชี้นำทำให้ข้อมูลลำเอียง</li><li>กราฟที่แกนเริ่มผิด/มาตราส่วนไม่เท่ากันอาจทำให้เข้าใจผิด</li></ul></div>","lessonNo":16,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ data survey category tally table chart scale conclusion"},{"id":"l16-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"การเก็บข้อมูลและนำเสนอด้วยกระดาษ","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. แปลง tally ||||/ || เป็นจำนวน</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. คำถาม “ทุกคนชอบฟุตบอลใช่ไหม?” มีปัญหาอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ข้อมูล 5,3,7 ผลรวม</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. วาดแผนภูมิแท่งจากตารางที่กำหนด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนข้อสรุป 2 ข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l16-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนข้อจำกัดหนึ่งข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l16-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l16-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":16,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l16-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"การเก็บข้อมูลและนำเสนอด้วยกระดาษ","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>7</td></tr><tr><td>2</td><td>เป็นคำถามชี้นำ</td></tr><tr><td>3</td><td>15</td></tr><tr><td>4</td><td>แท่ง ชื่อ แกน มาตราส่วนถูก</td></tr><tr><td>5</td><td>เช่น หมวดสูงสุด/ต่ำสุดตามข้อมูล</td></tr><tr><td>6</td><td>สำรวจเฉพาะห้องนี้/ผู้ตอบน้อย/ตัวเลือกจำกัด</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเก็บและนำเสนอข้อมูลบนกระดาษได้เป็นระบบ ควรย้ำว่าข้อสรุปต้องตรงกับกลุ่มที่สำรวจ ไม่เหมารวมทุกคน</p></div>","lessonNo":16,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l17-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 17: โครงงาน Unplugged Coding Challenge","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">บูรณาการการแยกปัญหา อัลกอริทึม ผังงาน เงื่อนไข ลูป การดีบัก ข้อมูล และความปลอดภัย เพื่อสร้างเกมกระดาษที่ผู้อื่นเล่นได้</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/1–5 (บูรณาการ)</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>สร้างชิ้นงานคอมพิวเตอร์เชิงแนวคิดโดยไม่ต้องมีเครื่อง</li><li>ทดสอบกับผู้ใช้และแก้ bug จากหลักฐาน</li><li>สื่อสารกติกาและทำงานร่วมกันอย่างรับผิดชอบ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":17,"teacherOnly":false,"icon":"◎","search":"project prototype user rule algorithm test debug feedback"},{"id":"l17-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"โครงงาน Unplugged Coding Challenge","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>บอก 7 ขั้นโครงงาน</li><li>prototype คืออะไร</li><li>ทำไมต้องผู้ทดสอบภายนอกกลุ่ม</li><li>feedback ที่ดีเป็นอย่างไร</li><li>ยก bug ของเกมกระดาษ 1 อย่าง</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “งาน Little Steps Coding Fair ให้เด็กสร้างเกมที่ใช้ได้จริงโดยไม่มีคอมพิวเตอร์ และสอนกลุ่มอื่นเล่นภายใน 3 นาที” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>ขั้นโครงงาน: Define→Decompose→Design→Build→Test→Debug→Share</li><li>กติกาต้องชัดและยุติธรรม</li><li>เกมควรมีเป้าหมาย จุดเริ่ม จุดจบ และเงื่อนไข</li><li>ทดสอบกับผู้ใช้จริงที่ไม่ได้ช่วยออกแบบ</li><li>บันทึก bug และสิ่งที่แก้</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>เกมเส้นทาง</td><td>ใช้ลูกศร condition และ obstacle</td></tr><tr><td>เกมทายข้อมูล</td><td>ใช้คำถาม yes/no และการค้นหา</td></tr><tr><td>เกมคะแนน</td><td>ใช้ตัวแปร score และ update</td></tr></tbody></table></div>","lessonNo":17,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l17-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"โครงงาน Unplugged Coding Challenge","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เลือกปัญหา/ประเภทเกม</li><li>วาดผังงานกติกา</li><li>ทำต้นแบบด้วยกระดาษ</li><li>ทดสอบ–บันทึก–แก้</li><li>นำเสนอและสะท้อน</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Unplugged Coding Fair</div><p class=\"content-p \">อุปกรณ์: กระดาษแข็ง การ์ด ลูกเต๋ากระดาษ ตัวเดิน ปากกา เชือก และแบบทดสอบผู้ใช้</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กำหนดผู้เล่น เป้าหมาย และทักษะคอมพิวเตอร์อย่างน้อย 3 เรื่อง</li><li>เขียนกติกาและผังงานก่อนสร้าง</li><li>ทำ prototype ใช้วัสดุเรียบง่าย</li><li>ให้กลุ่มอื่นเล่นโดยผู้สร้างห้ามอธิบายเพิ่มในรอบแรก</li><li>บันทึก bug 2 จุด แก้ และทดสอบรอบสอง</li><li>นำเสนอสิ่งที่เปลี่ยนจาก feedback</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">maze game</span><span class=\"chip\">condition cards</span><span class=\"chip\">loop pattern</span><span class=\"chip\">search mystery</span><span class=\"chip\">data voting game</span><span class=\"chip\">cyber safety scenario</span></div><p class=\"content-p question\">เกณฑ์คะแนน: แนวคิดคอมพิวเตอร์ 4 + กติกา/การทำงาน 3 + การทดสอบแก้ไข 2 + การสื่อสาร 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":17,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l17-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: โครงงาน Unplugged Coding Challenge","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">บูรณาการการแยกปัญหา อัลกอริทึม ผังงาน เงื่อนไข ลูป การดีบัก ข้อมูล และความปลอดภัย เพื่อสร้างเกมกระดาษที่ผู้อื่นเล่นได้</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">project</ ut \" data-save-key=\"l17-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ระบุแนวคิด 3 เรื่องที่ใช้</label><input type=\"text\" class=\"response-input \" data-save-key=\"l17-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. บันทึกผลทดสอบ: expected/actual/bug/fix</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l17-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. สะท้อนตนเอง: สิ่งที่ภูมิใจและจะปรับรุ่นถัดไป</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l17-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l17-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":17,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l17-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"โครงงาน Unplugged Coding Challenge","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ชัดว่าใครเล่นและชนะอย่างไร</td></tr><tr><td>2</td><td>กติกา อุปกรณ์ กระดาน การ์ด ทดสอบ/นำเสนอ ฯลฯ</td></tr><tr><td>3</td><td>มีเริ่ม กระบวนการ/เงื่อนไข และจบ</td></tr><tr><td>4</td><td>เช่น sequence condition loop variable debugging</td></tr><tr><td>5</td><td>มีหลักฐานจากผู้เล่นจริง</td></tr><tr><td>6</td><td>คำตอบเฉพาะเจาะจง</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนสามารถสร้างเกม Unplugged ที่ใช้แนวคิดอัลกอริทึมและการดีบักได้ ความก้าวหน้าที่เด่นคือการแก้ปัญหาจาก feedback ควรเก็บต้นแบบและลองสอนสมาชิกครอบครัวเล่นเพื่อทดสอบกติกาอีกครั้ง</p></div>","lessonNo":17,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"}]};

function coverHTML(){return `<div class="cover"><div class="cover-copy"><div class="eyebrow">✦ ${COURSE.englishName}</div><h1 class="cover-title">${COURSE.title}<span>ป.4 · 16 ชั่วโมง</span></h1><p class="cover-subtitle">${COURSE.subtitle}</p><div class="cover-pills">${COURSE.pills.map(x=>`<span class="cover-pill">${x}</span>`).join('')}</div><div class="cta-row"><button type="button" class="cta primary" onclick="go('course-map')">ดูแผนทั้งคอร์ส →</button><button type="button" class="cta secondary" onclick="go('${COURSE.firstLesson}')">เริ่มชั่วโมงที่ 1</button></div></div><div class="cover-logo"><img src="assets/logo.png" alt="Little Steps"></div></div>`}
function mapHTML(){return `<div class="map"><div class="map-head"><div><div class="eyebrow">แผนที่คอร์ส</div><h2>16 ก้าวการเรียนรู้</h2><p>แตะบทเรียนเพื่อเปิดภาพรวม ขั้นสอน ใบความรู้ เกม และใบงาน</p></div><button type="button" class="icon-btn" onclick="printAll()">🖨️ พิมพ์ทั้งชุด</button></div><div class="lesson-grid">${COURSE.lessons.map(l=>`<button type="button" class="lesson-card" onclick="go('${l.first}')"><span class="n">${l.no}</span><h3>${l.title}</h3><small>เปิดบทเรียน →</small></button>`).join('')}</div></div>`}
function render(dir=0){let s=cur();if(mode==='student'&&s.teacherOnly){current=visible()[0].id;s=cur()};const el=$('.slide');if(s.kind==='cover')el.innerHTML=coverHTML();else if(s.kind==='map')el.innerHTML=mapHTML();else el.innerHTML=`<header class="banner"><div class="kicker"><span class="dots"></span>${s.label}${s.lessonNo?` · ชั่วโมงที่ ${s.lessonNo}`:''}</div><h1 class="slide-title">${s.title}</h1>${s.parent?`<div class="slide-parent">${s.parent}</div>`:''}</header><main class="body">${s.html}</main><footer class="footer"><div class="footer-note">Little Steps · เพราะทุกก้าวเล็ก ๆ สร้างพัฒนาการที่ยิ่งใหญ่</div><div class="footer-actions"><button type="button" class="arrow" onclick="prev()">← ก่อนหน้า</button><button type="button" class="arrow primary" onclick="next()">ถัดไป →</button></div></footer>`;bindInputs();update();document.title=`${s.title} | ${COURSE.title} ป.4`;window.scrollTo({top:0,left:0,behavior:'auto'});$('.body')?.scrollTo(0,0)}
function go(id,historyMode='push'){const s=SLIDES.find(x=>x.id===id);if(!s)return;if(mode==='student'&&s.teacherOnly){toast('หน้านี้แสดงในโหมดครู');return}const v=visible(),old=v.findIndex(x=>x.id===current),neu=v.findIndex(x=>x.id===id);current=id;history[historyMode+'State']({id},'',`#${id}`);render(neu>old?1:-1);closeMenu()}
function next(){const v=visible(),i=v.findIndex(x=>x.id===current);if(i<v.length-1)go(v[i+1].id)}function prev(){const v=visible(),i=v.findIndex(x=>x.id===current);if(i>0)go(v[i-1].id)}
function update(){const v=visible(),i=Math.max(0,v.findIndex(x=>x.id===current));$('.progress-bar').style.width=`${(i+1)*100/v.length}%`;$('.progress-label').textContent=`${i+1} / ${v.length}`;$('.dock-page').textContent=`หน้า ${i+1} จาก ${v.length}`;$('.dock-title').textContent=cur().title;$$('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===current));const d=$(`details[data-lesson="${cur().lessonNo}"]`);if(d)d.open=true;$$('.arrow').forEach((b,n)=>b.disabled=n===0?i===0:i===v.length-1)}
function setMode(m){mode=m;Store.set(COURSE.storage+'-mode',m);document.body.dataset.mode=m;$('.mode-btn').dataset.active=String(m==='teacher');$('.mode-text').textContent=m==='teacher'?'ครู':'ผู้เรียน';if(m==='student'&&cur().teacherOnly)current=visible()[0].id;buildNav();render();toast(m==='teacher'?'เปิดโหมดครูแล้ว':'เปิดโหมดผู้เรียนแล้ว')}
function toggleMode(){setMode(mode==='teacher'?'student':'teacher')}
function buildNav(){let h='<div class="nav-title">เริ่มต้น</div>';for(const s of SLIDES.filter(x=>!x.lessonNo&&(mode==='teacher'||!x.teacherOnly)))h+=navBtn(s);for(const l of COURSE.lessons){const ss=SLIDES.filter(x=>x.lessonNo===l.no&&(mode==='teacher'||!x.teacherOnly));h+=`<details class="lesson-group" data-lesson="${l.no}"><summary><span class="nav-num">${l.no}</span><span>ชั่วโมงที่ ${l.no}<br><small>${l.title}</small></span></summary><div class="group-body">${ss.map(navBtn).join('')}</div></details>`}$('.nav-content').innerHTML=h;bindSearch();update()}
function navBtn(s){return `<button type="button" class="nav-btn" data-id="${s.id}" data-search="${(s.title+' '+s.label+' '+(s.search||'')).toLowerCase()}" onclick="go('${s.id}')"><span class="nav-num">${s.icon||'•'}</span><span>${s.label}</span></button>`}
function bindSearch(){const i=$('#searchInput');i.oninput=()=>{const q=i.value.trim().toLowerCase();$$('.nav-btn').forEach(b=>b.style.display=!q||b.dataset.search.includes(q)?'':'none');$$('.lesson-group').forEach(g=>{const yes=$$('.nav-btn',g).some(b=>b.style.display!=='none');g.style.display=yes?'':'none';if(q&&yes)g.open=true})}}
function bindInputs(){$$('[data-save-key]').forEach(el=>{const k=COURSE.storage+'-'+el.dataset.saveKey;el.value=Store.get(k,'');el.addEventListener('input',()=>{Store.set(k,el.value);toast('บันทึกคำตอบแล้ว')})})}
let tt;function toast(t){const e=$('.toast');e.textContent=t;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),1100)}
function toggleMenu(){document.body.classList.toggle('drawer-open')}function closeMenu(){document.body.classList.remove('drawer-open')}
function printCurrent(){window.print()}function printAll(){const a=$('.print-area');a.innerHTML=visible().map(s=>`<section class="print-page"><h1>${s.title}</h1>${s.kind==='cover'?coverHTML():s.kind==='map'?mapHTML():s.html}</section>`).join('');document.body.classList.add('printing-all');setTimeout(()=>window.print(),80)}window.addEventListener('afterprint',()=>{document.body.classList.remove('printing-all');$('.print-area').innerHTML=''})
window.addEventListener('popstate',()=>{const id=(location.hash||'#home').slice(1);if(SLIDES.some(s=>s.id===id)){current=id;render()}});window.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')closeMenu()});
let touch=null;$('.stage').addEventListener('touchstart',e=>{if(e.target.closest('input,textarea,button,a,.table-wrap,summary'))return;const t=e.touches[0];touch={x:t.clientX,y:t.clientY,time:Date.now()}},{passive:true});$('.stage').addEventListener('touchend',e=>{if(!touch)return;const t=e.changedTouches[0],dx=t.clientX-touch.x,dy=t.clientY-touch.y,dt=Date.now()-touch.time;touch=null;if(dt<650&&Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.3)(dx<0?next:prev)()},{passive:true});
$('.mode-btn').dataset.active=String(mode==='teacher');$('.mode-text').textContent=mode==='teacher'?'ครู':'ผู้เรียน';buildNav();history.replaceState({id:current},'',`#${current}`);render();
</script></body></html>
