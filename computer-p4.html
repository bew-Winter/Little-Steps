const COURSE={"title":"คอมพิวเตอร์ (ไม่ใช้เครื่อง)","englishName":"Little Steps Unplugged Computing","subtitle":"วิทยาการคำนวณ ป.4 แบบ Unplugged 100% ใช้กระดาษ บัตรคำ ตารางพื้น การแสดงบทบาท และเกมคิดเชิงคำนวณ ไม่ต้องมีเครื่องคอมพิวเตอร์","pills":["ไม่ต้องมีคอมพิวเตอร์","16 ชั่วโมงจบในตัว","คิด–ทดลอง–ดีบัก","ปลอดภัยดิจิทัล"],"storage":"little-steps-computing-p4","lessons":[{"no":1,"title":"คิดแบบแยกปัญหา: Decomposition","first":"l1-overview"},{"no":2,"title":"อัลกอริทึมและลำดับขั้น","first":"l2-overview"},{"no":3,"title":"เส้นทางบนตารางและพิกัด","first":"l3-overview"},{"no":4,"title":"Debugging: หาข้อผิดพลาดและแก้ทีละจุด","first":"l4-overview"},{"no":5,"title":"ผังงาน: สื่อสารขั้นตอนด้วยสัญลักษณ์","first":"l5-overview"},{"no":6,"title":"เงื่อนไข: ถ้า…แล้ว…มิฉะนั้น…","first":"l6-overview"},{"no":7,"title":"การทำซ้ำ: Loops","first":"l7-overview"},{"no":8,"title":"ตัวแปรและข้อมูลในกล่อง","first":"l8-overview"},{"no":9,"title":"ข้อมูลแบบเลขฐานสองและการเข้ารหัสภาพ","first":"l9-overview"},{"no":10,"title":"การค้นหาอย่างเป็นระบบ","first":"l10-overview"},{"no":11,"title":"การเรียงลำดับข้อมูล","first":"l11-overview"},{"no":12,"title":"เครือข่ายและการส่งข้อมูล","first":"l12-overview"},{"no":13,"title":"ค้นข้อมูลและประเมินความน่าเชื่อถือ","first":"l13-overview"},{"no":14,"title":"ความปลอดภัยไซเบอร์: รหัสผ่านและการหลอกลวง","first":"l14-overview"},{"no":15,"title":"พลเมืองดิจิทัล ความเป็นส่วนตัว และลิขสิทธิ์","first":"l15-overview"},{"no":16,"title":"การเก็บข้อมูลและนำเสนอด้วยกระดาษ","first":"l16-overview"},{"no":17,"title":"โครงงาน Unplugged Coding Challenge","first":"l17-overview"}],"firstLesson":"l1-overview","slides":[{"id":"home","kind":"cover","label":"หน้าปก","title":"คอมพิวเตอร์ (ไม่ใช้เครื่อง)","html":"","teacherOnly":false,"icon":"⌂"},{"id":"course-map","kind":"map","label":"แผนที่คอร์ส","title":"โครงสร้าง 16 ชั่วโมง","html":"","teacherOnly":false,"icon":"▦"},{"id":"l1-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 1: คิดแบบแยกปัญหา: Decomposition","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ฝึกแบ่งงานใหญ่เป็นงานย่อยที่จัดการได้ โดยใช้กิจวัตรใกล้ตัวและปัญหาที่ไม่มีเครื่องคอมพิวเตอร์</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ระบุเป้าหมายและข้อจำกัด</li><li>แบ่งปัญหาเป็นส่วนย่อยที่ลงมือได้</li><li>ตรวจความครบถ้วนและรวมผลย่อยกลับ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"◎","search":"ปัญหา ปัญหาย่อย decomposition เป้าหมาย ข้อมูล ข้อจำกัด ขั้นตอน"},{"id":"l1-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"คิดแบบแยกปัญหา: Decomposition","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>งานใหญ่คืออะไร</li><li>ยกปัญหาย่อยของการจัดกระเป๋า 2 อย่าง</li><li>ทำไมต้องกำหนดเป้าหมาย</li><li>แบ่ง “ทำแซนด์วิช” เป็นกี่ส่วนได้</li><li>เมื่อทำย่อยครบต้องทำอะไรต่อ</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ห้องเรียนต้องจัดงานนิทรรศการภายในเวลาจำกัด เด็กจะทำสำเร็จได้เมื่อแบ่งงานเป็นทีมและเห็นความสัมพันธ์ของทุกชิ้น” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>เริ่มจากระบุเป้าหมายให้ชัด</li><li>แยกสิ่งที่ต้องรู้–ต้องทำ–ต้องตรวจ</li><li>ปัญหาย่อยควรเล็กพอให้ลงมือได้</li><li>รวมคำตอบย่อยกลับเป็นคำตอบของงานใหญ่</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>จัดงานวันเกิด</td><td>แยกเป็นแขก สถานที่ อาหาร กิจกรรม งบประมาณ</td></tr><tr><td>ทำการบ้านหลายวิชา</td><td>แยกตามวิชา เวลา และลำดับความเร่งด่วน</td></tr><tr><td>หาของหาย</td><td>แยกพื้นที่ค้นหาและลำดับเหตุการณ์ล่าสุด</td></tr></tbody></table></div>","lessonNo":1,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l1-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"คิดแบบแยกปัญหา: Decomposition","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>แตกปัญหา “จัดห้องเรียน” เป็น 5 งาน</li><li>จัดหมวดงาน คน–ของ–เวลา–กติกา</li><li>ตรวจว่างานย่อยมีส่วนซ้ำ/ตกหล่นไหม</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Problem Puzzle</div><p class=\"content-p \">อุปกรณ์: การ์ดงานใหญ่ การ์ดเปล่า โพสต์อิท และเชือกเชื่อม</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>แต่ละกลุ่มหยิบการ์ดปัญหาใหญ่</li><li>เขียนปัญหาย่อยอย่างน้อย 6 ใบ</li><li>จัดลำดับและเชื่อมใบที่ต้องทำก่อน–หลัง</li><li>แลกกับกลุ่มอื่นให้ตรวจว่ามีงานใดตกหล่น</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">จัดทัศนศึกษา</span><span class=\"chip\">ทำหนังสือพิมพ์ห้อง</span><span class=\"chip\">เตรียมงานกีฬา</span><span class=\"chip\">ทำอาหารเช้า</span><span class=\"chip\">หาสัตว์เลี้ยงที่หาย</span></div><p class=\"content-p question\">เกณฑ์คะแนน: เป้าหมายชัด 1 + ปัญหาย่อยครบ 2 + ความสัมพันธ์ชัด 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l1-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: คิดแบบแยกปัญหา: Decomposition","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ฝึกแบ่งงานใหญ่เป็นงานย่อยที่จัดการได้ โดยใช้กิจวัตรใกล้ตัวและปัญหาที่ไม่มีเครื่องคอมพิวเตอร์</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">ปัญหา</span><span class=\"chip\">ปัญหาย่อย</span><span class=\"chip\">decomposition</span><span class=\"chip\">เป้าหมาย</span><span class=\"chip\">ข้อมูล</span><span class=\"chip\">ข้อจำกัด</span><span class=\"chip\">ขั้นตอน</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>การแบ่งปัญหาไม่ใช่แบ่งแบบสุ่ม</li><li>ปัญหาเดียวแบ่งได้หลายแบบ</li><li>เลือกวิธีแบ่งที่ช่วยทำงานและตรวจได้ง่าย</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>จัดงานวันเกิด</td><td>แยกเป็นแขก สถานที่ อาหาร กิจกรรม งบประมาณ</td></tr><tr><td>ทำการบ้านหลายวิชา</td><td>แยกตามวิชา เวลา และลำดับความเร่งด่วน</td></tr><tr><td>หาของหาย</td><td>แยกพื้นที่ค้นหาและลำดับเหตุการณ์ล่าสุด</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>การแบ่งปัญหาไม่ใช่แบ่งแบบสุ่ม</li><li>ปัญหาเดียวแบ่งได้หลายแบบ</li><li>เลือกวิธีแบ่งที่ช่วยทำงานและตรวจได้ง่าย</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ ปัญหา ปัญหาย่อย decomposition เป้าหมาย ข้อมูล ข้อจำกัด ขั้นตอน"},{"id":"l1-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"คิดแบบแยกปัญหา: Decomposition","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. แบ่ง “ไปโรงเรียนให้ทัน” เป็นงานย่อย 5 ขั้น</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. งานย่อยใดต้องทำก่อน “ใส่รองเท้า” ในการแต่งตัว</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เขียนเป้าหมายของการจัดโต๊ะอ่านหนังสือ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. แบ่งงานใหญ่ “ทำโปสเตอร์” เป็น 4 หมวด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ตรวจรายการปัญหาย่อยและวงส่วนซ้ำ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบายว่าการแยกปัญหาช่วยอย่างไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":1,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l1-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"คิดแบบแยกปัญหา: Decomposition","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>ตื่น แต่งตัว กินอาหาร ตรวจของ ออกจากบ้าน/เดินทาง</td></tr><tr><td>2</td><td>แต่งเสื้อผ้า/เตรียมตัวก่อน ตามเหตุผล</td></tr><tr><td>3</td><td>โต๊ะเป็นระเบียบ หาของง่าย และปลอดภัย</td></tr><tr><td>4</td><td>วางแผนเนื้อหา ออกแบบ เตรียมวัสดุ ลงมือ/ตรวจ</td></tr><tr><td>5</td><td>คำตอบตามรายการ</td></tr><tr><td>6</td><td>ลดความซับซ้อน แบ่งงาน วางแผนและตรวจได้ง่าย</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนสามารถแยกงานใหญ่เป็นงานย่อยได้ดี ควรฝึกก่อนทำงานบ้านหรือการบ้าน โดยเขียน 3–5 ขั้นและขีดฆ่าเมื่อเสร็จ</p></div>","lessonNo":1,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l2-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 2: อัลกอริทึมและลำดับขั้น","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">เข้าใจอัลกอริทึมว่าเป็นลำดับคำสั่งที่ชัดเจน มีจุดเริ่ม–จบ และผู้อื่นทำตามแล้วได้ผลตามเป้าหมาย</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>“ทำให้เรียบร้อย” กำกวม ควรบอกว่าจัดอะไรไว้ที่ใด</li><li>สลับลำดับอาจเปลี่ยนผล</li><li>อัลกอริทึมมีได้มากกว่าหนึ่งวิธี</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"◎","search":"algorithm ลำดับ คำสั่ง จุดเริ่มต้น ผลลัพธ์ ความชัดเจน ผู้ปฏิบัติ"},{"id":"l2-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"อัลกอริทึมและลำดับขั้น","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>อัลกอริทึมคืออะไร</li><li>คำว่า “ทำเร็ว ๆ” ชัดเจนไหม</li><li>เหตุใดลำดับสำคัญ</li><li>ต้องมีจุดจบหรือไม่</li><li>ยกตัวอย่างอัลกอริทึมในชีวิตจริง</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “หุ่นยนต์กระดาษไม่เข้าใจภาษาคน ต้องได้รับคำสั่งที่ชัดจนไม่ต้องเดาแม้แต่หนึ่งขั้น” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>อัลกอริทึม = ขั้นตอนแก้ปัญหาตามลำดับ</li><li>แต่ละคำสั่งต้องเจาะจงและทำได้</li><li>ต้องระบุจุดเริ่มและเงื่อนไขจบ</li><li>ทดลองให้คนอื่นทำตามเพื่อหาความกำกวม</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>แปรงฟัน</td><td>หยิบแปรง→ใส่ยาสีฟัน→แปรง→บ้วน→ล้าง</td></tr><tr><td>วาดสี่เหลี่ยม</td><td>วาดเส้นตรง 4 เส้นเชื่อมเป็นมุมฉาก</td></tr><tr><td>เดินไปประตู</td><td>หันไปทางประตู→เดิน 5 ก้าว→หยุด</td></tr></tbody></table></div>","lessonNo":2,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l2-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"อัลกอริทึมและลำดับขั้น","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เรียงบัตรล้างมือ</li><li>แก้คำสั่งกำกวม</li><li>เขียนขั้นตอนให้เพื่อนวาดภาพเดียวกัน</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Robot Teacher</div><p class=\"content-p \">อุปกรณ์: ตารางพื้น ลูกศร และหุ่นยนต์กระดาษ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กคนหนึ่งเป็นหุ่นยนต์ ทำตามคำสั่งตรงตัว</li><li>ผู้สั่งห้ามชี้หรือช่วยด้วยท่าทาง</li><li>เมื่อหุ่นยนต์ทำผิด ให้หยุดและแก้คำสั่ง</li><li>สรุปคำใดกำกวมและเปลี่ยนให้วัดได้</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">เดินหน้า 1 ช่อง</span><span class=\"chip\">หันซ้าย 90°</span><span class=\"chip\">หันขวา 90°</span><span class=\"chip\">หยิบการ์ด</span><span class=\"chip\">วางการ์ด</span><span class=\"chip\">หยุด</span></div><p class=\"content-p question\">เกณฑ์คะแนน: คำสั่งชัด 1 + ลำดับถึงเป้าหมาย 1 + แก้ความกำกวม 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l2-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: อัลกอริทึมและลำดับขั้น","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เข้าใจอัลกอริทึมว่าเป็นลำดับคำสั่งที่ชัดเจน มีจุดเริ่ม–จบ และผู้อื่นทำตามแล้วได้ผลตามเป้าหมาย</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">algorithm</span><span class=\"chip\">ลำดับ</span><span class=\"chip\">คำสั่ง</span><span class=\"chip\">จุดเริ่มต้น</span><span class=\"chip\">ผลลัพธ์</span><span class=\"chip\">ความชัดเจน</span><span class=\"chip\">ผู้ปฏิบัติ</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>“ทำให้เรียบร้อย” กำกวม ควรบอกว่าจัดอะไรไว้ที่ใด</li><li>สลับลำดับอาจเปลี่ยนผล</li><li>อัลกอริทึมมีได้มากกว่าหนึ่งวิธี</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>แปรงฟัน</td><td>หยิบแปรง→ใส่ยาสีฟัน→แปรง→บ้วน→ล้าง</td></tr><tr><td>วาดสี่เหลี่ยม</td><td>วาดเส้นตรง 4 เส้นเชื่อมเป็นมุมฉาก</td></tr><tr><td>เดินไปประตู</td><td>หันไปทางประตู→เดิน 5 ก้าว→หยุด</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>“ทำให้เรียบร้อย” กำกวม ควรบอกว่าจัดอะไรไว้ที่ใด</li><li>สลับลำดับอาจเปลี่ยนผล</li><li>อัลกอริทึมมีได้มากกว่าหนึ่งวิธี</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ algorithm ลำดับ คำสั่ง จุดเริ่มต้น ผลลัพธ์ ความชัดเจน ผู้ปฏิบัติ"},{"id":"l2-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"อัลกอริทึมและลำดับขั้น","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เรียงขั้นตอนล้างมือ 5 ขั้น</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. แก้คำสั่ง “เดินไปนิดหนึ่ง”</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. อัลกอริทึมต้องมีอะไรอย่างน้อย 3 อย่าง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เขียนอัลกอริทึมพับกระดาษครึ่งหนึ่ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ให้เพื่อนทำตามและบันทึกจุดที่เข้าใจต่าง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. ปรับอัลกอริทึมจาก feedback</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":2,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l2-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"อัลกอริทึมและลำดับขั้น","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>เปิดน้ำ–ทำมือเปียก–ฟอกสบู่–ล้าง–เช็ด/ปิดน้ำ</td></tr><tr><td>2</td><td>เดินหน้า 2 ช่อง/2 ก้าว</td></tr><tr><td>3</td><td>จุดเริ่ม คำสั่งชัด ลำดับ และจุดจบ</td></tr><tr><td>4</td><td>วางกระดาษ–จับขอบ–พับให้ตรง–กดรอยพับ</td></tr><tr><td>5</td><td>คำตอบจากการทดลอง</td></tr><tr><td>6</td><td>ขั้นตอนใหม่ชัดเจนขึ้น</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเขียนลำดับได้ดีขึ้นและเห็นว่าคำสั่งต้องชัด ลองให้ผู้เรียนเขียนวิธีทำงานบ้านหนึ่งอย่าง แล้วผู้ปกครองทำตามเฉพาะที่เขียนเพื่อทดสอบ</p></div>","lessonNo":2,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l3-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 3: เส้นทางบนตารางและพิกัด","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ออกแบบลำดับคำสั่งเคลื่อนที่บนตาราง ใช้พิกัดอย่างง่าย และเปรียบเทียบเส้นทางที่สั้น/ปลอดภัยโดยไม่ใช้เครื่องคอมพิวเตอร์</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>จำนวนคำสั่งน้อยไม่เสมอปลอดภัยที่สุด</li><li>การหันไม่เท่ากับการเดิน</li><li>ตรวจเส้นทางทีละคำสั่ง</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"◎","search":"grid row column coordinate start goal obstacle route"},{"id":"l3-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"เส้นทางบนตารางและพิกัด","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>พิกัดมีประโยชน์อย่างไร</li><li>การหันทำให้ตำแหน่งเปลี่ยนไหม</li><li>ต้องระบุทิศเริ่มหรือไม่</li><li>เส้นทางสั้นกว่าดีเสมอไหม</li><li>ตรวจคำสั่งอย่างไร</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักสำรวจต้องนำเสบียงผ่านแผนที่ตารางที่มีแม่น้ำและกำแพง โดยส่งคำสั่งบนกระดาษเท่านั้น” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>กำหนดจุดเริ่มและทิศเริ่มต้น</li><li>คำสั่งพื้นฐาน: เดินหน้า หันซ้าย หันขวา</li><li>พิกัดช่วยระบุตำแหน่งไม่กำกวม</li><li>เส้นทางที่ดีต้องถึงเป้าหมายและหลบอุปสรรค</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>เริ่ม A1 หันเหนือ เดินหน้า 2</td><td>ไป A3</td></tr><tr><td>ขวา–หน้า–หน้า</td><td>ต้องรู้ทิศเริ่มจึงตีความได้</td></tr><tr><td>เส้นทางผ่านกำแพง</td><td>เป็นอัลกอริทึมที่ใช้ไม่ได้</td></tr></tbody></table></div>","lessonNo":3,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l3-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"เส้นทางบนตารางและพิกัด","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>อ่านพิกัดจากตาราง</li><li>จำลองลูกศรทีละคำสั่ง</li><li>หาเส้นทางสองแบบแล้วเปรียบเทียบ</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Floor Grid Mission</div><p class=\"content-p \">อุปกรณ์: เทปทำตารางพื้น 5×5 การ์ดลูกศร และสิ่งกีดขวาง</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กำหนด start, goal และทิศเริ่ม</li><li>ทีมวางการ์ดคำสั่งโดยยังไม่เดิน</li><li>เพื่อนเป็นหุ่นยนต์ทดสอบทีละใบ</li><li>ถ้าชนสิ่งกีดขวาง ให้แก้เฉพาะจุดที่ผิดและทดสอบใหม่</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">↑ เดินหน้า</span><span class=\"chip\">↶ หันซ้าย</span><span class=\"chip\">↷ หันขวา</span><span class=\"chip\">หยิบ</span><span class=\"chip\">วาง</span><span class=\"chip\">จุดตรวจ</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ถึงเป้าหมาย 2 + ไม่ชน 1 + อธิบายพิกัด/ทิศ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l3-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: เส้นทางบนตารางและพิกัด","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ออกแบบลำดับคำสั่งเคลื่อนที่บนตาราง ใช้พิกัดอย่างง่าย และเปรียบเทียบเส้นทางที่สั้น/ปลอดภัยโดยไม่ใช้เครื่องคอมพิวเตอร์</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">grid</span><span class=\"chip\">row</span><span class=\"chip\">column</span><span class=\"chip\">coordinate</span><span class=\"chip\">start</span><span class=\"chip\">goal</span><span class=\"chip\">obstacle</span><span class=\"chip\">route</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>จำนวนคำสั่งน้อยไม่เสมอปลอดภัยที่สุด</li><li>การหันไม่เท่ากับการเดิน</li><li>ตรวจเส้นทางทีละคำสั่ง</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>เริ่ม A1 หันเหนือ เดินหน้า 2</td><td>ไป A3</td></tr><tr><td>ขวา–หน้า–หน้า</td><td>ต้องรู้ทิศเริ่มจึงตีความได้</td></tr><tr><td>เส้นทางผ่านกำแพง</td><td>เป็นอัลกอริทึมที่ใช้ไม่ได้</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>จำนวนคำสั่งน้อยไม่เสมอปลอดภัยที่สุด</li><li>การหันไม่เท่ากับการเดิน</li><li>ตรวจเส้นทางทีละคำสั่ง</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ grid row column coordinate start goal obstacle route"},{"id":"l3-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"เส้นทางบนตารางและพิกัด","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. จาก A1 ไป A3 เมื่อหันเหนือ ต้องเดินกี่ช่อง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. การหันขวาเปลี่ยนตำแหน่งหรือทิศ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เขียนเส้นทางบนตารางที่กำหนด 6–10 คำสั่ง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. หาเส้นทางอีกแบบ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เปรียบเทียบเส้นทางด้วยเกณฑ์ 2 ข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. บอก bug ที่พบและคำสั่งที่แก้</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":3,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l3-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"เส้นทางบนตารางและพิกัด","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>2 ช่อง</td></tr><tr><td>2</td><td>เปลี่ยนทิศ ไม่เปลี่ยนตำแหน่ง</td></tr><tr><td>3</td><td>เส้นทางถูกและหลบอุปสรรค</td></tr><tr><td>4</td><td>คำตอบต่างแต่ถึงจุดหมาย</td></tr><tr><td>5</td><td>จำนวนคำสั่ง ความปลอดภัย ความง่ายในการตรวจ</td></tr><tr><td>6</td><td>ระบุจุดผิดเฉพาะและการแก้</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนวางแผนเส้นทางและทดสอบทีละคำสั่งได้ดี ควรฝึกแยก “หัน” กับ “เดิน” และระบุทิศเริ่มต้นทุกครั้ง</p></div>","lessonNo":3,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l4-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 4: Debugging: หาข้อผิดพลาดและแก้ทีละจุด","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">มองข้อผิดพลาดเป็นข้อมูล เรียนรู้การทำซ้ำ ทดสอบทีละส่วน ระบุจุดผิด และแก้โดยไม่เปลี่ยนทุกอย่างพร้อมกัน</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ข้อผิดพลาดไม่ใช่ความล้มเหลว</li><li>อย่าเดาแก้หลายจุดพร้อมกัน</li><li>ใช้หลักฐานจาก trace</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":4,"teacherOnly":false,"icon":"◎","search":"bug debug test expected result actual result trace fix"},{"id":"l4-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"Debugging: หาข้อผิดพลาดและแก้ทีละจุด","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>bug คืออะไร</li><li>ขั้นแรกก่อนแก้คืออะไร</li><li>ทำไมแก้ทีละจุด</li><li>trace หมายถึงอะไร</li><li>ถ้าผลจริงตรงถึงขั้น 3 bug น่าจะอยู่ที่ใด</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “รหัสเส้นทางของเพื่อนเสีย แต่ห้ามเขียนใหม่ทั้งหมด เด็กต้องใช้ตาราง trace หา “จุดแรกที่ต่าง”” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>กำหนดผลที่คาดก่อนทดสอบ</li><li>ทำตามคำสั่งทีละขั้นและจดผลจริง</li><li>หาขั้นแรกที่ผลเริ่มต่าง</li><li>แก้หนึ่งจุดแล้วทดสอบใหม่</li><li>เก็บสิ่งที่ถูกไว้ ไม่รื้อทั้งหมด</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>คาดว่าจะถึงดาว แต่ไปชนกำแพงที่คำสั่ง 4</td><td>bug อยู่ก่อน/ที่คำสั่ง 4</td></tr><tr><td>แก้หันซ้ายเป็นหันขวาแล้วทดสอบ</td><td>debug หนึ่งจุด</td></tr><tr><td>ผลยังผิด</td><td>ย้อนดูจุดต่างแรกอีกครั้ง</td></tr></tbody></table></div>","lessonNo":4,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l4-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"Debugging: หาข้อผิดพลาดและแก้ทีละจุด","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เดินตามคำสั่งผิดทีละใบ</li><li>ทำตารางขั้น–คาด–จริง</li><li>เสนอ fix และทดสอบซ้ำ</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Bug Hospital</div><p class=\"content-p \">อุปกรณ์: ซองโปรแกรมเส้นทางผิด ตาราง trace และสติกเกอร์ bug/fix</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>รับโปรแกรมที่มี bug 1–2 จุด</li><li>ก่อนเดิน เขียนผลคาดหวัง</li><li>จำลองทีละคำสั่งและบันทึกตำแหน่งจริง</li><li>ติดสติกเกอร์ bug ที่จุดแรกต่าง แก้หนึ่งใบ แล้วรันใหม่</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">missing step</span><span class=\"chip\">wrong turn</span><span class=\"chip\">extra step</span><span class=\"chip\">wrong order</span><span class=\"chip\">unclear instruction</span></div><p class=\"content-p question\">เกณฑ์คะแนน: หา first difference 2 + แก้หนึ่งจุด 1 + ทดสอบซ้ำ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":4,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l4-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: Debugging: หาข้อผิดพลาดและแก้ทีละจุด","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">มองข้อผิดพลาดเป็นข้อมูล เรียนรู้การทำซ้ำ ทดสอบทีละส่วน ระบุจุดผิด และแก้โดยไม่เปลี่ยนทุกอย่างพร้อมกัน</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">bug</span><span class=\"chip\">debug</span><span class=\"chip\">test</span><span class=\"chip\">expected result</span><span class=\"chip\">actual result</span><span class=\"chip\">trace</span><span class=\"chip\">fix</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ข้อผิดพลาดไม่ใช่ความล้มเหลว</li><li>อย่าเดาแก้หลายจุดพร้อมกัน</li><li>ใช้หลักฐานจาก trace</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>คาดว่าจะถึงดาว แต่ไปชนกำแพงที่คำสั่ง 4</td><td>bug อยู่ก่อน/ที่คำสั่ง 4</td></tr><tr><td>แก้หันซ้ายเป็นหันขวาแล้วทดสอบ</td><td>debug หนึ่งจุด</td></tr><tr><td>ผลยังผิด</td><td>ย้อนดูจุดต่างแรกอีกครั้ง</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ข้อผิดพลาดไม่ใช่ความล้มเหลว</li><li>อย่าเดาแก้หลายจุดพร้อมกัน</li><li>ใช้หลักฐานจาก trace</li></ul></div>","lessonNo":4,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ bug debug test expected result actual result trace fix"},{"id":"l4-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"Debugging: หาข้อผิดพลาดและแก้ทีละจุด","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. อธิบาย bug และ debugging</label><input type=\"text\" class=\"response-input \" data-save-key=\"l4-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ทำไมต้องรู้ expected result</label><input type=\"text\" class=\"response-input \" data-save-key=\"l4-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เติมตาราง trace จากคำสั่ง 5 ขั้น</label><input type=\"text\" class=\"response-input \" data-save-key=\"l4-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ระบุจุดแรกที่ผลต่าง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l4-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เสนอ fix หนึ่งจุด</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l4-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนสิ่งที่เรียนรู้จาก bug</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l4-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l4-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":4,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l4-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"Debugging: หาข้อผิดพลาดและแก้ทีละจุด","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>bug คือข้อผิดพลาด; debugging คือกระบวนการหาและแก้</td></tr><tr><td>2</td><td>เพื่อเปรียบเทียบกับผลจริงและรู้ว่าผิดเมื่อใด</td></tr><tr><td>3</td><td>ตำแหน่ง/ผลแต่ละขั้นถูก</td></tr><tr><td>4</td><td>ตามตารางโจทย์</td></tr><tr><td>5</td><td>แก้คำสั่งเฉพาะที่ทำให้ต่าง</td></tr><tr><td>6</td><td>ข้อผิดพลาดช่วยบอกจุดที่ต้องปรับและควรทดสอบซ้ำ</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนมีทัศนคติที่ดีต่อข้อผิดพลาดและใช้ trace หา bug ได้ ควรฝึกพูดว่า “ผลเริ่มต่างที่ขั้น…” แทนการบอกว่า “ผิดหมด”</p></div>","lessonNo":4,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l5-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 5: ผังงาน: สื่อสารขั้นตอนด้วยสัญลักษณ์","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">อ่านและสร้างผังงานอย่างง่ายด้วยเริ่ม/จบ กระบวนการ การตัดสินใจ และลูกศร เพื่อให้เห็นทิศทางชัดเจน</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>สัญลักษณ์ช่วยอ่านเร็วแต่ข้อความยังต้องชัด</li><li>ลูกศรขาดทำให้ไม่รู้ลำดับ</li><li>คำถามใน decision ควรตอบได้เป็นตัวเลือกชัด</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":5,"teacherOnly":false,"icon":"◎","search":"flowchart start/end process decision arrow yes/no symbol"},{"id":"l5-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"ผังงาน: สื่อสารขั้นตอนด้วยสัญลักษณ์","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>วงรีใช้ทำอะไร</li><li>decision ใช้รูปใด</li><li>ลูกศรมีหน้าที่อะไร</li><li>คำถาม decision ควรตอบแบบใด</li><li>ยก decision ในชีวิตจริง</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “คู่มือฉุกเฉินของห้องเรียนต้องอ่านได้ทันที เด็กจึงต้องเปลี่ยนข้อความยาวให้เป็นผังงานชัดเจน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>วงรี = เริ่ม/จบ</li><li>สี่เหลี่ยม = กระบวนการ/คำสั่ง</li><li>สี่เหลี่ยมข้าวหลามตัด = คำถามตัดสินใจ</li><li>ลูกศรบอกทิศทาง</li><li>decision ต้องมีทางออกอย่างน้อย Yes/No</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>เริ่ม→แปรงฟัน→จบ</td><td>ผังงานลำดับตรง</td></tr><tr><td>ฝนตกไหม? Yes→กางร่ม / No→เดินต่อ</td><td>ผังงานมีการตัดสินใจ</td></tr><tr><td>ไม่มีลูกศร</td><td>ไม่ทราบทิศทาง</td></tr></tbody></table></div>","lessonNo":5,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l5-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"ผังงาน: สื่อสารขั้นตอนด้วยสัญลักษณ์","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จับคู่สัญลักษณ์กับหน้าที่</li><li>อ่านผังงานแล้วบอกผลลัพธ์</li><li>เปลี่ยนขั้นตอนล้างมือเป็นผังงาน</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Human Flowchart</div><p class=\"content-p \">อุปกรณ์: แผ่นสัญลักษณ์ขนาดใหญ่ ลูกศร และบัตรคำสั่ง</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>วางสัญลักษณ์บนพื้น</li><li>เด็กแต่ละคนถือขั้นตอนและยืนตามผัง</li><li>ผู้ทดสอบเดินตามลูกศร</li><li>เพิ่ม decision หนึ่งจุดและทดสอบทั้งทาง Yes/No</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Start</span><span class=\"chip\">Process</span><span class=\"chip\">Decision</span><span class=\"chip\">Yes</span><span class=\"chip\">No</span><span class=\"chip\">End</span><span class=\"chip\">Is it raining?</span><span class=\"chip\">Take an umbrella</span></div><p class=\"content-p question\">เกณฑ์คะแนน: สัญลักษณ์ถูก 1 + ลูกศรครบ 1 + ทั้งสองทางถึงจบ 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":5,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l5-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: ผังงาน: สื่อสารขั้นตอนด้วยสัญลักษณ์","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อ่านและสร้างผังงานอย่างง่ายด้วยเริ่ม/จบ กระบวนการ การตัดสินใจ และลูกศร เพื่อให้เห็นทิศทางชัดเจน</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">flowchart</span><span class=\"chip\">start/end</span><span class=\"chip\">process</span><span class=\"chip\">decision</span><span class=\"chip\">arrow</s \" class=\"response-input \" data-save-key=\"l5-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เพิ่มคำถาม “ฝนตกไหม?” และทาง Yes/No</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l5-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. ตรวจผังงานด้วย checklist</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l5-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l5-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":5,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l5-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"ผังงาน: สื่อสารขั้นตอนด้วยสัญลักษณ์","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>วงรี</td></tr><tr><td>2</td><td>สี่เหลี่ยมผืนผ้า</td></tr><tr><td>3</td><td>สี่เหลี่ยมข้าวหลามตัด</td></tr><tr><td>4</td><td>มีเริ่ม กระบวนการ ลูกศร จบ</td></tr><tr><td>5</td><td>สองแขนงชัดเจนและกลับ/จบเหมาะสม</td></tr><tr><td>6</td><td>สัญลักษณ์ ลูกศร ข้อความ และปลายทางครบ</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนอ่านสัญลักษณ์ผังงานได้และสร้างผังง่าย ๆ ได้ ควรฝึกตรวจว่าลูกศรทุกทาง โดยเฉพาะ Yes/No มีจุดจบ</p></div>","lessonNo":5,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l6-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 6: เงื่อนไข: ถ้า…แล้ว…มิฉะนั้น…","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ใช้เงื่อนไขตัดสินใจจากข้อมูล โดยเขียน If–Then–Else ให้ครบและทดสอบกรณีขอบเขต</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>“อากาศดี” กำกวมกว่าค่าอุณหภูมิ/ฝน</li><li>ต้องทดสอบทั้ง true และ false</li><li>ถ้าไม่มี else ต้องรู้ว่าเมื่อ false ทำอะไร</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"◎","search":"condition if then else true false rule boundary"},{"id":"l6-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"เงื่อนไข: ถ้า…แล้ว…มิฉะนั้น…","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>IF คืออะไร</li><li>ELSE ทำเมื่อใด</li><li>คะแนน 8 ใน ≥8 เป็น true ไหม</li><li>ทำไมต้องทดสอบทั้งสองทาง</li><li>ยกเงื่อนไขที่ตรวจได้ 1 ข้อ</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ประตูเมืองอัจฉริยะใช้กฎบัตรผ่าน เด็กต้องออกแบบเงื่อนไขที่ยุติธรรมและไม่ทิ้งกรณีใดไว้” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>IF เงื่อนไขเป็นจริง THEN ทำทางหนึ่ง ELSE ทำอีกทาง</li><li>เงื่อนไขต้องตรวจได้ เช่น คะแนน ≥ 8</li><li>ระวังกรณีเท่ากับขอบเขต</li><li>หลายเงื่อนไขควรเรียงลำดับไม่ให้ทับกัน</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>IF ฝนตก THEN กางร่ม ELSE ไม่กาง</td><td>สองทางครบ</td></tr><tr><td>IF คะแนน ≥ 8 THEN ผ่าน</td><td>คะแนน 8 ต้องผ่านเพราะมี =</td></tr><tr><td>IF สีแดง THEN หยุด ELSE เดิน</td><td>เงื่อนไขจากสัญญาณ</td></tr></tbody></table></div>","lessonNo":6,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l6-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"เงื่อนไข: ถ้า…แล้ว…มิฉะนั้น…","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เปลี่ยนกฎชีวิตจริงเป็น IF–THEN–ELSE</li><li>ทดสอบบัตรกรณีต่าง ๆ</li><li>ค้นหากฎทับซ้อน/ช่องว่าง</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Condition Gatekeeper</div><p class=\"content-p \">อุปกรณ์: ป้าย IF/THEN/ELSE บัตรคุณสมบัติ และประตูจำลอง</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กลุ่มตั้งกฎ เช่น IF บัตรสีฟ้า THEN ผ่าน ELSE รอ</li><li>เพื่อนสุ่มบัตรและเดินตามผล</li><li>เพิ่มเงื่อนไขตัวเลขและทดสอบค่าต่ำกว่า–เท่ากับ–สูงกว่า</li><li>แก้กฎถ้าพบกรณีไม่ชัด</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">score 7</span><span class=\"chip\">score 8</span><span class=\"chip\">score 9</span><span class=\"chip\">red card</span><span class=\"chip\">blue card</span><span class=\"chip\">raining</span><span class=\"chip\">not raining</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ผล true/false ถูก 1 + ทดสอบ boundary 1 + กฎชัด 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l6-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: เงื่อนไข: ถ้า…แล้ว…มิฉะนั้น…","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ใช้เงื่อนไขตัดสินใจจากข้อมูล โดยเขียน If–Then–Else ให้ครบและทดสอบกรณีขอบเขต</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">condition</span><span class=\"chip\">if</span><span class=\"chip\">then</span><span class=\"chip\">else</span><span class=\"chip\">true</span><span class=\"chip\">false</span><span class=\"chip\">rule</span><span class=\"chip\">boundary</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>“อากาศดี” กำกวมกว่าค่าอุณหภูมิ/ฝน</li><li>ต้องทดสอบทั้ง true และ false</li><li>ถ้าไม่มี else ต้องรู้ว่าเมื่อ false ทำอะไร</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>IF ฝนตก THEN กางร่ม ELSE ไม่กาง</td><td>สองทางครบ</td></tr><tr><td>IF คะแนน ≥ 8 THEN ผ่าน</td><td>คะแนน 8 ต้องผ่านเพราะมี =</td></tr><tr><td>IF สีแดง THEN หยุด ELSE เดิน</td><td>เงื่อนไขจากสัญญาณ</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>“อากาศดี” กำกวมกว่าค่าอุณหภูมิ/ฝน</li><li>ต้องทดสอบทั้ง true และ false</li><li>ถ้าไม่มี else ต้องรู้ว่าเมื่อ false ทำอะไร</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ condition if then else true false rule boundary"},{"id":"l6-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"เงื่อนไข: ถ้า…แล้ว…มิฉะนั้น…","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เขียน IF ฝนตก…</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. คะแนนผ่าน ≥ 10: คะแนน 10 ได้ผลอะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เขียนเงื่อนไขเลือกเสื้อจากอุณหภูมิ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ทดสอบเงื่อนไขด้วย 3 ค่า</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. หาช่องว่างในกฎ &gt;10 และ &lt;10</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. แต่งเกมทายบัตรด้วยเงื่อนไข 2 ขั้น</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":6,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l6-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"เงื่อนไข: ถ้า…แล้ว…มิฉะนั้น…","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>IF ฝนตก THEN กางร่ม ELSE ไม่กางร่ม</td></tr><tr><td>2</td><td>ผ่าน</td></tr><tr><td>3</td><td>เช่น IF ต่ำกว่า 20 THEN ใส่เสื้อหนา ELSE ใส่เสื้อบาง</td></tr><tr><td>4</td><td>ค่าต่ำกว่า เท่ากับ สูงกว่าขอบเขต</td></tr><tr><td>5</td><td>ค่าเท่ากับ 10 ไม่มีทาง ต้องเพิ่ม ≥/≤ หรือ else</td></tr><tr><td>6</td><td>กฎไม่ทับซ้อนและครอบคลุม</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนใช้ IF–THEN–ELSE ได้ดี จุดที่ควรฝึกคือค่าที่ “เท่ากับ” ขอบเขต ให้ทดสอบต่ำกว่า–เท่ากับ–สูงกว่าทุกครั้ง</p></div>","lessonNo":6,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l7-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 7: การทำซ้ำ: Loops","parent":"คอมพิวเตอร์ (ไม่ใช้เครื่อง) ป.4","html":"<p class=\"content-p lead\">ย่อคำสั่งซ้ำด้วย repeat จำนวนครั้งหรือทำซ้ำจนเงื่อนไขเป็นจริง และเปรียบเทียบความกระชับกับความถูกต้อง</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ว 4.2 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>นับผลรวมจำนวนรอบ×การเคลื่อนที่ในหนึ่งรอบ</li><li>คำสั่งนอกลูปทำครั้งเดียว</li><li>เงื่อนไข until ตรวจหลัง/ก่อนตามกติกาที่กำหนดให้ชัด</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"◎","search":"loop repeat times until iteration pattern body"},{"id":"l7-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"การทำซ้ำ: Loops","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>loop ช่วยอะไร</li><li>ซ้ำหน้า 2 ช่อง 3 รอบ รวมกี่ช่อง</li><li>คำสั่งใดอยู่ในวงเล็บลูป</li><li>infinite loop คืออะไร</li><li>ยกกิจกรรมซ้ำในชีวิตจริง</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักเต้นหุ่นยนต์มีการ์ดจำกัด จึงต้องใช้ลูปแทนการเขียนท่าซ้ำยาว ๆ” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>REPEAT n TIMES ทำชุดคำสั่ง n รอบ</li><li>REPEAT UNTIL ทำจนเงื่อนไขจบเป็นจริง</li><li>ต้องรู้ว่าคำสั่งใดอยู่ในลูป</li><li>ลูปต้องมีโอกาสหยุด ไม่เช่นนั้นเป็น infinite loop</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>หน้า 1 ช่อง ซ้ำ 4 ครั้ง</td><td>ไปข้างหน้า 4 ช่อง</td></tr><tr><td>ซ้ำ [หน้า,ขวา] 4 ครั้ง</td><td>เดินเป็นสี่เหลี่ยม</td></tr><tr><td>ทำจนถึงกำแพง แต่ไม่มีการเคลื่อนที่</td><td>อาจวนไม่จบ</td></tr></tbody></table></div>","lessonNo":7,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l7-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"การทำซ้ำ: Loops","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>ยุบคำสั่งซ้ำเป็น repeat</li><li>คลี่ลูปเพื่อทำนายผล</li><li>ออกแบบลวดลายจากชุดคำสั่งซ้ำ</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและ
