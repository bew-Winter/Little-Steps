p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>สัมภาษณ์ Can you…?</li><li>แยก ability กับ rule</li><li>แก้ประโยคที่เติม s หลัง can</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Talent &amp; Safety Stations</div><p class=\"content-p \">อุปกรณ์: ป้ายฐานความสามารถและบัตรกฎ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กเดินฐานและถามคู่ Can you…?</li><li>คู่ตอบและสาธิตท่าทางแบบปลอดภัย</li><li>หยิบบัตรสถานที่แล้วแต่งกฎ You can/cannot…</li><li>กลุ่มเลือกกฎสำคัญที่สุดและอธิบาย</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">swim</span><span class=\"chip\">sing</span><span class=\"chip\">draw</span><span class=\"chip\">ride a bike</span><span class=\"chip\">library: talk quietly</span><span class=\"chip\">pool: run</span><span class=\"chip\">road: look both ways</span></div><p class=\"content-p question\">เกณฑ์คะแนน: คำถาม–ตอบถูก 1 + base verb ถูก 1 + กฎสมเหตุผล 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l14-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: Can / Cannot: Abilities & Rules","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">บอกความสามารถ ขออนุญาต และกฎง่าย ๆ ด้วย can/cannot โดยใช้กริยารูปเดิม</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">can</span><span class=\"chip\">cannot</span><span class=\"chip\">can’t</span><span class=\"chip\">swim</span><span class=\"chip\">ride a bike</span><span class=\"chip\">sing</span><span class=\"chip\">draw</span><span class=\"chip\">May I…?</span><span class=\"chip\">rule</span><span class=\"chip\">safe</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>can ใช้เหมือนกันทุกประธาน</li><li>หลัง can เป็น base verb</li><li>แยกความสามารถ (can) กับข้อห้าม (cannot/must not) ตามบริบท</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>She can sings.</td><td>แก้เป็น She can sing.</td></tr><tr><td>Can you swim?</td><td>Yes, I can.</td></tr><tr><td>You cannot run here.</td><td>กฎห้ามวิ่งบริเวณนี้</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>can ใช้เหมือนกันทุกประธาน</li><li>หลัง can เป็น base verb</li><li>แยกความสามารถ (can) กับข้อห้าม (cannot/must not) ตามบริบท</li></ul></div>","lessonNo":14,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ can cannot can’t swim ride a bike sing draw May I…? rule safe"},{"id":"l14-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"Can / Cannot: Abilities & Rules","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เติม She can ___ well. (sing)</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. แก้ He can plays football.</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. ตอบ Can you swim? แบบปฏิเสธ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เขียนความสามารถ 3 อย่าง</label><input type=\"text\" class=\"response-input \" data-save-key=\"l14-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนกฎในห้องเรียน 3 ข้อด้วย can/cannot</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบายกฎ “หลัง can ใช้กริยารูปใด”</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l14-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":14,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l14-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"Can / Cannot: Abilities & Rules","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>sing</td></tr><tr><td>2</td><td>He can play football.</td></tr><tr><td>3</td><td>No, I cannot./No, I can’t.</td></tr><tr><td>4</td><td>I can… 3 ประโยค</td></tr><tr><td>5</td><td>คำตอบสมเหตุสมผล</td></tr><tr><td>6</td><td>ใช้ base verb ไม่เติม s และไม่ใส่ to</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนใช้ can/can’t เพื่อบอกความสามารถได้คล่อง จุดที่ต้องระวังคือหลัง can ใช้กริยารูปเดิมเสมอ ให้ฝึกสัมภาษณ์สมาชิกครอบครัวด้วย Can you…?</p></div>","lessonNo":14,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l15-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 15: Reading Short Texts: Main Idea & Details","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">อ่านย่อหน้าสั้นโดยใช้ขั้น Preview–Read–Underline–Answer แยกใจความสำคัญจากรายละเอียด และตอบด้วยหลักฐานจากข้อความ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.1 ป.4/4</span><span class=\"chip\">ต 1.3 ป.4/2</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ใช้คำถาม Who/Where/When/What เพื่อหาข้อมูล</li><li>เลือกใจความสำคัญที่ครอบคลุมทั้งย่อหน้า</li><li>อ้างหลักฐานจากข้อความก่อนตอบ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"◎","search":"title main idea detail who where when because evidence"},{"id":"l15-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"Reading Short Texts: Main Idea & Details","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>main idea แปลว่าอะไร</li><li>คำถาม Where มองหาข้อมูลใด</li><li>ควรอ่าน title ก่อนหรือหลัง</li><li>หลักฐานคืออะไร</li><li>สรุปข้อความตัวอย่างหนึ่งประโยค</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักสืบหนังสือต้องหาคำตอบจากหลักฐานในข้อความ ห้ามตอบจากการเดาหรือประสบการณ์ส่วนตัว” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>อ่านชื่อเรื่องและภาพก่อน</li><li>อ่านคำถามก่อนอ่านรอบสอง</li><li>ขีดเส้นใต้คำที่ตอบ who/where/when</li><li>Main idea = เรื่องส่วนใหญ่กล่าวถึงอะไร</li><li>ตอบแล้วชี้ประโยคหลักฐาน</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>Tom goes to the park every Sunday. He rides his bike and feeds the fish.</td><td>Main idea: Tom’s Sunday at the park.</td></tr><tr><td>Where does Tom go?</td><td>He goes to the park.</td></tr><tr><td>What does he do?</td><td>He rides his bike and feeds the fish.</td></tr></tbody></table></div>","lessonNo":15,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l15-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"Reading Short Texts: Main Idea & Details","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>อ่านย่อหน้าพร้อมกันและวงชื่อคน</li><li>จับคู่คำถามกับประโยคหลักฐาน</li><li>เลือก main idea จาก 3 ตัวเลือก</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Evidence Detective</div><p class=\"content-p \">อุปกรณ์: ข้อความสั้น 4 ใบ ปากกาเน้นคำ และบัตรคำถาม</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>กลุ่มอ่าน title และคาดเดาเนื้อหา</li><li>หยิบบัตร who/where/when/why</li><li>ขีดเส้นใต้หลักฐานด้วยสีเดียวกับบัตร</li><li>ตอบเป็นประโยคและอ่านหลักฐานให้เพื่อนฟัง</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Who?</span><span class=\"chip\">Where?</span><span class=\"chip\">When?</span><span class=\"chip\">What does…do?</span><span class=\"chip\">Why?</span><span class=\"chip\">Main idea?</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ตอบถูก 1 + ชี้หลักฐานถูก 1 + สรุปไม่เกิน 1 ประโยค 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l15-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: Reading Short Texts: Main Idea & Details","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">อ่านย่อหน้าสั้นโดยใช้ขั้น Preview–Read–Underline–Answer แยกใจความสำคัญจากรายละเอียด และตอบด้วยหลักฐานจากข้อความ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">title</span><span class=\"chip\">main idea</span><span class=\"chip\">detail</span><span class=\"chip\">who</span><span class=\"chip\">where</span><span class=\"chip\">when</span><span class=\"chip\">because</span><span class=\"chip\">evidence</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ไม่จำเป็นต้องแปลทุกคำ</li><li>ใจความสำคัญครอบคลุมหลายประโยค</li><li>รายละเอียดสนับสนุนใจความสำคัญ</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>Tom goes to the park every Sunday. He rides his bike and feeds the fish.</td><td>Main idea: Tom’s Sunday at the park.</td></tr><tr><td>Where does Tom go?</td><td>He goes to the park.</td></tr><tr><td>What does he do?</td><td>He rides his bike and feeds the fish.</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ไม่จำเป็นต้องแปลทุกคำ</li><li>ใจความสำคัญครอบคลุมหลายประโยค</li><li>รายละเอียดสนับสนุนใจความสำคัญ</li></ul></div>","lessonNo":15,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ title main idea detail who where when because evidence"},{"id":"l15-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"Reading Short Texts: Main Idea & Details","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. อ่านข้อความ: “Mina has a small garden. She waters the flowers every morning. She likes red roses.” ใครมีสวน</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-q1\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เธอรดน้ำเมื่อใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เธอชอบดอกไม้อะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ใจความสำคัญคืออะไร</label><input type=\"text\" class=\"response-input \" data-save-key=\"l15-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. ขีด/คัดประโยคหลักฐานของข้อ 2</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนสรุปข้อความ 1 ประโยค</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l15-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":15,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l15-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"Reading Short Texts: Main Idea & Details","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>Mina</td></tr><tr><td>2</td><td>every morning</td></tr><tr><td>3</td><td>red roses</td></tr><tr><td>4</td><td>Mina’s garden / สวนและการดูแลดอกไม้ของ Mina</td></tr><tr><td>5</td><td>She waters the flowers every morning.</td></tr><tr><td>6</td><td>Mina takes care of her small garden and likes red roses.</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนหาข้อมูลตรงจากข้อความได้ดีขึ้น ควรฝึกสรุปใจความสำคัญโดยถามว่า “ทุกประโยคพูดเรื่องเดียวกันว่าอะไร” และชี้หลักฐานก่อนตอบ</p></div>","lessonNo":15,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l16-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 16: Writing & Speaking Mini Project","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">บูรณาการคำศัพท์และโครงสร้างทั้งคอร์สเพื่อสร้างโปสเตอร์ “All About Me” และนำเสนอ 1–2 นาทีอย่างมั่นใจ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.2 ป.4/4</span><span class=\"chip\">ต 1.3 ป.4/1</span><span class=\"chip\">ต 4.1 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>วางแผนและเขียนข้อความแนะนำตนเองอย่างเป็นลำดับ</li><li>ตรวจแก้ภาษาโดยใช้ checklist</li><li>นำเสนอด้วยเสียงชัดและรับ feedback อย่างสร้างสรรค์</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":16,"teacherOnly":false,"icon":"◎","search":"introduction draft check revise present voice eye contact because"},{"id":"l16-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"Writing & Speaking Mini Project","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>บอก 5 ส่วนของโปสเตอร์</li><li>แก้ i am ten.</li><li>เพิ่มเหตุผลให้ I like music.</li><li>พูด closing 1 แบบ</li><li>ตรวจประโยค He can plays.</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “โรงเรียนจัด Little Steps English Day เด็กต้องสร้างโปสเตอร์แนะนำตนเองและนำเสนอให้ผู้ฟังเข้าใจโดยไม่อ่านท่องทั้งหมด” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>โครงสร้าง 5 ส่วน: greeting–name/age–family/routine–likes/ability–closing</li><li>เขียนร่างก่อนตกแต่ง</li><li>ตรวจ Capital letter, spacing, full stop, verb</li><li>พูดช้า ชัด มองผู้ฟัง และใช้บัตรคำสำคัญไม่อ่านทั้งแผ่น</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>Hello. My name is Nida.</td><td>เปิดเรื่อง</td></tr><tr><td>I usually wake up at six.</td><td>กิจวัตร</td></tr><tr><td>I like drawing because it is fun.</td><td>ความชอบพร้อมเหตุผล</td></tr><tr><td>I can swim. Thank you.</td><td>ความสามารถและปิดเรื่อง</td></tr></tbody></table></div>","lessonNo":16,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l16-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"Writing & Speaking Mini Project","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>วางแผนข้อมูลด้วย mind map</li><li>เขียนร่าง 8–10 ประโยค</li><li>ใช้ checklist ตรวจคู่</li><li>ซ้อมพูดรอบสั้นและรับ feedback</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Gallery Walk &amp; Two Stars, One Step</div><p class=\"content-p \">อุปกรณ์: กระดาษโปสเตอร์ สติกเกอร์ดาว บัตร checklist</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กติดผลงานรอบห้อง</li><li>เพื่อนเดินอ่านและติดดาว 2 จุดที่ทำดี</li><li>เขียน One Step ข้อเสนอแนะ 1 อย่างอย่างสุภาพ</li><li>เจ้าของแก้ผลงานและนำเสนอรอบสุดท้าย</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Correct sentence</span><span class=\"chip\">Clear idea</span><span class=\"chip\">Good reason</span><span class=\"chip\">Neat layout</span><span class=\"chip\">Speak clearly</span><span class=\"chip\">Look at audience</span></div><p class=\"content-p question\">เกณฑ์คะแนน: เนื้อหาครบ 4 + ภาษา 3 + การนำเสนอ 2 + ปรับงานจาก feedback 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":16,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l16-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: Writing & Speaking Mini Project","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">บูรณาการคำศัพท์และโครงสร้างทั้งคอร์สเพื่อสร้างโปสเตอร์ “All About Me” และนำเสนอ 1–2 นาทีอย่างมั่นใจ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">introduction</span><span class=\"chip\">draft</span><span class=\"chip\">check</span><span class=\"chip\">revise</span><span class=\"chip\">present</span><span class=\"chip\">voice</span><span class=\"chip\">eye contact</span><span class=\"chip\">because</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>งานเขียนที่ดีผ่านขั้น plan→draft→check→revise→publish</li><li>ประโยคสั้นแต่ถูกและเชื่อมกันดีกว่าประโยคยาวที่ไม่ชัด</li><li>การนำเสนอประเมินทั้งเนื้อหา ความชัด และความกล้า</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>Hello. My name is Nida.</td><td>เปิดเรื่อง</td></tr><tr><td>I usually wake up at six.</td><td>กิจวัตร</td></tr><tr><td>I like drawing because it is fun.</td><td>ความชอบพร้อมเหตุผล</td></tr><tr><td>I can swim. Thank you.</td><td>ความสามารถและปิดเรื่อง</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>งานเขียนที่ดีผ่านขั้น plan→draft→check→revise→publish</li><li>ประโยคสั้นแต่ถูกและเชื่อมกันดีกว่าประโยคยาวที่ไม่ชัด</li><li>การนำเสนอประเมินทั้งเนื้อหา ความชัด และความกล้า</li></ul></div>","lessonNo":16,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ introduction draft check revise present voice eye contact because"},{"id":"l16-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"Writing & Speaking Mini Project","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เขียน greeting และแนะนำชื่อ/อายุ 2 ประโยค</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เขียนกิจวัตร 2 ประโยค</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เขียนความชอบพร้อม because</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เขียนความสามารถด้วย can</label><input type=\"text\" class=\"response-input \" data-save-key=\"l16-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. รวมเป็นร่าง 8–10 ประโยคและตรวจตัวพิมพ์ใหญ่/จุด</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l16-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนบันทึกหลั const visible=()=>SLIDES.filter(s=>mode==='teacher'||!s.teacherOnly);
const cur=()=>SLIDES.find(s=>s.id===current)||SLIDES[0];
function coverHTML(){return `<div class="cover"><div class="cover-copy"><div class="eyebrow">✦ ${COURSE.englishName}</div><h1 class="cover-title">${COURSE.title}<span>ป.4 · 16 ชั่วโมง</span></h1><p class="cover-subtitle">${COURSE.subtitle}</p><div class="cover-pills">${COURSE.pills.map(x=>`<span class="cover-pill">${x}</span>`).join('')}</div><div class="cta-row"><button type="button" class="cta primary" onclick="go('course-map')">ดูแผนทั้งคอร์ส →</button><button type="button" class="cta secondary" onclick="go('${COURSE.firstLesson}')">เริ่มชั่วโมงที่ 1</button></div></div><div class="cover-logo"><img src="assets/logo.png" alt="Little Steps"></div></div>`}
function mapHTML(){return `<div class="map"><div class="map-head"><div><div class="eyebrow">แผนที่คอร์ส</div><h2>16 ก้าวการเรียนรู้</h2><p>แตะบทเรียนเพื่อเปิดภาพรวม ขั้นสอน ใบความรู้ เกม และใบงาน</p></div><button type="button" class="icon-btn" onclick="printAll()">🖨️ พิมพ์ทั้งชุด</button></div><div class="lesson-grid">${COURSE.lessons.map(l=>`<button type="button" class="lesson-card" onclick="go('${l.first}')"><span class="n">${l.no}</span><h3>${l.title}</h3><small>เปิดบทเรียน →</small></button>`).join('')}</div></div>`}
function render(dir=0){let s=cur();if(mode==='student'&&s.teacherOnly){current=visible()[0].id;s=cur()};const el=$('.slide');if(s.kind==='cover')el.innerHTML=coverHTML();else if(s.kind==='map')el.innerHTML=mapHTML();else el.innerHTML=`<header class="banner"><div class="kicker"><span class="dots"></span>${s.label}${s.lessonNo?` · ชั่วโมงที่ ${s.lessonNo}`:''}</div><h1 class="slide-title">${s.title}</h1>${s.parent?`<div class="slide-parent">${s.parent}</div>`:''}</header><main class="body">${s.html}</main><footer class="footer"><div class="footer-note">Little Steps · เพราะทุกก้าวเล็ก ๆ สร้างพัฒนาการที่ยิ่งใหญ่</div><div class="footer-actions"><button type="button" class="arrow" onclick="prev()">← ก่อนหน้า</button><button type="button" class="arrow primary" onclick="next()">ถัดไป →</button></div></footer>`;bindInputs();update();document.title=`${s.title} | ${COURSE.title} ป.4`;window.scrollTo({top:0,left:0,behavior:'auto'});$('.body')?.scrollTo(0,0)}
function go(id,historyMode='push'){const s=SLIDES.find(x=>x.id===id);if(!s)return;if(mode==='student'&&s.teacherOnly){toast('หน้านี้แสดงในโหมดครู');return}const v=visible(),old=v.findIndex(x=>x.id===current),neu=v.findIndex(x=>x.id===id);current=id;history[historyMode+'State']({id},'',`#${id}`);render(neu>old?1:-1);closeMenu()}
function next(){const v=visible(),i=v.findIndex(x=>x.id===current);if(i<v.length-1)go(v[i+1].id)}function prev(){const v=visible(),i=v.findIndex(x=>x.id===current);if(i>0)go(v[i-1].id)}
function update(){const v=visible(),i=Math.max(0,v.findIndex(x=>x.id===current));$('.progress-bar').style.width=`${(i+1)*100/v.length}%`;$('.progress-label').textContent=`${i+1} / ${v.length}`;$('.dock-page').textContent=`หน้า ${i+1} จาก ${v.length}`;$('.dock-title').textContent=cur().title;$$('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===current));const d=$(`details[data-lesson="${cur().lessonNo}"]`);if(d)d.open=true;$$('.arrow').forEach((b,n)=>b.disabled=n===0?i===0:i===v.length-1)}
function setMode(m){mode=m;Store.set(COURSE.storage+'-mode',m);document.body.dataset.mode=m;$('.mode-btn').dataset.active=String(m==='teacher');$('.mode-text').textContent=m==='teacher'?'ครู':'ผู้เรียน';if(m==='student'&&cur().teacherOnly)current=visible()[0].id;buildNav();render();toast(m==='teacher'?'เปิดโหมดครูแล้ว':'เปิดโหมดผู้เรียนแล้ว')}
function toggleMode(){setMode(mode==='teacher'?'student':'teacher')}
function buildNav(){let h='<div class="nav-title">เริ่มต้น</div>';for(const s of SLIDES.filter(x=>!x.lessonNo&&(mode==='teacher'||!x.teacherOnly)))h+=navBtn(s);for(const l of COURSE.lessons){const ss=SLIDES.filter(x=>x.lessonNo===l.no&&(mode==='teacher'||!x.teacherOnly));h+=`<details class="lesson-group" data-lesson="${l.no}"><summary><span class="nav-num">${l.no}</span><span>ชั่วโมงที่ ${l.no}<br><small>${l.title}</small></span></summary><div class="group-body">${ss.map(navBtn).join('')}</div></details>`}$('.nav-content').innerHTML=h;bindSearch();update()}
function navBtn(s){return `<button type="button" class="nav-btn" data-id="${s.id}" data-search="${(s.title+' '+s.label+' '+(s.search||'')).toLowerCase()}" onclick="go('${s.id}')"><span class="nav-num">${s.icon||'•'}</span><span>${s.label}</span></button>`}
function bindSearch(){const i=$('#searchInput');i.oninput=()=>{const q=i.value.trim().toLowerCase();$$('.nav-btn').forEach(b=>b.style.display=!q||b.dataset.search.includes(q)?'':'none');$$('.lesson-group').forEach(g=>{const yes=$$('.nav-btn',g).some(b=>b.style.display!=='none');g.style.display=yes?'':'none';if(q&&yes)g.open=true})}}
function bindInputs(){$$('[data-save-key]').forEach(el=>{const k=COURSE.storage+'-'+el.dataset.saveKey;el.value=Store.get(k,'');el.addEventListener('input',()=>{Store.set(k,el.value);toast('บันทึกคำตอบแล้ว')})})}
let tt;function toast(t){const e=$('.toast');e.textContent=t;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),1100)}
function toggleMenu(){document.body.classList.toggle('drawer-open')}function closeMenu(){document.body.classList.remove('drawer-open')}
function printCurrent(){window.print()}function printAll(){const a=$('.print-area');a.innerHTML=visible().map(s=>`<section class="print-page"><h1>${s.title}</h1>${s.kind==='cover'?coverHTML():s.kind==='map'?mapHTML():s.html}</section>`).join('');document.body.classList.add('printing-all');setTimeout(()=>window.print(),80)}window.addEventListener('afterprint',()=>{document.body.classList.remove('printing-all');$('.print-area').innerHTML=''})
window.addEventListener('popstate',()=>{const id=(location.hash||'#home').slice(1);if(SLIDES.some(s=>s.id===id)){current=id;render()}});window.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')closeMenu()});
let touch=null;$('.stage').addEventListener('touchstart',e=>{if(e.target.closest('input,textarea,button,a,.table-wrap,summary'))return;const t=e.touches[0];touch={x:t.clientX,y:t.clientY,time:Date.now()}},{passive:true});$('.stage').addEventListener('touchend',e=>{if(!touch)return;const t=e.changedTouches[0],dx=t.clientX-touch.x,dy=t.clientY-touch.y,dt=Date.now()-touch.time;touch=null;if(dt<650&&Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.3)(dx<0?next:prev)()},{passive:true});
$('.mode-btn').dataset.active=String(mode==='teacher');$('.mode-text').textContent=mode==='teacher'?'ครู':'ผู้เรียน';buildNav();history.replaceState({id:current},'',`#${current}`);render();
</script></body></html>
