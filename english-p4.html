const COURSE={"title":"ภาษาอังกฤษ","englishName":"Little Steps English","subtitle":"ภาษาอังกฤษ ป.4 แบบสื่อสารจริง 16 ชั่วโมง ครบการฟัง พูด อ่าน เขียน เกม ใบความรู้ ใบงาน และ Feedback ผู้ปกครอง","pills":["16 ชั่วโมงจบในตัว","เกม 2 ส่วนทุกบท","ครูสอนได้ทีละขั้น","โหมดครู / ผู้เรียน"],"storage":"little-steps-english-p4","lessons":[{"no":1,"title":"Greetings & Classroom English","first":"l1-overview"},{"no":2,"title":"Phonics: Short Vowels & CVC Words","first":"l2-overview"},{"no":3,"title":"About Me: Pronouns & Verb to Be","first":"l3-overview"},{"no":4,"title":"My Family & Possessive Adjectives","first":"l4-overview"},{"no":5,"title":"Numbers, Dates & Time","first":"l5-overview"},{"no":6,"title":"Daily Routines: Present Simple","first":"l6-overview"},{"no":7,"title":"He/She and Do/Does","first":"l7-overview"},{"no":8,"title":"Adverbs of Frequency","first":"l8-overview"},{"no":9,"title":"Likes, Dislikes & Hobbies","first":"l9-overview"},{"no":10,"title":"Food: Some, Any & Containers","first":"l10-overview"},{"no":11,"title":"Places: There Is / There Are","first":"l11-overview"},{"no":12,"title":"Prepositions & Directions","first":"l12-overview"},{"no":13,"title":"Weather & Clothes","first":"l13-overview"},{"no":14,"title":"Can / Cannot: Abilities & Rules","first":"l14-overview"},{"no":15,"title":"Reading Short Texts: Main Idea & Details","first":"l15-overview"},{"no":16,"title":"Writing & Speaking Mini Project","first":"l16-overview"}],"firstLesson":"l1-overview","slides":[{"id":"home","kind":"cover","label":"หน้าปก","title":"ภาษาอังกฤษ","html":"","teacherOnly":false,"icon":"⌂"},{"id":"course-map","kind":"map","label":"แผนที่คอร์ส","title":"โครงสร้าง 16 ชั่วโมง","html":"","teacherOnly":false,"icon":"▦"},{"id":"l1-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 1: Greetings & Classroom English","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">ใช้คำทักทาย แนะนำตัว และคำสั่งในห้องเรียนอย่างสุภาพ เด็กต้องฟังคำสั่งสั้น ๆ แล้วตอบสนองได้ทันที</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.1 ป.4/1</span><span class=\"chip\">ต 1.2 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ช่วงเช้าใช้ Good morning.</li><li>ตอบ How are you? ได้หลายแบบ เช่น I am fine./I am happy.</li><li>คำสั่งมักขึ้นต้นด้วยคำกริยา: Stand, Sit, Open, Close, Listen, Point</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"◎","search":"Hello Good morning How are you? I am fine. Please Thank you Stand up Sit down Open your book Listen"},{"id":"l1-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"Greetings & Classroom English","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>ครูพูด “Stand up.” เด็กควรทำอะไร</li><li>เติมคำ: Good _____. (ช่วงเช้า)</li><li>ตอบ How are you? หนึ่งประโยค</li><li>คำใดสุภาพกว่า: Open the door / Please open the door</li><li>พูดคำขอบคุณเป็นภาษาอังกฤษ</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักเรียนใหม่เดินเข้าห้องและต้องทักทายครู ขอให้เพื่อนเปิดหนังสือ และบอกความรู้สึกของตน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>Greeting = คำทักทาย</li><li>Hello./Good morning.</li><li>How are you? — I am fine, thank you.</li><li>Classroom command: Verb + object เช่น Open your book.</li><li>ใช้ please เพื่อขออย่างสุภาพ และ thank you เมื่อตอบรับ</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>Good morning, Mali.</td><td>Good morning, Teacher.</td></tr><tr><td>Please open your book.</td><td>เด็กเปิดหนังสือ แล้วตอบ OK.</td></tr><tr><td>How are you today?</td><td>I am happy, thank you.</td></tr></tbody></table></div>","lessonNo":1,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l1-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"Greetings & Classroom English","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จับคู่คำสั่งกับท่าทาง: Listen / Point / Close your book</li><li>เรียงบทสนทนา: Hello → How are you? → I am fine.</li><li>เปลี่ยนคำสั่งตรง ๆ ให้สุภาพด้วย please</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Teacher Says</div><p class=\"content-p \">อุปกรณ์: บัตรคำสั่ง 10 ใบ และพื้นที่ยืน</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูหยิบบัตรและพูดคำสั่ง หากขึ้นต้นว่า “Teacher says…” เด็กจึงทำ</li><li>ถ้าไม่มีคำว่า Teacher says ให้ยืนนิ่ง</li><li>หลัง 5 รอบ เด็กผลัดเป็นผู้นำและอ่านบัตร</li><li>ให้ 1 คะแนนเมื่อทำถูก และอีก 1 คะแนนเมื่อออกเสียงชัด</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Stand up</span><span class=\"chip\">Sit down</span><span class=\"chip\">Open your book</span><span class=\"chip\">Close your book</span><span class=\"chip\">Listen</span><span class=\"chip\">Point to the door</span><span class=\"chip\">Raise your hand</span><span class=\"chip\">Turn around</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ถูกท่าทาง 1 คะแนน + ออกเสียง/พูดสุภาพ 1 คะแนน</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l1-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: Greetings & Classroom English","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ใช้คำทักทาย แนะนำตัว และคำสั่งในห้องเรียนอย่างสุภาพ เด็กต้องฟังคำสั่งสั้น ๆ แล้วตอบสนองได้ทันที</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">Hello</span><span class=\"chip\">Good morning</span><span class=\"chip\">How are you?</span><span class=\"chip\">I am fine.</span><span class=\"chip\">Please</span><span class=\"chip\">Thank you</span><span class=\"chip\">Stand up</span><span class=\"chip\">Sit down</span><span class=\"chip\">Open your book</span><span class=\"chip\">Listen</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ช่วงเช้าใช้ Good morning.</li><li>ตอบ How are you? ได้หลายแบบ เช่น I am fine./I am happy.</li><li>คำสั่งมักขึ้นต้นด้วยคำกริยา: Stand, Sit, Open, Close, Listen, Point</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>Good morning, Mali.</td><td>Good morning, Teacher.</td></tr><tr><td>Please open your book.</td><td>เด็กเปิดหนังสือ แล้วตอบ OK.</td></tr><tr><td>How are you today?</td><td>I am happy, thank you.</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ช่วงเช้าใช้ Good morning.</li><li>ตอบ How are you? ได้หลายแบบ เช่น I am fine./I am happy.</li><li>คำสั่งมักขึ้นต้นด้วยคำกริยา: Stand, Sit, Open, Close, Listen, Point</li></ul></div>","lessonNo":1,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ Hello Good morning How are you? I am fine. Please Thank you Stand up Sit down Open your book Listen"},{"id":"l1-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"Greetings & Classroom English","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เขียนคำทักทายในตอนเช้า</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. ตอบคำถาม “How are you?”</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. แปลคำสั่ง “Open your book.” เป็นการกระทำ</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เติมคำสุภาพ: ____ close the door.</label><input type=\"text\" class=\"response-input \" data-save-key=\"l1-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนบทสนทนาทักทาย 4 บรรทัด</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เลือก 3 คำสั่งแล้ววาด/อธิบายท่าทาง</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l1-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":1,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l1-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"Greetings & Classroom English","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>Good morning.</td></tr><tr><td>2</td><td>I am fine, thank you. (คำตอบใกล้เคียงได้)</td></tr><tr><td>3</td><td>เปิดหนังสือ</td></tr><tr><td>4</td><td>Please</td></tr><tr><td>5</td><td>ตัวอย่าง: A: Hello. B: Hello. A: How are you? B: I am happy, thank you.</td></tr><tr><td>6</td><td>คำตอบตามคำสั่งที่เลือก</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">วันนี้ผู้เรียนสามารถทักทายและทำตามคำสั่งภาษาอังกฤษพื้นฐานได้ดี จุดที่ควรฝึกเพิ่มคือการตอบเป็นประโยคเต็ม ขอให้ผู้ปกครองใช้คำสั่งสั้น ๆ เช่น Stand up, Sit down, Open the door วันละ 3–5 นาที</p></div>","lessonNo":1,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l2-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 2: Phonics: Short Vowels & CVC Words","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">เชื่อมเสียงสระสั้น a e i o u กับคำแบบพยัญชนะ–สระ–พยัญชนะ (CVC) เพื่ออ่านคำใหม่ได้ ไม่พึ่งการท่องจำคำทั้งคำ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.1 ป.4/2</span><span class=\"chip\">ต 1.1 ป.4/3</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ระบุสระกลางของคำ CVC ได้</li><li>แยกเสียงและรวมเสียงเพื่ออ่านคำได้</li><li>สร้างคำใหม่โดยเปลี่ยนพยัญชนะหรือสระหนึ่งตัวได้</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"◎","search":"a /æ/ e /e/ i /ɪ/ o /ɒ/ u /ʌ/ cat bed pig hot sun"},{"id":"l2-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"Phonics: Short Vowels & CVC Words","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>สระกลางของ cat คืออะไร</li><li>อ่าน b-e-d ช้า ๆ แล้วรวมคำ</li><li>คำใดเสียง i: pig / pen</li><li>เปลี่ยน cat ให้เป็น cot ต้องเปลี่ยนตัวใด</li><li>ยกตัวอย่างคำ CVC เสียง u</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “เด็กพบป้ายคำในเกมล่าสมบัติ แต่จะเปิดกล่องได้เมื่ออ่านคำโดยแยกเสียงและรวมเสียงถูกต้อง” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>CVC = consonant + vowel + consonant</li><li>แตะเสียงทีละตัว c–a–t แล้วลากรวม cat</li><li>a: cat, bag; e: bed, pen; i: pig, sit; o: hot, dog; u: sun, cup</li><li>ดูสระตรงกลางก่อนเลือกเสียง</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>c + a + t</td><td>/k/ /æ/ /t/ → cat</td></tr><tr><td>p + e + n</td><td>/p/ /e/ /n/ → pen</td></tr><tr><td>s + i + t</td><td>/s/ /ɪ/ /t/ → sit</td></tr></tbody></table></div>","lessonNo":2,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l2-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"Phonics: Short Vowels & CVC Words","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จัดคำ cat, bed, pig, hot, sun ลงกลุ่มสระ</li><li>เปลี่ยนตัวแรก: cat → hat → mat</li><li>เปลี่ยนสระกลาง: bag → big → bug</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Vowel House</div><p class=\"content-p \">อุปกรณ์: บ้านกระดาษ 5 หลังเขียน a e i o u และบัตรคำ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>วางบ้านสระ 5 หลัง</li><li>เด็กหยิบบัตร อ่านแบบแตะเสียง แล้ววางในบ้านตามสระกลาง</li><li>เพื่อนตรวจโดยอ่านซ้ำ</li><li>รอบท้าทายให้เปลี่ยนสระกลางแล้วอ่านคำใหม่</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">cat</span><span class=\"chip\">map</span><span class=\"chip\">bed</span><span class=\"chip\">hen</span><span class=\"chip\">pig</span><span class=\"chip\">sit</span><span class=\"chip\">dog</span><span class=\"chip\">hot</span><span class=\"chip\">sun</span><span class=\"chip\">cup</span><span class=\"chip\">bag</span><span class=\"chip\">red</span></div><p class=\"content-p question\">เกณฑ์คะแนน: วางถูก 1 คะแนน อ่าน blend ถูก 1 คะแนน</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l2-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: Phonics: Short Vowels & CVC Words","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เชื่อมเสียงสระสั้น a e i o u กับคำแบบพยัญชนะ–สระ–พยัญชนะ (CVC) เพื่ออ่านคำใหม่ได้ ไม่พึ่งการท่องจำคำทั้งคำ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">a /æ/</span><span class=\"chip\">e /e/</span><span class=\"chip\">i /ɪ/</span><span class=\"chip\">o /ɒ/</span><span class=\"chip\">u /ʌ/</span><span class=\"chip\">cat</span><span class=\"chip\">bed</span><span class=\"chip\">pig</span><span class=\"chip\">hot</span><span class=\"chip\">sun</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ออกเสียงทีละหน่วยแล้ว blend รวม</li><li>เปลี่ยนสระกลางทำให้คำเปลี่ยน: cat → cot → cut</li><li>คำบางคำไม่เป็นไปตามกฎ ต้องฟังและจำแยก</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>c + a + t</td><td>/k/ /æ/ /t/ → cat</td></tr><tr><td>p + e + n</td><td>/p/ /e/ /n/ → pen</td></tr><tr><td>s + i + t</td><td>/s/ /ɪ/ /t/ → sit</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ออกเสียงทีละหน่วยแล้ว blend รวม</li><li>เปลี่ยนสระกลางทำให้คำเปลี่ยน: cat → cot → cut</li><li>คำบางคำไม่เป็นไปตามกฎ ต้องฟังและจำแยก</li></ul></div>","lessonNo":2,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ a /æ/ e /e/ i /ɪ/ o /ɒ/ u /ʌ/ cat bed pig hot sun"},{"id":"l2-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"Phonics: Short Vowels & CVC Words","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. วงสระกลางในคำ cat</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. จัดคำ bed อยู่บ้านสระใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. อ่านคำ p-i-g</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เปลี่ยน hot เป็น hut ต้องเปลี่ยนตัวอักษรใด</label><input type=\"text\" class=\"response-input \" data-save-key=\"l2-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนคำ CVC สระ a และ i อย่างละ 2 คำ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อธิบายวิธีอ่านคำ CVC 3 ขั้น</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l2-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":2,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l2-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"Phonics: Short Vowels & CVC Words","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>a</td></tr><tr><td>2</td><td>e</td></tr><tr><td>3</td><td>pig</td></tr><tr><td>4</td><td>o เป็น u</td></tr><tr><td>5</td><td>เช่น cat, bag / pig, sit</td></tr><tr><td>6</td><td>ดูตัวอักษร–ออกเสียงทีละตัว–ลากรวมเป็นคำ</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเริ่มใช้วิธีสะกดเสียงแทนการเดาคำได้แล้ว ควรฝึกบัตรคำ CVC วันละ 5 คำ โดยให้แตะเสียงทีละตัวก่อนลากรวม หลีกเลี่ยงการบอกคำตอบทันที</p></div>","lessonNo":2,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l3-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 3: About Me: Pronouns & Verb to Be","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">พูดและเขียนข้อมูลตนเองด้วย I am / You are / He is / She is และเลือกสรรพนามให้ตรงกับบุคคล</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.2 ป.4/4</span><span class=\"chip\">ต 1.3 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>I ใช้ am เท่านั้น</li><li>he/she ใช้ is</li><li>you/we/they ใช้ are</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"◎","search":"I you he she we they am is are name age"},{"id":"l3-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"About Me: Pronouns & Verb to Be","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>เติม I __ happy</li><li>แทน Mali ด้วย pronoun ใด</li><li>Tom and Ben = pronoun ใด</li><li>แก้ประโยค He are ten.</li><li>พูดแนะนำตัว 2 ประโยค</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “ชมรมใหม่ให้สมาชิกติดป้ายแนะนำตัว โดยต้องมีชื่อ อายุ และความรู้สึก พร้อมแนะนำเพื่อนอีกหนึ่งคน” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>I am …</li><li>You/We/They are …</li><li>He/She is …</li><li>My name is …</li><li>I am nine years old.</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>I ___ ten.</td><td>I am ten.</td></tr><tr><td>Mina is happy.</td><td>She is happy.</td></tr><tr><td>Tom and I are friends.</td><td>We are friends.</td></tr></tbody></table></div>","lessonNo":3,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l3-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"About Me: Pronouns & Verb to Be","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จับคู่ I–am, he–is, they–are</li><li>เปลี่ยนชื่อเป็น pronoun: Jane → she</li><li>รวมสองคน: Tom and I → we</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Pronoun Switch</div><p class=\"content-p \">อุปกรณ์: บัตรบุคคลและบัตร am/is/are</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูวางบัตรภาพ/ชื่อ เช่น Anna, Tom and I, the boys</li><li>เด็กชู pronoun ที่แทนได้</li><li>หยิบบัตร am/is/are มาต่อให้ถูก</li><li>พูดประโยคเต็มและเปลี่ยน adjective หนึ่งคำ</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Anna</span><span class=\"chip\">Peter</span><span class=\"chip\">Peter and Anna</span><span class=\"chip\">My friends</span><span class=\"chip\">You and I</span><span class=\"chip\">The dog</span><span class=\"chip\">I</span><span class=\"chip\">The girls</span></div><p class=\"content-p question\">เกณฑ์คะแนน: pronoun ถูก 1 + verb to be ถูก 1 + ประโยคเต็ม 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l3-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: About Me: Pronouns & Verb to Be","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">พูดและเขียนข้อมูลตนเองด้วย I am / You are / He is / She is และเลือกสรรพนามให้ตรงกับบุคคล</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">I</span><span class=\"chip\">you</span><span class=\"chip\">he</span><span class=\"chip\">she</span><span class=\"chip\">we</span><span class=\"chip\">they</span><span class=\"chip\">am</span><span class=\"chip\">is</span><span class=\"chip\">are</span><span class=\"chip\">name</span><span class=\"chip\">age</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>I ใช้ am เท่านั้น</li><li>he/she ใช้ is</li><li>you/we/they ใช้ are</li><li>ชื่อคนหนึ่งคนแทนด้วย he หรือ she ได้</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>I ___ ten.</td><td>I am ten.</td></tr><tr><td>Mina is happy.</td><td>She is happy.</td></tr><tr><td>Tom and I are friends.</td><td>We are friends.</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>I ใช้ am เท่านั้น</li><li>he/she ใช้ is</li><li>you/we/they ใช้ are</li></ul></div>","lessonNo":3,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ I you he she we they am is are name age"},{"id":"l3-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"About Me: Pronouns & Verb to Be","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เติม I ___ a student.</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เติม She ___ kind.</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. แทน “Ben and I” ด้วยสรรพนาม</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. แก้ประโยค They is happy.</label><input type=\"text\" class=\"response-input \" data-save-key=\"l3-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนแนะนำตัว 3 ประโยค</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียนแนะนำเพื่อน 2 ประโยค</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l3-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":3,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l3-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"About Me: Pronouns & Verb to Be","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>am</td></tr><tr><td>2</td><td>is</td></tr><tr><td>3</td><td>we</td></tr><tr><td>4</td><td>They are happy.</td></tr><tr><td>5</td><td>ตัวอย่าง: My name is … I am ten years old. I am happy.</td></tr><tr><td>6</td><td>ตัวอย่าง: This is Mali. She is kind.</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนใช้ I am และ He/She is ได้ดีขึ้น แต่ยังควรฝึก you/we/they are ให้คล่อง แนะนำให้ทำบัตร 3 ใบ am–is–are แล้วสุ่มประธานวันละ 5 ข้อ</p></div>","lessonNo":3,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l4-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 4: My Family & Possessive Adjectives","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">บอกสมาชิกครอบครัวและความเป็นเจ้าของด้วย my, your, his, her, our, their โดยแยกผู้เป็นเจ้าของออกจากสิ่งของ</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.1 ป.4/3</span><span class=\"chip\">ต 1.2 ป.4/4</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>คำแสดงความเป็นเจ้าของวางหน้าคำนาม</li><li>his อ้างถึงเจ้าของเพศชาย ส่วน her อ้างถึงเจ้าของเพศหญิง</li><li>อย่าดูเพศของสิ่งของ ให้ดูว่าใครเป็นเจ้าของ</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":4,"teacherOnly":false,"icon":"◎","search":"father mother brother sister grandfather grandmother my your his her"},{"id":"l4-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"My Family & Possessive Adjectives","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>I → คำแสดงเจ้าของอะไร</li><li>เติม Tom has a dog. ___ dog…</li><li>คำใดหมายถึงพี่/น้องสาว</li><li>We → our หรือ their</li><li>พูดแนะนำสมาชิกครอบครัว 1 คน</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “เด็กนำภาพครอบครัวจำลองมาจัดนิทรรศการ และต้องติดป้ายแนะนำว่าแต่ละคนเป็นใครและชื่ออะไร” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>I → my</li><li>you → your</li><li>he → his</li><li>she → her</li><li>we → our</li><li>they → their</li><li>This is my mother. Her name is …</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>This is Anna. ___ mother is a nurse.</td><td>Her mother…</td></tr><tr><td>Tom has a bike. ___ bike is blue.</td><td>His bike…</td></tr><tr><td>We have a house.</td><td>Our house…</td></tr></tbody></table></div>","lessonNo":4,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l4-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"My Family & Possessive Adjectives","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จับคู่ pronoun กับ possessive adjective</li><li>อ่าน family tree แล้วตอบ Who is she?</li><li>เติม his/her โดยดูเจ้าของ</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Family Tree Detective</div><p class=\"content-p \">อุปกรณ์: แผนผังครอบครัวจำลอง บัตรคำ และคลิปหนีบ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>ครูให้แผนผังครอบครัวหนึ่งชุดต่อกลุ่ม</li><li>เด็กฟัง clue เช่น “Her brother is Ben.” แล้วชี้บุคคล</li><li>หนีบบัตร his/her/my/our หน้าคำนามให้ถูก</li><li>กลุ่มแต่ง clue ใหม่ให้เพื่อนทาย</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">my mother</span><span class=\"chip\">his father</span><span class=\"chip\">her sister</span><span class=\"chip\">our family</span><span class=\"chip\">their house</span><span class=\"chip\">your brother</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ชี้บุคคลถูก 1 + ใช้ possessive ถูก 1 + clue ชัดเจน 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":4,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l4-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: My Family & Possessive Adjectives","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">บอกสมาชิกครอบครัวและความเป็นเจ้าของด้วย my, your, his, her, our, their โดยแยกผู้เป็นเจ้าของออกจากสิ่งของ</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">father</spa dred Monday January date o’clock half past What time? When?"},{"id":"l5-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"Numbers, Dates & Time","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>อ่าน 9:00</li><li>อ่าน 6:30</li><li>วันหลัง Monday คืออะไร</li><li>เดือนหลัง March คืออะไร</li><li>ถามวันเกิดเป็นภาษาอังกฤษ</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “โรงเรียนจัดตารางกิจกรรมหนึ่งวัน เด็กต้องอ่านเวลา นัดหมายเพื่อน และเขียนวันจัดงานให้ถูกต้อง” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>What time is it? — It is seven o’clock.</li><li>7:30 = half past seven</li><li>When is your birthday? — It is on …</li><li>วันที่ใช้ลำดับ: first, second, third, fourth…</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>7:00</td><td>It is seven o’clock.</td></tr><tr><td>8:30</td><td>It is half past eight.</td></tr><tr><td>15 June</td><td>the fifteenth of June / June fifteenth</td></tr></tbody></table></div>","lessonNo":5,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l5-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"Numbers, Dates & Time","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>จับคู่นาฬิกากับประโยค</li><li>เรียงวัน Monday–Sunday</li><li>ถาม–ตอบวันเกิดกับเพื่อน</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Human Clock &amp; Calendar Race</div><p class=\"content-p \">อุปกรณ์: เข็มนาฬิกากระดาษ บัตรเวลา บัตรวันและเดือน</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กสองคนเป็นเข็มสั้น–เข็มยาวบนหน้าปัดพื้น</li><li>เพื่อนหยิบบัตรเวลาและจัดเข็ม</li><li>อ่านเวลาเป็นประโยคเต็ม</li><li>รอบปฏิทินให้เรียงวัน/เดือนและตอบ When is…?</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">7:00</span><span class=\"chip\">9:30</span><span class=\"chip\">12:00</span><span class=\"chip\">3:30</span><span class=\"chip\">Monday</span><span class=\"chip\">Friday</span><span class=\"chip\">January</span><span class=\"chip\">June</span><span class=\"chip\">December</span></div><p class=\"content-p question\">เกณฑ์คะแนน: จัดถูก 1 + อ่านถูก 1 + ตอบเป็นประโยค 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถ able-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>It is eight o’clock.</td></tr><tr><td>2</td><td>It is half past four.</td></tr><tr><td>3</td><td>Friday</td></tr><tr><td>4</td><td>on</td></tr><tr><td>5</td><td>คำตอบตามจริง</td></tr><tr><td>6</td><td>คำตอบหลากหลาย เช่น I study at eight o’clock.</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนอ่านเวลาเต็มชั่วโมงและครึ่งชั่วโมงได้ดี ควรทบทวนชื่อวัน–เดือนและการใช้ on หน้าวันที่ ผู้ปกครองถาม What time is it? จากนาฬิกาจริงวันละ 2 ครั้งได้</p></div>","lessonNo":5,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l6-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 6: Daily Routines: Present Simple","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">เล่ากิจวัตรด้วย Present Simple สำหรับ I/You/We/They และเรียงเหตุการณ์ตามเวลา</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.2 ป.4/4</span><span class=\"chip\">ต 1.3 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>ประธาน I/you/we/they ใช้คำกริยารูปเดิม</li><li>เวลาใช้ at</li><li>กิจวัตรคือสิ่งที่ทำเป็นประจำ จึงใช้ Present Simple</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"◎","search":"wake up brush my teeth have breakfast go to school study play do homework go to bed"},{"id":"l6-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"Daily Routines: Present Simple","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>เติม I ___ breakfast. (have)</li><li>เรียง wake up / go to bed</li><li>ใช้ at หรือ on หน้า 7:00</li><li>พูดกิจวัตรตอนเช้า 1 อย่าง</li><li>คำใดใช้ปิดลำดับ: First/Finally</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “เด็กต้องจัดการ์ดกิจวัตรที่ปลิวสลับกันให้กลับเป็น “หนึ่งวันของฉัน” แล้วเล่าให้เพื่อนฟัง” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>I/You/We/They + base verb</li><li>I wake up at six.</li><li>We go to school at seven.</li><li>ลำดับเหตุการณ์ใช้ First, Then, After that, Finally</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>I / go / school / 7:00</td><td>I go to school at seven.</td></tr><tr><td>We / do homework / evening</td><td>We do homework in the evening.</td></tr><tr><td>First … Then …</td><td>First, I wake up. Then, I brush my teeth.</td></tr></tbody></table></div>","lessonNo":6,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l6-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"Daily Routines: Present Simple","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>เรียงบัตรกิจวัตรตามเวลา</li><li>สร้างประโยคจาก subject + verb + time</li><li>เล่าต่อกันคนละประโยคโดยใช้ First/Then</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Routine Relay</div><p class=\"content-p \">อุปกรณ์: บัตรกิจวัตร บัตรเวลา และเส้นเวลา</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>แต่ละทีมรับบัตรกิจวัตร 6 ใบ</li><li>ผลัดกันนำบัตรไปวางบนเส้นเวลาตามลำดับ</li><li>สมาชิกอ่านประโยคเต็มคนละใบ</li><li>ทีมตรวจตนเองด้วยคำว่า First–Then–Finally</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">wake up 6:00</span><span class=\"chip\">have breakfast 6:30</span><span class=\"chip\">go to school 7:30</span><span class=\"chip\">study 9:00</span><span class=\"chip\">do homework 17:00</span><span class=\"chip\">go to bed 21:00</span></div><p class=\"content-p question\">เกณฑ์คะแนน: ลำดับถูก 1 ต่อใบ + ประโยคเต็ม 1 ต่อคน</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l6-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: Daily Routines: Present Simple","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">เล่ากิจวัตรด้วย Present Simple สำหรับ I/You/We/They และเรียงเหตุการณ์ตามเวลา</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">wake up</span><span class=\"chip\">brush my teeth</span><span class=\"chip\">have breakfast</span><span class=\"chip\">go to school</span><span class=\"chip\">study</span><span class=\"chip\">play</span><span class=\"chip\">do homework</span><span class=\"chip\">go to bed</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>ประธาน I/you/we/they ใช้คำกริยารูปเดิม</li><li>เวลาใช้ at</li><li>กิจวัตรคือสิ่งที่ทำเป็นประจำ จึงใช้ Present Simple</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>I / go / school / 7:00</td><td>I go to school at seven.</td></tr><tr><td>We / do homework / evening</td><td>We do homework in the evening.</td></tr><tr><td>First … Then …</td><td>First, I wake up. Then, I brush my teeth.</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>ประธาน I/you/we/they ใช้คำกริยารูปเดิม</li><li>เวลาใช้ at</li><li>กิจวัตรคือสิ่งที่ทำเป็นประจำ จึงใช้ Present Simple</li></ul></div>","lessonNo":6,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ wake up brush my teeth have breakfast go to school study play do homework go to bed"},{"id":"l6-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"Daily Routines: Present Simple","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เติม I ___ to school at seven.</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เรียงคำ: breakfast / have / I</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. เติมบุพบท: I wake up ___ six.</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. เขียนกิจวัตรเช้า 3 ขั้น</label><input type=\"text\" class=\"response-input \" data-save-key=\"l6-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนกิจวัตร 5 ประโยคพร้อมเวลา</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. อ่านงานตนเองแล้ววง subject และขีดเส้นใต้ verb</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l6-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":6,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l6-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"Daily Routines: Present Simple","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>go</td></tr><tr><td>2</td><td>I have breakfast.</td></tr><tr><td>3</td><td>at</td></tr><tr><td>4</td><td>คำตอบตามจริง ใช้ First, Then, Finally</td></tr><tr><td>5</td><td>คำตอบตามจริง</td></tr><tr><td>6</td><td>ตรวจตามประโยคที่เขียน</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อย 80% และอธิบายเหตุผลได้</li><li>ระดับผ่าน: ถูก 60–79% หรือทำได้เมื่อมีคำถามนำ</li><li>ควรเสริม: ต่ำกว่า 60% ให้กลับไปใช้สื่อ/ตัวอย่างรูปธรรมแล้วทำข้อพื้นฐานซ้ำ</li></ul><p class=\"content-p subhead\">ข้อความ Feedback ส่งผู้ปกครอง</p><p class=\"content-p question\">ผู้เรียนเล่ากิจวัตรด้วย I + verb ได้แล้ว จุดที่ควรพัฒนาคือการเรียงประโยคและใส่เวลา แนะนำให้เล่ากิจวัตรตอนเช้า 3 ประโยคเป็นภาษาอังกฤษทุกวัน</p></div>","lessonNo":6,"teacherOnly":true,"icon":"✓","search":"เฉลย ประเมิน ผู้ปกครอง feedback"},{"id":"l7-overview","kind":"overview","label":"ภาพรวมและเป้าหมาย","title":"ชั่วโมงที่ 7: He/She and Do/Does","parent":"ภาษาอังกฤษ ป.4","html":"<p class=\"content-p lead\">ใช้กริยาเติม -s/-es กับ he/she/it และสร้างคำถาม–คำตอบด้วย Does โดยไม่เติม -s ซ้ำในคำกริยาหลัก</p><div class=\"grid2\"><div class=\"card\"><b>K ความรู้</b><span>บอกกฎและคำสำคัญของบทเรียนได้</span></div><div class=\"card\"><b>P ทักษะ</b><span>นำความรู้ไปตอบโจทย์และสื่อสารขั้นตอนคิดได้</span></div><div class=\"card\"><b>A เจตคติ</b><span>กล้าลอง กล้าพูด และตรวจแก้คำตอบของตนเอง</span></div></div><p class=\"content-p subhead\">มาตรฐาน/ตัวชี้วัดที่เชื่อมโยง</p><div class=\"chips\"><span class=\"chip\">ต 1.2 ป.4/4</span><span class=\"chip\">ต 1.3 ป.4/1</span></div><p class=\"content-p subhead\">สาระที่เด็กต้องได้กลับบ้าน</p><ul class=\"list-card\"><li>กริยาทั่วไปเติม s: play→plays</li><li>ลงท้าย sh/ch/x/o มักเติม es: watch→watches, go→goes</li><li>พยัญชนะ+y เปลี่ยน y เป็น ies: study→studies</li></ul><div class=\"note\"><div class=\"note-title\">การเตรียมก่อนสอน</div><ul class=\"list-card\"><li>บัตรคำ/บัตรภาพ</li><li>กระดาษคำตอบหรือกระดานเล็ก</li><li>ดินสอสีและนาฬิกาจับเวลา</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"◎","search":"he she it does does not plays goes watches studies"},{"id":"l7-teach1","kind":"teach","label":"ขั้นนำและสร้างความรู้","title":"สอนจริง: จากความรู้เดิมสู่แนวคิดใหม่","parent":"He/She and Do/Does","html":"<p class=\"content-p subhead\">ชุดโจทย์ Quick 5 พร้อมใช้</p><ul class=\"list-card\"><li>เติม She ___ football. (play)</li><li>เลือก go/goes: He ___ home.</li><li>แก้ Does she likes cats?</li><li>ตอบ Does he study? แบบ yes</li><li>คำใดลงท้าย -ies: study</li></ul><p class=\"content-p subhead\">ขั้นสอน: ครูทำอะไร–เด็กทำอะไร–ทำไมต้องทำ</p><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">1. เกมเปิดสมอง</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> อ่านโจทย์ทีละข้อจากชุด Quick 5 ไม่เฉลยทันที ให้สัญญาณยกป้ายหรือชูนิ้ว แล้วถามเด็ก 1 คนว่า “คิดอย่างไร”</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ตอบทุกข้อ อธิบายอย่างน้อย 1 ข้อ และแก้คำตอบของตนเมื่อได้ยินเหตุผลของเพื่อน</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ตรวจพื้นฐานเดิมและทำให้ครูรู้จุดที่ต้องชะลอ</div></div><div class=\"step\"><div class=\"step-stage\">2. เชื่อมสถานการณ์</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> เล่าสถานการณ์ “นักข่าวเด็กสัมภาษณ์เรื่องกิจวัตรของเพื่อน แล้วเขียนข่าวสั้นว่าเขา/เธอทำอะไร” จากนั้นเขียนคำถามนำ 2 ข้อบนกระดานและรับทุกคำตอบก่อนจัดหมวด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> ฟัง สังเกต บอกสิ่งที่รู้แล้วและสิ่งที่ยังสงสัยด้วยประโยคของตนเอง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เชื่อมบทเรียนกับชีวิตจริง เด็กจึงเห็นว่าความรู้นี้ใช้เมื่อใด</div></div><div class=\"step\"><div class=\"step-stage\">3. สร้างความรู้</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครูพูด/ทำ:</b> สอนตาม “เนื้อหาบนกระดาน” ด้านล่าง ทีละบรรทัด ใช้ตัวอย่างหนึ่งข้อ–ถามหนึ่งครั้ง หลีกเลี่ยงการบอกกฎรวดเดียว</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็กทำ:</b> อ่านตาม ชี้คำสำคัญ จดกฎย่อ และสร้างตัวอย่างใหม่ 1 ตัวอย่าง</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> สลับการฟังกับการลงมือ ทำให้ตรวจความเข้าใจได้ระหว่างสอน</div></div></div><div class=\"note\"><div class=\"note-title\">เนื้อหาพร้อมเขียนบนกระดาน</div><ul class=\"list-card\"><li>He/She/It + verb-s/es</li><li>Does he/she + base verb?</li><li>Yes, he/she does. / No, he/she does not.</li><li>หลัง does ใช้กริยารูปเดิม</li></ul></div><p class=\"content-p subhead\">ตัวอย่างที่ครูสาธิตทีละขั้น</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>วิธีคิด/คำอธิบายที่ครูใช้</th></tr></thead><tbody><tr><td>Mina plays tennis.</td><td>ประธาน she จึงเติม s</td></tr><tr><td>He watches TV.</td><td>watch ลงท้าย ch จึงเติม es</td></tr><tr><td>Does Tom go to school?</td><td>หลัง does ใช้ go ไม่ใช่ goes</td></tr></tbody></table></div>","lessonNo":7,"teacherOnly":false,"icon":"①","search":"ครู เด็ก ขั้นสอน quick"},{"id":"l7-teach2","kind":"teach","label":"ฝึกร่วมกันและเกม","title":"ฝึกคิด เล่นเกม และเตรียมทำงานเดี่ยว","parent":"He/She and Do/Does","html":"<p class=\"content-p subhead\">โจทย์ฝึกร่วมกัน</p><ul class=\"list-card\"><li>แปลง I play → He plays</li><li>สร้างคำถาม Does she…? จากประโยค</li><li>จับคู่คำถามกับ Yes/No answer</li></ul><div class=\"timeline\"><div class=\"step\"><div class=\"step-stage\">4. ฝึกร่วมกัน</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> แจก/แสดงโจทย์ฝึกร่วมกันทีละข้อ ให้เวลาคิดเงียบก่อน แล้วชวนเด็กบอก “ขั้นที่ 1–2–3” ครูวงจุดที่เด็กมักพลาด</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำบนกระดานเล็กหรือกระดาษ ยกคำตอบพร้อมกัน จับคู่ตรวจและอธิบายเหตุผล</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> เด็กได้ลองก่อนทำเดี่ยว และครูแก้ความเข้าใจคลาดเคลื่อนทันที</div></div><div class=\"step\"><div class=\"step-stage\">5. เกมเฉพาะบท</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> อธิบายเป้าหมาย กติกา ทดลอง 1 รอบ แล้วจึงเริ่มเกมจริง ระหว่างเล่นถามว่า “หลักฐานคืออะไร” ไม่ถามแค่คำตอบ</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> เล่นตามบทบาท ผลัดกันคิด–พูด–ตรวจ บันทึกคะแนนจากความถูกต้องและการอธิบาย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> ฝึกซ้ำโดยไม่รู้สึกว่าเป็นแบบฝึกหัด และเพิ่มการสื่อสาร</div></div><div class=\"step\"><div class=\"step-stage\">6. ทำงานเดี่ยวและสรุป</div><div class=\"step-cell\"><span class=\"step-label\">ครู</span><b>ครู:</b> ให้ทำใบงานตามลำดับ พื้นฐาน→อธิบาย→ประยุกต์ ช่วยด้วยคำถามนำแทนการบอกคำตอบ แล้วเก็บ Exit Ticket</div><div class=\"step-cell\"><span class=\"step-label\">ผู้เรียน</span><b>เด็ก:</b> ทำด้วยตนเอง ตรวจด้วยเกณฑ์ 3 ข้อ และเขียนหนึ่งสิ่งที่เข้าใจ/ยังสงสัย</div><div class=\"step-cell\"><span class=\"step-label\">เหตุผล</span><b>เหตุผล:</b> แยกให้เห็นว่าเด็กทำได้จริงเมื่อไม่มีเพื่อนช่วย และได้ข้อมูลส่งผู้ปกครอง</div></div></div><div class=\"note\"><div class=\"note-title\">เกม: Grammar Reporter</div><p class=\"content-p \">อุปกรณ์: บัตรบุคคล บัตรกิจกรรม และไมโครโฟนกระดาษ</p><p class=\"content-p subhead\">วิธีเล่น</p><ul class=\"list-card\"><li>เด็กหยิบบัตรบุคคลและกิจกรรม</li><li>นักข่าวถาม Does he/she…?</li><li>ผู้ตอบดูบัตรแล้วตอบ Yes/No</li><li>นักข่าวสรุป He/She + verb-s/es หนึ่งประโยค</li></ul><p class=\"content-p subhead\">บัตร/โจทย์พร้อมตัดใช้</p><div class=\"chips\"><span class=\"chip\">Mali/play tennis</span><span class=\"chip\">Tom/watch TV</span><span class=\"chip\">Nina/study English</span><span class=\"chip\">Ben/go to school</span><span class=\"chip\">The dog/run fast</span></div><p class=\"content-p question\">เกณฑ์คะแนน: คำถามถูก 1 + คำตอบถูก 1 + ประโยคสรุปถูก 1</p></div><div class=\"note\"><div class=\"note-title\">เมื่อเด็กติด ให้ครูใช้คำถามช่วย</div><ul class=\"list-card\"><li>คำสำคัญในโจทย์คือคำใด</li><li>ลองยกตัวอย่างที่ง่ายกว่านี้ก่อน</li><li>อธิบายสิ่งที่รู้แล้วหนึ่งอย่าง</li><li>ตรวจคำตอบด้วยกฎบนกระดานอีกครั้ง</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"②","search":"เกม ฝึกร่วมกัน บัตร"},{"id":"l7-knowledge","kind":"knowledge","label":"ใบความรู้","title":"ใบความรู้: He/She and Do/Does","parent":"เด็กอ่านทบทวนได้ด้วยตนเอง","html":"<p class=\"content-p lead\">ใช้กริยาเติม -s/-es กับ he/she/it และสร้างคำถาม–คำตอบด้วย Does โดยไม่เติม -s ซ้ำในคำกริยาหลัก</p><p class=\"content-p subhead\">คำสำคัญ</p><div class=\"chips\"><span class=\"chip\">he</span><span class=\"chip\">she</span><span class=\"chip\">it</span><span class=\"chip\">does</span><span class=\"chip\">does not</span><span class=\"chip\">plays</span><span class=\"chip\">goes</span><span class=\"chip\">watches</span><span class=\"chip\">studies</span></div><p class=\"content-p subhead\">กฎหรือแนวคิดจำเป็น</p><ul class=\"list-card\"><li>กริยาทั่วไปเติม s: play→plays</li><li>ลงท้าย sh/ch/x/o มักเติม es: watch→watches, go→goes</li><li>พยัญชนะ+y เปลี่ยน y เป็น ies: study→studies</li><li>เมื่อมี does กริยากลับรูปเดิม: Does she play?</li></ul><p class=\"content-p subhead\">ตัวอย่างเพิ่มเติม</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ตัวอย่าง</th><th>คำอธิบาย</th></tr></thead><tbody><tr><td>Mina plays tennis.</td><td>ประธาน she จึงเติม s</td></tr><tr><td>He watches TV.</td><td>watch ลงท้าย ch จึงเติม es</td></tr><tr><td>Does Tom go to school?</td><td>หลัง does ใช้ go ไม่ใช่ goes</td></tr></tbody></table></div><div class=\"note\"><div class=\"note-title\">จำให้แม่น</div><ul class=\"list-card\"><li>กริยาทั่วไปเติม s: play→plays</li><li>ลงท้าย sh/ch/x/o มักเติม es: watch→watches, go→goes</li><li>พยัญชนะ+y เปลี่ยน y เป็น ies: study→studies</li></ul></div>","lessonNo":7,"teacherOnly":false,"icon":"▤","search":"ใบความรู้ he she it does does not plays goes watches studies"},{"id":"l7-worksheet","kind":"worksheet","label":"ใบงาน","title":"ใบงาน: ลงมือทำด้วยตนเอง","parent":"He/She and Do/Does","html":"<p class=\"content-p lead\">ทำตามลำดับ ไม่ต้องรีบข้ามข้อ หากไม่แน่ใจให้วงคำสำคัญและเขียนสิ่งที่รู้ก่อน</p><div class=\"form-field\"><label>1. เติม He ___ TV. (watch)</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q1\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>2. เติม She ___ English. (study)</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q2\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>3. แก้: Does he goes to school?</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q3\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>4. ตอบ: Does Mina play tennis? (yes)</label><input type=\"text\" class=\"response-input \" data-save-key=\"l7-q4\"><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>5. เขียนคำถาม Does…? 3 ข้อ</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-q5\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>6. เขียน 3 ประโยคเกี่ยวกับเพื่อนโดยใช้ he/she</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-q6\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div><div class=\"form-field\"><label>Exit Ticket: วันนี้ฉันเข้าใจเรื่องใดดีที่สุด และยังสงสัยอะไร</label><textarea rows=\"3\" class=\"response-input response-area\" data-save-key=\"l7-exit\"></textarea><div class=\"save-hint\">คำตอบจะบันทึกในอุปกรณ์นี้โดยอัตโนมัติ</div></div>","lessonNo":7,"teacherOnly":false,"icon":"✎","search":"ใบงาน แบบฝึกหัด exit ticket"},{"id":"l7-answers","kind":"answers","label":"เฉลยและ Feedback","title":"เฉลย การประเมิน และข้อความถึงผู้ปกครอง","parent":"He/She and Do/Does","html":"<div class=\"teacher-zone\"><p class=\"content-p subhead\">แนวคำตอบใบงาน</p><div class=\"table-wrap\"><table class=\"content-table\"><thead><tr><th>ข้อ</th><th>แนวคำตอบ</th></tr></thead><tbody><tr><td>1</td><td>watches</td></tr><tr><td>2</td><td>studies</td></tr><tr><td>3</td><td>Does he go to school?</td></tr><tr><td>4</td><td>Yes, she does.</td></tr><tr><td>5</td><td>คำตอบหลากหลาย ใช้ base verb</td></tr><tr><td>6</td><td>คำตอบตามจริง โดยกริยาเติม s/es</td></tr></tbody></table></div><p class=\"content-p subhead\">จุดที่มักพลาดและวิธีแก้</p><ul class=\"list-card\"><li>จำกฎได้แต่ใช้ผิดบริบท — ให้กลับไปเทียบตัวอย่างคู่กัน</li><li>รีบตอบโดยไม่อ่านคำสำคัญ — ให้ขีดเส้นใต้ก่อนตอบ</li><li>อธิบายไม่ได้ — ให้ใช้ประโยคเริ่มต้น “ฉันเลือก…เพราะ…”</li></ul><p class=\"content-p subhead\">เกณฑ์ประเมิน</p><ul class=\"list-card\"><li>ระดับดีมาก: ถูกอย่างน้อ
