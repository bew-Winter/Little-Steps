ind":"answers","teacherOnly":true,"blocks":[{"type":"p","style":"Normal","text":"เฉลยใบงาน"},{"type":"p","style":"Normal","text":"1. 619,555"},{"type":"p","style":"Normal","text":"2. 443,211"},{"type":"p","style":"Normal","text":"3. 475,500"},{"type":"p","style":"Normal","text":"4. 267,700"},{"type":"p","style":"Normal","text":"5. 503,500 บาท"},{"type":"p","style":"Normal","text":"6. 376,550 เล่ม"},{"type":"p","style":"Normal","text":"7. 443,211 + 356,789 = 800,000"},{"type":"p","style":"Normal","text":"8. ตัวอย่าง: 300,000 + 150,000 = 450,000"},{"type":"p","style":"Normal","text":"เกณฑ์การประเมินรายชั่วโมง"},{"type":"table","rows":[["ด้าน","ผ่านดี","กำลังพัฒนา","ต้องเสริม"],["ความเข้าใจ","อธิบายหลักการได้","ทำได้เมื่อมีตัวอย่าง","ยังตอบแบบเดา"],["ทักษะคำนวณ","ถูกอย่างน้อย 70%","ถูก 50-69%","ต่ำกว่า 50%"],["การสื่อสารวิธีคิด","เขียน/พูดเป็นขั้นตอน","อธิบายได้บางส่วน","ยังอธิบายไม่ได้"],["ความตั้งใจ","ร่วมกิจกรรมต่อเนื่อง","ร่วมบ้างเป็นช่วง","ต้องกระตุ้นบ่อย"]]},{"type":"p","style":"Normal","text":"ข้อความ Feedback ผู้ปกครองประจำบท"},{"type":"table","rows":[["แม่แบบปรับใช้ได้ทันที\n• วันนี้น้องเรียนเรื่อง “การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า”\n• น้องทำได้ดีในเรื่อง: ____________________\n• จุดที่ควรฝึกเพิ่มคือ: ____________________\n• การบ้าน/ฝึกที่บ้าน: ฝึกโจทย์ตัวไม่ทราบค่า 5 ข้อ โดยให้ผู้ปกครองสลับเป็นผู้ตั้งโจทย์\n• ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"]]}],"searchText":"เฉลย ใบประเมิน และ Feedback แผนที่ 3 เฉลยใบงาน 1. 619,555 2. 443,211 3. 475,500 4. 267,700 5. 503,500 บาท 6. 376,550 เล่ม 7. 443,211 + 356,789 = 800,000 8. ตัวอย่าง: 300,000 + 150,000 = 450,000 เกณฑ์การประเมินรายชั่วโมง ด้าน ผ่านดี กำลังพัฒนา ต้องเสริม ความเข้าใจ อธิบายหลักการได้ ทำได้เมื่อมีตัวอย่าง ยังตอบแบบเดา ทักษะคำนวณ ถูกอย่างน้อย 70% ถูก 50-69% ต่ำกว่า 50% การสื่อสารวิธีคิด เขียน/พูดเป็นขั้นตอน อธิบายได้บางส่วน ยังอธิบายไม่ได้ ความตั้งใจ ร่วมกิจกรรมต่อเนื่อง ร่วมบ้างเป็นช่วง ต้องกระตุ้นบ่อย ข้อความ Feedback ผู้ปกครองประจำบท แม่แบบปรับใช้ได้ทันที • วันนี้น้องเรียนเรื่อง “การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า” • น้องทำได้ดีในเรื่อง: ____________________ • จุดที่ควรฝึกเพิ่มคือ: ____________________ • การบ้าน/ฝึกที่บ้าน: ฝึกโจทย์ตัวไม่ทราบค่า 5 ข้อ โดยให้ผู้ปกครองสลับเป็นผู้ตั้งโจทย์ • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-4-การคูณจำนวนหลายหลักและการตรวจคำตอบ-21","title":"แผนการสอนที่ 4: การคูณจำนวนหลายหลักและการตรวจคำตอบ","level":1,"parent":"","lessonNo":4,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/9 หาค่าของตัวไม่ทราบค่าในประโยคสัญลักษณ์การคูณของจำนวนหลายหลักที่มีผลคูณไม่เกิน 6 หลัก"],["สาระสำคัญ","แตกจำนวนตามค่าประจำหลัก คูณทีละส่วน และใช้การประมาณตรวจคำตอบ"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 4: การคูณจำนวนหลายหลักและการตรวจคำตอบ ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/9 หาค่าของตัวไม่ทราบค่าในประโยคสัญลักษณ์การคูณของจำนวนหลายหลักที่มีผลคูณไม่เกิน 6 หลัก สาระสำคัญ แตกจำนวนตามค่าประจำหลัก คูณทีละส่วน และใช้การประมาณตรวจคำตอบ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-4-22","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 4","level":2,"parent":"แผนการสอนที่ 4: การคูณจำนวนหลายหลักและการตรวจคำตอบ","lessonNo":4,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 3,214 × 7\n• คำนวณ 426 × 35\n• คำนวณ 2,050 × 24\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ลืมเลื่อนหลักเมื่อคูณด้วยหลักสิบ หรือคำตอบขาด/เกินศูนย์"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 4: การคูณจำนวนหลายหลักและการตรวจคำตอบ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การคูณจำนวนหลายหลักทำได้โดยแตกจำนวน เช่น 234 × 6 = 200×6 + 30×6 + 4×6\n• การตั้งคูณต้องจัดตำแหน่งหลักให้ถูก โดยเฉพาะเมื่อคูณด้วยจำนวน 2 หลัก\n• ใช้การประมาณ เช่น 398 × 24 ≈ 400 × 20 = 8,000 เพื่อตรวจว่าคำตอบสมเหตุสมผล\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 2,345 × 6 = 14,070\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: แยกผลคูณหลักหน่วย/หลักสิบและเขียนค่าประมาณก่อน"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 326 × 24 = 326×20 + 326×4 = 6,520 + 1,304 = 7,824\n• □ × 5 = 42,500 ดังนั้น □ = 42,500 ÷ 5 = 8,500\n• เติมจำนวน: □ × 8 = 56,000\n• ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: โรงงานคูณเร็ว","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับบัตรโจทย์คูณระดับง่าย กลาง ท้าทาย\n• ต้องเขียนวิธีคิดอย่างน้อย 2 วิธี เช่น ตั้งคูณและแตกจำนวน\n• ครูให้ดาวพิเศษสำหรับวิธีที่อธิบายขั้นตอนได้ชัด\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 426 × 35\n• เติมจำนวน: □ × 8 = 56,000\n• ประมาณ 1,986 × 32 แล้วบอกว่าคำตอบควรใกล้เท่าใด\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 3,214 × 7\n• คำนวณ 426 × 35\n• คำนวณ 2,050 × 24\nช่วง B แสดงวิธี ข้อ 4–5:\n• เติมจำนวน: □ × 8 = 56,000\n• ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• ถุงข้าว 1 ถุงหนัก 25 กิโลกรัม มี 1,236 ถุง หนักรวมกี่กิโลกรัม\n• ประมาณ 1,986 × 32 แล้วบอกว่าคำตอบควรใกล้เท่าใด\n• อธิบายความผิดพลาดที่พบบ่อยเมื่อตั้งคูณด้วยจำนวนสองหลัก\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 3,214 × 7\n• เติมจำนวน: □ × 8 = 56,000\n• ประมาณ 1,986 × 32 แล้วบอกว่าคำตอบควรใกล้เท่าใด\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"การคูณจำนวนหลายหลักทำได้โดยแตกจำนวน เช่น 234 × 6 = 200×6 + 30×6 + 4×6"},{"type":"p","style":"List Bullet","text":"การตั้งคูณต้องจัดตำแหน่งหลักให้ถูก โดยเฉพาะเมื่อคูณด้วยจำนวน 2 หลัก"},{"type":"p","style":"List Bullet","text":"ใช้การประมาณ เช่น 398 × 24 ≈ 400 × 20 = 8,000 เพื่อตรวจว่าคำตอบสมเหตุสมผล"},{"type":"p","style":"List Bullet","text":"2,345 × 6 = 14,070"},{"type":"p","style":"List Bullet","text":"326 × 24 = 326×20 + 326×4 = 6,520 + 1,304 = 7,824"},{"type":"p","style":"List Bullet","text":"□ × 5 = 42,500 ดังนั้น □ = 42,500 ÷ 5 = 8,500"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"คำนวณ 3,214 × 7"},{"type":"p","style":"List Number","text":"คำนวณ 426 × 35"},{"type":"p","style":"List Number","text":"คำนวณ 2,050 × 24"},{"type":"p","style":"List Number","text":"เติมจำนวน: □ × 8 = 56,000"},{"type":"p","style":"List Number","text":"ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: ลืมเลื่อนหลักเมื่อคูณด้วยหลักสิบ หรือคำตอบขาด/เกินศูนย์\n• วิธีช่วยเมื่อเด็กติด: แยกผลคูณหลักหน่วย/หลักสิบและเขียนค่าประมาณก่อน"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 4 แผนการสอนที่ 4: การคูณจำนวนหลายหลักและการตรวจคำตอบ ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 3,214 × 7\n• คำนวณ 426 × 35\n• คำนวณ 2,050 × 24\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ลืมเลื่อนหลักเมื่อคูณด้วยหลักสิบ หรือคำตอบขาด/เกินศูนย์ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 4: การคูณจำนวนหลายหลักและการตรวจคำตอบ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การคูณจำนวนหลายหลักทำได้โดยแตกจำนวน เช่น 234 × 6 = 200×6 + 30×6 + 4×6\n• การตั้งคูณต้องจัดตำแหน่งหลักให้ถูก โดยเฉพาะเมื่อคูณด้วยจำนวน 2 หลัก\n• ใช้การประมาณ เช่น 398 × 24 ≈ 400 × 20 = 8,000 เพื่อตรวจว่าคำตอบสมเหตุสมผล\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 2,345 × 6 = 14,070\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: แยกผลคูณหลักหน่วย/หลักสิบและเขียนค่าประมาณก่อน 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 326 × 24 = 326×20 + 326×4 = 6,520 + 1,304 = 7,824\n• □ × 5 = 42,500 ดังนั้น □ = 42,500 ÷ 5 = 8,500\n• เติมจำนวน: □ × 8 = 56,000\n• ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: โรงงานคูณเร็ว เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับบัตรโจทย์คูณระดับง่าย กลาง ท้าทาย\n• ต้องเขียนวิธีคิดอย่างน้อย 2 วิธี เช่น ตั้งคูณและแตกจำนวน\n• ครูให้ดาวพิเศษสำหรับวิธีที่อธิบายขั้นตอนได้ชัด\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 426 × 35\n• เติมจำนวน: □ × 8 = 56,000\n• ประมาณ 1,986 × 32 แล้วบอกว่าคำตอบควรใกล้เท่าใด\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 3,214 × 7\n• คำนวณ 426 × 35\n• คำนวณ 2,050 × 24\nช่วง B แสดงวิธี ข้อ 4–5:\n• เติมจำนวน: □ × 8 = 56,000\n• ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• ถุงข้าว 1 ถุงหนัก 25 กิโลกรัม มี 1,236 ถุง หนักรวมกี่กิโลกรัม\n• ประมาณ 1,986 × 32 แล้วบอกว่าคำตอบควรใกล้เท่าใด\n• อธิบายความผิดพลาดที่พบบ่อยเมื่อตั้งคูณด้วยจำนวนสองหลัก\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 3,214 × 7\n• เติมจำนวน: □ × 8 = 56,000\n• ประมาณ 1,986 × 32 แล้วบอกว่าคำตอบควรใกล้เท่าใด\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน การคูณจำนวนหลายหลักทำได้โดยแตกจำนวน เช่น 234 × 6 = 200×6 + 30×6 + 4×6 การตั้งคูณต้องจัดตำแหน่งหลักให้ถูก โดยเฉพาะเมื่อคูณด้วยจำนวน 2 หลัก ใช้การประมาณ เช่น 398 × 24 ≈ 400 × 20 = 8,000 เพื่อตรวจว่าคำตอบสมเหตุสมผล 2,345 × 6 = 14,070 326 × 24 = 326×20 + 326×4 = 6,520 + 1,304 = 7,824 □ × 5 = 42,500 ดังนั้น □ = 42,500 ÷ 5 = 8,500 ชุดบัตรเกมพร้อมใช้ คำนวณ 3,214 × 7 คำนวณ 426 × 35 คำนวณ 2,050 × 24 เติมจำนวน: □ × 8 = 56,000 ร้านขายสมุด 248 โหล โหลละ 12 เล่ม มีสมุดกี่เล่ม คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: ลืมเลื่อนหลักเมื่อคูณด้วยหลักสิบ หรือคำตอบขาด/เกินศูนย์\n• วิธีช่วยเมื่อเด็กติด: แยกผลคูณหลักหน่วย/หลักสิบและเขียนค่าประมาณก่อน"},{"id":"ใบความรู้-แผนที่-4-การคูณจำนวนหลายหลักและการตรวจคำตอบ-23","title":"ใบความรู้ แผนที่ 4: การคูณจำนวนหลายหลักและการตรวจคำตอบ","level":2,"parent":"แผ [["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/9 หาค่าของตัวไม่ทราบค่าในประโยคสัญลักษณ์การหารที่ตัวตั้งไม่เกิน 6 หลัก ตัวหารไม่เกิน 2 หลัก"],["สาระสำคัญ","เข้าใจการหารเป็นการแบ่งเท่า ๆ กัน ใช้การคูณตรวจคำตอบ และจัดการเศษ"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 5: การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/9 หาค่าของตัวไม่ทราบค่าในประโยคสัญลักษณ์การหารที่ตัวตั้งไม่เกิน 6 หลัก ตัวหารไม่เกิน 2 หลัก สาระสำคัญ เข้าใจการหารเป็นการแบ่งเท่า ๆ กัน ใช้การคูณตรวจคำตอบ และจัดการเศษ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-5-27","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 5","level":2,"parent":"แผนการสอนที่ 5: การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก","lessonNo":5,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 42,560 ÷ 8\n• คำนวณ 96,432 ÷ 12\n• คำนวณ 75,000 ÷ 25\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: วางเลขผลหารผิดหลัก เศษมากกว่าตัวหาร และไม่ตีความเศษตามสถานการณ์"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 5: การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เติมจำนวน: 84,000 ÷ □ = 7,000\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การหารคือการแบ่งออกเป็นกลุ่มเท่า ๆ กันหรือหาจำนวนกลุ่ม\n• ตรวจคำตอบด้วย ตัวหาร × ผลหาร + เศษ = ตัวตั้ง\n• เศษต้องน้อยกว่าตัวหารเสมอ ถ้าเศษมากกว่าหรือเท่าตัวหาร แปลว่ายังหารต่อได้\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 48,625 ÷ 5 = 9,725\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้ขั้น หาร–คูณ–ลบ–ดึงลง และสูตรตรวจ ตัวหาร×ผลหาร+เศษ"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 125,436 ÷ 12 = 10,453 เศษ 0\n• 3,257 ÷ 8 = 407 เศษ 1 ตรวจ: 8×407+1 = 3,257\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• เติมจำนวน: 84,000 ÷ □ = 7,000\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: ภารกิจแบ่งสมบัติ","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูให้เหรียญ/ลูกปัดจำลองและโจทย์แบ่งเป็นกลุ่ม\n• เด็กต้องบอกทั้งคำตอบและเศษ พร้อมความหมายของเศษในสถานการณ์\n• โจทย์สุดท้ายให้เลือกว่าจะปัดขึ้นหรือไม่ เช่น รถรับส่งต้องใช้กี่คัน\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 96,432 ÷ 12\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• ตรวจคำตอบข้อ 4 ด้วยการคูณ\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 42,560 ÷ 8\n• คำนวณ 96,432 ÷ 12\n• คำนวณ 75,000 ÷ 25\nช่วง B แสดงวิธี ข้อ 4–5:\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• เติมจำนวน: 84,000 ÷ □ = 7,000\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• นักเรียน 248 คน นั่งรถตู้คันละ 12 คน ต้องใช้รถกี่คัน\n• ตรวจคำตอบข้อ 4 ด้วยการคูณ\n• อธิบายว่าเหตุใดเศษในการหารต้องน้อยกว่าตัวหาร\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 42,560 ÷ 8\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• ตรวจคำตอบข้อ 4 ด้วยการคูณ\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"การหารคือการแบ่งออกเป็นกลุ่มเท่า ๆ กันหรือหาจำนวนกลุ่ม"},{"type":"p","style":"List Bullet","text":"ตรวจคำตอบด้วย ตัวหาร × ผลหาร + เศษ = ตัวตั้ง"},{"type":"p","style":"List Bullet","text":"เศษต้องน้อยกว่าตัวหารเสมอ ถ้าเศษมากกว่าหรือเท่าตัวหาร แปลว่ายังหารต่อได้"},{"type":"p","style":"List Bullet","text":"48,625 ÷ 5 = 9,725"},{"type":"p","style":"List Bullet","text":"125,436 ÷ 12 = 10,453 เศษ 0"},{"type":"p","style":"List Bullet","text":"3,257 ÷ 8 = 407 เศษ 1 ตรวจ: 8×407+1 = 3,257"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"คำนวณ 42,560 ÷ 8"},{"type":"p","style":"List Number","text":"คำนวณ 96,432 ÷ 12"},{"type":"p","style":"List Number","text":"คำนวณ 75,000 ÷ 25"},{"type":"p","style":"List Number","text":"คำนวณ 13,287 ÷ 9 พร้อมเศษ"},{"type":"p","style":"List Number","text":"เติมจำนวน: 84,000 ÷ □ = 7,000"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: วางเลขผลหารผิดหลัก เศษมากกว่าตัวหาร และไม่ตีความเศษตามสถานการณ์\n• วิธีช่วยเมื่อเด็กติด: ใช้ขั้น หาร–คูณ–ลบ–ดึงลง และสูตรตรวจ ตัวหาร×ผลหาร+เศษ"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 5 แผนการสอนที่ 5: การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 42,560 ÷ 8\n• คำนวณ 96,432 ÷ 12\n• คำนวณ 75,000 ÷ 25\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: วางเลขผลหารผิดหลัก เศษมากกว่าตัวหาร และไม่ตีความเศษตามสถานการณ์ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 5: การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เติมจำนวน: 84,000 ÷ □ = 7,000\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การหารคือการแบ่งออกเป็นกลุ่มเท่า ๆ กันหรือหาจำนวนกลุ่ม\n• ตรวจคำตอบด้วย ตัวหาร × ผลหาร + เศษ = ตัวตั้ง\n• เศษต้องน้อยกว่าตัวหารเสมอ ถ้าเศษมากกว่าหรือเท่าตัวหาร แปลว่ายังหารต่อได้\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 48,625 ÷ 5 = 9,725\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้ขั้น หาร–คูณ–ลบ–ดึงลง และสูตรตรวจ ตัวหาร×ผลหาร+เศษ 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 125,436 ÷ 12 = 10,453 เศษ 0\n• 3,257 ÷ 8 = 407 เศษ 1 ตรวจ: 8×407+1 = 3,257\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• เติมจำนวน: 84,000 ÷ □ = 7,000\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: ภารกิจแบ่งสมบัติ เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูให้เหรียญ/ลูกปัดจำลองและโจทย์แบ่งเป็นกลุ่ม\n• เด็กต้องบอกทั้งคำตอบและเศษ พร้อมความหมายของเศษในสถานการณ์\n• โจทย์สุดท้ายให้เลือกว่าจะปัดขึ้นหรือไม่ เช่น รถรับส่งต้องใช้กี่คัน\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 96,432 ÷ 12\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• ตรวจคำตอบข้อ 4 ด้วยการคูณ\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 42,560 ÷ 8\n• คำนวณ 96,432 ÷ 12\n• คำนวณ 75,000 ÷ 25\nช่วง B แสดงวิธี ข้อ 4–5:\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• เติมจำนวน: 84,000 ÷ □ = 7,000\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• นักเรียน 248 คน นั่งรถตู้คันละ 12 คน ต้องใช้รถกี่คัน\n• ตรวจคำตอบข้อ 4 ด้วยการคูณ\n• อธิบายว่าเหตุใดเศษในการหารต้องน้อยกว่าตัวหาร\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 42,560 ÷ 8\n• คำนวณ 13,287 ÷ 9 พร้อมเศษ\n• ตรวจคำตอบข้อ 4 ด้วยการคูณ\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน การหารคือการแบ่งออกเป็นกลุ่มเท่า ๆ กันหรือหาจำนวนกลุ่ม ตรวจคำตอบด้วย ตัวหาร × ผลหาร + เศษ = ตัวตั้ง เศษต้องน้อยกว่าตัวหารเสมอ ถ้าเศษมากกว่าหรือเท่าตัวหาร แปลว่ายังหารต่อได้ 48,625 ÷ 5 = 9,725 125,436 ÷ 12 = 10,453 เศษ 0 3,257 ÷ 8 = 407 เศษ 1 ตรวจ: 8×407+1 = 3,257 ชุดบัตรเกมพร้อมใช้ คำนวณ 42,560 ÷ 8 คำนวณ 96,432 ÷ 12 คำนวณ 75,000 ÷ 25 คำนวณ 13,287 ÷ 9 พร้อมเศษ เติมจำนวน: 84,000 ÷ □ = 7,000 คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: วางเลขผลหารผิดหลัก เศษมากกว่าตัวหาร และไม่ตีความเศษตามสถานการณ์\n• วิธีช่วยเมื่อเด็กติด: ใช้ขั้น หาร–คูณ–ลบ–ดึงลง และสูตรตรวจ ตัวหาร×ผลหาร+เศษ"},{"id":"ใบความรู้-แผนที่-5-การหาร-ตัวตั้งไม่เกิน-6-หลัก-ตัวหาร-1-2-หลัก-28","title":"ใบความรู้ แผนที่ 5: การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก","level":2,"parent":"แผนการสอนที่ 5: การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก","lessonNo":5,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใช้ส่วนนี้เป็นแบบเรียนสั้นสำหรับครูสอนหรือให้เด็กอ่านทบทวนก่อนทำใบงาน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"การหารคือการแบ่งออกเป็นกลุ่มเท่า ๆ กันหรือหาจำนวนกลุ่ม"},{"type":"p","style":"List Bullet","text":"ตรวจคำตอบด้วย ตัวหาร × ผลหาร + เศษ = ตัวตั้ง"},{"type":"p","style":"List Bullet","text":"เศษต้องน้อยกว่าตัวหารเสมอ ถ้าเศษมากกว่าหรือเท่าตัวหาร แปลว่ายังหารต่อได้"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"List Number","text":"48,625 ÷ 5 = 9,725"},{"type":"p","style":"List Number","text":"125,436 ÷ 12 = 10,453 เศษ 0"},{"type":"p","style":"List Number","text":"3,257 ÷ 8 = 407 เศษ 1 ตรวจ: 8×407+1 = 3,257"},{"type":"p","style":"Normal","text":"แบบฝึกนำก่อนใบงาน"},{"type":"p","style":"Normal","text":"ลองทำ 1: .... เมื่อมีตัวอย่าง ยังตอบแบบเดา ทักษะคำนวณ ถูกอย่างน้อย 70% ถูก 50-69% ต่ำกว่า 50% การสื่อสารวิธีคิด เขียน/พูดเป็นขั้นตอน อธิบายได้บางส่วน ยังอธิบายไม่ได้ ความตั้งใจ ร่วมกิจกรรมต่อเนื่อง ร่วมบ้างเป็นช่วง ต้องกระตุ้นบ่อย ข้อความ Feedback ผู้ปกครองประจำบท แม่แบบปรับใช้ได้ทันที • วันนี้น้องเรียนเรื่อง “การหาร ตัวตั้งไม่เกิน 6 หลัก ตัวหาร 1-2 หลัก” • น้องทำได้ดีในเรื่อง: ____________________ • จุดที่ควรฝึกเพิ่มคือ: ____________________ • การบ้าน/ฝึกที่บ้าน: ฝึกหารจากสถานการณ์จริง เช่น แบ่งขนม แบ่งเงิน แบ่งคนเข้ากลุ่ม 5 ข้อ • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-6-การบวก-ลบ-คูณ-หารระคน-และลำดับการคำนวณ-31","title":"แผนการสอนที่ 6: การบวก ลบ คูณ หารระคน และลำดับการคำนวณ","level":1,"parent":"","lessonNo":6,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/10 หาผลลัพธ์การบวก ลบ คูณ หารระคนของจำนวนนับและ 0"],["สาระสำคัญ","รู้ลำดับคำนวณ วงเล็บก่อน คูณ/หารก่อน บวก/ลบทีหลัง และคำนวณจากซ้ายไปขวาในระดับเดียวกัน"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 6: การบวก ลบ คูณ หารระคน และลำดับการคำนวณ ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/10 หาผลลัพธ์การบวก ลบ คูณ หารระคนของจำนวนนับและ 0 สาระสำคัญ รู้ลำดับคำนวณ วงเล็บก่อน คูณ/หารก่อน บวก/ลบทีหลัง และคำนวณจากซ้ายไปขวาในระดับเดียวกัน จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-6-32","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 6","level":2,"parent":"แผนการสอนที่ 6: การบวก ลบ คูณ หารระคน และลำดับการคำนวณ","lessonNo":6,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 45 + 8 × 6\n• คำนวณ (45 + 8) × 6\n• คำนวณ 200 - 72 ÷ 8\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ทำจากซ้ายไปขวาทั้งหมดโดยไม่ทำวงเล็บและคูณหารก่อน"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 6: การบวก ลบ คูณ หารระคน และลำดับการคำนวณ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• คำนวณ 45 + 8 × 6\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ลำดับการคำนวณสำคัญเพราะโจทย์เดียวกันอาจได้คำตอบต่างกันหากทำผิดลำดับ\n• ถ้ามีวงเล็บ ให้ทำในวงเล็บก่อน\n• ถ้าไม่มีวงเล็บ ให้ทำคูณหรือหารก่อน แล้วจึงบวกหรือลบ\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 35 + 6 × 4 = 35 + 24 = 59\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วงส่วนที่ต้องทำก่อนและเขียนหนึ่งการเปลี่ยนต่อหนึ่งบรรทัด"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• (35 + 6) × 4 = 41 × 4 = 164\n• 120 ÷ 6 + 18 × 3 = 20 + 54 = 74\n• คำนวณ 36 × 5 - 120 ÷ 4\n• คำนวณ 1,000 - (250 + 35 × 6)\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: ทางออกคำนวณ","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูทำบัตรเส้นทาง 4 ด่าน แต่ละด่านเป็นโจทย์ระคน\n• ตอบถูกจึงไปด่านถัดไป หากผิดต้องย้อนกลับตรวจลำดับการคิด\n• ทีมชนะไม่ใช่ทีมเร็วสุดเท่านั้น แต่ต้องอธิบายลำดับการคิดได้\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ (45 + 8) × 6\n• คำนวณ 36 × 5 - 120 ÷ 4\n• โจทย์: ซื้อสมุด 8 เล่ม เล่มละ 15 บาท และดินสอ 6 แท่ง แท่งละ 5 บาท จ่ายกี่บาท\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 45 + 8 × 6\n• คำนวณ (45 + 8) × 6\n• คำนวณ 200 - 72 ÷ 8\nช่วง B แสดงวิธี ข้อ 4–5:\n• คำนวณ 36 × 5 - 120 ÷ 4\n• คำนวณ 1,000 - (250 + 35 × 6)\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เติมวงเล็บให้ได้ 300: 20 + 10 × 10\n• โจทย์: ซื้อสมุด 8 เล่ม เล่มละ 15 บาท และดินสอ 6 แท่ง แท่งละ 5 บาท จ่ายกี่บาท\n• อธิบายว่าโจทย์ข้อ 1 และข้อ 2 ได้คำตอบต่างกันเพราะอะไร\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 45 + 8 × 6\n• คำนวณ 36 × 5 - 120 ÷ 4\n• โจทย์: ซื้อสมุด 8 เล่ม เล่มละ 15 บาท และดินสอ 6 แท่ง แท่งละ 5 บาท จ่ายกี่บาท\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ลำดับการคำนวณสำคัญเพราะโจทย์เดียวกันอาจได้คำตอบต่างกันหากทำผิดลำดับ"},{"type":"p","style":"List Bullet","text":"ถ้ามีวงเล็บ ให้ทำในวงเล็บก่อน"},{"type":"p","style":"List Bullet","text":"ถ้าไม่มีวงเล็บ ให้ทำคูณหรือหารก่อน แล้วจึงบวกหรือลบ"},{"type":"p","style":"List Bullet","text":"35 + 6 × 4 = 35 + 24 = 59"},{"type":"p","style":"List Bullet","text":"(35 + 6) × 4 = 41 × 4 = 164"},{"type":"p","style":"List Bullet","text":"120 ÷ 6 + 18 × 3 = 20 + 54 = 74"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"คำนวณ 45 + 8 × 6"},{"type":"p","style":"List Number","text":"คำนวณ (45 + 8) × 6"},{"type":"p","style":"List Number","text":"คำนวณ 200 - 72 ÷ 8"},{"type":"p","style":"List Number","text":"คำนวณ 36 × 5 - 120 ÷ 4"},{"type":"p","style":"List Number","text":"คำนวณ 1,000 - (250 + 35 × 6)"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: ทำจากซ้ายไปขวาทั้งหมดโดยไม่ทำวงเล็บและคูณหารก่อน\n• วิธีช่วยเมื่อเด็กติด: วงส่วนที่ต้องทำก่อนและเขียนหนึ่งการเปลี่ยนต่อหนึ่งบรรทัด"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 6 แผนการสอนที่ 6: การบวก ลบ คูณ หารระคน และลำดับการคำนวณ ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 45 + 8 × 6\n• คำนวณ (45 + 8) × 6\n• คำนวณ 200 - 72 ÷ 8\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ทำจากซ้ายไปขวาทั้งหมดโดยไม่ทำวงเล็บและคูณหารก่อน 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 6: การบวก ลบ คูณ หารระคน และลำดับการคำนวณ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• คำนวณ 45 + 8 × 6\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ลำดับการคำนวณสำคัญเพราะโจทย์เดียวกันอาจได้คำตอบต่างกันหากทำผิดลำดับ\n• ถ้ามีวงเล็บ ให้ทำในวงเล็บก่อน\n• ถ้าไม่มีวงเล็บ ให้ทำคูณหรือหารก่อน แล้วจึงบวกหรือลบ\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 35 + 6 × 4 = 35 + 24 = 59\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วงส่วนที่ต้องทำก่อนและเขียนหนึ่งการเปลี่ยนต่อหนึ่งบรรทัด 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• (35 + 6) × 4 = 41 × 4 = 164\n• 120 ÷ 6 + 18 × 3 = 20 + 54 = 74\n• คำนวณ 36 × 5 - 120 ÷ 4\n• คำนวณ 1,000 - (250 + 35 × 6)\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: ทางออกคำนวณ เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูทำบัตรเส้นทาง 4 ด่าน แต่ละด่านเป็นโจทย์ระคน\n• ตอบถูกจึงไปด่านถัดไป หากผิดต้องย้อนกลับตรวจลำดับการคิด\n• ทีมชนะไม่ใช่ทีมเร็วสุดเท่านั้น แต่ต้องอธิบายลำดับการคิดได้\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ (45 + 8) × 6\n• คำนวณ 36 × 5 - 120 ÷ 4\n• โจทย์: ซื้อสมุด 8 เล่ม เล่มละ 15 บาท และดินสอ 6 แท่ง แท่งละ 5 บาท จ่ายกี่บาท\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 45 + 8 × 6\n• คำนวณ (45 + 8) × 6\n• คำนวณ 200 - 72 ÷ 8\nช่วง B แสดงวิธี ข้อ 4–5:\n• คำนวณ 36 × 5 - 120 ÷ 4\n• คำนวณ 1,000 - (250 + 35 × 6)\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เติมวงเล็บให้ได้ 300: 20 + 10 × 10\n• โจทย์: ซื้อสมุด 8 เล่ม เล่มละ 15 บาท และดินสอ 6 แท่ง แท่งละ 5 บาท จ่ายกี่บาท\n• อธิบายว่าโจทย์ข้อ 1 และข้อ 2 ได้คำตอบต่างกันเพราะอะไร\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 45 + 8 × 6\n• คำนวณ 36 × 5 - 120 ÷ 4\n• โจทย์: ซื้อสมุด 8 เล่ม เล่มละ 15 บาท และดินสอ 6 แท่ง แท่งละ 5 บาท จ่ายกี่บาท\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน ลำดับการคำนวณสำคัญเพราะโจทย์เดียวกันอาจได้คำตอบต่างกันหากทำผิดลำดับ ถ้ามีวงเล็บ ให้ทำในวงเล็บก่อน ถ้าไม่มีวงเล็บ ให้ทำคูณหรือหารก่อน แล้วจึงบวกหรือลบ 35 + 6 × 4 = 35 + 24 = 59 (35 + 6) × 4 = 41 × 4 = 164 120 ÷ 6 + 18 × 3 = 20 + 54 = 74 ชุดบัตรเกมพร้อมใช้ คำนวณ 45 + 8 × 6 คำนวณ (45 + 8) × 6 คำนวณ 200 - 72 ÷ 8 คำนวณ 36 × 5 - 120 ÷ 4 คำนวณ 1,000 - (250 + 35 × 6) คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: ทำจากซ้ายไปขวาทั้งหมดโดยไม่ทำวงเล็บและคูณหารก่อน\n• วิธีช่วยเมื่อเด็กติด: วงส่วนที่ต้องทำก่อนและเขียนหนึ่งการเปลี่ยนต่อหนึ่งบรรทัด"},{"id":"ใบความรู้-แผนที่-6-การบวก-ลบ-คูณ-หารระคน-และลำดับการคำนวณ-33","title":"ใบความรู้ แผนที่ 6: การบวก ลบ คูณ หารระคน และลำดับการคำนวณ","level":2,"parent":"แผนการสอนที่ 6: การบวก ลบ คูณ หารระคน และลำดับ อธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 7: โจทย์ปัญหา 2 ขั้นตอน และการสร้างโจทย์ปัญหา ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/11 แสดงวิธีหาคำตอบของโจทย์ปัญหา 2 ขั้นตอน และ ค 1.1 ป.4/12 สร้างโจทย์ปัญหา 2 ขั้นตอนพร้อมหาคำตอบ สาระสำคัญ อ่านโจทย์อย่างเป็นระบบ หาคำสำคัญ เลือกวิธีคิด และเขียนประโยคสัญลักษณ์ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-7-37","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 7","level":2,"parent":"แผนการสอนที่ 7: โจทย์ปัญหา 2 ขั้นตอน และการสร้างโจทย์ปัญหา","lessonNo":7,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด\n• โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม\n• แม่มีเงิน 1,000 บาท ซื้อข้าวสาร 3 ถุง ถุงละ 185 บาท เหลือเงินเท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: นำตัวเลขทุกตัวมาคำนวณทันที ไม่หาคำถามกลางและไม่ใส่หน่วย"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 7: โจทย์ปัญหา 2 ขั้นตอน และการสร้างโจทย์ปัญหา” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• โจทย์ปัญหา 2 ขั้นตอนต้องทำมากกว่า 1 การดำเนินการ เช่น บวกแล้วหาร คูณแล้วลบ\n• ขั้นอ่านโจทย์ให้ถาม 3 คำถาม: รู้อะไร ต้องการหาอะไร ควรทำอะไรก่อน\n• การสร้างโจทย์ต้องมีข้อมูลเพียงพอ คำถามชัด และคำตอบตรวจสอบได้\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• มีเงิน 2,000 บาท ซื้อหนังสือ 3 เล่ม เล่มละ 250 บาท เหลือเงินเท่าใด: 3×250=750, 2,000-750=1,250\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้กรอบ รู้อะไร–หาอะไร–ขั้นแรก–ขั้นสอง และเขียนหน่วยทุกขั้น"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• มีนักเรียน 120 คน แบ่งเป็นกลุ่มละ 8 คน แล้วแต่ละกลุ่มได้กระดาษ 5 แผ่น ต้องใช้กระดาษกี่แผ่น: 120÷8=15, 15×5=75\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: นักสืบโจทย์ปัญหา","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับบัตรโจทย์และปากกา 3 สี: ขีดข้อมูล สำคัญ คำถาม และคำบอกวิธีคิด\n• ให้เด็กจับคู่แลกโจทย์ แล้วตรวจว่าคู่ของตนตีความถูกหรือไม่\n• คะแนนพิเศษสำหรับเด็กที่เขียนประโยคสัญลักษณ์ได้ครบ 2 ขั้น\nบัตรโจทย์พร้อมใช้ในเกม:\n• โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• แก้โจทย์: ร้านมีแก้ว 25 ลัง ลังละ 48 ใบ แตกไป 37 ใบ เหลือกี่ใบ\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด\n• โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม\n• แม่มีเงิน 1,000 บาท ซื้อข้าวสาร 3 ถุง ถุงละ 185 บาท เหลือเงินเท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• โจทย์ใดควรทำก่อนในข้อ 3 และเพราะอะไร\n• แก้โจทย์: ร้านมีแก้ว 25 ลัง ลังละ 48 ใบ แตกไป 37 ใบ เหลือกี่ใบ\n• ให้เด็กตรวจคำตอบข้อ 7 ด้วยการประมาณ\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• แก้โจทย์: ร้านมีแก้ว 25 ลัง ลังละ 48 ใบ แตกไป 37 ใบ เหลือกี่ใบ\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"โจทย์ปัญหา 2 ขั้นตอนต้องทำมากกว่า 1 การดำเนินการ เช่น บวกแล้วหาร คูณแล้วลบ"},{"type":"p","style":"List Bullet","text":"ขั้นอ่านโจทย์ให้ถาม 3 คำถาม: รู้อะไร ต้องการหาอะไร ควรทำอะไรก่อน"},{"type":"p","style":"List Bullet","text":"การสร้างโจทย์ต้องมีข้อมูลเพียงพอ คำถามชัด และคำตอบตรวจสอบได้"},{"type":"p","style":"List Bullet","text":"มีเงิน 2,000 บาท ซื้อหนังสือ 3 เล่ม เล่มละ 250 บาท เหลือเงินเท่าใด: 3×250=750, 2,000-750=1,250"},{"type":"p","style":"List Bullet","text":"มีนักเรียน 120 คน แบ่งเป็นกลุ่มละ 8 คน แล้วแต่ละกลุ่มได้กระดาษ 5 แผ่น ต้องใช้กระดาษกี่แผ่น: 120÷8=15, 15×5=75"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด"},{"type":"p","style":"List Number","text":"โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม"},{"type":"p","style":"List Number","text":"แม่มีเงิน 1,000 บาท ซื้อข้าวสาร 3 ถุง ถุงละ 185 บาท เหลือเงินเท่าใด"},{"type":"p","style":"List Number","text":"แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15"},{"type":"p","style":"List Number","text":"เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: นำตัวเลขทุกตัวมาคำนวณทันที ไม่หาคำถามกลางและไม่ใส่หน่วย\n• วิธีช่วยเมื่อเด็กติด: ใช้กรอบ รู้อะไร–หาอะไร–ขั้นแรก–ขั้นสอง และเขียนหน่วยทุกขั้น"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 7 แผนการสอนที่ 7: โจทย์ปัญหา 2 ขั้นตอน และการสร้างโจทย์ปัญหา ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด\n• โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม\n• แม่มีเงิน 1,000 บาท ซื้อข้าวสาร 3 ถุง ถุงละ 185 บาท เหลือเงินเท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: นำตัวเลขทุกตัวมาคำนวณทันที ไม่หาคำถามกลางและไม่ใส่หน่วย 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 7: โจทย์ปัญหา 2 ขั้นตอน และการสร้างโจทย์ปัญหา” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• โจทย์ปัญหา 2 ขั้นตอนต้องทำมากกว่า 1 การดำเนินการ เช่น บวกแล้วหาร คูณแล้วลบ\n• ขั้นอ่านโจทย์ให้ถาม 3 คำถาม: รู้อะไร ต้องการหาอะไร ควรทำอะไรก่อน\n• การสร้างโจทย์ต้องมีข้อมูลเพียงพอ คำถามชัด และคำตอบตรวจสอบได้\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• มีเงิน 2,000 บาท ซื้อหนังสือ 3 เล่ม เล่มละ 250 บาท เหลือเงินเท่าใด: 3×250=750, 2,000-750=1,250\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้กรอบ รู้อะไร–หาอะไร–ขั้นแรก–ขั้นสอง และเขียนหน่วยทุกขั้น 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• มีนักเรียน 120 คน แบ่งเป็นกลุ่มละ 8 คน แล้วแต่ละกลุ่มได้กระดาษ 5 แผ่น ต้องใช้กระดาษกี่แผ่น: 120÷8=15, 15×5=75\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: นักสืบโจทย์ปัญหา เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับบัตรโจทย์และปากกา 3 สี: ขีดข้อมูล สำคัญ คำถาม และคำบอกวิธีคิด\n• ให้เด็กจับคู่แลกโจทย์ แล้วตรวจว่าคู่ของตนตีความถูกหรือไม่\n• คะแนนพิเศษสำหรับเด็กที่เขียนประโยคสัญลักษณ์ได้ครบ 2 ขั้น\nบัตรโจทย์พร้อมใช้ในเกม:\n• โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• แก้โจทย์: ร้านมีแก้ว 25 ลัง ลังละ 48 ใบ แตกไป 37 ใบ เหลือกี่ใบ\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด\n• โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม\n• แม่มีเงิน 1,000 บาท ซื้อข้าวสาร 3 ถุง ถุงละ 185 บาท เหลือเงินเท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• โจทย์ใดควรทำก่อนในข้อ 3 และเพราะอะไร\n• แก้โจทย์: ร้านมีแก้ว 25 ลัง ลังละ 48 ใบ แตกไป 37 ใบ เหลือกี่ใบ\n• ให้เด็กตรวจคำตอบข้อ 7 ด้วยการประมาณ\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด\n• แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15\n• แก้โจทย์: ร้านมีแก้ว 25 ลัง ลังละ 48 ใบ แตกไป 37 ใบ เหลือกี่ใบ\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน โจทย์ปัญหา 2 ขั้นตอนต้องทำมากกว่า 1 การดำเนินการ เช่น บวกแล้วหาร คูณแล้วลบ ขั้นอ่านโจทย์ให้ถาม 3 คำถาม: รู้อะไร ต้องการหาอะไร ควรทำอะไรก่อน การสร้างโจทย์ต้องมีข้อมูลเพียงพอ คำถามชัด และคำตอบตรวจสอบได้ มีเงิน 2,000 บาท ซื้อหนังสือ 3 เล่ม เล่มละ 250 บาท เหลือเงินเท่าใด: 3×250=750, 2,000-750=1,250 มีนักเรียน 120 คน แบ่งเป็นกลุ่มละ 8 คน แล้วแต่ละกลุ่มได้กระดาษ 5 แผ่น ต้องใช้กระดาษกี่แผ่น: 120÷8=15, 15×5=75 ชุดบัตรเกมพร้อมใช้ อ่านโจทย์: มีส้ม 480 ผล แบ่งใส่ถุงถุงละ 12 ผล ขายไปถุงละ 35 บาท ได้เงินเท่าใด โรงเรียนมีนักเรียน 360 คน แบ่งเป็น 9 ห้องเท่า ๆ กัน แต่ละห้องได้รับสมุดคนละ 2 เล่ม ต้องใช้สมุดกี่เล่ม แม่มีเงิน 1,000 บาท ซื้อข้าวสาร 3 ถุง ถุงละ 185 บาท เหลือเงินเท่าใด แต่งโจทย์ 2 ขั้นตอนโดยใช้จำนวน 240, 12, 15 เขียนประโยคสัญลักษณ์จากโจทย์ข้อ 1 คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: นำตัวเลขทุกตัวมาคำนวณทันที ไม่หาคำถามกลางและไม่ใส่หน่วย\n• วิธีช่วยเมื่อเด็กติด: ใช้กรอบ รู้อะไร–หาอะไร–ขั้นแรก–ขั้นสอง และเขียนหน่วยทุกขั้น"},{"id":"ใบความรู้-แผนที่-7-โจทย์ปัญหา-2-ขั้นตอน-และการสร้างโจทย์ปัญหา-38","title":"ใบความรู้ แผนที่ 7: โจทย์ปัญหา 2 ขั้นตอน และการสร้างโจทย์ปัญหา","level":2,"parent":"แผนการสอนที่ 7: โจทย์ปัญหา 2 ขั้นตอน และการสร้างโจทย์ปัญหา","lessonNo":7,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใช้ส่วนนี้เป็นแบบเรียนสั้นสำหรับครูสอนหรือให้เด็กอ่านทบทวนก่อนทำใบงาน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"โจทย์ปัญหา 2 ขั้นตอนต้องทำมากกว่า 1 การดำเนินการ เช่น บวกแล้วหาร คูณแล้วลบ"},{"type":"p","style":"List Bullet","text":"ขั้นอ่านโจทย์ให้ถาม 3 คำถาม: รู้อะไร ต้องการหาอะไร ควรทำอะไรก่อน"},{"type":"p","style":"List Bullet","text":"การสร้างโจทย์ต้องมีข้อมูลเพียงพอ คำถามชัด และคำตอบตรวจสอบได้"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"List Number","text":"มีเงิน 2,000 บาท ซื้อหนังสือ 3 เล่ม เล่มละ 250 บาท เหลือเงินเท่าใด: 3×250=750, 2,000-750=1,250"},{"type":"p","style":"List Number","text":"มีนักเรียน 120
