<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0757A5">
<meta name="description" content="แผนการสอนพิเศษคณิตศาสตร์ ป.4 จำนวน 16 ชั่วโมง พร้อมเกม ใบความรู้ ใบงาน เฉลย และ Feedback ผู้ปกครอง">
<title>Little Steps คณิตศาสตร์ ป.4 · 16 ชั่วโมง</title>
<style>
:root {
  --navy:#0757A5; --navy-2:#073C7D; --blue:#0F83C9; --cyan:#28B7DF;
  --sky:#EAF8FF; --sky-2:#F5FBFF; --yellow:#FFC83D; --gold:#F5A623;
  --green:#72B94F; --ink:#18344E; --muted:#617B91; --line:#D9ECF7;
  --paper:#FFFFFF; --shadow:0 24px 70px rgba(4,75,130,.16);
  --radius:32px; --sidebar:310px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:"Noto Sans Thai","Leelawadee UI",Tahoma,Arial,sans-serif;color:var(--ink);background:
 radial-gradient(circle at 10% 8%,rgba(40,183,223,.16),transparent 24%),
 radial-gradient(circle at 92% 90%,rgba(255,200,61,.16),transparent 22%),
 linear-gradient(135deg,#f7fcff 0%,#eef8ff 48%,#fffdf4 100%);min-height:100vh;overflow-x:hidden}
button,input,textarea{font:inherit}
button{cursor:pointer}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid rgba(40,183,223,.4);outline-offset:2px}
.app{min-height:100vh}
.topbar{position:fixed;inset:0 0 auto 0;height:68px;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border-bottom:1px solid rgba(7,87,165,.1);z-index:50;display:flex;align-items:center;gap:14px;padding:0 20px}
.brand-mini{display:flex;align-items:center;gap:10px;min-width:260px}
.brand-badge{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--cyan),var(--navy));display:grid;place-items:center;color:white;font-weight:900;box-shadow:0 8px 20px rgba(15,131,201,.25);position:relative}
.brand-badge::after{content:"✦";position:absolute;color:var(--yellow);font-size:12px;right:-5px;top:-5px}
.brand-mini strong{font-size:15px;color:var(--navy)}
.brand-mini small{display:block;color:var(--muted);font-size:11px;margin-top:1px}
.progress-wrap{flex:1;display:flex;align-items:center;gap:10px;min-width:110px}
.progress-track{height:9px;background:#e5f2f9;border-radius:99px;overflow:hidden;flex:1}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--navy),var(--yellow));border-radius:inherit;transition:width .35s ease}
.progress-label{font-size:12px;color:var(--muted);white-space:nowrap}
.toolbar{display:flex;gap:8px;align-items:center}
.icon-btn,.pill-btn{border:1px solid #d7eaf5;background:white;color:var(--navy);height:40px;border-radius:14px;padding:0 12px;display:inline-flex;align-items:center;gap:7px;font-weight:700;box-shadow:0 4px 14px rgba(7,87,165,.06)}
.icon-btn:hover,.pill-btn:hover{background:var(--sky);transform:translateY(-1px)}
.mode-btn[data-mode="teacher"]{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-color:transparent}
.menu-btn{display:none}
.sidebar{position:fixed;left:0;top:68px;bottom:0;width:var(--sidebar);background:rgba(255,255,255,.93);backdrop-filter:blur(18px);border-right:1px solid rgba(7,87,165,.11);z-index:40;overflow-y:auto;padding:18px 14px 30px}
.searchbox{position:sticky;top:-18px;background:rgba(255,255,255,.97);padding:10px 0 12px;z-index:2}
.searchbox input{width:100%;border:1px solid #d9eaf4;background:#f8fcff;border-radius:15px;padding:11px 13px;color:var(--ink)}
.nav-section{margin:10px 0 16px}
.nav-section-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#7c93a7;font-weight:900;margin:0 8px 7px}
.nav-btn{width:100%;border:0;background:transparent;text-align:left;padding:9px 10px;border-radius:13px;color:#41627c;display:flex;gap:9px;align-items:flex-start;line-height:1.35;margin:2px 0}
.nav-btn:hover{background:#eff9ff;color:var(--navy)}
.nav-btn.active{background:linear-gradient(135deg,#e6f7ff,#fff8de);color:var(--navy);font-weight:900;box-shadow:inset 3px 0 var(--cyan)}
.nav-num{flex:0 0 28px;height:28px;border-radius:10px;background:#e9f6fd;color:var(--blue);font-weight:900;display:grid;place-items:center;font-size:12px}
.nav-btn.active .nav-num{background:var(--navy);color:white}
.lesson-group{border:1px solid #e1eff7;border-radius:17px;margin:8px 0;overflow:hidden;background:#fff}
.lesson-group summary{list-style:none;display:flex;align-items:center;gap:10px;padding:11px 10px;cursor:pointer;font-weight:800;color:var(--navy);font-size:13px}
.lesson-group summary::-webkit-details-marker{display:none}
.lesson-group summary::after{content:"＋";margin-left:auto;color:var(--cyan)}
.lesson-group[open] summary::after{content:"−"}
.lesson-group .group-body{padding:0 7px 7px}
.lesson-group .nav-btn{font-size:12px;padding:8px}
.main{margin-left:var(--sidebar);padding:92px 24px 28px;min-height:100vh}
.slide-stage{max-width:1220px;margin:0 auto;position:relative}
.slide-card{background:rgba(255,255,255,.97);border:1px solid rgba(7,87,165,.10);border-radius:var(--radius);box-shadow:var(--shadow);min-height:calc(100vh - 132px);overflow:hidden;position:relative;display:flex;flex-direction:column}
.slide-card::before{content:"";position:absolute;width:250px;height:250px;border:34px solid rgba(40,183,223,.10);border-radius:50%;right:-130px;top:-120px;pointer-events:none}
.slide-card::after{content:"";position:absolute;width:180px;height:28px;border-radius:50%;background:linear-gradient(90deg,rgba(40,183,223,.18),rgba(255,200,61,.22));left:8%;bottom:-8px;filter:blur(8px);pointer-events:none}
.slide-banner{min-height:132px;padding:27px 40px 22px;background:linear-gradient(120deg,#f1fbff 0%,#fff 55%,#fff9e6 100%);border-bottom:1px solid var(--line);position:relative;z-index:1}
.slide-kicker{display:flex;align-items:center;gap:9px;color:var(--blue);font-weight:900;font-size:13px;margin-bottom:9px}
.kicker-dot{width:11px;height:11px;border-radius:50%;background:var(--yellow);box-shadow:18px 0 0 var(--cyan),36px 0 0 var(--navy);margin-right:33px}
.slide-title{font-size:clamp(25px,3vw,42px);line-height:1.18;margin:0;color:var(--navy-2);max-width:970px;letter-spacing:-.02em}
.slide-parent{margin-top:9px;color:var(--muted);font-size:13px}
.slide-body{padding:30px 40px 92px;position:relative;z-index:1;flex:1;overflow:auto}
.slide-footer{position:absolute;left:0;right:0;bottom:0;height:68px;background:linear-gradient(180deg,rgba(255,255,255,.25),rgba(255,255,255,.96) 34%);display:flex;align-items:center;justify-content:space-between;padding:13px 30px;z-index:5;pointer-events:none}
.slide-footer>*{pointer-events:auto}
.footer-note{font-size:12px;color:var(--muted)}
.footer-actions{display:flex;gap:8px}
.nav-arrow{border:0;border-radius:14px;padding:10px 15px;background:#edf8fe;color:var(--navy);font-weight:900}
.nav-arrow.primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;box-shadow:0 8px 20px rgba(7,87,165,.22)}
.nav-arrow:disabled{opacity:.35;cursor:not-allowed}
.content-p{font-size:16px;line-height:1.8;margin:0 0 12px;color:#2c4a62}
.content-p.lead{font-size:18px;line-height:1.85;color:#24445f;background:#f5fbff;border-left:5px solid var(--cyan);padding:17px 19px;border-radius:0 18px 18px 0}
.content-p.subhead{font-size:21px;line-height:1.35;color:var(--navy);font-weight:900;margin:25px 0 12px;display:flex;align-items:center;gap:10px}
.content-p.subhead::before{content:"";width:12px;height:12px;border-radius:4px;background:linear-gradient(135deg,var(--yellow),var(--gold));box-shadow:5px 5px 0 rgba(40,183,223,.2)}
.content-p.question{background:#fbfdff;border:1px solid #dcecf6;border-radius:17px;padding:14px 16px;margin:10px 0;font-weight:650;color:#234963}
.content-p.answer{background:#f3fbf1;border-left:4px solid var(--green);padding:11px 14px;border-radius:0 13px 13px 0}
.list-card{margin:9px 0 18px;padding:18px 22px 18px 42px;border-radius:20px;background:linear-gradient(135deg,#f6fcff,#fffef8);border:1px solid #dfedf5}
.list-card li{margin:8px 0;line-height:1.7;padding-left:3px}
.list-card li::marker{color:var(--blue);font-weight:900}
.table-wrap{margin:18px 0 25px;overflow-x:auto;border-radius:20px;border:1px solid #dbeaf3;box-shadow:0 8px 24px rgba(7,87,165,.06);background:white}
table.content-table{width:100%;border-collapse:collapse;min-width:680px}
table.content-table th{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;text-align:left;padding:13px 14px;font-size:14px;line-height:1.45;position:sticky;top:0}
table.content-table td{padding:13px 14px;border-top:1px solid #e5f0f6;vertical-align:top;line-height:1.55;font-size:14px;color:#34546c}
table.content-table tr:nth-child(even) td{background:#f8fcff}
table.content-table tr:hover td{background:#fffbea}
.note-box{margin:17px 0 24px;padding:20px 22px;border-radius:22px;background:linear-gradient(135deg,#eefaff,#fff9e6);border:1px solid #d6ebf5;position:relative;overflow:hidden}
.note-box::after{content:"✦";position:absolute;right:18px;top:11px;font-size:32px;color:rgba(255,190,35,.35)}
.note-title{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:9px}
.note-box ul{margin:0;padding-left:22px}.note-box li{margin:6px 0;line-height:1.65}
.kv-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px;margin:17px 0 24px}
.kv-item{border:1px solid #dbeaf3;border-radius:18px;padding:16px;background:#fbfdff}
.kv-key{font-size:12px;color:var(--blue);font-weight:900;margin-bottom:6px;text-transform:none}
.kv-value{font-size:14px;line-height:1.65;color:#31516a}
.timeline{display:grid;gap:14px;margin:18px 0 25px}
.step-card{display:grid;grid-template-columns:170px 1fr 1fr 1fr;border:1px solid #dbeaf3;border-radius:21px;overflow:hidden;background:white;box-shadow:0 8px 22px rgba(7,87,165,.05)}
.step-stage{padding:16px;background:linear-gradient(135deg,#e9f8ff,#fff8dc);font-weight:900;color:var(--navy);line-height:1.45}
.step-cell{padding:15px;border-left:1px solid #e3eef5;line-height:1.6;font-size:13px;color:#36546b}
.step-label{display:block;font-size:10px;letter-spacing:.08em;color:var(--blue);font-weight:900;margin-bottom:5px}
.form-field{margin:8px 0 14px}
.form-field label{display:block;font-weight:750;color:#274c67;margin-bottom:7px;line-height:1.55}
.response-input,.response-area{width:100%;border:1.5px dashed #9ccfe8;border-radius:14px;background:#f8fdff;padding:11px 12px;color:#18344e;transition:.2s}
.response-area{min-height:76px;resize:vertical}
.response-input:focus,.response-area:focus{border-style:solid;background:white;box-shadow:0 0 0 4px rgba(40,183,223,.12)}
.save-hint{font-size:11px;color:#7791a5;margin-top:5px}
.teacher-answer-zone{margin-top:24px;border:2px solid #bfe0c0;border-radius:22px;padding:20px;background:#f7fff5}
.teacher-answer-zone::before{content:"เฉลยสำหรับครู";display:inline-flex;background:var(--green);color:white;border-radius:99px;padding:5px 12px;font-size:12px;font-weight:900;margin-bottom:12px}
body[data-mode="student"] .teacher-answer-zone{display:none}
.teacher-lock{display:none;text-align:center;padding:80px 20px;color:var(--muted)}
.teacher-lock strong{display:block;color:var(--navy);font-size:25px;margin:10px}
.cover-slide{min-height:calc(100vh - 132px);padding:46px;display:grid;grid-template-columns:1.08fr .92fr;gap:34px;align-items:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#f1fbff 0%,#fff 52%,#fff9e6 100%)}
.cover-slide::before{content:"";position:absolute;width:520px;height:170px;border:28px solid rgba(40,183,223,.13);border-radius:50%;left:-110px;bottom:-95px;transform:rotate(-7deg)}
.cover-copy{position:relative;z-index:2}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:white;border:1px solid #d8edf7;border-radius:99px;padding:7px 13px;color:var(--blue);font-weight:900;box-shadow:0 6px 18px rgba(7,87,165,.07)}
.cover-title{font-size:clamp(44px,6vw,78px);line-height:1.05;color:var(--navy);margin:20px 0 10px;letter-spacing:-.04em}
.cover-title span{display:block;color:var(--cyan)}
.cover-subtitle{font-size:20px;line-height:1.7;color:#3e6078;max-width:650px}
.cover-pills{display:flex;flex-wrap:wrap;gap:9px;margin:23px 0}
.cover-pill{padding:9px 13px;border-radius:13px;background:#fff;border:1px solid #d9ebf5;font-weight:800;color:var(--navy)}
.cta-row{display:flex;gap:11px;flex-wrap:wrap;margin-top:24px}
.cta{border:0;border-radius:16px;padding:13px 19px;font-weight:900}
.cta.primary{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;box-shadow:0 12px 28px rgba(7,87,165,.25)}
.cta.secondary{background:#fff5cd;color:#8e6410;border:1px solid #f5dc7a}
.cover-logo{position:relative;z-index:2;background:rgba(255,255,255,.78);border:1px solid rgba(7,87,165,.11);border-radius:36px;padding:20px;box-shadow:0 28px 70px rgba(7,87,165,.15);transform:rotate(1deg)}
.cover-logo img{width:100%;display:block;border-radius:24px}
.float-star{position:absolute;color:var(--yellow);font-size:30px;animation:float 4s ease-in-out infinite}.star-1{top:10%;right:8%}.star-2{top:24%;left:48%;font-size:18px;animation-delay:1.3s}.star-3{bottom:16%;right:41%;font-size:22px;animation-delay:.7s}
@keyframes float{50%{transform:translateY(-9px) rotate(8deg)}}
.map-wrap{padding:32px 36px 90px}
.map-intro{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:22px}
.map-intro h2{font-size:34px;color:var(--navy);margin:0}.map-intro p{margin:6px 0 0;color:var(--muted)}
.lesson-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.lesson-card{border:1px solid #dcecf5;background:linear-gradient(145deg,#fff,#f6fbff);border-radius:20px;padding:17px;text-align:left;min-height:150px;transition:.22s;position:relative;overflow:hidden}
.lesson-card::after{content:"";position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(40,183,223,.09);right:-18px;bottom:-23px}
.lesson-card:hover{transform:translateY(-5px);box-shadow:0 15px 32px rgba(7,87,165,.13);border-color:#acdcef}
.lesson-card .n{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--navy));color:white;display:grid;place-items:center;font-weight:900;margin-bottom:12px;box-shadow:0 8px 18px rgba(15,131,201,.22)}
.lesson-card h3{font-size:14px;line-height:1.45;color:var(--navy);margin:0;position:relative;z-index:1}
.lesson-card small{display:block;margin-top:9px;color:var(--muted)}
.presentation .sidebar{display:none}.presentation .main{margin-left:0;padding:74px 0 0}.presentation .slide-stage{max-width:none}.presentation .slide-card{min-height:calc(100vh - 74px);border-radius:0;border:0;box-shadow:none}.presentation .topbar{height:60px}.presentation .brand-mini,.presentation .progress-label{display:none}
.toast{position:fixed;right:22px;bottom:22px;background:#123c5d;color:white;padding:11px 15px;border-radius:13px;box-shadow:0 10px 30px rgba(0,0,0,.18);z-index:100;opacity:0;transform:translateY(8px);pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:none}
.print-area{display:none}
@media(max-width:1080px){.lesson-grid{grid-template-columns:repeat(3,1fr)}.step-card{grid-template-columns:145px 1fr}.step-cell{border-top:1px solid #e3eef5}.step-cell:nth-child(2){border-top:0}.cover-slide{grid-template-columns:1fr}.cover-logo{max-width:540px;margin:auto}.kv-grid{grid-template-columns:1fr}}
@media(max-width:820px){
  :root{--sidebar:286px}.menu-btn{display:inline-flex}.brand-mini{min-width:auto}.brand-mini .brand-text{display:none}.toolbar .desktop-only{display:none}
  .sidebar{transform:translateX(-105%);transition:.26s;box-shadow:12px 0 35px rgba(7,87,165,.16)}body.drawer-open .sidebar{transform:none}
  .main{margin-left:0;padding:82px 10px 14px}.slide-card{min-height:calc(100vh - 96px);border-radius:24px}.slide-banner{padding:23px 20px 18px}.slide-body{padding:23px 19px 84px}.slide-footer{padding:12px 16px}.footer-note{display:none}
  .cover-slide{padding:28px 20px 84px;min-height:calc(100vh - 96px)}.cover-title{font-size:48px}.cover-subtitle{font-size:17px}.lesson-grid{grid-template-columns:repeat(2,1fr)}.map-wrap{padding:25px 18px 82px}.map-intro{align-items:start;flex-direction:column}.map-intro h2{font-size:29px}
}
@media(max-width:540px){.topbar{padding:0 9px;gap:7px}.progress-wrap{min-width:60px}.pill-btn{padding:0 9px}.mode-label{display:none}.slide-title{font-size:26px}.content-p{font-size:15px}.content-p.subhead{font-size:19px}.lesson-grid{grid-template-columns:1fr}.cover-title{font-size:42px}.cover-pills{gap:6px}.cover-pill{font-size:12px}.step-card{grid-template-columns:1fr}.step-cell{border-left:0}.map-intro h2{font-size:26px}}

/* ===== Little Steps UI refinement v2 ===== */
:root{
  --topbar-h:76px;
  --sidebar:330px;
  --radius:30px;
  --shadow:0 22px 60px rgba(6,72,125,.14),0 3px 12px rgba(6,72,125,.06);
  --font-body:-apple-system,BlinkMacSystemFont,"Sukhumvit Set","Thonburi","Leelawadee UI","Noto Sans Thai",Tahoma,Arial,sans-serif;
  --font-heading:-apple-system,BlinkMacSystemFont,"Sukhumvit Set","Leelawadee UI","Noto Sans Thai",Tahoma,Arial,sans-serif;
}
html{-webkit-text-size-adjust:100%;text-rendering:optimizeLegibility;scroll-padding-top:calc(var(--topbar-h) + 18px)}
body{font-family:var(--font-body);font-size:17px;line-height:1.65;letter-spacing:.005em;-webkit-font-smoothing:antialiased;min-height:100svh;min-height:100dvh}

.topbar{height:var(--topbar-h);padding:0 max(18px,env(safe-area-inset-left)) 0 max(18px,env(safe-area-inset-left));gap:16px;background:rgba(255,255,255,.91);-webkit-backdrop-filter:blur(22px) saturate(1.12);backdrop-filter:blur(22px) saturate(1.12);box-shadow:0 1px 14px rgba(7,87,165,.055)}
.brand-mini{min-width:285px;gap:12px}.brand-badge{width:46px;height:46px;border-radius:16px;font-size:17px}.brand-mini strong{font-size:16px;line-height:1.25}.brand-mini small{font-size:12px;line-height:1.35;margin-top:3px}
.progress-wrap{gap:12px}.progress-track{height:10px;box-shadow:inset 0 1px 2px rgba(7,87,165,.08)}.progress-bar{transition:width .42s cubic-bezier(.2,.8,.2,1)}.progress-label{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.icon-btn,.pill-btn{min-width:46px;height:46px;border-radius:15px;padding:0 14px;font-size:15px;font-weight:800;box-shadow:0 5px 16px rgba(7,87,165,.07)}
.icon-btn:hover,.pill-btn:hover,.cta:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(7,87,165,.13)}.icon-btn:active,.pill-btn:active,.cta:active,.lesson-card:active{transform:translateY(0) scale(.98)}
.sidebar{top:var(--topbar-h);width:var(--sidebar);padding:20px 16px calc(34px + env(safe-area-inset-bottom));background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);scrollbar-width:thin;scrollbar-color:#c8e5f4 transparent}

ังสือแสดงจำนวนนับที่มากกว่า 100,000"],["สาระสำคัญ","อ่านจำนวน แยกหลัก บอกค่าของเลขโดด และเขียนกระจายจำนวน"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 1: ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000 ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/1 อ่านและเขียนตัวเลขฮินดูอารบิก ตัวเลขไทย และตัวหนังสือแสดงจำนวนนับที่มากกว่า 100,000 สาระสำคัญ อ่านจำนวน แยกหลัก บอกค่าของเลขโดด และเขียนกระจายจำนวน จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-1-7","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 1","level":2,"parent":"แผนการสอนที่ 1: ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000","lessonNo":1,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• จงอ่านจำนวน 604,215 เป็นคำอ่าน\n• จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก\n• ในจำนวน 719,508 เลข 1 อยู่หลักใด และมีค่าเท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: สับสนระหว่างชื่อหลักกับค่าของเลขโดด และอ่านศูนย์แทรกเกินจริง"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 1: ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ค่าประจำหลักคือค่าของตำแหน่ง เช่น หลักหน่วย หลักสิบ หลักร้อย หลักพัน หลักหมื่น หลักแสน\n• ค่าของเลขโดดขึ้นอยู่กับตำแหน่ง เช่น 7 ใน 472,381 อยู่หลักหมื่น มีค่า 70,000\n• การเขียนกระจายจำนวนช่วยให้เด็กเห็นโครงสร้างของจำนวนและลดการอ่านผิดหลัก\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• ตัวอย่าง 1: 583,426 อ่านว่า ห้าแสนแปดหมื่นสามพันสี่ร้อยยี่สิบหก\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้ตารางหลักและสีแยกคำว่า “หลัก” กับ “ค่า”"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• เขียนกระจาย: 583,426 = 500,000 + 80,000 + 3,000 + 400 + 20 + 6\n• เลข 8 อยู่หลักหมื่น มีค่า 80,000\n• จงเขียน 456,203 ในรูปกระจาย\n• สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: บ้านหลักเลข","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแจกบัตรเลข 0-9 ให้เด็ก 6 ใบ แล้วให้สร้างจำนวนตามเงื่อนไข เช่น มากที่สุด น้อยที่สุด เลข 5 อยู่หลักหมื่น\n• เด็กวางบัตรลงในตารางหลักแสน-หลักหน่วย แล้วอธิบายค่าของเลขโดด 1 ตำแหน่ง\n• ให้ดาว Math Hero เมื่อเด็กอธิบายว่า “เลขนี้อยู่หลักใด มีค่าเท่าใด” ได้ชัดเจน\nบัตรโจทย์พร้อมใช้ในเกม:\n• จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก\n• จงเขียน 456,203 ในรูปกระจาย\n• จำนวนใดมีค่าเลข 6 มากกว่า: 268,401 หรือ 806,123 เพราะเหตุใด\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• จงอ่านจำนวน 604,215 เป็นคำอ่าน\n• จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก\n• ในจำนวน 719,508 เลข 1 อยู่หลักใด และมีค่าเท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• จงเขียน 456,203 ในรูปกระจาย\n• สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เรียงหลักของจำนวน 350,918 ตั้งแต่หลักแสนถึงหลักหน่วย\n• จำนวนใดมีค่าเลข 6 มากกว่า: 268,401 หรือ 806,123 เพราะเหตุใด\n• เขียนจำนวน “สามแสนสองหมื่นหนึ่งพันห้าร้อยสี่” เป็นตัวเลข\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• จงอ่านจำนวน 604,215 เป็นคำอ่าน\n• จงเขียน 456,203 ในรูปกระจาย\n• จำนวนใดมีค่าเลข 6 มากกว่า: 268,401 หรือ 806,123 เพราะเหตุใด\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ค่าประจำหลักคือค่าของตำแหน่ง เช่น หลักหน่วย หลักสิบ หลักร้อย หลักพัน หลักหมื่น หลักแสน"},{"type":"p","style":"List Bullet","text":"ค่าของเลขโดดขึ้นอยู่กับตำแหน่ง เช่น 7 ใน 472,381 อยู่หลักหมื่น มีค่า 70,000"},{"type":"p","style":"List Bullet","text":"การเขียนกระจายจำนวนช่วยให้เด็กเห็นโครงสร้างของจำนวนและลดการอ่านผิดหลัก"},{"type":"p","style":"List Bullet","text":"ตัวอย่าง 1: 583,426 อ่านว่า ห้าแสนแปดหมื่นสามพันสี่ร้อยยี่สิบหก"},{"type":"p","style":"List Bullet","text":"เขียนกระจาย: 583,426 = 500,000 + 80,000 + 3,000 + 400 + 20 + 6"},{"type":"p","style":"List Bullet","text":"เลข 8 อยู่หลักหมื่น มีค่า 80,000"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"จงอ่านจำนวน 604,215 เป็นคำอ่าน"},{"type":"p","style":"List Number","text":"จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก"},{"type":"p","style":"List Number","text":"ในจำนวน 719,508 เลข 1 อยู่หลักใด และมีค่าเท่าใด"},{"type":"p","style":"List Number","text":"จงเขียน 456,203 ในรูปกระจาย"},{"type":"p","style":"List Number","text":"สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: สับสนระหว่างชื่อหลักกับค่าของเลขโดด และอ่านศูนย์แทรกเกินจริง\n• วิธีช่วยเมื่อเด็กติด: ใช้ตารางหลักและสีแยกคำว่า “หลัก” กับ “ค่า”"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 1 แผนการสอนที่ 1: ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000 ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• จงอ่านจำนวน 604,215 เป็นคำอ่าน\n• จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก\n• ในจำนวน 719,508 เลข 1 อยู่หลักใด และมีค่าเท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: สับสนระหว่างชื่อหลักกับค่าของเลขโดด และอ่านศูนย์แทรกเกินจริง 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 1: ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ค่าประจำหลักคือค่าของตำแหน่ง เช่น หลักหน่วย หลักสิบ หลักร้อย หลักพัน หลักหมื่น หลักแสน\n• ค่าของเลขโดดขึ้นอยู่กับตำแหน่ง เช่น 7 ใน 472,381 อยู่หลักหมื่น มีค่า 70,000\n• การเขียนกระจายจำนวนช่วยให้เด็กเห็นโครงสร้างของจำนวนและลดการอ่านผิดหลัก\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• ตัวอย่าง 1: 583,426 อ่านว่า ห้าแสนแปดหมื่นสามพันสี่ร้อยยี่สิบหก\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้ตารางหลักและสีแยกคำว่า “หลัก” กับ “ค่า” 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• เขียนกระจาย: 583,426 = 500,000 + 80,000 + 3,000 + 400 + 20 + 6\n• เลข 8 อยู่หลักหมื่น มีค่า 80,000\n• จงเขียน 456,203 ในรูปกระจาย\n• สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: บ้านหลักเลข เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแจกบัตรเลข 0-9 ให้เด็ก 6 ใบ แล้วให้สร้างจำนวนตามเงื่อนไข เช่น มากที่สุด น้อยที่สุด เลข 5 อยู่หลักหมื่น\n• เด็กวางบัตรลงในตารางหลักแสน-หลักหน่วย แล้วอธิบายค่าของเลขโดด 1 ตำแหน่ง\n• ให้ดาว Math Hero เมื่อเด็กอธิบายว่า “เลขนี้อยู่หลักใด มีค่าเท่าใด” ได้ชัดเจน\nบัตรโจทย์พร้อมใช้ในเกม:\n• จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก\n• จงเขียน 456,203 ในรูปกระจาย\n• จำนวนใดมีค่าเลข 6 มากกว่า: 268,401 หรือ 806,123 เพราะเหตุใด\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• จงอ่านจำนวน 604,215 เป็นคำอ่าน\n• จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก\n• ในจำนวน 719,508 เลข 1 อยู่หลักใด และมีค่าเท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• จงเขียน 456,203 ในรูปกระจาย\n• สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เรียงหลักของจำนวน 350,918 ตั้งแต่หลักแสนถึงหลักหน่วย\n• จำนวนใดมีค่าเลข 6 มากกว่า: 268,401 หรือ 806,123 เพราะเหตุใด\n• เขียนจำนวน “สามแสนสองหมื่นหนึ่งพันห้าร้อยสี่” เป็นตัวเลข\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• จงอ่านจำนวน 604,215 เป็นคำอ่าน\n• จงเขียน 456,203 ในรูปกระจาย\n• จำนวนใดมีค่าเลข 6 มากกว่า: 268,401 หรือ 806,123 เพราะเหตุใด\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน ค่าประจำหลักคือค่าของตำแหน่ง เช่น หลักหน่วย หลักสิบ หลักร้อย หลักพัน หลักหมื่น หลักแสน ค่าของเลขโดดขึ้นอยู่กับตำแหน่ง เช่น 7 ใน 472,381 อยู่หลักหมื่น มีค่า 70,000 การเขียนกระจายจำนวนช่วยให้เด็กเห็นโครงสร้างของจำนวนและลดการอ่านผิดหลัก ตัวอย่าง 1: 583,426 อ่านว่า ห้าแสนแปดหมื่นสามพันสี่ร้อยยี่สิบหก เขียนกระจาย: 583,426 = 500,000 + 80,000 + 3,000 + 400 + 20 + 6 เลข 8 อยู่หลักหมื่น มีค่า 80,000 ชุดบัตรเกมพร้อมใช้ จงอ่านจำนวน 604,215 เป็นคำอ่าน จงเขียน ๘๓๒,๐๗๖ เป็นตัวเลขฮินดูอารบิก ในจำนวน 719,508 เลข 1 อยู่หลักใด และมีค่าเท่าใด จงเขียน 456,203 ในรูปกระจาย สร้างจำนวน 6 หลักที่มีเลข 9 อยู่หลักแสน และเลข 0 อยู่หลักสิบ คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: สับสนระหว่างชื่อหลักกับค่าของเลขโดด และอ่านศูนย์แทรกเกินจริง\n• วิธีช่วยเมื่อเด็กติด: ใช้ตารางหลักและสีแยกคำว่า “หลัก” กับ “ค่า”"},{"id":"ใบความรู้-แผนที่-1-ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า-100-000-8","title":"ใบความรู้ แผนที่ 1: ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000","level":2,"parent":"แผนการสอนที่ 1: ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000","lessonNo":1,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใช้ส่วนนี้เป็นแบบเรียนสั้นสำหรับครูสอนหรือให้เด็กอ่านทบทวนก่อนทำใบงาน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"ค่าประจำหลักคือค่าของตำแหน่ง เช่น หลักหน่วย หลักสิบ หลักร้อย หลักพัน หลักหมื่น หลักแสน"},{"type":"p","style":"List Bullet","text":"ค่าของเลขโดดขึ้นอยู่กับตำแหน่ง เช่น 7 ใน 472,381 อยู่หลักหมื่น มีค่า 70,000"},{"type":"p","style":"List Bullet","text":"การเขียนกระจายจำนวนช่วยให้เด็กเห็นโครงสร้างของจำนวนและลดการอ่านผิดหลัก"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"List Number","text":"ตัวอย่าง 1: 583,426 อ่านว่า ห้าแสนแปดหมื่นสามพันสี่ร้อยยี่สิบหก"},{"type":"p","style":"List Number","text":"เขียนกระจาย: 583,426 = 500,000 + 80,000 + 3,000 + 400 + 20 + 6"},{"type":"p","style":"List Number","text":"เลข 8 อยู่หลักหมื่น มีค่า 80,000"},{"type":"p","style":"Normal","text":"แบบฝึกนำก่อนใบงาน"},{"type":"p","style":"Normal","text":"ลองทำ 1: ........................................................................................................"},{"type":"p","style":"Normal","text":"วิธีคิด: ................................................................................................................"},{"type":"p","style":"Normal","text":"ลองทำ 2: ................................................................................. 000 + 6,000 + 200 + 0 + 3 5. ตัวอย่างคำตอบ: 934,205 6. 3 หลักแสน, 5 หลักหมื่น, 0 หลักพัน, 9 หลักร้อย, 1 หลักสิบ, 8 หลักหน่วย 7. 268,401 เพราะเลข 6 อยู่หลักหมื่น มีค่า 60,000 ส่วน 806,123 เลข 6 อยู่หลักพัน มีค่า 6,000 8. 321,504 เกณฑ์การประเมินรายชั่วโมง ด้าน ผ่านดี กำลังพัฒนา ต้องเสริม ความเข้าใจ อธิบายหลักการได้ ทำได้เมื่อมีตัวอย่าง ยังตอบแบบเดา ทักษะคำนวณ ถูกอย่างน้อย 70% ถูก 50-69% ต่ำกว่า 50% การสื่อสารวิธีคิด เขียน/พูดเป็นขั้นตอน อธิบายได้บางส่วน ยังอธิบายไม่ได้ ความตั้งใจ ร่วมกิจกรรมต่อเนื่อง ร่วมบ้างเป็นช่วง ต้องกระตุ้นบ่อย ข้อความ Feedback ผู้ปกครองประจำบท แม่แบบปรับใช้ได้ทันที • วันนี้น้องเรียนเรื่อง “ค่าประจำหลักและการอ่านเขียนจำนวนนับมากกว่า 100,000” • น้องทำได้ดีในเรื่อง: ____________________ • จุดที่ควรฝึกเพิ่มคือ: ____________________ • การบ้าน/ฝึกที่บ้าน: ให้ผู้เรียนเลือกเลขทะเบียนรถ/เบอร์บ้าน/ราคาในใบปลิว 5 จำนวน แล้วอ่านและเขียนกระจายมาในครั้งถัดไป • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-2-การเปรียบเทียบ-เรียงลำดับจำนวน-และการประมาณค่า-11","title":"แผนการสอนที่ 2: การเปรียบเทียบ เรียงลำดับจำนวน และการประมาณค่า","level":1,"parent":"","lessonNo":2,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/2 เปรียบเทียบและเรียงลำดับจำนวนนับที่มากกว่า 100,000 จากสถานการณ์ต่าง ๆ และ ค 1.1 ป.4/7 ประมาณผลลัพธ์อย่างสมเหตุสมผล"],["สาระสำคัญ","ใช้จำนวนหลักก่อน เปรียบเทียบทีละหลัก และปัดเศษเพื่อประมาณผลลัพธ์"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 2: การเปรียบเทียบ เรียงลำดับจำนวน และการประมาณค่า ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/2 เปรียบเทียบและเรียงลำดับจำนวนนับที่มากกว่า 100,000 จากสถานการณ์ต่าง ๆ และ ค 1.1 ป.4/7 ประมาณผลลัพธ์อย่างสมเหตุสมผล สาระสำคัญ ใช้จำนวนหลักก่อน เปรียบเทียบทีละหลัก และปัดเศษเพื่อประมาณผลลัพธ์ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-2-12","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 2","level":2,"parent":"แผนการสอนที่ 2: การเปรียบเทียบ เรียงลำดับจำนวน และการประมาณค่า","lessonNo":2,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999\n• เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102\n• จำนวนใดใกล้ 900,000 ที่สุด: 889,500 / 912,000 / 899,100\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: เปรียบเทียบจากเลขท้ายหรือปัดผิดหลัก เพราะไม่วงหลักที่เก็บและหลักที่ใช้ตัดสิน"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 2: การเปรียบเทียบ เรียงลำดับจำนวน และการประมาณค่า” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การเปรียบเทียบจำนวนให้ดูจำนวนหลักก่อน ถ้าจำนวนหลักเท่ากันให้เทียบจากซ้ายไปขวา\n• การเรียงลำดับจำนวนควรทำเครื่องหมายหรือขีดเส้นใต้หลักที่ต่างกัน\n• การประมาณค่าช่วยตรวจคำตอบว่าคำตอบจริงควรอยู่ใกล้จำนวนใด\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 428,915 < 482,105 เพราะหลักหมื่น 2 น้อยกว่า 8\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วงหลักแรกที่ต่างกัน และใช้เส้นจำนวนช่วยปัด/หาใกล้"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 615,240 ปัดเป็นหลักหมื่นได้ 620,000\n• ประมาณ 398,200 + 201,600 ≈ 400,000 + 200,000 = 600,000\n• ปัด 678,432 เป็นหลักหมื่น\n• ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: มากกว่า น้อยกว่า หรือใกล้กว่า","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแสดงบัตรจำนวน 2 ใบ เด็กชูสัญลักษณ์ > < = ให้เร็วและต้องอธิบายเหตุผล\n• รอบที่ 2 ครูให้เป้าหมาย เช่น ใกล้ 500,000 ที่สุด เด็กเลือกจำนวนที่ใกล้ที่สุด\n• เน้นให้เด็กพูดเหตุผล ไม่ให้ใช้แค่การเดา\nบัตรโจทย์พร้อมใช้ในเกม:\n• เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102\n• ปัด 678,432 เป็นหลักหมื่น\n• อธิบายเหตุผลว่า 621,999 มากกว่า 619,999 อย่างไร\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999\n• เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102\n• จำนวนใดใกล้ 900,000 ที่สุด: 889,500 / 912,000 / 899,100\nช่วง B แสดงวิธี ข้อ 4–5:\n• ปัด 678,432 เป็นหลักหมื่น\n• ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เขียนจำนวน 3 จำนวนที่มากกว่า 500,000 แต่น้อยกว่า 510,000\n• อธิบายเหตุผลว่า 621,999 มากกว่า 619,999 อย่างไร\n• โจทย์สถานการณ์: ร้านขายของมีลูกค้า 248,900 คนต่อปี อีกสาขามี 251,300 คน สาขาใดมีลูกค้ามากกว่า และมากกว่าประมาณกี่คน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999\n• ปัด 678,432 เป็นหลักหมื่น\n• อธิบายเหตุผลว่า 621,999 มากกว่า 619,999 อย่างไร\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"การเปรียบเทียบจำนวนให้ดูจำนวนหลักก่อน ถ้าจำนวนหลักเท่ากันให้เทียบจากซ้ายไปขวา"},{"type":"p","style":"List Bullet","text":"การเรียงลำดับจำนวนควรทำเครื่องหมายหรือขีดเส้นใต้หลักที่ต่างกัน"},{"type":"p","style":"List Bullet","text":"การประมาณค่าช่วยตรวจคำตอบว่าคำตอบจริงควรอยู่ใกล้จำนวนใด"},{"type":"p","style":"List Bullet","text":"428,915 < 482,105 เพราะหลักหมื่น 2 น้อยกว่า 8"},{"type":"p","style":"List Bullet","text":"615,240 ปัดเป็นหลักหมื่นได้ 620,000"},{"type":"p","style":"List Bullet","text":"ประมาณ 398,200 + 201,600 ≈ 400,000 + 200,000 = 600,000"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999"},{"type":"p","style":"List Number","text":"เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102"},{"type":"p","style":"List Number","text":"จำนวนใดใกล้ 900,000 ที่สุด: 889,500 / 912,000 / 899,100"},{"type":"p","style":"List Number","text":"ปัด 678,432 เป็นหลักหมื่น"},{"type":"p","style":"List Number","text":"ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: เปรียบเทียบจากเลขท้ายหรือปัดผิดหลัก เพราะไม่วงหลักที่เก็บและหลักที่ใช้ตัดสิน\n• วิธีช่วยเมื่อเด็กติด: วงหลักแรกที่ต่างกัน และใช้เส้นจำนวนช่วยปัด/หาใกล้"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 2 แผนการสอนที่ 2: การเปรียบเทียบ เรียงลำดับจำนวน และการประมาณค่า ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999\n• เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102\n• จำนวนใดใกล้ 900,000 ที่สุด: 889,500 / 912,000 / 899,100\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: เปรียบเทียบจากเลขท้ายหรือปัดผิดหลัก เพราะไม่วงหลักที่เก็บและหลักที่ใช้ตัดสิน 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 2: การเปรียบเทียบ เรียงลำดับจำนวน และการประมาณค่า” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การเปรียบเทียบจำนวนให้ดูจำนวนหลักก่อน ถ้าจำนวนหลักเท่ากันให้เทียบจากซ้ายไปขวา\n• การเรียงลำดับจำนวนควรทำเครื่องหมายหรือขีดเส้นใต้หลักที่ต่างกัน\n• การประมาณค่าช่วยตรวจคำตอบว่าคำตอบจริงควรอยู่ใกล้จำนวนใด\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 428,915 < 482,105 เพราะหลักหมื่น 2 น้อยกว่า 8\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วงหลักแรกที่ต่างกัน และใช้เส้นจำนวนช่วยปัด/หาใกล้ 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 615,240 ปัดเป็นหลักหมื่นได้ 620,000\n• ประมาณ 398,200 + 201,600 ≈ 400,000 + 200,000 = 600,000\n• ปัด 678,432 เป็นหลักหมื่น\n• ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: มากกว่า น้อยกว่า หรือใกล้กว่า เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแสดงบัตรจำนวน 2 ใบ เด็กชูสัญลักษณ์ > < = ให้เร็วและต้องอธิบายเหตุผล\n• รอบที่ 2 ครูให้เป้าหมาย เช่น ใกล้ 500,000 ที่สุด เด็กเลือกจำนวนที่ใกล้ที่สุด\n• เน้นให้เด็กพูดเหตุผล ไม่ให้ใช้แค่การเดา\nบัตรโจทย์พร้อมใช้ในเกม:\n• เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102\n• ปัด 678,432 เป็นหลักหมื่น\n• อธิบายเหตุผลว่า 621,999 มากกว่า 619,999 อย่างไร\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999\n• เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102\n• จำนวนใดใกล้ 900,000 ที่สุด: 889,500 / 912,000 / 899,100\nช่วง B แสดงวิธี ข้อ 4–5:\n• ปัด 678,432 เป็นหลักหมื่น\n• ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เขียนจำนวน 3 จำนวนที่มากกว่า 500,000 แต่น้อยกว่า 510,000\n• อธิบายเหตุผลว่า 621,999 มากกว่า 619,999 อย่างไร\n• โจทย์สถานการณ์: ร้านขายของมีลูกค้า 248,900 คนต่อปี อีกสาขามี 251,300 คน สาขาใดมีลูกค้ามากกว่า และมากกว่าประมาณกี่คน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999\n• ปัด 678,432 เป็นหลักหมื่น\n• อธิบายเหตุผลว่า 621,999 มากกว่า 619,999 อย่างไร\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน การเปรียบเทียบจำนวนให้ดูจำนวนหลักก่อน ถ้าจำนวนหลักเท่ากันให้เทียบจากซ้ายไปขวา การเรียงลำดับจำนวนควรทำเครื่องหมายหรือขีดเส้นใต้หลักที่ต่างกัน การประมาณค่าช่วยตรวจคำตอบว่าคำตอบจริงควรอยู่ใกล้จำนวนใด 428,915 < 482,105 เพราะหลักหมื่น 2 น้อยกว่า 8 615,240 ปัดเป็นหลักหมื่นได้ 620,000 ประมาณ 398,200 + 201,600 ≈ 400,000 + 200,000 = 600,000 ชุดบัตรเกมพร้อมใช้ เติมเครื่องหมาย > < หรือ = : 450,215 ___ 405,999 เรียงจำนวนจากน้อยไปมาก: 703,120 / 730,012 / 370,210 / 703,102 จำนวนใดใกล้ 900,000 ที่สุด: 889,500 / 912,000 / 899,100 ปัด 678,432 เป็นหลักหมื่น ประมาณผลลัพธ์ 198,700 + 302,100 โดยปัดเป็นหลักแสน คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: เปรียบเทียบจากเลขท้ายหรือปัดผิดหลัก เพราะไม่วงหลักที่เก็บและหลักที่ใช้ตัดสิน\n• วิธีช่วยเมื่อเด็กติด: วงหลักแรกที่ต่างกัน และใช้เส้นจำนวนช่วยปัด/หาใกล้"},{"id":"ใบความรู้-แผนที่-2-การเปรียบเทียบ-เรียงลำดับจำนวน-และการประมาณค่า-13","title":"ใบความรู้ วน ยังอธิบายไม่ได้ ความตั้งใจ ร่วมกิจกรรมต่อเนื่อง ร่วมบ้างเป็นช่วง ต้องกระตุ้นบ่อย ข้อความ Feedback ผู้ปกครองประจำบท แม่แบบปรับใช้ได้ทันที • วันนี้น้องเรียนเรื่อง “การเปรียบเทียบ เรียงลำดับจำนวน และการประมาณค่า” • น้องทำได้ดีในเรื่อง: ____________________ • จุดที่ควรฝึกเพิ่มคือ: ____________________ • การบ้าน/ฝึกที่บ้าน: ให้ผู้เรียนสำรวจราคาสินค้า 5 รายการจากใบปลิว แล้วเรียงจากถูกไปแพงพร้อมปัดเศษเป็นหลักพัน • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-3-การบวก-การลบจำนวนหลายหลัก-และตัวไม่ทราบค่า-16","title":"แผนการสอนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า","level":1,"parent":"","lessonNo":3,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/8 หาค่าของตัวไม่ทราบค่าในประโยคสัญลักษณ์การบวกและการลบของจำนวนนับที่มากกว่า 100,000 และ 0"],["สาระสำคัญ","ตั้งหลักให้ตรง คิดจากขวาไปซ้าย ตรวจคำตอบด้วยการดำเนินการย้อนกลับ"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/8 หาค่าของตัวไม่ทราบค่าในประโยคสัญลักษณ์การบวกและการลบของจำนวนนับที่มากกว่า 100,000 และ 0 สาระสำคัญ ตั้งหลักให้ตรง คิดจากขวาไปซ้าย ตรวจคำตอบด้วยการดำเนินการย้อนกลับ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-3-17","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 3","level":2,"parent":"แผนการสอนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า","lessonNo":3,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 348,125 + 271,430\n• คำนวณ 800,000 - 356,789\n• เติมจำนวน: □ + 124,500 = 600,000\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ตั้งหลักไม่ตรง กระจายผ่านศูนย์ไม่ครบ และเปลี่ยนเครื่องหมายของช่องว่างโดยไม่ดูความสัมพันธ์"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• มีเงินกองทุน 325,000 บาท ได้รับเพิ่ม 178,500 บาท รวมเป็นเท่าใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การบวกและลบจำนวนหลายหลักต้องตั้งหลักให้ตรงกันเสมอ\n• การตรวจคำตอบใช้ความสัมพันธ์ บวก-ลบ เช่น ผลบวก - ตัวตั้ง = ตัวบวก\n• ตัวไม่ทราบค่าไม่จำเป็นต้องเดา ให้ใช้การดำเนินการย้อนกลับ\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 245,678 + 132,451 = 378,129\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้กระดาษตารางจัดหลักและแถบส่วน–ทั้งหมดสำหรับตัวไม่ทราบค่า"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 700,000 - 284,635 = 415,365\n• □ + 158,000 = 430,000 ดังนั้น □ = 430,000 - 158,000 = 272,000\n• เติมจำนวน: 750,000 - □ = 482,300\n• มีเงินกองทุน 325,000 บาท ได้รับเพิ่ม 178,500 บาท รวมเป็นเท่าใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: นักสืบจำนวนหาย","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูเขียนสมการมีช่องว่าง เช่น □ + 125,000 = 420,000\n• เด็กจับคู่ค้นหาวิธีคิดย้อนกลับ แล้วเขียนเหตุผล 1 บรรทัด\n• ทีมที่ได้คำตอบถูกและอธิบายสั้นที่สุดรับดาว\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 800,000 - 356,789\n• เติมจำนวน: 750,000 - □ = 482,300\n• ตรวจคำตอบข้อ 2 ด้วยการบวก\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 348,125 + 271,430\n• คำนวณ 800,000 - 356,789\n• เติมจำนวน: □ + 124,500 = 600,000\nช่วง B แสดงวิธี ข้อ 4–5:\n• เติมจำนวน: 750,000 - □ = 482,300\n• มีเงินกองทุน 325,000 บาท ได้รับเพิ่ม 178,500 บาท รวมเป็นเท่าใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• ห้องสมุดมีหนังสือ 502,300 เล่ม จำหน่ายออก 125,750 เล่ม เหลือกี่เล่ม\n• ตรวจคำตอบข้อ 2 ด้วยการบวก\n• สร้างโจทย์การบวกหรือลบ 1 ข้อที่คำตอบเป็น 450,000\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ ด็กติด: ใช้กระดาษตารางจัดหลักและแถบส่วน–ทั้งหมดสำหรับตัวไม่ทราบค่า"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 3 แผนการสอนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 348,125 + 271,430\n• คำนวณ 800,000 - 356,789\n• เติมจำนวน: □ + 124,500 = 600,000\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ตั้งหลักไม่ตรง กระจายผ่านศูนย์ไม่ครบ และเปลี่ยนเครื่องหมายของช่องว่างโดยไม่ดูความสัมพันธ์ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• มีเงินกองทุน 325,000 บาท ได้รับเพิ่ม 178,500 บาท รวมเป็นเท่าใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การบวกและลบจำนวนหลายหลักต้องตั้งหลักให้ตรงกันเสมอ\n• การตรวจคำตอบใช้ความสัมพันธ์ บวก-ลบ เช่น ผลบวก - ตัวตั้ง = ตัวบวก\n• ตัวไม่ทราบค่าไม่จำเป็นต้องเดา ให้ใช้การดำเนินการย้อนกลับ\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 245,678 + 132,451 = 378,129\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้กระดาษตารางจัดหลักและแถบส่วน–ทั้งหมดสำหรับตัวไม่ทราบค่า 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 700,000 - 284,635 = 415,365\n• □ + 158,000 = 430,000 ดังนั้น □ = 430,000 - 158,000 = 272,000\n• เติมจำนวน: 750,000 - □ = 482,300\n• มีเงินกองทุน 325,000 บาท ได้รับเพิ่ม 178,500 บาท รวมเป็นเท่าใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: นักสืบจำนวนหาย เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูเขียนสมการมีช่องว่าง เช่น □ + 125,000 = 420,000\n• เด็กจับคู่ค้นหาวิธีคิดย้อนกลับ แล้วเขียนเหตุผล 1 บรรทัด\n• ทีมที่ได้คำตอบถูกและอธิบายสั้นที่สุดรับดาว\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 800,000 - 356,789\n• เติมจำนวน: 750,000 - □ = 482,300\n• ตรวจคำตอบข้อ 2 ด้วยการบวก\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 348,125 + 271,430\n• คำนวณ 800,000 - 356,789\n• เติมจำนวน: □ + 124,500 = 600,000\nช่วง B แสดงวิธี ข้อ 4–5:\n• เติมจำนวน: 750,000 - □ = 482,300\n• มีเงินกองทุน 325,000 บาท ได้รับเพิ่ม 178,500 บาท รวมเป็นเท่าใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• ห้องสมุดมีหนังสือ 502,300 เล่ม จำหน่ายออก 125,750 เล่ม เหลือกี่เล่ม\n• ตรวจคำตอบข้อ 2 ด้วยการบวก\n• สร้างโจทย์การบวกหรือลบ 1 ข้อที่คำตอบเป็น 450,000\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 348,125 + 271,430\n• เติมจำนวน: 750,000 - □ = 482,300\n• ตรวจคำตอบข้อ 2 ด้วยการบวก\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน การบวกและลบจำนวนหลายหลักต้องตั้งหลักให้ตรงกันเสมอ การตรวจคำตอบใช้ความสัมพันธ์ บวก-ลบ เช่น ผลบวก - ตัวตั้ง = ตัวบวก ตัวไม่ทราบค่าไม่จำเป็นต้องเดา ให้ใช้การดำเนินการย้อนกลับ 245,678 + 132,451 = 378,129 700,000 - 284,635 = 415,365 □ + 158,000 = 430,000 ดังนั้น □ = 430,000 - 158,000 = 272,000 ชุดบัตรเกมพร้อมใช้ คำนวณ 348,125 + 271,430 คำนวณ 800,000 - 356,789 เติมจำนวน: □ + 124,500 = 600,000 เติมจำนวน: 750,000 - □ = 482,300 มีเงินกองทุน 325,000 บาท ได้รับเพิ่ม 178,500 บาท รวมเป็นเท่าใด คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: ตั้งหลักไม่ตรง กระจายผ่านศูนย์ไม่ครบ และเปลี่ยนเครื่องหมายของช่องว่างโดยไม่ดูความสัมพันธ์\n• วิธีช่วยเมื่อเด็กติด: ใช้กระดาษตารางจัดหลักและแถบส่วน–ทั้งหมดสำหรับตัวไม่ทราบค่า"},{"id":"ใบความรู้-แผนที่-3-การบวก-การลบจำนวนหลายหลัก-และตัวไม่ทราบค่า-18","title":"ใบความรู้ แผนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า","level":2,"parent":"แผนการสอนที่ 3: การบวก การลบจำนวนหลายหลัก และตัวไม่ทราบค่า","lessonNo":3,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใช้ส่วนนี้เป็นแบบเรียนสั้นสำหรับครูสอนหรือให้เด็กอ่านทบทวนก่อนทำใบงาน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"การบวกและลบจำนวนหลายหลักต้องตั้งหลักให้ตรงกันเสมอ"},{"type":"p","style":"List Bullet","text":"การตรวจคำตอบใช้ความสัมพันธ์ บวก-ลบ เช่น ผลบวก - ตัวตั้ง = ตัวบวก"},{"type":"p","style":"List Bullet","text":"ตัวไม่ทราบค่าไม่จำเป็นต้องเดา ให้ใช้การดำเนินการย้อนกลับ"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"List Number","text":"245,678 + 132,451 = 378,129"},{"type":"p","style":"List Number","text":"700,000 - 284,635 = 415,365"},{"type":"p","style":"List Number","text":"□ + 158,000 = 430,000 ดังนั้น □ = 430,000 - 158,000 = 272,000"},{"type":"p","style":"Normal","text":"แบบฝึกนำก่อนใบงาน"},{"type":"p","style":"Normal","text":"ลองทำ 1: ........................................................................................................"},{"type":"p","style":"Normal","text":"วิธีคิด: ................................................................................................................"},{"type":"p","style":"Normal","text":"ลองทำ 2: ........................................................................
