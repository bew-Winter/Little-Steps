ความหมาย-อ่าน-เขียน-และแสดงภาพ-41","title":"แผนการสอนที่ 8: เศษส่วนและจำนวนคละ: ความหมาย อ่าน เขียน และแสดงภาพ","level":1,"parent":"","lessonNo":8,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/3 บอก อ่าน และเขียนเศษส่วน จำนวนคละ แสดงปริมาณสิ่งต่าง ๆ และแสดงสิ่งต่าง ๆ ตามเศษส่วน/จำนวนคละที่กำหนด"],["สาระสำคัญ","เข้าใจเศษส่วนเป็นส่วนหนึ่งของทั้งหมดและจำนวนคละเป็นจำนวนเต็มรวมกับเศษส่วน"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 8: เศษส่วนและจำนวนคละ: ความหมาย อ่าน เขียน และแสดงภาพ ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/3 บอก อ่าน และเขียนเศษส่วน จำนวนคละ แสดงปริมาณสิ่งต่าง ๆ และแสดงสิ่งต่าง ๆ ตามเศษส่วน/จำนวนคละที่กำหนด สาระสำคัญ เข้าใจเศษส่วนเป็นส่วนหนึ่งของทั้งหมดและจำนวนคละเป็นจำนวนเต็มรวมกับเศษส่วน จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-8-42","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 8","level":2,"parent":"แผนการสอนที่ 8: เศษส่วนและจำนวนคละ: ความหมาย อ่าน เขียน และแสดงภาพ","lessonNo":8,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เขียนคำอ่านของ 5/8\n• ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3\n• เขียนเศษส่วนแทน “แบ่งเค้กเป็น 10 ชิ้น กินไป 7 ชิ้น”\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: สลับตัวเศษกับตัวส่วน และมองข้ามเงื่อนไขที่ต้องแบ่งเป็นส่วนเท่า ๆ กัน"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 8: เศษส่วนและจำนวนคละ: ความหมาย อ่าน เขียน และแสดงภาพ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• แปลง 9/4 เป็นจำนวนคละ\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• เศษส่วนประกอบด้วยตัวเศษและตัวส่วน ตัวส่วนบอกว่าแบ่งทั้งหมดเป็นกี่ส่วน ตัวเศษบอกว่าเลือกมากี่ส่วน\n• เศษส่วนแท้มีตัวเศษน้อยกว่าตัวส่วน เช่น 3/5\n• จำนวนคละประกอบด้วยจำนวนเต็มและเศษส่วน เช่น 2 1/4\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 3/4 อ่านว่า เศษสามส่วนสี่ หมายถึง แบ่งทั้งหมดเป็น 4 ส่วนเท่า ๆ กัน เลือก 3 ส่วน\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้พิซซ่า/แถบเศษส่วนก่อนสัญลักษณ์"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 1 2/3 อ่านว่า หนึ่งเศษสองส่วนสาม หมายถึง 1 หน่วยเต็มกับอีก 2 ใน 3 ส่วน\n• 7/4 = 1 3/4 เพราะ 7 ส่วนเท่ากับ 4 ส่วนเต็ม 1 ชุด เหลือ 3 ส่วน\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• แปลง 9/4 เป็นจำนวนคละ\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: พิซซ่าเศษส่วน","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแจกวงกลมพิซซ่ากระดาษ แบ่งเป็น 2, 3, 4, 6, 8 ส่วน\n• เด็กหยิบบัตรเศษส่วนแล้วระบายหรือวางชิ้นส่วนให้ตรงกับบัตร\n• รอบจำนวนคละ ให้เด็กสร้าง 1 พิซซ่าเต็มและเศษส่วนเพิ่ม\nบัตรโจทย์พร้อมใช้ในเกม:\n• ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• วงกลมคำตอบ: 4/4 เป็นจำนวนเต็มกี่หน่วย\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เขียนคำอ่านของ 5/8\n• ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3\n• เขียนเศษส่วนแทน “แบ่งเค้กเป็น 10 ชิ้น กินไป 7 ชิ้น”\nช่วง B แสดงวิธี ข้อ 4–5:\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• แปลง 9/4 เป็นจำนวนคละ\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• แปลง 2 3/5 เป็นเศษเกิน\n• วงกลมคำตอบ: 4/4 เป็นจำนวนเต็มกี่หน่วย\n• ยกตัวอย่างสถานการณ์จริงที่ใช้เศษส่วน 1 เรื่อง\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เขียนคำอ่านของ 5/8\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• วงกลมคำตอบ: 4/4 เป็นจำนวนเต็มกี่หน่วย\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"เศษส่วนประกอบด้วยตัวเศษและตัวส่วน ตัวส่วนบอกว่าแบ่งทั้งหมดเป็นกี่ส่วน ตัวเศษบอกว่าเลือกมากี่ส่วน"},{"type":"p","style":"List Bullet","text":"เศษส่วนแท้มีตัวเศษน้อยกว่าตัวส่วน เช่น 3/5"},{"type":"p","style":"List Bullet","text":"จำนวนคละประกอบด้วยจำนวนเต็มและเศษส่วน เช่น 2 1/4"},{"type":"p","style":"List Bullet","text":"3/4 อ่านว่า เศษสามส่วนสี่ หมายถึง แบ่งทั้งหมดเป็น 4 ส่วนเท่า ๆ กัน เลือก 3 ส่วน"},{"type":"p","style":"List Bullet","text":"1 2/3 อ่านว่า หนึ่งเศษสองส่วนสาม หมายถึง 1 หน่วยเต็มกับอีก 2 ใน 3 ส่วน"},{"type":"p","style":"List Bullet","text":"7/4 = 1 3/4 เพราะ 7 ส่วนเท่ากับ 4 ส่วนเต็ม 1 ชุด เหลือ 3 ส่วน"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"เขียนคำอ่านของ 5/8"},{"type":"p","style":"List Number","text":"ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3"},{"type":"p","style":"List Number","text":"เขียนเศษส่วนแทน “แบ่งเค้กเป็น 10 ชิ้น กินไป 7 ชิ้น”"},{"type":"p","style":"List Number","text":"จำนวนคละ 3 1/2 หมายความว่าอย่างไร"},{"type":"p","style":"List Number","text":"แปลง 9/4 เป็นจำนวนคละ"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: สลับตัวเศษกับตัวส่วน และมองข้ามเงื่อนไขที่ต้องแบ่งเป็นส่วนเท่า ๆ กัน\n• วิธีช่วยเมื่อเด็กติด: ใช้พิซซ่า/แถบเศษส่วนก่อนสัญลักษณ์"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 8 แผนการสอนที่ 8: เศษส่วนและจำนวนคละ: ความหมาย อ่าน เขียน และแสดงภาพ ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เขียนคำอ่านของ 5/8\n• ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3\n• เขียนเศษส่วนแทน “แบ่งเค้กเป็น 10 ชิ้น กินไป 7 ชิ้น”\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: สลับตัวเศษกับตัวส่วน และมองข้ามเงื่อนไขที่ต้องแบ่งเป็นส่วนเท่า ๆ กัน 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 8: เศษส่วนและจำนวนคละ: ความหมาย อ่าน เขียน และแสดงภาพ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• แปลง 9/4 เป็นจำนวนคละ\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• เศษส่วนประกอบด้วยตัวเศษและตัวส่วน ตัวส่วนบอกว่าแบ่งทั้งหมดเป็นกี่ส่วน ตัวเศษบอกว่าเลือกมากี่ส่วน\n• เศษส่วนแท้มีตัวเศษน้อยกว่าตัวส่วน เช่น 3/5\n• จำนวนคละประกอบด้วยจำนวนเต็มและเศษส่วน เช่น 2 1/4\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 3/4 อ่านว่า เศษสามส่วนสี่ หมายถึง แบ่งทั้งหมดเป็น 4 ส่วนเท่า ๆ กัน เลือก 3 ส่วน\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้พิซซ่า/แถบเศษส่วนก่อนสัญลักษณ์ 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 1 2/3 อ่านว่า หนึ่งเศษสองส่วนสาม หมายถึง 1 หน่วยเต็มกับอีก 2 ใน 3 ส่วน\n• 7/4 = 1 3/4 เพราะ 7 ส่วนเท่ากับ 4 ส่วนเต็ม 1 ชุด เหลือ 3 ส่วน\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• แปลง 9/4 เป็นจำนวนคละ\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: พิซซ่าเศษส่วน เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแจกวงกลมพิซซ่ากระดาษ แบ่งเป็น 2, 3, 4, 6, 8 ส่วน\n• เด็กหยิบบัตรเศษส่วนแล้วระบายหรือวางชิ้นส่วนให้ตรงกับบัตร\n• รอบจำนวนคละ ให้เด็กสร้าง 1 พิซซ่าเต็มและเศษส่วนเพิ่ม\nบัตรโจทย์พร้อมใช้ในเกม:\n• ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• วงกลมคำตอบ: 4/4 เป็นจำนวนเต็มกี่หน่วย\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เขียนคำอ่านของ 5/8\n• ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3\n• เขียนเศษส่วนแทน “แบ่งเค้กเป็น 10 ชิ้น กินไป 7 ชิ้น”\nช่วง B แสดงวิธี ข้อ 4–5:\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• แปลง 9/4 เป็นจำนวนคละ\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• แปลง 2 3/5 เป็นเศษเกิน\n• วงกลมคำตอบ: 4/4 เป็นจำนวนเต็มกี่หน่วย\n• ยกตัวอย่างสถานการณ์จริงที่ใช้เศษส่วน 1 เรื่อง\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เขียนคำอ่านของ 5/8\n• จำนวนคละ 3 1/2 หมายความว่าอย่างไร\n• วงกลมคำตอบ: 4/4 เป็นจำนวนเต็มกี่หน่วย\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน เศษส่วนประกอบด้วยตัวเศษและตัวส่วน ตัวส่วนบอกว่าแบ่งทั้งหมดเป็นกี่ส่วน ตัวเศษบอกว่าเลือกมากี่ส่วน เศษส่วนแท้มีตัวเศษน้อยกว่าตัวส่วน เช่น 3/5 จำนวนคละประกอบด้วยจำนวนเต็มและเศษส่วน เช่น 2 1/4 3/4 อ่านว่า เศษสามส่วนสี่ หมายถึง แบ่งทั้งหมดเป็น 4 ส่วนเท่า ๆ กัน เลือก 3 ส่วน 1 2/3 อ่านว่า หนึ่งเศษสองส่วนสาม หมายถึง 1 หน่วยเต็มกับอีก 2 ใน 3 ส่วน 7/4 = 1 3/4 เพราะ 7 ส่วนเท่ากับ 4 ส่วนเต็ม 1 ชุด เหลือ 3 ส่วน ชุดบัตรเกมพร้อมใช้ เขียนคำอ่านของ 5/8 ระบายรูปสี่เหลี่ยม 6 ช่องให้แสดง 2/3 เขียนเศษส่วนแทน “แบ่งเค้กเป็น 10 ชิ้น กินไป 7 ชิ้น” จำนวนคละ 3 1/2 หมายความว่าอย่างไร แปลง 9/4 เป็นจำนวนคละ คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่ง ื่อง “เศษส่วนและจำนวนคละ: ความหมาย อ่าน เขียน และแสดงภาพ” • น้องทำได้ดีในเรื่อง: ____________________ • จุดที่ควรฝึกเพิ่มคือ: ____________________ • การบ้าน/ฝึกที่บ้าน: ให้เด็กถ่ายรูป/วาดสิ่งของที่แบ่งเป็นส่วนเท่า ๆ กัน 3 ภาพ แล้วเขียนเศษส่วนกำกับ • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-9-เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน-46","title":"แผนการสอนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน","level":1,"parent":"","lessonNo":9,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/4 เปรียบเทียบเรียงลำดับเศษส่วนและจำนวนคละที่ตัวส่วนหนึ่งเป็นพหุคูณของอีกตัวหนึ่ง และ ค 1.1 ป.4/13 หาผลบวกผลลบของเศษส่วน/จำนวนคละที่ตัวส่วนสัมพันธ์กัน"],["สาระสำคัญ","ทำตัวส่วนให้เท่ากันเมื่อเปรียบเทียบหรือบวก-ลบ และใช้ภาพช่วยตรวจความเข้าใจ"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/4 เปรียบเทียบเรียงลำดับเศษส่วนและจำนวนคละที่ตัวส่วนหนึ่งเป็นพหุคูณของอีกตัวหนึ่ง และ ค 1.1 ป.4/13 หาผลบวกผลลบของเศษส่วน/จำนวนคละที่ตัวส่วนสัมพันธ์กัน สาระสำคัญ ทำตัวส่วนให้เท่ากันเมื่อเปรียบเทียบหรือบวก-ลบ และใช้ภาพช่วยตรวจความเข้าใจ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-9-47","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 9","level":2,"parent":"แผนการสอนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน","lessonNo":9,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เปรียบเทียบ 1/2 ___ 3/6\n• เปรียบเทียบ 2/3 ___ 5/6\n• เรียงจากน้อยไปมาก: 1/4, 3/8, 1/2\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: บวกตัวส่วนตรง ๆ หรือคูณเฉพาะตัวเศษ/ตัวส่วนด้านเดียว"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เปรียบเทียบ 1/2 ___ 3/6\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• เมื่อเศษส่วนมีตัวส่วนเท่ากัน เปรียบเทียบที่ตัวเศษได้ทันที\n• ถ้าตัวส่วนไม่เท่ากัน แต่ตัวหนึ่งเป็นพหุคูณของอีกตัวหนึ่ง ให้ขยายเศษส่วนให้ตัวส่วนเท่ากัน\n• การบวก-ลบเศษส่วนทำได้เมื่อตัวส่วนเท่ากันแล้ว จึงบวกหรือลบเฉพาะตัวเศษ\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 1/2 = 2/4 ดังนั้น 1/2 < 3/4\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้แถบเศษส่วนหาตัวส่วนร่วมและวงตัวคูณทั้งเศษกับส่วน"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 2/3 + 1/6 = 4/6 + 1/6 = 5/6\n• 1 1/4 + 2/4 = 1 3/4\n• คำนวณ 1/2 + 1/4\n• คำนวณ 5/6 - 1/3\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: สะพานตัวส่วนเท่ากัน","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กจับบัตรเศษส่วน 2 ใบ เช่น 1/2 และ 3/4\n• ต้องสร้างสะพานโดยแปลงให้ตัวส่วนเท่ากันก่อนเปรียบเทียบ\n• รอบบวก-ลบ ให้ทีมที่วาดภาพประกอบได้ถูกต้องรับดาวเพิ่ม\nบัตรโจทย์พร้อมใช้ในเกม:\n• เปรียบเทียบ 2/3 ___ 5/6\n• คำนวณ 1/2 + 1/4\n• คำนวณ 2 1/4 - 1/2\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เปรียบเทียบ 1/2 ___ 3/6\n• เปรียบเทียบ 2/3 ___ 5/6\n• เรียงจากน้อยไปมาก: 1/4, 3/8, 1/2\nช่วง B แสดงวิธี ข้อ 4–5:\n• คำนวณ 1/2 + 1/4\n• คำนวณ 5/6 - 1/3\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• คำนวณ 1 1/2 + 3/4\n• คำนวณ 2 1/4 - 1/2\n• อธิบายว่าทำไมเราต้องทำตัวส่วนให้เท่ากันก่อนบวกเศษส่วน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เปรียบเทียบ 1/2 ___ 3/6\n• คำนวณ 1/2 + 1/4\n• คำนวณ 2 1/4 - 1/2\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"เมื่อเศษส่วนมีตัวส่วนเท่ากัน เปรียบเทียบที่ตัวเศษได้ทันที"},{"type":"p","style":"List Bullet","text":"ถ้าตัวส่วนไม่เท่ากัน แต่ตัวหนึ่งเป็นพหุคูณของอีกตัวหนึ่ง ให้ขยายเศษส่วนให้ตัวส่วนเท่ากัน"},{"type":"p","style":"List Bullet","text":"การบวก-ลบเศษส่วนทำได้เมื่อตัวส่วนเท่ากันแล้ว จึงบวกหรือลบเฉพาะตัวเศษ"},{"type":"p","style":"List Bullet","text":"1/2 = 2/4 ดังนั้น 1/2 < 3/4"},{"type":"p","style":"List Bullet","text":"2/3 + 1/6 = 4/6 + 1/6 = 5/6"},{"type":"p","style":"List Bullet","text":"1 1/4 + 2/4 = 1 3/4"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"เปรียบเทียบ 1/2 ___ 3/6"},{"type":"p","style":"List Number","text":"เปรียบเทียบ 2/3 ___ 5/6"},{"type":"p","style":"List Number","text":"เรียงจากน้อยไปมาก: 1/4, 3/8, 1/2"},{"type":"p","style":"List Number","text":"คำนวณ 1/2 + 1/4"},{"type":"p","style":"List Number","text":"คำนวณ 5/6 - 1/3"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: บวกตัวส่วนตรง ๆ หรือคูณเฉพาะตัวเศษ/ตัวส่วนด้านเดียว\n• วิธีช่วยเมื่อเด็กติด: ใช้แถบเศษส่วนหาตัวส่วนร่วมและวงตัวคูณทั้งเศษกับส่วน"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 9 แผนการสอนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เปรียบเทียบ 1/2 ___ 3/6\n• เปรียบเทียบ 2/3 ___ 5/6\n• เรียงจากน้อยไปมาก: 1/4, 3/8, 1/2\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: บวกตัวส่วนตรง ๆ หรือคูณเฉพาะตัวเศษ/ตัวส่วนด้านเดียว 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เปรียบเทียบ 1/2 ___ 3/6\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• เมื่อเศษส่วนมีตัวส่วนเท่ากัน เปรียบเทียบที่ตัวเศษได้ทันที\n• ถ้าตัวส่วนไม่เท่ากัน แต่ตัวหนึ่งเป็นพหุคูณของอีกตัวหนึ่ง ให้ขยายเศษส่วนให้ตัวส่วนเท่ากัน\n• การบวก-ลบเศษส่วนทำได้เมื่อตัวส่วนเท่ากันแล้ว จึงบวกหรือลบเฉพาะตัวเศษ\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 1/2 = 2/4 ดังนั้น 1/2 < 3/4\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้แถบเศษส่วนหาตัวส่วนร่วมและวงตัวคูณทั้งเศษกับส่วน 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 2/3 + 1/6 = 4/6 + 1/6 = 5/6\n• 1 1/4 + 2/4 = 1 3/4\n• คำนวณ 1/2 + 1/4\n• คำนวณ 5/6 - 1/3\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: สะพานตัวส่วนเท่ากัน เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กจับบัตรเศษส่วน 2 ใบ เช่น 1/2 และ 3/4\n• ต้องสร้างสะพานโดยแปลงให้ตัวส่วนเท่ากันก่อนเปรียบเทียบ\n• รอบบวก-ลบ ให้ทีมที่วาดภาพประกอบได้ถูกต้องรับดาวเพิ่ม\nบัตรโจทย์พร้อมใช้ในเกม:\n• เปรียบเทียบ 2/3 ___ 5/6\n• คำนวณ 1/2 + 1/4\n• คำนวณ 2 1/4 - 1/2\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เปรียบเทียบ 1/2 ___ 3/6\n• เปรียบเทียบ 2/3 ___ 5/6\n• เรียงจากน้อยไปมาก: 1/4, 3/8, 1/2\nช่วง B แสดงวิธี ข้อ 4–5:\n• คำนวณ 1/2 + 1/4\n• คำนวณ 5/6 - 1/3\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• คำนวณ 1 1/2 + 3/4\n• คำนวณ 2 1/4 - 1/2\n• อธิบายว่าทำไมเราต้องทำตัวส่วนให้เท่ากันก่อนบวกเศษส่วน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เปรียบเทียบ 1/2 ___ 3/6\n• คำนวณ 1/2 + 1/4\n• คำนวณ 2 1/4 - 1/2\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน เมื่อเศษส่วนมีตัวส่วนเท่ากัน เปรียบเทียบที่ตัวเศษได้ทันที ถ้าตัวส่วนไม่เท่ากัน แต่ตัวหนึ่งเป็นพหุคูณของอีกตัวหนึ่ง ให้ขยายเศษส่วนให้ตัวส่วนเท่ากัน การบวก-ลบเศษส่วนทำได้เมื่อตัวส่วนเท่ากันแล้ว จึงบวกหรือลบเฉพาะตัวเศษ 1/2 = 2/4 ดังนั้น 1/2 < 3/4 2/3 + 1/6 = 4/6 + 1/6 = 5/6 1 1/4 + 2/4 = 1 3/4 ชุดบัตรเกมพร้อมใช้ เปรียบเทียบ 1/2 ___ 3/6 เปรียบเทียบ 2/3 ___ 5/6 เรียงจากน้อยไปมาก: 1/4, 3/8, 1/2 คำนวณ 1/2 + 1/4 คำนวณ 5/6 - 1/3 คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: บวกตัวส่วนตรง ๆ หรือคูณเฉพาะตัวเศษ/ตัวส่วนด้านเดียว\n• วิธีช่วยเมื่อเด็กติด: ใช้แถบเศษส่วนหาตัวส่วนร่วมและวงตัวคูณทั้งเศษกับส่วน"},{"id":"ใบความรู้-แผนที่-9-เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน-48","title":"ใบความรู้ แผนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน","level":2,"parent":"แผนการสอนที่ 9: เปรียบเทียบเศษส่วนและบวก-ลบเศษส่วนที่ตัวส่วนสัมพันธ์กัน","lessonNo":9,"kind":"knowledge","teacherOnly":false,"b ประโยคสัญลักษณ์"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 10: โจทย์ปัญหาเศษส่วนและจำนวนคละ ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/14 แสดงวิธีหาคำตอบของโจทย์ปัญหาการบวกและการลบเศษส่วน/จำนวนคละที่ตัวส่วนสัมพันธ์กัน สาระสำคัญ ตีความคำว่า “รวมกัน เหลือ มากกว่า น้อยกว่า” ในสถานการณ์เศษส่วน และเขียนประโยคสัญลักษณ์ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-10-52","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 10","level":2,"parent":"แผนการสอนที่ 10: โจทย์ปัญหาเศษส่วนและจำนวนคละ","lessonNo":10,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด\n• เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด\n• เค้ก 1 ถาด กินไป 2/3 ถาด เหลือเท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: เลือกบวกหรือลบจากตัวเลขแทนการอ่านคำว่า เติม ใช้ไป รวม หรือเหลือ"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 10: โจทย์ปัญหาเศษส่วนและจำนวนคละ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• โจทย์เศษส่วนต้องตรวจหน่วยและตัวส่วนก่อนคำนวณ\n• คำว่า รวมกัน/ทั้งหมด มักใช้บวก คำว่า เหลือ/ใช้ไป/ต่างกัน มักใช้ลบ\n• หลังคำนวณต้องตอบเป็นหน่วย เช่น เมตร ลิตร กิโลกรัม\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• แม่ใช้แป้ง 1/2 กก. และใช้อีก 1/4 กก. รวมใช้ 3/4 กก.\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วาดแถบ เริ่มต้น–เปลี่ยน–ผลลัพธ์ และตรวจทิศทางเพิ่ม/ลด"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• มีริบบิ้น 2 1/2 เมตร ใช้ไป 3/4 เมตร เหลือ 1 3/4 เมตร\n• น้ำผลไม้ 5/6 ลิตร ดื่มไป 1/3 ลิตร เหลือ 1/2 ลิตร\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: ตลาดเศษส่วน","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูทำร้านจำลอง เช่น ข้าวสาร น้ำผลไม้ ริบบิ้น ใช้หน่วยเป็นเศษส่วน\n• เด็กซื้อ/ใช้/เหลือของตามบัตรโจทย์ แล้วคำนวณ\n• ให้เด็กพูดว่าโจทย์เป็นบวกหรือลบเพราะอะไร\nบัตรโจทย์พร้อมใช้ในเกม:\n• เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เขียนประโยคสัญลักษณ์ของข้อ 2\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด\n• เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด\n• เค้ก 1 ถาด กินไป 2/3 ถาด เหลือเท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• แต่งโจทย์เศษส่วนที่มีคำตอบ 5/6\n• เขียนประโยคสัญลักษณ์ของข้อ 2\n• ตรวจคำตอบข้อ 1 ด้วยภาพหรือการอธิบาย\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เขียนประโยคสัญลักษณ์ของข้อ 2\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"โจทย์เศษส่วนต้องตรวจหน่วยและตัวส่วนก่อนคำนวณ"},{"type":"p","style":"List Bullet","text":"คำว่า รวมกัน/ทั้งหมด มักใช้บวก คำว่า เหลือ/ใช้ไป/ต่างกัน มักใช้ลบ"},{"type":"p","style":"List Bullet","text":"หลังคำนวณต้องตอบเป็นหน่วย เช่น เมตร ลิตร กิโลกรัม"},{"type":"p","style":"List Bullet","text":"แม่ใช้แป้ง 1/2 กก. และใช้อีก 1/4 กก. รวมใช้ 3/4 กก."},{"type":"p","style":"List Bullet","text":"มีริบบิ้น 2 1/2 เมตร ใช้ไป 3/4 เมตร เหลือ 1 3/4 เมตร"},{"type":"p","style":"List Bullet","text":"น้ำผลไม้ 5/6 ลิตร ดื่มไป 1/3 ลิตร เหลือ 1/2 ลิตร"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด"},{"type":"p","style":"List Number","text":"เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด"},{"type":"p","style":"List Number","text":"เค้ก 1 ถาด กินไป 2/3 ถาด เหลือเท่าใด"},{"type":"p","style":"List Number","text":"น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด"},{"type":"p","style":"List Number","text":"เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: เลือกบวกหรือลบจากตัวเลขแทนการอ่านคำว่า เติม ใช้ไป รวม หรือเหลือ\n• วิธีช่วยเมื่อเด็กติด: วาดแถบ เริ่มต้น–เปลี่ยน–ผลลัพธ์ และตรวจทิศทางเพิ่ม/ลด"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 10 แผนการสอนที่ 10: โจทย์ปัญหาเศษส่วนและจำนวนคละ ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด\n• เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด\n• เค้ก 1 ถาด กินไป 2/3 ถาด เหลือเท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: เลือกบวกหรือลบจากตัวเลขแทนการอ่านคำว่า เติม ใช้ไป รวม หรือเหลือ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 10: โจทย์ปัญหาเศษส่วนและจำนวนคละ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• โจทย์เศษส่วนต้องตรวจหน่วยและตัวส่วนก่อนคำนวณ\n• คำว่า รวมกัน/ทั้งหมด มักใช้บวก คำว่า เหลือ/ใช้ไป/ต่างกัน มักใช้ลบ\n• หลังคำนวณต้องตอบเป็นหน่วย เช่น เมตร ลิตร กิโลกรัม\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• แม่ใช้แป้ง 1/2 กก. และใช้อีก 1/4 กก. รวมใช้ 3/4 กก.\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วาดแถบ เริ่มต้น–เปลี่ยน–ผลลัพธ์ และตรวจทิศทางเพิ่ม/ลด 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• มีริบบิ้น 2 1/2 เมตร ใช้ไป 3/4 เมตร เหลือ 1 3/4 เมตร\n• น้ำผลไม้ 5/6 ลิตร ดื่มไป 1/3 ลิตร เหลือ 1/2 ลิตร\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: ตลาดเศษส่วน เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูทำร้านจำลอง เช่น ข้าวสาร น้ำผลไม้ ริบบิ้น ใช้หน่วยเป็นเศษส่วน\n• เด็กซื้อ/ใช้/เหลือของตามบัตรโจทย์ แล้วคำนวณ\n• ให้เด็กพูดว่าโจทย์เป็นบวกหรือลบเพราะอะไร\nบัตรโจทย์พร้อมใช้ในเกม:\n• เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เขียนประโยคสัญลักษณ์ของข้อ 2\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด\n• เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด\n• เค้ก 1 ถาด กินไป 2/3 ถาด เหลือเท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• แต่งโจทย์เศษส่วนที่มีคำตอบ 5/6\n• เขียนประโยคสัญลักษณ์ของข้อ 2\n• ตรวจคำตอบข้อ 1 ด้วยภาพหรือการอธิบาย\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด\n• น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด\n• เขียนประโยคสัญลักษณ์ของข้อ 2\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน โจทย์เศษส่วนต้องตรวจหน่วยและตัวส่วนก่อนคำนวณ คำว่า รวมกัน/ทั้งหมด มักใช้บวก คำว่า เหลือ/ใช้ไป/ต่างกัน มักใช้ลบ หลังคำนวณต้องตอบเป็นหน่วย เช่น เมตร ลิตร กิโลกรัม แม่ใช้แป้ง 1/2 กก. และใช้อีก 1/4 กก. รวมใช้ 3/4 กก. มีริบบิ้น 2 1/2 เมตร ใช้ไป 3/4 เมตร เหลือ 1 3/4 เมตร น้ำผลไม้ 5/6 ลิตร ดื่มไป 1/3 ลิตร เหลือ 1/2 ลิตร ชุดบัตรเกมพร้อมใช้ มีน้ำ 3/4 ลิตร เติมอีก 1/8 ลิตร มีน้ำรวมเท่าใด เชือกยาว 2 1/2 เมตร ตัดไป 3/4 เมตร เหลือเท่าใด เค้ก 1 ถาด กินไป 2/3 ถาด เหลือเท่าใด น้ำตาล 1 1/4 กก. ใช้เพิ่มอีก 1/2 กก. รวมใช้เท่าใด เปรียบเทียบว่าข้อใดเป็นการบวก ข้อใดเป็นการลบ พร้อมเหตุผล คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: เลือกบวกหรือลบจากตัวเลขแทนการอ่านคำว่า เติม ใช้ไป รวม หรือเหลือ\n• วิธีช่วยเมื่อเด็กติด: วาดแถบ เริ่มต้น–เปลี่ยน–ผลลัพธ์ และตรวจทิศทางเพิ่ม/ลด"},{"id":"ใบความรู้-แผนที่-10-โจทย์ปัญหาเศษส่วนและจำนวนคละ-53","title":"ใบความรู้ แผนที่ 10: โจทย์ปัญหาเศษส่วนและจำนวนคละ","level":2,"parent":"แผนการสอนที่ 10: โจทย์ปัญหาเศษส่วนและจำนวนคละ","lessonNo":10,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","s ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/5 อ่านและเขียนทศนิยมไม่เกิน 3 ตำแหน่ง และ ค 1.1 ป.4/6 เปรียบเทียบและเรียงลำดับทศนิยมไม่เกิน 3 ตำแหน่ง"],["สาระสำคัญ","เข้าใจค่าประจำหลักของทศนิยม: ส่วนสิบ ส่วนร้อย ส่วนพัน และเปรียบเทียบทีละหลัก"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 11: ทศนิยมไม่เกิน 3 ตำแหน่ง: อ่าน เขียน เปรียบเทียบ และเรียงลำดับ ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/5 อ่านและเขียนทศนิยมไม่เกิน 3 ตำแหน่ง และ ค 1.1 ป.4/6 เปรียบเทียบและเรียงลำดับทศนิยมไม่เกิน 3 ตำแหน่ง สาระสำคัญ เข้าใจค่าประจำหลักของทศนิยม: ส่วนสิบ ส่วนร้อย ส่วนพัน และเปรียบเทียบทีละหลัก จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-11-57","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 11","level":2,"parent":"แผนการสอนที่ 11: ทศนิยมไม่เกิน 3 ตำแหน่ง: อ่าน เขียน เปรียบเทียบ และเรียงลำดับ","lessonNo":11,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เขียนคำอ่านของ 4.305\n• เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน\n• เปรียบเทียบ 0.8 ___ 0.75\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: อ่านศูนย์หลังจุดหายไป และเปรียบเทียบทศนิยมเหมือนจำนวนนับ"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 11: ทศนิยมไม่เกิน 3 ตำแหน่ง: อ่าน เขียน เปรียบเทียบ และเรียงลำดับ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เขียนคำอ่านของ 4.305\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ทศนิยมหนึ่งตำแหน่งคือส่วนสิบ สองตำแหน่งคือส่วนร้อย สามตำแหน่งคือส่วนพัน\n• 0.5 = 0.50 = 0.500 เพราะเติมศูนย์ด้านท้ายทศนิยมแล้วค่าไม่เปลี่ยน\n• การเปรียบเทียบทศนิยมให้เทียบส่วนจำนวนเต็มก่อน แล้วเทียบทศนิยมจากซ้ายไปขวา\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 3.245 อ่านว่า สามจุดสองสี่ห้า หรือ สามกับสองร้อยสี่สิบห้าในพันส่วน\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้ตาราง จำนวนเต็ม–ส่วนสิบ–ส่วนร้อย–ส่วนพัน และเติมศูนย์ท้ายเพื่อเทียบ"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 0.7 > 0.68 เพราะ 0.70 > 0.68\n• เรียง 1.205, 1.25, 1.052 จากน้อยไปมากได้ 1.052, 1.205, 1.25\n• เปรียบเทียบ 2.305 ___ 2.350\n• เรียงจากน้อยไปมาก: 0.905, 0.59, 0.950, 0.509\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: เส้นจำนวนทศนิยม","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูติดเส้นจำนวน 0-1 บนกระดาน แล้วแจกบัตรทศนิยมให้เด็ก\n• เด็กนำบัตรไปติดตำแหน่งโดยประมาณ แล้วอธิบายว่าอยู่ใกล้จำนวนใด\n• รอบยากใช้ทศนิยม 2-3 ตำแหน่ง เช่น 0.375, 0.75, 0.8\nบัตรโจทย์พร้อมใช้ในเกม:\n• เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน\n• เปรียบเทียบ 2.305 ___ 2.350\n• เขียนทศนิยม 3 จำนวนที่อยู่ระหว่าง 1.2 และ 1.3\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เขียนคำอ่านของ 4.305\n• เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน\n• เปรียบเทียบ 0.8 ___ 0.75\nช่วง B แสดงวิธี ข้อ 4–5:\n• เปรียบเทียบ 2.305 ___ 2.350\n• เรียงจากน้อยไปมาก: 0.905, 0.59, 0.950, 0.509\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เติมศูนย์ให้ 0.6 มี 3 ตำแหน่งโดยค่าไม่เปลี่ยน\n• เขียนทศนิยม 3 จำนวนที่อยู่ระหว่าง 1.2 และ 1.3\n• อธิบายว่า 0.40 กับ 0.4 เท่ากันหรือไม่\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เขียนคำอ่านของ 4.305\n• เปรียบเทียบ 2.305 ___ 2.350\n• เขียนทศนิยม 3 จำนวนที่อยู่ระหว่าง 1.2 และ 1.3\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ทศนิยมหนึ่งตำแหน่งคือส่วนสิบ สองตำแหน่งคือส่วนร้อย สามตำแหน่งคือส่วนพัน"},{"type":"p","style":"List Bullet","text":"0.5 = 0.50 = 0.500 เพราะเติมศูนย์ด้านท้ายทศนิยมแล้วค่าไม่เปลี่ยน"},{"type":"p","style":"List Bullet","text":"การเปรียบเทียบทศนิยมให้เทียบส่วนจำนวนเต็มก่อน แล้วเทียบทศนิยมจากซ้ายไปขวา"},{"type":"p","style":"List Bullet","text":"3.245 อ่านว่า สามจุดสองสี่ห้า หรือ สามกับสองร้อยสี่สิบห้าในพันส่วน"},{"type":"p","style":"List Bullet","text":"0.7 > 0.68 เพราะ 0.70 > 0.68"},{"type":"p","style":"List Bullet","text":"เรียง 1.205, 1.25, 1.052 จากน้อยไปมากได้ 1.052, 1.205, 1.25"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"เขียนคำอ่านของ 4.305"},{"type":"p","style":"List Number","text":"เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน"},{"type":"p","style":"List Number","text":"เปรียบเทียบ 0.8 ___ 0.75"},{"type":"p","style":"List Number","text":"เปรียบเทียบ 2.305 ___ 2.350"},{"type":"p","style":"List Number","text":"เรียงจากน้อยไปมาก: 0.905, 0.59, 0.950, 0.509"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: อ่านศูนย์หลังจุดหายไป และเปรียบเทียบทศนิยมเหมือนจำนวนนับ\n• วิธีช่วยเมื่อเด็กติด: ใช้ตาราง จำนวนเต็ม–ส่วนสิบ–ส่วนร้อย–ส่วนพัน และเติมศูนย์ท้ายเพื่อเทียบ"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 11 แผนการสอนที่ 11: ทศนิยมไม่เกิน 3 ตำแหน่ง: อ่าน เขียน เปรียบเทียบ และเรียงลำดับ ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• เขียนคำอ่านของ 4.305\n• เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน\n• เปรียบเทียบ 0.8 ___ 0.75\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: อ่านศูนย์หลังจุดหายไป และเปรียบเทียบทศนิยมเหมือนจำนวนนับ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 11: ทศนิยมไม่เกิน 3 ตำแหน่ง: อ่าน เขียน เปรียบเทียบ และเรียงลำดับ” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• เขียนคำอ่านของ 4.305\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ทศนิยมหนึ่งตำแหน่งคือส่วนสิบ สองตำแหน่งคือส่วนร้อย สามตำแหน่งคือส่วนพัน\n• 0.5 = 0.50 = 0.500 เพราะเติมศูนย์ด้านท้ายทศนิยมแล้วค่าไม่เปลี่ยน\n• การเปรียบเทียบทศนิยมให้เทียบส่วนจำนวนเต็มก่อน แล้วเทียบทศนิยมจากซ้ายไปขวา\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 3.245 อ่านว่า สามจุดสองสี่ห้า หรือ สามกับสองร้อยสี่สิบห้าในพันส่วน\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้ตาราง จำนวนเต็ม–ส่วนสิบ–ส่วนร้อย–ส่วนพัน และเติมศูนย์ท้ายเพื่อเทียบ 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 0.7 > 0.68 เพราะ 0.70 > 0.68\n• เรียง 1.205, 1.25, 1.052 จากน้อยไปมากได้ 1.052, 1.205, 1.25\n• เปรียบเทียบ 2.305 ___ 2.350\n• เรียงจากน้อยไปมาก: 0.905, 0.59, 0.950, 0.509\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: เส้นจำนวนทศนิยม เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูติดเส้นจำนวน 0-1 บนกระดาน แล้วแจกบัตรทศนิยมให้เด็ก\n• เด็กนำบัตรไปติดตำแหน่งโดยประมาณ แล้วอธิบายว่าอยู่ใกล้จำนวนใด\n• รอบยากใช้ทศนิยม 2-3 ตำแหน่ง เช่น 0.375, 0.75, 0.8\nบัตรโจทย์พร้อมใช้ในเกม:\n• เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน\n• เปรียบเทียบ 2.305 ___ 2.350\n• เขียนทศนิยม 3 จำนวนที่อยู่ระหว่าง 1.2 และ 1.3\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• เขียนคำอ่านของ 4.305\n• เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน\n• เปรียบเทียบ 0.8 ___ 0.75\nช่วง B แสดงวิธี ข้อ 4–5:\n• เปรียบเทียบ 2.305 ___ 2.350\n• เรียงจากน้อยไปมาก: 0.905, 0.59, 0.950, 0.509\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• เติมศูนย์ให้ 0.6 มี 3 ตำแหน่งโดยค่าไม่เปลี่ยน\n• เขียนทศนิยม 3 จำนวนที่อยู่ระหว่าง 1.2 และ 1.3\n• อธิบายว่า 0.40 กับ 0.4 เท่ากันหรือไม่\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• เขียนคำอ่านของ 4.305\n• เปรียบเทียบ 2.305 ___ 2.350\n• เขียนทศนิยม 3 จำนวนที่อยู่ระหว่าง 1.2 และ 1.3\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน ทศนิยมหนึ่งตำแหน่งคือส่วนสิบ สองตำแหน่งคือส่วนร้อย สามตำแหน่งคือส่วนพัน 0.5 = 0.50 = 0.500 เพราะเติมศูนย์ด้านท้ายทศนิยมแล้วค่าไม่เปลี่ยน การเปรียบเทียบทศนิยมให้เทียบส่วนจำนวนเต็มก่อน แล้วเทียบทศนิยมจากซ้ายไปขวา 3.245 อ่านว่า สามจุดสองสี่ห้า หรือ สามกับสองร้อยสี่สิบห้าในพันส่วน 0.7 > 0.68 เพราะ 0.70 > 0.68 เรียง 1.205, 1.25, 1.052 จากน้อยไปมากได้ 1.052, 1.205, 1.25 ชุดบัตรเกมพร้อมใช้ เขียนคำอ่านของ 4.305 เขียนทศนิยมแทน 7 ส่วนใน 10 ส่วน เปรียบเทียบ 0.8 ___ 0.75 เปรียบเทียบ 2.305 ___ 2.350 เรียงจากน้อยไปมาก: 0.905, 0.59, 0.950, 0.509 คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: อ่านศูนย์หลังจุดหายไป และเปรียบเทียบทศนิยมเหมือนจำนวนนับ\n• วิธีช่วยเมื่อเด็กติด: ใช้ตาราง จำนวนเต็ม–ส่วนสิบ–ส่วนร้อย–ส่วนพัน และเติมศูนย์ท้ายเพื่อเทียบ"},{"id":"ใบความรู้-แผนที่-11-ทศนิยมไม่เกิน-3-ตำแหน่ง-อ่าน-เขียน-เปรียบเทียบ-และเรียงลำดับ-58","title":"ใบความรู้ แผนที่ กที่เป็นทศนิยม 5 รายการ แล้วเรียงลำดับ • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-12-การบวก-ลบทศนิยม-และโจทย์เกี่ยวกับเงิน-การซื้อขาย-61","title":"แผนการสอนที่ 12: การบวก ลบทศนิยม และโจทย์เกี่ยวกับเงิน/การซื้อขาย","level":1,"parent":"","lessonNo":12,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 1.1 ป.4/15 หาผลบวกผลลบของทศนิยมไม่เกิน 3 ตำแหน่ง และ ค 1.1 ป.4/16 แสดงวิธีหาคำตอบโจทย์ปัญหาการบวก/ลบทศนิยม 2 ขั้นตอน"],["สาระสำคัญ","ตั้งจุดทศนิยมให้ตรงกัน คำนวณเหมือนจำนวนเต็ม และตอบหน่วยให้ครบ โดยใช้บริบทเงินเพื่อเสริมทักษะชีวิต"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 12: การบวก ลบทศนิยม และโจทย์เกี่ยวกับเงิน/การซื้อขาย ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 1.1 ป.4/15 หาผลบวกผลลบของทศนิยมไม่เกิน 3 ตำแหน่ง และ ค 1.1 ป.4/16 แสดงวิธีหาคำตอบโจทย์ปัญหาการบวก/ลบทศนิยม 2 ขั้นตอน สาระสำคัญ ตั้งจุดทศนิยมให้ตรงกัน คำนวณเหมือนจำนวนเต็ม และตอบหน่วยให้ครบ โดยใช้บริบทเงินเพื่อเสริมทักษะชีวิต จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-12-62","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 12","level":2,"parent":"แผนการสอนที่ 12: การบวก ลบทศนิยม และโจทย์เกี่ยวกับเงิน/การซื้อขาย","lessonNo":12,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 3.45 + 2.8\n• คำนวณ 10.000 - 4.375\n• คำนวณ 12.5 + 0.75 + 3.125\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ตั้งตัวเลขชิดขวาแทนการจัดจุดทศนิยมให้ตรงกัน และลืมหน่วยบาท–สตางค์"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 12: การบวก ลบทศนิยม และโจทย์เกี่ยวกับเงิน/การซื้อขาย” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การบวกและลบทศนิยมต้องจัดจุดทศนิยมให้ตรงกันก่อน\n• หากจำนวนตำแหน่งทศนิยมไม่เท่ากัน เติมศูนย์ได้ เช่น 2.5 = 2.50\n• โจทย์เงินควรตอบเป็นบาทและสตางค์ หรือเขียนเป็นทศนิยม 2 ตำแหน่ง\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 12.45 + 3.7 = 12.45 + 3.70 = 16.15\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ลากเส้นแนวตั้งผ่านจุดทศนิยมและใช้ตารางบาท–สตางค์"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 20.00 - 8.75 = 11.25\n• ซื้อของ 15.50 และ 22.25 บาท จ่าย 50 บาท ได้เงินทอน 12.25 บาท\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: ร้านค้าทศนิยม","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแจกป้ายราคาสินค้า เช่น 12.50, 8.75, 25.25 บาท\n• เด็กจับคู่เป็นผู้ขายและผู้ซื้อ คำนวณยอดรวม เงินทอน หรือส่วนลด\n• ครูเน้นการตั้งจุดทศนิยมตรงกันมากกว่าการคิดเร็ว\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 10.000 - 4.375\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• แต่งโจทย์ทศนิยม 2 ขั้นตอนเกี่ยวกับการซื้อของ\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 3.45 + 2.8\n• คำนวณ 10.000 - 4.375\n• คำนวณ 12.5 + 0.75 + 3.125\nช่วง B แสดงวิธี ข้อ 4–5:\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• น้ำหนักของกล่อง 2.35 กก. ใส่ของเพิ่ม 1.875 กก. รวมหนักเท่าใด\n• แต่งโจทย์ทศนิยม 2 ขั้นตอนเกี่ยวกับการซื้อของ\n• อธิบายข้อผิดพลาดถ้าตั้งจุดทศนิยมไม่ตรงกัน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 3.45 + 2.8\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• แต่งโจทย์ทศนิยม 2 ขั้นตอนเกี่ยวกับการซื้อของ\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"การบวกและลบทศนิยมต้องจัดจุดทศนิยมให้ตรงกันก่อน"},{"type":"p","style":"List Bullet","text":"หากจำนวนตำแหน่งทศนิยมไม่เท่ากัน เติมศูนย์ได้ เช่น 2.5 = 2.50"},{"type":"p","style":"List Bullet","text":"โจทย์เงินควรตอบเป็นบาทและสตางค์ หรือเขียนเป็นทศนิยม 2 ตำแหน่ง"},{"type":"p","style":"List Bullet","text":"12.45 + 3.7 = 12.45 + 3.70 = 16.15"},{"type":"p","style":"List Bullet","text":"20.00 - 8.75 = 11.25"},{"type":"p","style":"List Bullet","text":"ซื้อของ 15.50 และ 22.25 บาท จ่าย 50 บาท ได้เงินทอน 12.25 บาท"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"คำนวณ 3.45 + 2.8"},{"type":"p","style":"List Number","text":"คำนวณ 10.000 - 4.375"},{"type":"p","style":"List Number","text":"คำนวณ 12.5 + 0.75 + 3.125"},{"type":"p","style":"List Number","text":"ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด"},{"type":"p","style":"List Number","text":"จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: ตั้งตัวเลขชิดขวาแทนการจัดจุดทศนิยมให้ตรงกัน และลืมหน่วยบาท–สตางค์\n• วิธีช่วยเมื่อเด็กติด: ลากเส้นแนวตั้งผ่านจุดทศนิยมและใช้ตารางบาท–สตางค์"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 12 แผนการสอนที่ 12: การบวก ลบทศนิยม และโจทย์เกี่ยวกับเงิน/การซื้อขาย ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• คำนวณ 3.45 + 2.8\n• คำนวณ 10.000 - 4.375\n• คำนวณ 12.5 + 0.75 + 3.125\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: ตั้งตัวเลขชิดขวาแทนการจัดจุดทศนิยมให้ตรงกัน และลืมหน่วยบาท–สตางค์ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 12: การบวก ลบทศนิยม และโจทย์เกี่ยวกับเงิน/การซื้อขาย” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• การบวกและลบทศนิยมต้องจัดจุดทศนิยมให้ตรงกันก่อน\n• หากจำนวนตำแหน่งทศนิยมไม่เท่ากัน เติมศูนย์ได้ เช่น 2.5 = 2.50\n• โจทย์เงินควรตอบเป็นบาทและสตางค์ หรือเขียนเป็นทศนิยม 2 ตำแหน่ง\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• 12.45 + 3.7 = 12.45 + 3.70 = 16.15\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ลากเส้นแนวตั้งผ่านจุดทศนิยมและใช้ตารางบาท–สตางค์ 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• 20.00 - 8.75 = 11.25\n• ซื้อของ 15.50 และ 22.25 บาท จ่าย 50 บาท ได้เงินทอน 12.25 บาท\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: ร้านค้าทศนิยม เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• ครูแจกป้ายราคาสินค้า เช่น 12.50, 8.75, 25.25 บาท\n• เด็กจับคู่เป็นผู้ขายและผู้ซื้อ คำนวณยอดรวม เงินทอน หรือส่วนลด\n• ครูเน้นการตั้งจุดทศนิยมตรงกันมากกว่าการคิดเร็ว\nบัตรโจทย์พร้อมใช้ในเกม:\n• คำนวณ 10.000 - 4.375\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• แต่งโจทย์ทศนิยม 2 ขั้นตอนเกี่ยวกับการซื้อของ\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• คำนวณ 3.45 + 2.8\n• คำนวณ 10.000 - 4.375\n• คำนวณ 12.5 + 0.75 + 3.125\nช่วง B แสดงวิธี ข้อ 4–5:\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• น้ำหนักของกล่อง 2.35 กก. ใส่ของเพิ่ม 1.875 กก. รวมหนักเท่าใด\n• แต่งโจทย์ทศนิยม 2 ขั้นตอนเกี่ยวกับการซื้อของ\n• อธิบายข้อผิดพลาดถ้าตั้งจุดทศนิยมไม่ตรงกัน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• คำนวณ 3.45 + 2.8\n• ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด\n• แต่งโจทย์ทศนิยม 2 ขั้นตอนเกี่ยวกับการซื้อของ\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน การบวกและลบทศนิยมต้องจัดจุดทศนิยมให้ตรงกันก่อน หากจำนวนตำแหน่งทศนิยมไม่เท่ากัน เติมศูนย์ได้ เช่น 2.5 = 2.50 โจทย์เงินควรตอบเป็นบาทและสตางค์ หรือเขียนเป็นทศนิยม 2 ตำแหน่ง 12.45 + 3.7 = 12.45 + 3.70 = 16.15 20.00 - 8.75 = 11.25 ซื้อของ 15.50 และ 22.25 บาท จ่าย 50 บาท ได้เงินทอน 12.25 บาท ชุดบัตรเกมพร้อมใช้ คำนวณ 3.45 + 2.8 คำนวณ 10.000 - 4.375 คำนวณ 12.5 + 0.75 + 3.125 ซื้อดินสอ 12.50 บาท ยางลบ 8.75 บาท รวมเท่าใด จ่ายเงิน 100 บาท ซื้อของ 64.25 บาท ได้เงินทอนเท่าใด คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: ตั้งตัวเลขชิดขวาแทนการจัดจุดทศนิยมให้ตรงกัน แ
