ียนยอดรวมและเงินทอน • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-13-เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา-66","title":"แผนการสอนที่ 13: เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา","level":1,"parent":"","lessonNo":13,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 2.1 ป.4/1 แสดงวิธีหาคำตอบของโจทย์ปัญหาเกี่ยวกับเวลา"],["สาระสำคัญ","อ่านเวลา แปลงหน่วยเวลา และหาช่วงเวลาเริ่ม-สิ้นสุดอย่างเป็นระบบ"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 13: เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 2.1 ป.4/1 แสดงวิธีหาคำตอบของโจทย์ปัญหาเกี่ยวกับเวลา สาระสำคัญ อ่านเวลา แปลงหน่วยเวลา และหาช่วงเวลาเริ่ม-สิ้นสุดอย่างเป็นระบบ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-13-67","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 13","level":2,"parent":"แผนการสอนที่ 13: เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา","lessonNo":13,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• แปลง 3 ชั่วโมง 20 นาที เป็นกี่นาที\n• แปลง 185 นาที เป็นกี่ชั่วโมงกี่นาที\n• เริ่มทำการบ้าน 17:30 เสร็จ 18:10 ใช้เวลากี่นาที\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: คิดเวลาเป็นฐานสิบ แทนที่จะใช้ 60 นาทีต่อ 1 ชั่วโมง หรือบวก–ลบก่อน/หลังกลับทิศ"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 13: เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ต้องถึงโรงเรียน 07:50 ใช้เวลาเดินทาง 25 นาที ควรออกจากบ้านไม่เกินเวลาใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• 1 ชั่วโมง = 60 นาที และ 1 วัน = 24 ชั่วโมง\n• การหาช่วงเวลาทำได้โดยนับจากเวลาเริ่มไปถึงเวลาสิ้นสุด แยกเป็นชั่วโมงและนาที\n• โจทย์เวลาอาจต้องระวังคำว่า ก่อน หลัง ใช้เวลา ถึงเวลา และล่าช้า\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• เริ่มเรียน 09:15 จบ 10:00 ใช้เวลา 45 นาที\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้เส้นเวลาและเดินไปถึงชั่วโมงเต็มก่อน"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• ออกจากบ้าน 07:40 ใช้เวลาเดินทาง 35 นาที ถึง 08:15\n• ภาพยนตร์เริ่ม 18:30 ยาว 2 ชั่วโมง 15 นาที จบ 20:45\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ต้องถึงโรงเรียน 07:50 ใช้เวลาเดินทาง 25 นาที ควรออกจากบ้านไม่เกินเวลาใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: รถไฟตรงเวลา","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับตารางเวลารถไฟจำลอง มีเวลาออกและเวลาเดินทาง\n• ต้องคำนวณเวลาถึง หรือเวลาที่ควรออกจากบ้าน\n• มีรอบพิเศษที่ข้ามชั่วโมง เช่น 08:45 + 1 ชม. 30 นาที\nบัตรโจทย์พร้อมใช้ในเกม:\n• แปลง 185 นาที เป็นกี่ชั่วโมงกี่นาที\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ถ้านาฬิกาช้าไป 10 นาที เด็กเห็นเวลา 06:50 เวลาจริงคือกี่โมง\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• แปลง 3 ชั่วโมง 20 นาที เป็นกี่นาที\n• แปลง 185 นาที เป็นกี่ชั่วโมงกี่นาที\n• เริ่มทำการบ้าน 17:30 เสร็จ 18:10 ใช้เวลากี่นาที\nช่วง B แสดงวิธี ข้อ 4–5:\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ต้องถึงโรงเรียน 07:50 ใช้เวลาเดินทาง 25 นาที ควรออกจากบ้านไม่เกินเวลาใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• กิจกรรมเริ่ม 13:20 จบ 15:05 ใช้เวลานานเท่าใด\n• ถ้านาฬิกาช้าไป 10 นาที เด็กเห็นเวลา 06:50 เวลาจริงคือกี่โมง\n• แต่งโจทย์เวลา 1 ข้อจากชีวิตประจำวัน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• แปลง 3 ชั่วโมง 20 นาที เป็นกี่นาที\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ถ้านาฬิกาช้าไป 10 นาที เด็กเห็นเวลา 06:50 เวลาจริงคือกี่โมง\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"1 ชั่วโมง = 60 นาที และ 1 วัน = 24 ชั่วโมง"},{"type":"p","style":"List Bullet","text":"การหาช่วงเวลาทำได้โดยนับจากเวลาเริ่มไปถึงเวลาสิ้นสุด แยกเป็นชั่วโมงและนาที"},{"type":"p","style":"List Bullet","text":"โจทย์เวลาอาจต้องระวังคำว่า ก่อน หลัง ใช้เวลา ถึงเวลา และล่าช้า"},{"type":"p","style":"List Bullet","text":"เริ่มเรียน 09:15 จบ 10:00 ใช้เวลา 45 นาที"},{"type":"p","style":"List Bullet","text":"ออกจากบ้าน 07:40 ใช้เวลาเดินทาง 35 นาที ถึง 08:15"},{"type":"p","style":"List Bullet","text":"ภาพยนตร์เริ่ม 18:30 ยาว 2 ชั่วโมง 15 นาที จบ 20:45"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"แปลง 3 ชั่วโมง 20 นาที เป็นกี่นาที"},{"type":"p","style":"List Number","text":"แปลง 185 นาที เป็นกี่ชั่วโมงกี่นาที"},{"type":"p","style":"List Number","text":"เริ่มทำการบ้าน 17:30 เสร็จ 18:10 ใช้เวลากี่นาที"},{"type":"p","style":"List Number","text":"รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด"},{"type":"p","style":"List Number","text":"ต้องถึงโรงเรียน 07:50 ใช้เวลาเดินทาง 25 นาที ควรออกจากบ้านไม่เกินเวลาใด"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: คิดเวลาเป็นฐานสิบ แทนที่จะใช้ 60 นาทีต่อ 1 ชั่วโมง หรือบวก–ลบก่อน/หลังกลับทิศ\n• วิธีช่วยเมื่อเด็กติด: ใช้เส้นเวลาและเดินไปถึงชั่วโมงเต็มก่อน"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 13 แผนการสอนที่ 13: เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• แปลง 3 ชั่วโมง 20 นาที เป็นกี่นาที\n• แปลง 185 นาที เป็นกี่ชั่วโมงกี่นาที\n• เริ่มทำการบ้าน 17:30 เสร็จ 18:10 ใช้เวลากี่นาที\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: คิดเวลาเป็นฐานสิบ แทนที่จะใช้ 60 นาทีต่อ 1 ชั่วโมง หรือบวก–ลบก่อน/หลังกลับทิศ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 13: เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ต้องถึงโรงเรียน 07:50 ใช้เวลาเดินทาง 25 นาที ควรออกจากบ้านไม่เกินเวลาใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• 1 ชั่วโมง = 60 นาที และ 1 วัน = 24 ชั่วโมง\n• การหาช่วงเวลาทำได้โดยนับจากเวลาเริ่มไปถึงเวลาสิ้นสุด แยกเป็นชั่วโมงและนาที\n• โจทย์เวลาอาจต้องระวังคำว่า ก่อน หลัง ใช้เวลา ถึงเวลา และล่าช้า\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• เริ่มเรียน 09:15 จบ 10:00 ใช้เวลา 45 นาที\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้เส้นเวลาและเดินไปถึงชั่วโมงเต็มก่อน 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• ออกจากบ้าน 07:40 ใช้เวลาเดินทาง 35 นาที ถึง 08:15\n• ภาพยนตร์เริ่ม 18:30 ยาว 2 ชั่วโมง 15 นาที จบ 20:45\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ต้องถึงโรงเรียน 07:50 ใช้เวลาเดินทาง 25 นาที ควรออกจากบ้านไม่เกินเวลาใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: รถไฟตรงเวลา เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับตารางเวลารถไฟจำลอง มีเวลาออกและเวลาเดินทาง\n• ต้องคำนวณเวลาถึง หรือเวลาที่ควรออกจากบ้าน\n• มีรอบพิเศษที่ข้ามชั่วโมง เช่น 08:45 + 1 ชม. 30 นาที\nบัตรโจทย์พร้อมใช้ในเกม:\n• แปลง 185 นาที เป็นกี่ชั่วโมงกี่นาที\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ถ้านาฬิกาช้าไป 10 นาที เด็กเห็นเวลา 06:50 เวลาจริงคือกี่โมง\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• แปลง 3 ชั่วโมง 20 นาที เป็นกี่นาที\n• แปลง 185 นาที เป็นกี่ชั่วโมงกี่นาที\n• เริ่มทำการบ้าน 17:30 เสร็จ 18:10 ใช้เวลากี่นาที\nช่วง B แสดงวิธี ข้อ 4–5:\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ต้องถึงโรงเรียน 07:50 ใช้เวลาเดินทาง 25 นาที ควรออกจากบ้านไม่เกินเวลาใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• กิจกรรมเริ่ม 13:20 จบ 15:05 ใช้เวลานานเท่าใด\n• ถ้านาฬิกาช้าไป 10 นาที เด็กเห็นเวลา 06:50 เวลาจริงคือกี่โมง\n• แต่งโจทย์เวลา 1 ข้อจากชีวิตประจำวัน\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• แปลง 3 ชั่วโมง 20 นาที เป็นกี่นาที\n• รถออก 08:45 ใช้เวลาเดินทาง 1 ชั่วโมง 35 นาที ถึงเวลาใด\n• ถ้านาฬิกาช้าไป 10 นาที เด็กเห็นเวลา 06:50 เวลาจริงคือกี่โมง\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน 1 ชั่วโมง = 60 นาที และ 1 วัน = 24 ชั่วโมง การหาช่วงเวลาทำได้โดยนับจากเวลาเริ่มไปถึงเวลาสิ้นสุด แยกเป็นชั่วโมงและนาที โจทย์เวลาอาจต้องระวังคำว่า ก่อน หลัง ใช้เวลา ถึงเวลา และล่าช้า เริ่มเรียน 09:15 จบ 10:00 ใช้เวลา 45 นาที ออกจากบ้าน 07:40 ใช้เวลาเดินท รได้ ทำได้เมื่อมีตัวอย่าง ยังตอบแบบเดา ทักษะคำนวณ ถูกอย่างน้อย 70% ถูก 50-69% ต่ำกว่า 50% การสื่อสารวิธีคิด เขียน/พูดเป็นขั้นตอน อธิบายได้บางส่วน ยังอธิบายไม่ได้ ความตั้งใจ ร่วมกิจกรรมต่อเนื่อง ร่วมบ้างเป็นช่วง ต้องกระตุ้นบ่อย ข้อความ Feedback ผู้ปกครองประจำบท แม่แบบปรับใช้ได้ทันที • วันนี้น้องเรียนเรื่อง “เวลาและการแก้โจทย์ปัญหาเกี่ยวกับเวลา” • น้องทำได้ดีในเรื่อง: ____________________ • จุดที่ควรฝึกเพิ่มคือ: ____________________ • การบ้าน/ฝึกที่บ้าน: ให้เด็กบันทึกเวลา 1 วัน เช่น ตื่นนอน ออกบ้าน เรียน เล่น และคำนวณช่วงเวลา 3 ช่วง • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-14-มุม-การวัดมุม-และรูปเรขาคณิตพื้นฐาน-71","title":"แผนการสอนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน","level":1,"parent":"","lessonNo":14,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 2.1 ป.4/2 วัดและสร้างมุมโดยใช้โพรแทรกเตอร์ และ ค 2.2 ป.4/1 จำแนกชนิดของมุม บอกชื่อมุม ส่วนประกอบ และเขียนสัญลักษณ์แสดงมุม"],["สาระสำคัญ","รู้ส่วนประกอบของมุม จำแนกมุมแหลม มุมฉาก มุมป้าน และใช้โพรแทรกเตอร์อย่างถูกต้อง"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 2.1 ป.4/2 วัดและสร้างมุมโดยใช้โพรแทรกเตอร์ และ ค 2.2 ป.4/1 จำแนกชนิดของมุม บอกชื่อมุม ส่วนประกอบ และเขียนสัญลักษณ์แสดงมุม สาระสำคัญ รู้ส่วนประกอบของมุม จำแนกมุมแหลม มุมฉาก มุมป้าน และใช้โพรแทรกเตอร์อย่างถูกต้อง จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-14-72","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 14","level":2,"parent":"แผนการสอนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน","lessonNo":14,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• บอกชนิดของมุม 45°\n• บอกชนิดของมุม 90°\n• บอกชนิดของมุม 135°\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: วางจุดกึ่งกลางโพรแทรกเตอร์ไม่ตรงจุดยอดหรืออ่านสเกลผิดด้าน"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• บอกชนิดของมุม 45°\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• มุมเกิดจากรังสี 2 เส้นที่มีจุดปลายร่วมกัน จุดร่วมเรียกว่าจุดยอดมุม\n• มุมแหลมน้อยกว่า 90° มุมฉากเท่ากับ 90° มุมป้านมากกว่า 90° แต่น้อยกว่า 180°\n• การวัดมุมต้องวางจุดกึ่งกลางโพรแทรกเตอร์ตรงจุดยอดมุม และวางเส้นฐานตรงแขนมุมด้านหนึ่ง\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• ∠ABC มี B เป็นจุดยอดมุม\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วงศูนย์เริ่มอ่านบนโพรแทรกเตอร์และตรวจชนิดมุมกับองศา"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• มุม 35° เป็นมุมแหลม มุม 90° เป็นมุมฉาก มุม 120° เป็นมุมป้าน\n• สร้างมุม 60°: ลากเส้นฐาน วางโพรแทรกเตอร์ ทำจุดที่ 60° แล้วลากแขนมุม\n• วาดมุม 60° และเขียนชื่อมุม\n• วาดมุม 110° และเขียนชนิดของมุม\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: ล่ามุมในห้องเรียน","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กเดินหามุมจากสิ่งของในห้อง เช่น ขอบโต๊ะ หนังสือ ประตู นาฬิกา\n• บันทึกว่าเป็นมุมแหลม ฉาก หรือป้าน พร้อมวาดรูปคร่าว ๆ\n• รอบวัดจริง ใช้โพรแทรกเตอร์วัดมุมจากบัตรภาพ\nบัตรโจทย์พร้อมใช้ในเกม:\n• บอกชนิดของมุม 90°\n• วาดมุม 60° และเขียนชื่อมุม\n• หา 3 สิ่งในห้องที่มีมุมฉาก\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• บอกชนิดของมุม 45°\n• บอกชนิดของมุม 90°\n• บอกชนิดของมุม 135°\nช่วง B แสดงวิธี ข้อ 4–5:\n• วาดมุม 60° และเขียนชื่อมุม\n• วาดมุม 110° และเขียนชนิดของมุม\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• อธิบายวิธีวางโพรแทรกเตอร์ 3 ขั้นตอน\n• หา 3 สิ่งในห้องที่มีมุมฉาก\n• เขียนสัญลักษณ์มุมที่มีจุดยอดเป็น B จากจุด A-B-C\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• บอกชนิดของมุม 45°\n• วาดมุม 60° และเขียนชื่อมุม\n• หา 3 สิ่งในห้องที่มีมุมฉาก\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"มุมเกิดจากรังสี 2 เส้นที่มีจุดปลายร่วมกัน จุดร่วมเรียกว่าจุดยอดมุม"},{"type":"p","style":"List Bullet","text":"มุมแหลมน้อยกว่า 90° มุมฉากเท่ากับ 90° มุมป้านมากกว่า 90° แต่น้อยกว่า 180°"},{"type":"p","style":"List Bullet","text":"การวัดมุมต้องวางจุดกึ่งกลางโพรแทรกเตอร์ตรงจุดยอดมุม และวางเส้นฐานตรงแขนมุมด้านหนึ่ง"},{"type":"p","style":"List Bullet","text":"∠ABC มี B เป็นจุดยอดมุม"},{"type":"p","style":"List Bullet","text":"มุม 35° เป็นมุมแหลม มุม 90° เป็นมุมฉาก มุม 120° เป็นมุมป้าน"},{"type":"p","style":"List Bullet","text":"สร้างมุม 60°: ลากเส้นฐาน วางโพรแทรกเตอร์ ทำจุดที่ 60° แล้วลากแขนมุม"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"บอกชนิดของมุม 45°"},{"type":"p","style":"List Number","text":"บอกชนิดของมุม 90°"},{"type":"p","style":"List Number","text":"บอกชนิดของมุม 135°"},{"type":"p","style":"List Number","text":"วาดมุม 60° และเขียนชื่อมุม"},{"type":"p","style":"List Number","text":"วาดมุม 110° และเขียนชนิดของมุม"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: วางจุดกึ่งกลางโพรแทรกเตอร์ไม่ตรงจุดยอดหรืออ่านสเกลผิดด้าน\n• วิธีช่วยเมื่อเด็กติด: วงศูนย์เริ่มอ่านบนโพรแทรกเตอร์และตรวจชนิดมุมกับองศา"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 14 แผนการสอนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• บอกชนิดของมุม 45°\n• บอกชนิดของมุม 90°\n• บอกชนิดของมุม 135°\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: วางจุดกึ่งกลางโพรแทรกเตอร์ไม่ตรงจุดยอดหรืออ่านสเกลผิดด้าน 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• บอกชนิดของมุม 45°\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• มุมเกิดจากรังสี 2 เส้นที่มีจุดปลายร่วมกัน จุดร่วมเรียกว่าจุดยอดมุม\n• มุมแหลมน้อยกว่า 90° มุมฉากเท่ากับ 90° มุมป้านมากกว่า 90° แต่น้อยกว่า 180°\n• การวัดมุมต้องวางจุดกึ่งกลางโพรแทรกเตอร์ตรงจุดยอดมุม และวางเส้นฐานตรงแขนมุมด้านหนึ่ง\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• ∠ABC มี B เป็นจุดยอดมุม\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: วงศูนย์เริ่มอ่านบนโพรแทรกเตอร์และตรวจชนิดมุมกับองศา 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• มุม 35° เป็นมุมแหลม มุม 90° เป็นมุมฉาก มุม 120° เป็นมุมป้าน\n• สร้างมุม 60°: ลากเส้นฐาน วางโพรแทรกเตอร์ ทำจุดที่ 60° แล้วลากแขนมุม\n• วาดมุม 60° และเขียนชื่อมุม\n• วาดมุม 110° และเขียนชนิดของมุม\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: ล่ามุมในห้องเรียน เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กเดินหามุมจากสิ่งของในห้อง เช่น ขอบโต๊ะ หนังสือ ประตู นาฬิกา\n• บันทึกว่าเป็นมุมแหลม ฉาก หรือป้าน พร้อมวาดรูปคร่าว ๆ\n• รอบวัดจริง ใช้โพรแทรกเตอร์วัดมุมจากบัตรภาพ\nบัตรโจทย์พร้อมใช้ในเกม:\n• บอกชนิดของมุม 90°\n• วาดมุม 60° และเขียนชื่อมุม\n• หา 3 สิ่งในห้องที่มีมุมฉาก\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• บอกชนิดของมุม 45°\n• บอกชนิดของมุม 90°\n• บอกชนิดของมุม 135°\nช่วง B แสดงวิธี ข้อ 4–5:\n• วาดมุม 60° และเขียนชื่อมุม\n• วาดมุม 110° และเขียนชนิดของมุม\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• อธิบายวิธีวางโพรแทรกเตอร์ 3 ขั้นตอน\n• หา 3 สิ่งในห้องที่มีมุมฉาก\n• เขียนสัญลักษณ์มุมที่มีจุดยอดเป็น B จากจุด A-B-C\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• บอกชนิดของมุม 45°\n• วาดมุม 60° และเขียนชื่อมุม\n• หา 3 สิ่งในห้องที่มีมุมฉาก\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน มุมเกิดจากรังสี 2 เส้นที่มีจุดปลายร่วมกัน จุดร่วมเรียกว่าจุดยอดมุม มุมแหลมน้อยกว่า 90° มุมฉากเท่ากับ 90° มุมป้านมากกว่า 90° แต่น้อยกว่า 180° การวัดมุมต้องวางจุดกึ่งกลางโพรแทรกเตอร์ตรงจุดยอดมุม และวางเส้นฐานตรงแขนมุมด้านหนึ่ง ∠ABC มี B เป็นจุดยอดมุม มุม 35° เป็นมุมแหลม มุม 90° เป็นมุมฉาก มุม 120° เป็นมุมป้าน สร้างมุม 60°: ลากเส้นฐาน วางโพรแทรกเตอร์ ทำจุดที่ 60° แล้วลากแขนมุม ชุดบัตรเกมพร้อมใช้ บอกชนิดของมุม 45° บอกชนิดของมุม 90° บอกชนิดของมุม 135° วาดมุม 60° และเขียนชื่อมุม วาดมุม 110° และเขียนชนิดของมุม คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: วางจุดกึ่งกลางโพรแทรกเตอร์ไม่ตรงจุดยอดหรืออ่านสเกลผิดด้าน\n• วิธีช่วยเมื่อเด็กติด: วงศูนย์เริ่มอ่านบนโพรแทรกเตอร์และตรวจชนิดมุมกับองศา"},{"id":"ใบความรู้-แผนที่-14-มุม-การวัดมุม-และรูปเรขาคณิตพื้นฐาน-73","title":"ใบความรู้ แผนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน","level":2,"parent":"แผนการสอนที่ 14: มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน","lessonNo":14,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใช้ส่วนนี้เป็นแบบเรียนสั้นสำหรับครูสอนหรือให้เด็กอ่านทบทวนก่อนทำใบงาน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"มุมเกิดจากรังสี 2 เส้นที่มีจุดปลายร่วมกัน จุดร่วมเรียกว่าจุดยอดมุม"},{"type":"p","style":"List Bullet","text":"มุมแหลมน้อยกว่า 90° มุมฉากเท่ากับ 90° มุมป้านมากกว่า 90° แต่น้อยกว่า 180°"},{"type":"p","style":"List Bullet","text":"การวัดมุมต้องวางจุดกึ่งกลางโพรแทรกเตอร์ตรงจุดยอดมุม และวางเส้นฐานตรงแขนมุมด้านหนึ่ง"},{"type":"p","style":"Normal","text":"ตัวอย่างสอนบนกระดาน"},{"type":"p","style":"List Number","text":"∠ABC มี B เป็นจุดยอดมุม"},{"type":"p","style":"List Number","text":"มุม 35° เป็นมุมแหลม มุม 90° เป็นมุมฉาก มุม 120° เป็นมุมป้าน"},{"type":"p","style":"List Number","text":"สร้างมุม 60°: ลากเส้นฐาน วางโพรแทรกเตอร์ ทำจุดที่ 60° แล้วลากแขนมุม"},{"type":"p","style":"Normal","text":"แบบฝึกนำก่อนใบงาน"},{"type":"p","style":"Normal","text":"ลองทำ 1: ........................................................................................................"},{"type":"p","style":"Normal","text":"วิธีคิด: ................................................................................................................"},{"type":"p","style":"Normal","text":"ลองทำ 2: ........................................................................................................"},{"type":"p","style":"Normal","text":"วิธีคิด: ................................................. al","text":"4. ครูตรวจภาพ ต้องใกล้ 60°"},{"type":"p","style":"Normal","text":"5. มุมป้าน ใกล้ 110°"},{"type":"p","style":"Normal","text":"6. วางจุดศูนย์กลางที่จุดยอด วางเส้นฐานทับแขนมุม อ่านสเกลจากศูนย์ที่ถูกด้าน"},{"type":"p","style":"Normal","text":"7. ตัวอย่าง: มุมโต๊ะ กระดาษ หนังสือ หน้าต่าง"},{"type":"p","style":"Normal","text":"8. ∠ABC"},{"type":"p","style":"Normal","text":"เกณฑ์การประเมินรายชั่วโมง"},{"type":"table","rows":[["ด้าน","ผ่านดี","กำลังพัฒนา","ต้องเสริม"],["ความเข้าใจ","อธิบายหลักการได้","ทำได้เมื่อมีตัวอย่าง","ยังตอบแบบเดา"],["ทักษะคำนวณ","ถูกอย่างน้อย 70%","ถูก 50-69%","ต่ำกว่า 50%"],["การสื่อสารวิธีคิด","เขียน/พูดเป็นขั้นตอน","อธิบายได้บางส่วน","ยังอธิบายไม่ได้"],["ความตั้งใจ","ร่วมกิจกรรมต่อเนื่อง","ร่วมบ้างเป็นช่วง","ต้องกระตุ้นบ่อย"]]},{"type":"p","style":"Normal","text":"ข้อความ Feedback ผู้ปกครองประจำบท"},{"type":"table","rows":[["แม่แบบปรับใช้ได้ทันที\n• วันนี้น้องเรียนเรื่อง “มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน”\n• น้องทำได้ดีในเรื่อง: ____________________\n• จุดที่ควรฝึกเพิ่มคือ: ____________________\n• การบ้าน/ฝึกที่บ้าน: ให้เด็กถ่ายรูปหรือวาดสิ่งของที่มีมุมแหลม ฉาก ป้าน อย่างละ 1 ภาพ\n• ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"]]}],"searchText":"เฉลย ใบประเมิน และ Feedback แผนที่ 14 เฉลยใบงาน 1. มุมแหลม 2. มุมฉาก 3. มุมป้าน 4. ครูตรวจภาพ ต้องใกล้ 60° 5. มุมป้าน ใกล้ 110° 6. วางจุดศูนย์กลางที่จุดยอด วางเส้นฐานทับแขนมุม อ่านสเกลจากศูนย์ที่ถูกด้าน 7. ตัวอย่าง: มุมโต๊ะ กระดาษ หนังสือ หน้าต่าง 8. ∠ABC เกณฑ์การประเมินรายชั่วโมง ด้าน ผ่านดี กำลังพัฒนา ต้องเสริม ความเข้าใจ อธิบายหลักการได้ ทำได้เมื่อมีตัวอย่าง ยังตอบแบบเดา ทักษะคำนวณ ถูกอย่างน้อย 70% ถูก 50-69% ต่ำกว่า 50% การสื่อสารวิธีคิด เขียน/พูดเป็นขั้นตอน อธิบายได้บางส่วน ยังอธิบายไม่ได้ ความตั้งใจ ร่วมกิจกรรมต่อเนื่อง ร่วมบ้างเป็นช่วง ต้องกระตุ้นบ่อย ข้อความ Feedback ผู้ปกครองประจำบท แม่แบบปรับใช้ได้ทันที • วันนี้น้องเรียนเรื่อง “มุม การวัดมุม และรูปเรขาคณิตพื้นฐาน” • น้องทำได้ดีในเรื่อง: ____________________ • จุดที่ควรฝึกเพิ่มคือ: ____________________ • การบ้าน/ฝึกที่บ้าน: ให้เด็กถ่ายรูปหรือวาดสิ่งของที่มีมุมแหลม ฉาก ป้าน อย่างละ 1 ภาพ • ภาพรวมวันนี้: □ ดีมาก □ ดี □ ต้องเสริมเพิ่มเติม"},{"id":"แผนการสอนที่-15-รูปสี่เหลี่ยมมุมฉาก-เส้นรอบรูป-และพื้นที่-76","title":"แผนการสอนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่","level":1,"parent":"","lessonNo":15,"kind":"lesson-overview","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ระยะเวลา: 1 ชั่วโมง  |  รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว  |  เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 2.1 ป.4/3 แสดงวิธีหาคำตอบของโจทย์ปัญหาเกี่ยวกับความยาวรอบรูปและพื้นที่ของรูปสี่เหลี่ยมมุมฉาก และ ค 2.2 ป.4/2 สร้างรูปสี่เหลี่ยมมุมฉากเมื่อกำหนดความยาวด้าน"],["สาระสำคัญ","แยกความหมายเส้นรอบรูปกับพื้นที่ ใช้สูตรอย่างเข้าใจ และแก้โจทย์สถานการณ์"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่ ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 2.1 ป.4/3 แสดงวิธีหาคำตอบของโจทย์ปัญหาเกี่ยวกับความยาวรอบรูปและพื้นที่ของรูปสี่เหลี่ยมมุมฉาก และ ค 2.2 ป.4/2 สร้างรูปสี่เหลี่ยมมุมฉากเมื่อกำหนดความยาวด้าน สาระสำคัญ แยกความหมายเส้นรอบรูปกับพื้นที่ ใช้สูตรอย่างเข้าใจ และแก้โจทย์สถานการณ์ จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-15-77","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 15","level":2,"parent":"แผนการสอนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่","lessonNo":15,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม.\n• หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม.\n• จัตุรัสด้านละ 9 เมตร มีพื้นที่เท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: สลับเส้นรอบรูปกับพื้นที่ และใช้หน่วยความยาวแทนตารางหน่วยหรือกลับกัน"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• เส้นรอบรูปคือความยาวรวมรอบขอบรูป หน่วยเป็นหน่วยความยาว เช่น ซม. เมตร\n• พื้นที่คือขนาดบริเวณภายในรูป หน่วยเป็นตารางหน่วย เช่น ตร.ซม. ตร.ม.\n• รูปสี่เหลี่ยมผืนผ้า: พื้นที่ = กว้าง × ยาว และเส้นรอบรูป = 2×(กว้าง+ยาว)\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• รูปกว้าง 5 ซม. ยาว 8 ซม. พื้นที่ = 40 ตร.ซม. เส้นรอบรูป = 26 ซม.\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้เชือกแทนรอบขอบและกระดาษตารางแทนพื้นที่"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• จัตุรัสด้านละ 6 เมตร พื้นที่ = 36 ตร.ม. เส้นรอบรูป = 24 เมตร\n• สร้างสี่เหลี่ยมผืนผ้า 4×7 ซม. โดยวัดด้านด้วยไม้บรรทัดและมุมฉาก\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: นักออกแบบสวน","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับกระดาษตารางและเงื่อนไข เช่น สวนกว้าง 6 ช่อง ยาว 8 ช่อง\n• ต้องหาพื้นที่และเส้นรอบรูป พร้อมออกแบบทางเดินหรือรั้ว\n• รอบท้าทายให้พื้นที่คงที่ แต่หารูปที่เส้นรอบรูปต่างกัน\nบัตรโจทย์พร้อมใช้ในเกม:\n• หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม.\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• รูปสองรูปมีพื้นที่เท่ากัน จำเป็นต้องมีเส้นรอบรูปเท่ากันหรือไม่ อธิบาย\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม.\n• หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม.\n• จัตุรัสด้านละ 9 เมตร มีพื้นที่เท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• วาดรูปสี่เหลี่ยมผืนผ้า 4 ซม. × 6 ซม.\n• รูปสองรูปมีพื้นที่เท่ากัน จำเป็นต้องมีเส้นรอบรูปเท่ากันหรือไม่ อธิบาย\n• โจทย์ท้าทาย: พื้นที่ 24 ตร.หน่วย สร้างรูปสี่เหลี่ยมผืนผ้าได้กี่แบบที่ใช้จำนวนเต็ม\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม.\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• รูปสองรูปมีพื้นที่เท่ากัน จำเป็นต้องมีเส้นรอบรูปเท่ากันหรือไม่ อธิบาย\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"เส้นรอบรูปคือความยาวรวมรอบขอบรูป หน่วยเป็นหน่วยความยาว เช่น ซม. เมตร"},{"type":"p","style":"List Bullet","text":"พื้นที่คือขนาดบริเวณภายในรูป หน่วยเป็นตารางหน่วย เช่น ตร.ซม. ตร.ม."},{"type":"p","style":"List Bullet","text":"รูปสี่เหลี่ยมผืนผ้า: พื้นที่ = กว้าง × ยาว และเส้นรอบรูป = 2×(กว้าง+ยาว)"},{"type":"p","style":"List Bullet","text":"รูปกว้าง 5 ซม. ยาว 8 ซม. พื้นที่ = 40 ตร.ซม. เส้นรอบรูป = 26 ซม."},{"type":"p","style":"List Bullet","text":"จัตุรัสด้านละ 6 เมตร พื้นที่ = 36 ตร.ม. เส้นรอบรูป = 24 เมตร"},{"type":"p","style":"List Bullet","text":"สร้างสี่เหลี่ยมผืนผ้า 4×7 ซม. โดยวัดด้านด้วยไม้บรรทัดและมุมฉาก"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม."},{"type":"p","style":"List Number","text":"หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม."},{"type":"p","style":"List Number","text":"จัตุรัสด้านละ 9 เมตร มีพื้นที่เท่าใด"},{"type":"p","style":"List Number","text":"สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร"},{"type":"p","style":"List Number","text":"ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: สลับเส้นรอบรูปกับพื้นที่ และใช้หน่วยความยาวแทนตารางหน่วยหรือกลับกัน\n• วิธีช่วยเมื่อเด็กติด: ใช้เชือกแทนรอบขอบและกระดาษตารางแทนพื้นที่"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 15 แผนการสอนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่ ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม.\n• หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม.\n• จัตุรัสด้านละ 9 เมตร มีพื้นที่เท่าใด\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: สลับเส้นรอบรูปกับพื้นที่ และใช้หน่วยความยาวแทนตารางหน่วยหรือกลับกัน 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• เส้นรอบรูปคือความยาวรวมรอบขอบรูป หน่วยเป็นหน่วยความยาว เช่น ซม. เมตร\n• พื้นที่คือขนาดบริเวณภายในรูป หน่วยเป็นตารางหน่วย เช่น ตร.ซม. ตร.ม.\n• รูปสี่เหลี่ยมผืนผ้า: พื้นที่ = กว้าง × ยาว และเส้นรอบรูป = 2×(กว้าง+ยาว)\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• รูปกว้าง 5 ซม. ยาว 8 ซม. พื้นที่ = 40 ตร.ซม. เส้นรอบรูป = 26 ซม.\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ใช้เชือกแทนรอบขอบและกระดาษตารางแทนพื้นที่ 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• จัตุรัสด้านละ 6 เมตร พื้นที่ = 36 ตร.ม. เส้นรอบรูป = 24 เมตร\n• สร้างสี่เหลี่ยมผืนผ้า 4×7 ซม. โดยวัดด้านด้วยไม้บรรทัดและมุมฉาก\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: นักออกแบบสวน เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• เด็กได้รับกระดาษตารางและเงื่อนไข เช่น สวนกว้าง 6 ช่อง ยาว 8 ช่อง\n• ต้องหาพื้นที่และเส้นรอบรูป พร้อมออกแบบทางเดินหรือรั้ว\n• รอบท้าทายให้พื้นที่คงที่ แต่หารูปที่เส้นรอบรูปต่างกัน\nบัตรโจทย์พร้อมใช้ในเกม:\n• หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม.\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• รูปสองรูปมีพื้นที่เท่ากัน จำเป็นต้องมีเส้นรอบรูปเท่ากันหรือไม่ อธิบาย\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม.\n• หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม.\n• จัตุรัสด้านละ 9 เมตร มีพื้นที่เท่าใด\nช่วง B แสดงวิธี ข้อ 4–5:\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• วาดรูปสี่เหลี่ยมผืนผ้า 4 ซม. × 6 ซม.\n• รูปสองรูปมีพื้นที่เท่ากัน จำเป็นต้องมีเส้นรอบรูปเท่ากันหรือไม่ อธิบาย\n• โจทย์ท้าทาย: พื้นที่ 24 ตร.หน่วย สร้างรูปสี่เหลี่ยมผืนผ้าได้กี่แบบที่ใช้จำนวนเต็ม\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม.\n• สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร\n• รูปสองรูปมีพื้นที่เท่ากัน จำเป็นต้องมีเส้นรอบรูปเท่ากันหรือไม่ อธิบาย\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน เส้นรอบรูปคือความยาวรวมรอบขอบรูป หน่วยเป็นหน่วยความยาว เช่น ซม. เมตร พื้นที่คือขนาดบริเวณภายในรูป หน่วยเป็นตารางหน่วย เช่น ตร.ซม. ตร.ม. รูปสี่เหลี่ยมผืนผ้า: พื้นที่ = กว้าง × ยาว และเส้นรอบรูป = 2×(กว้าง+ยาว) รูปกว้าง 5 ซม. ยาว 8 ซม. พื้นที่ = 40 ตร.ซม. เส้นรอบรูป = 26 ซม. จัตุรัสด้านละ 6 เมตร พื้นที่ = 36 ตร.ม. เส้นรอบรูป = 24 เมตร สร้างสี่เหลี่ยมผืนผ้า 4×7 ซม. โดยวัดด้านด้วยไม้บรรทัดและมุมฉาก ชุดบัตรเกมพร้อมใช้ หาพื้นที่รูปสี่เหลี่ยมผืนผ้ากว้าง 7 ซม. ยาว 12 ซม. หาเส้นรอบรูปของรูปกว้าง 7 ซม. ยาว 12 ซม. จัตุรัสด้านละ 9 เมตร มีพื้นที่เท่าใด สนามยาว 25 ม. กว้าง 18 ม. ต้องทำรั้วรอบสนามยาวกี่เมตร ห้องเรียนกว้าง 6 ม. ยาว 8 ม. มีพื้นที่เท่าใด คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: สลับเส้นรอบรูปกับพื้นที่ และใช้หน่วยความยาวแทนตารางหน่วยหรือกลับกัน\n• วิธีช่วยเมื่อเด็กติด: ใช้เชือกแทนรอบขอบและกระดาษตารางแทนพื้นที่"},{"id":"ใบความรู้-แผนที่-15-รูปสี่เหลี่ยมมุมฉาก-เส้นรอบรูป-และพื้นที่-78","title":"ใบความรู้ แผนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่","level":2,"parent":"แผนการสอนที่ 15: รูปสี่เหลี่ยมมุมฉาก เส้นรอบรูป และพื้นที่","lessonNo":15,"kind":"knowledge","teacherOnly":false,"blocks":[{"type":"p","style":"Normal","text":"ใช้ส่วนนี้เป็นแบบเรียนสั้นสำหรับครูสอนหรือให้เด็กอ่านทบทวนก่อนทำใบงาน"},{"type":"p","style":"Normal","text":"แนวคิดสำคัญ"},{"type":"p","style":"List Bullet","text":"เส้นรอบรูปคือความยาวรวมรอบขอบรูป หน่วยเป็นหน่วยความยาว เช่น ซม. เมตร"},{"type":"p","style":"List Bullet","text":"พื้นที่คือขนาดบริเวณภายในรูป หน่วยเป็นตารางหน่วย เช่น ตร.ซม. ตร.ม."},{"type":"p","style":"List Bullet","text":"รูปสี่เหลี่ยมผืนผ้า: พื้นท xit Ticket"},{"type":"table","rows":[["หัวข้อ","รายละเอียด"],["ตัวชี้วัด","ค 3.1 ป.4/1 ใช้ข้อมูลจากแผนภูมิแท่ง ตารางสองทาง ในการหาคำตอบของโจทย์ปัญหา และทบทวนตัวชี้วัดหลักทั้งคอร์ส"],["สาระสำคัญ","อ่านข้อมูลจากตาราง/แผนภูมิ เปรียบเทียบ หาผลรวม ผลต่าง และสรุปผลการเรียนทั้งหลักสูตร"],["จุดประสงค์ด้านความรู้ (K)","ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง"],["จุดประสงค์ด้านทักษะ (P)","ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70%"],["จุดประสงค์ด้านคุณลักษณะ (A)","ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด"],["สื่อ/อุปกรณ์","กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด"],["หลักการสอน","เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป"]]},{"type":"table","rows":[["จุดที่เด็กมักพลาดและวิธีแก้\n• ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้”\n• หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย\n• ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"]]}],"searchText":"แผนการสอนที่ 16: ตาราง แผนภูมิแท่ง สรุปรวม และแบบทดสอบหลังเรียน ระยะเวลา: 1 ชั่วโมง | รูปแบบ: เรียนพิเศษกลุ่มเล็ก/ตัวต่อตัว | เอกสารประกอบ: ใบความรู้ + ใบงาน + Exit Ticket หัวข้อ รายละเอียด ตัวชี้วัด ค 3.1 ป.4/1 ใช้ข้อมูลจากแผนภูมิแท่ง ตารางสองทาง ในการหาคำตอบของโจทย์ปัญหา และทบทวนตัวชี้วัดหลักทั้งคอร์ส สาระสำคัญ อ่านข้อมูลจากตาราง/แผนภูมิ เปรียบเทียบ หาผลรวม ผลต่าง และสรุปผลการเรียนทั้งหลักสูตร จุดประสงค์ด้านความรู้ (K) ผู้เรียนอธิบายแนวคิดหลักของบทเรียนได้ด้วยภาษาของตนเอง จุดประสงค์ด้านทักษะ (P) ผู้เรียนแสดงวิธีทำโจทย์ตามขั้นตอน และตรวจคำตอบได้อย่างน้อย 70% จุดประสงค์ด้านคุณลักษณะ (A) ผู้เรียนกล้าลองคิด กล้าอธิบาย และยอมตรวจแก้ข้อผิดพลาด สื่อ/อุปกรณ์ กระดาน, บัตรโจทย์, บัตรดาว Math Hero, ใบความรู้, ใบงาน, ปากกาสี/กระดาษทด หลักการสอน เริ่มจากตัวอย่างใกล้ตัว → ครูสาธิต → เด็กทำร่วมกัน → เกมเชื่อมเนื้อหา → ใบงานเดี่ยว → สรุป จุดที่เด็กมักพลาดและวิธีแก้ • ไม่ให้เด็กจำขั้นตอนอย่างเดียว ให้ถามเสมอว่า “ทำไมต้องทำแบบนี้” • หากเด็กตอบผิด ให้ครูพาเด็กย้อนดูข้อมูลในโจทย์/ตำแหน่งหลัก/หน่วย ก่อนเฉลย • ใช้คำถามนำ: รู้อะไร? ต้องการหาอะไร? ขั้นแรกควรทำอะไร? ตรวจอย่างไร?"},{"id":"ขั้นตอนการสอน-แผนที่-16-82","title":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 16","level":2,"parent":"แผนการสอนที่ 16: ตาราง แผนภูมิแท่ง สรุปรวม และแบบทดสอบหลังเรียน","lessonNo":16,"kind":"steps","teacherOnly":false,"blocks":[{"type":"table","rows":[["ช่วงกิจกรรม","ครูทำอะไร","เด็กทำอะไร","เหตุผล"],["1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง","แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน\n• ห้อง B ชาย 14 หญิง 13 รวมกี่คน\n• ห้องใดมีนักเรียนหญิงมากกว่า และมากกว่ากี่คน\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว","เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม","เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: อ่านสลับแถว–คอลัมน์ ไม่ดูสเกล และตอบจากภาพโดยไม่เขียนการคำนวณ"],["2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย","เขียนชื่อบท “แผนการสอนที่ 16: ตาราง แผนภูมิแท่ง สรุปรวม และแบบทดสอบหลังเรียน” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• รวมเด็กทั้งหมดกี่คน\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้","อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด","สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง"],["3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง","เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ตารางช่วยจัดข้อมูลเป็นแถวและคอลัมน์ อ่านโดยดูหัวตารางก่อน\n• แผนภูมิแท่งใช้ความสูง/ความยาวของแท่งแสดงจำนวน จึงใช้เปรียบเทียบข้อมูลได้ง่าย\n• การตอบโจทย์จากข้อมูลต้องระบุว่าอ่านจากส่วนใด และคำนวณผลรวม/ผลต่างอย่างไร\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• ตารางจำนวนนักเรียนชมรม: ศิลปะ 18 กีฬา 24 ดนตรี 15 กีฬา มากกว่าดนตรี 9 คน\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์","จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน","เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ชี้ชื่อเรื่อง หัวตาราง แกน หน่วย และสเกลก่อนตอบ"],["4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ","ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• ถ้าแผนภูมิแท่งแสดงยอดขาย จันทร์ 30 อังคาร 45 รวมสองวัน = 75\n• ตารางสองทางใช้เปรียบเทียบข้อมูล 2 กลุ่ม เช่น ห้องเรียนกับเพศ\n• รวมชายทั้งสองห้องกี่คน\n• รวมเด็กทั้งหมดกี่คน\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด","ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ","เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ"],["5. เกมเฉพาะบท: Math Champion Challenge","เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• แบ่งทีมตอบคำถาม 4 หมวด: จำนวน เศษส่วน/ทศนิยม การวัด/เรขาคณิต และข้อมูล\n• แต่ละทีมต้องมีคนอธิบายวิธีคิด ไม่ให้คนเก่งตอบคนเดียว\n• ปิดท้ายด้วย Post-test รายบุคคลและ feedback จุดแข็ง-จุดพัฒนา\nบัตรโจทย์พร้อมใช้ในเกม:\n• ห้อง B ชาย 14 หญิง 13 รวมกี่คน\n• รวมชายทั้งสองห้องกี่คน\n• สามวันขายรวมกี่แก้ว\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน","เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่","เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด"],["6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ","แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน\n• ห้อง B ชาย 14 หญิง 13 รวมกี่คน\n• ห้องใดมีนักเรียนหญิงมากกว่า และมากกว่ากี่คน\nช่วง B แสดงวิธี ข้อ 4–5:\n• รวมชายทั้งสองห้องกี่คน\n• รวมเด็กทั้งหมดกี่คน\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• ถ้าแผนภูมิแท่งยอดขายน้ำ: จันทร์ 25 แก้ว อังคาร 40 แก้ว พุธ 35 แก้ว วันใดขายมากที่สุด\n• สามวันขายรวมกี่แก้ว\n• เขียนคำถามจากข้อมูล 1 ข้อ พร้อมเฉลย\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น","ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด","การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย”"],["7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง","ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน\n• รวมชายทั้งสองห้องกี่คน\n• สามวันขายรวมกี่แก้ว\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง","ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป","Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที"]]},{"type":"p","style":"Normal","text":"เนื้อหาพร้อมเขียนบนกระดาน"},{"type":"p","style":"List Bullet","text":"ตารางช่วยจัดข้อมูลเป็นแถวและคอลัมน์ อ่านโดยดูหัวตารางก่อน"},{"type":"p","style":"List Bullet","text":"แผนภูมิแท่งใช้ความสูง/ความยาวของแท่งแสดงจำนวน จึงใช้เปรียบเทียบข้อมูลได้ง่าย"},{"type":"p","style":"List Bullet","text":"การตอบโจทย์จากข้อมูลต้องระบุว่าอ่านจากส่วนใด และคำนวณผลรวม/ผลต่างอย่างไร"},{"type":"p","style":"List Bullet","text":"ตารางจำนวนนักเรียนชมรม: ศิลปะ 18 กีฬา 24 ดนตรี 15 กีฬา มากกว่าดนตรี 9 คน"},{"type":"p","style":"List Bullet","text":"ถ้าแผนภูมิแท่งแสดงยอดขาย จันทร์ 30 อังคาร 45 รวมสองวัน = 75"},{"type":"p","style":"List Bullet","text":"ตารางสองทางใช้เปรียบเทียบข้อมูล 2 กลุ่ม เช่น ห้องเรียนกับเพศ"},{"type":"p","style":"Normal","text":"ชุดบัตรเกมพร้อมใช้"},{"type":"p","style":"List Number","text":"จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน"},{"type":"p","style":"List Number","text":"ห้อง B ชาย 14 หญิง 13 รวมกี่คน"},{"type":"p","style":"List Number","text":"ห้องใดมีนักเรียนหญิงมากกว่า และมากกว่ากี่คน"},{"type":"p","style":"List Number","text":"รวมชายทั้งสองห้องกี่คน"},{"type":"p","style":"List Number","text":"รวมเด็กทั้งหมดกี่คน"},{"type":"table","rows":[["คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: อ่านสลับแถว–คอลัมน์ ไม่ดูสเกล และตอบจากภาพโดยไม่เขียนการคำนวณ\n• วิธีช่วยเมื่อเด็กติด: ชี้ชื่อเรื่อง หัวตาราง แกน หน่วย และสเกลก่อนตอบ"]]}],"searchText":"ขั้นตอนการสอนฉบับละเอียด แผนที่ 16 แผนการสอนที่ 16: ตาราง แผนภูมิแท่ง สรุปรวม และแบบทดสอบหลังเรียน ช่วงกิจกรรม ครูทำอะไร เด็กทำอะไร เหตุผล 1. เกมทั่วไป: Quick 10 พร้อมโจทย์จริง แจกกระดานคำตอบ/กระดาษทด แล้วให้ทำทีละข้อโดยยังไม่เปิดใบความรู้\n• จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน\n• ห้อง B ชาย 14 หญิง 13 รวมกี่คน\n• ห้องใดมีนักเรียนหญิงมากกว่า และมากกว่ากี่คน\nหลังแต่ละข้อให้ชูคำตอบพร้อมกัน สุ่มผู้เรียนอธิบาย “ดูข้อมูลใด ใช้หลักใด และตรวจอย่างไร” ให้ดาว Math Hero สำหรับคำอธิบาย ไม่ใช่เฉพาะความเร็ว เขียนคำตอบทีละข้อ ชูพร้อมกัน และพูดวิธีคิดเป็นประโยคเต็ม\n• ทำ ✓ หน้าข้อที่มั่นใจ และ ? หน้าข้อที่ยังไม่แน่ใจ\n• แก้คำตอบด้วยปากกาสีอื่นหลังฟังเหตุผล โดยไม่ลบหลักฐานเดิม เช็กความรู้เดิมด้วยโจทย์เดียวกับบทจริง และทำให้ครูเห็นทันทีว่าเด็กมีจุดพลาดเรื่องใด\nจุดที่ต้องสังเกต: อ่านสลับแถว–คอลัมน์ ไม่ดูสเกล และตอบจากภาพโดยไม่เขียนการคำนวณ 2. ขั้นต้น: เปิดสถานการณ์และตั้งเป้าหมาย เขียนชื่อบท “แผนการสอนที่ 16: ตาราง แผนภูมิแท่ง สรุปรวม และแบบทดสอบหลังเรียน” และยกสถานการณ์จากใบงานขึ้นมาคุยก่อนคำนวณ:\n• รวมเด็กทั้งหมดกี่คน\nถามนำ 4 ข้อ: รู้อะไร? ต้องการหาอะไร? คำตอบควรมากขึ้นหรือลดลง/อยู่ช่วงใด? จะตรวจได้อย่างไร?\nเขียนเป้าหมายบทเรียนให้เด็กอ่านร่วมกัน: อธิบายแนวคิด แสดงวิธี และตรวจคำตอบได้ อ่านสถานการณ์สองรอบ รอบแรกฟังเรื่อง รอบสองขีดข้อมูลและคำถาม\n• คาดเดาลักษณะคำตอบก่อนลงมือ\n• บอกวิธีที่คิดว่าจะใช้ และจดคำศัพท์สำคัญของบทลงสมุด สถานการณ์ทำให้เด็กเห็นว่าเนื้อหานี้ใช้แก้ปัญหาอะไร ไม่ใช่สูตรลอย ๆ\nการคาดเดาก่อนคำนวณช่วยสร้างความรู้สึกเชิงจำนวนและใช้ตรวจคำตอบภายหลัง 3. ขั้นสอน 1: ครูสาธิตเนื้อหาพร้อมตัวอย่าง เขียน “แนวคิดที่ต้องรู้” บนกระดานและอธิบายทีละข้อ:\n• ตารางช่วยจัดข้อมูลเป็นแถวและคอลัมน์ อ่านโดยดูหัวตารางก่อน\n• แผนภูมิแท่งใช้ความสูง/ความยาวของแท่งแสดงจำนวน จึงใช้เปรียบเทียบข้อมูลได้ง่าย\n• การตอบโจทย์จากข้อมูลต้องระบุว่าอ่านจากส่วนใด และคำนวณผลรวม/ผลต่างอย่างไร\nจากนั้นสาธิตแบบคิดเสียงดังโดยใช้ตัวอย่างจริงจากใบความรู้:\n• ตารางจำนวนนักเรียนชมรม: ศิลปะ 18 กีฬา 24 ดนตรี 15 กีฬา มากกว่าดนตรี 9 คน\nทุกขั้นให้ครูพูดว่าเลือกทำอะไร เพราะอะไร และตรวจตรงไหน หากมีสื่อรูปธรรม/ตาราง/เส้นจำนวนให้ใช้ก่อนสัญลักษณ์ จดเฉพาะคำสำคัญ ไม่คัดทุกคำ\n• เติมขั้นที่ครูเว้นว่างและตอบคำถามระหว่างสาธิต\n• อธิบายตัวอย่างกลับด้วยภาษาตนเองหนึ่งครั้ง\n• ใช้สีวงข้อมูล ขั้นคำนวณ และคำตอบแยกกัน เด็กเห็นกระบวนการคิดจริง ไม่เห็นเพียงคำตอบสำเร็จ\nสื่อช่วยประคอง: ชี้ชื่อเรื่อง หัวตาราง แกน หน่วย และสเกลก่อนตอบ 4. ขั้นสอน 2: ฝึกร่วมกันแบบมีคำถามนำ ทำตัวอย่างร่วมกันจากใบความรู้และใบงาน:\n• ถ้าแผนภูมิแท่งแสดงยอดขาย จันทร์ 30 อังคาร 45 รวมสองวัน = 75\n• ตารางสองทางใช้เปรียบเทียบข้อมูล 2 กลุ่ม เช่น ห้องเรียนกับเพศ\n• รวมชายทั้งสองห้องกี่คน\n• รวมเด็กทั้งหมดกี่คน\nครูไม่เฉลยทันที แต่ใช้คำถามลำดับเดิม: ขั้นแรกทำอะไร? เพราะอะไร? คำตอบควรอยู่ช่วงใด? หน่วย/ตำแหน่งถูกไหม? ตรวจย้อนกลับได้อย่างไร?\nเมื่อเด็กผิด ให้ย้อนกลับไปยังบรรทัดแรกที่ผิดและแก้เฉพาะจุด ผลัดกันเป็น 3 บทบาท: ผู้วางแผน ผู้คำนวณ และผู้ตรวจ\n• เขียนวิธีทำทีละบรรทัด\n• ชี้จุดที่เพื่อนทำถูกก่อนเสนอจุดแก้\n• สรุปกฎหรือขั้นตอนด้วยภาษาตนเองหลังจบแต่ละข้อ เปลี่ยนผู้เรียนจากผู้ฟังเป็นผู้ลงมือคิด และทำให้ครูแยกได้ว่าผิดจากแนวคิดหรือการคำนวณ\nการแก้เฉพาะบรรทัดแรกที่ผิดฝึกทักษะตรวจงานอย่างเป็นระบบ 5. เกมเฉพาะบท: Math Champion Challenge เตรียมอุปกรณ์ตามกติกา แล้วอธิบายรอบทดลอง 1 รอบก่อนจับเวลา/ให้คะแนน\n• แบ่งทีมตอบคำถาม 4 หมวด: จำนวน เศษส่วน/ทศนิยม การวัด/เรขาคณิต และข้อมูล\n• แต่ละทีมต้องมีคนอธิบายวิธีคิด ไม่ให้คนเก่งตอบคนเดียว\n• ปิดท้ายด้วย Post-test รายบุคคลและ feedback จุดแข็ง-จุดพัฒนา\nบัตรโจทย์พร้อมใช้ในเกม:\n• ห้อง B ชาย 14 หญิง 13 รวมกี่คน\n• รวมชายทั้งสองห้องกี่คน\n• สามวันขายรวมกี่แก้ว\nเกณฑ์คะแนน: คำตอบถูก 1 คะแนน + วิธีคิด/เหตุผล 1 คะแนน + การตรวจหรือหน่วยถูก 1 คะแนน เล่นเป็นคู่หรือทีมเล็กและสลับบทบาททุกข้อ\n• ต้องวาง/วาด/เขียนหลักฐานก่อนประกาศคำตอบ\n• ทีมอื่นมีสิทธิ์ทักเมื่อชี้จุดที่ควรแก้ได้ชัด\n• บันทึกข้อที่ผิดลง “สมุดจุดพัฒนา” พร้อมวิธีแก้ใหม่ เกมยังคงเป้าหมายทางคณิตศาสตร์ เพราะให้คะแนนกระบวนการและการตรวจ ไม่ใช่ความเร็วอย่างเดียว\nการสลับบทบาทช่วยไม่ให้เด็กเก่งคนเดียวทำทั้งหมด 6. ลงมือทำใบงานพร้อมการช่วยเหลือเป็นระดับ แบ่งใบงานเป็น 3 ช่วงและหยุดตรวจระหว่างช่วง\nช่วง A พื้นฐาน ข้อ 1–3:\n• จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน\n• ห้อง B ชาย 14 หญิง 13 รวมกี่คน\n• ห้องใดมีนักเรียนหญิงมากกว่า และมากกว่ากี่คน\nช่วง B แสดงวิธี ข้อ 4–5:\n• รวมชายทั้งสองห้องกี่คน\n• รวมเด็กทั้งหมดกี่คน\nช่วง C เหตุผล/ประยุกต์ ข้อ 6–8:\n• ถ้าแผนภูมิแท่งยอดขายน้ำ: จันทร์ 25 แก้ว อังคาร 40 แก้ว พุธ 35 แก้ว วันใดขายมากที่สุด\n• สามวันขายรวมกี่แก้ว\n• เขียนคำถามจากข้อมูล 1 ข้อ พร้อมเฉลย\nครูเดินดูหลักฐานวิธีคิด หากเด็กติดให้ใช้คำใบ้ตามลำดับ: ชี้ข้อมูล → เตือนสื่อ/ตาราง → ให้ตัวอย่างคล้ายกัน 1 ข้อ โดยไม่บอกคำตอบข้อนั้น ทำช่วง A ด้วยตนเองแล้วจับคู่ตรวจ\n• ทำช่วง B โดยเขียนวิธีครบและวงจุดที่ไม่มั่นใจ\n• ทำช่วง C รายบุคคลและอธิบายอย่างน้อยหนึ่งข้อให้ครู/เพื่อนฟัง\n• เด็กที่คล่องสร้างโจทย์เพิ่มหรือหาวิธีที่สอง เด็กที่ยังไม่คล่องใช้สื่อช่วยตามที่ครูกำหนด การหยุดตรวจป้องกันการทำผิดซ้ำทั้งหน้า และทำให้ครูช่วยตรงระดับ\nหลักฐานวิธีคิดช่วยแยก “ยังไม่เข้าใจแนวคิด” ออกจาก “คำนวณพลาดเล็กน้อย” 7. ขั้นสรุปผล ประเมิน และ Feedback ผู้ปกครอง ให้ปิดใบความรู้แล้วทำ Exit Ticket 3 ข้อจากทักษะต่างระดับ:\n• จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน\n• รวมชายทั้งสองห้องกี่คน\n• สามวันขายรวมกี่แก้ว\nเฉลยโดยให้เด็กอธิบายก่อนครูสรุป แล้วเขียน “ประโยคจำง่ายของบท” 1 ประโยค\nบันทึกผลเป็น 3 ระดับ: ทำได้เอง / ทำได้เมื่อมีคำใบ้ / ต้องเสริม พร้อมจดข้อผิดจริงหนึ่งตัวอย่างสำหรับส่งผู้ปกครอง ทำ Exit Ticket รายบุคคลและประเมินความมั่นใจ C=มั่นใจ / U=ยังไม่มั่นใจ\n• แลกตรวจตามวิธีบนกระดานและแก้ด้วยปากกาสี\n• เขียนหนึ่งสิ่งที่ทำได้ดี หนึ่งเรื่องที่ต้องฝึก และเป้าหมายครั้งถัดไป Exit Ticket ใช้ข้อมูลจริง ไม่ประเมินจากความรู้สึกของครูเพียงอย่างเดียว\nFeedback ที่มีตัวอย่างข้อผิดและวิธีฝึกช่วยผู้ปกครองนำไปใช้ต่อได้ทันที เนื้อหาพร้อมเขียนบนกระดาน ตารางช่วยจัดข้อมูลเป็นแถวและคอลัมน์ อ่านโดยดูหัวตารางก่อน แผนภูมิแท่งใช้ความสูง/ความยาวของแท่งแสดงจำนวน จึงใช้เปรียบเทียบข้อมูลได้ง่าย การตอบโจทย์จากข้อมูลต้องระบุว่าอ่านจากส่วนใด และคำนวณผลรวม/ผลต่างอย่างไร ตารางจำนวนนักเรียนชมรม: ศิลปะ 18 กีฬา 24 ดนตรี 15 กีฬา มากกว่าดนตรี 9 คน ถ้าแผนภูมิแท่งแสดงยอดขาย จันทร์ 30 อังคาร 45 รวมสองวัน = 75 ตารางสองทางใช้เปรียบเทียบข้อมูล 2 กลุ่ม เช่น ห้องเรียนกับเพศ ชุดบัตรเกมพร้อมใช้ จากตาราง: ห้อง A ชาย 12 หญิง 15 รวมกี่คน ห้อง B ชาย 14 หญิง 13 รวมกี่คน ห้องใดมีนักเรียนหญิงมากกว่า และมากกว่ากี่คน รวมชายทั้งสองห้องกี่คน รวมเด็กทั้งหมดกี่คน คำพูดครูพร้อมใช้\n• “ครูยังไม่ต้องการคำตอบเร็ว ขอให้ชี้ว่าหนูใช้ข้อมูลหรือหลักใด”\n• “ลองตรวจด้วยอีกวิธีหนึ่งก่อนบอกว่าถูก”\n• จุดสังเกตประจำบท: อ่านสลับแถว–คอลัมน์ ไม่ดูสเกล และตอบจากภาพโดยไม่เขียนการคำนวณ\n• วิธีช่วยเมื่อเด็กติด: ชี้ชื่อเรื่อง หัวตาราง แกน หน่วย และสเกลก่อนตอบ"},{"id":"ใบความรู้-แผนที่-16-ตาราง-แผนภูมิแท่ง-สรุปรวม-และแบบทดสอบหลังเรียน-83","title":"ใบความรู้ แผนที่ 16: ตาราง แผนภูมิแท่ง สรุปรวม และแบ
